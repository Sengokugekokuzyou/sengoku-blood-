<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>戦国血脈 - 武将詳細</title>
    <style>
        body {
            background-color: #000;
            color: #d1b891; /* ゴールド系の文字 */
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .busho-detail-popup {
            background-color: #111; /* 黒に近い背景 */
            border: 3px solid #ffcc00; /* 派手なゴールド枠 */
            border-radius: 15px;
            width: 340px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.5);
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #ffcc00;
            cursor: pointer;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .busho-name {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
        }

        .busho-meta {
            font-size: 14px;
            margin-top: 5px;
        }

        .status-block {
            background-color: #222; /* 濃いグレー背景 */
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            text-align: center;
            display: flex;
            justify-content: space-around;
        }

        .status-item {
            font-size: 16px;
        }

        .section-title {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            margin-bottom: 5px;
        }

        .skill-block, .relationship-block, .bloodline-block {
            border: 1px solid #444; /* 薄い枠 */
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .skill-list {
            font-size: 14px;
            text-align: center;
        }

        .skill-item {
            margin: 0 5px;
        }

        .bloodline-pair {
            font-size: 18px;
            text-align: center;
            color: #ffcc00;
            margin-bottom: 10px;
        }

        .pedigree-btn {
            background-color: #ffcc00;
            color: #000;
            border: none;
            border-radius: 5px;
            width: 100%;
            padding: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            display: block;
            text-align: center;
        }

        .relationship-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
            color: #eee;
        }

        .relationship-value {
            color: #44ee44; /* 緑の文字 */
        }

        .back-btn {
            background-color: #ffcc00; /* ゴールド背景 */
            color: #000;
            border: none;
            border-radius: 5px;
            width: 100%;
            padding: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            display: block;
            text-align: center;
        }

    </style>
</head>
<body>

<div class="busho-detail-popup">
    <div class="close-btn">×</div>
    
    <div class="header">
        <div class="busho-name">明智 光忠</div>
        <div class="busho-meta">文官 Lv.15 | 〇〇歳</div>
    </div>

    <div class="status-block">
        <div class="status-item">武力 257</div>
        <div class="status-item">知力 99</div>
        <div class="status-item">統率 180</div>
    </div>

    <div class="section-title">所持スキル</div>
    <div class="skill-block">
        <div class="skill-list">
            <span class="skill-item">・外交術</span>
            <span class="skill-item">・和歌</span>
            <span class="skill-item">・建築</span>
        </div>
    </div>

    <div class="section-title">血統 (父 × 母)</div>
    <div class="bloodline-block">
        <div class="bloodline-pair">
            織田信長 × 濃姫(齋藤)
        </div>
        <button class="pedigree-btn">家系図の系譜を表示</button>
    </div>

    <div class="section-title">人間関係</div>
    <div class="relationship-block">
        <div class="relationship-item">
            <span>織田 信廣</span>
            <span class="relationship-value">やや対立 (+3)</span>
        </div>
        <div class="relationship-item">
            <span>お 市</span>
            <span class="relationship-value">普通 (+24)</span>
        </div>
        <div class="relationship-item">
            <span>(空き)</span>
            <span></span>
        </div>
    </div>

    <button class="back-btn">城に戻る</button>
</div>

</body>
</html>
