<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=DotGothic16&display=swap');
:root{
  --gold:#c8960c;--gold-l:#f0c040;--gold-d:rgba(200,150,12,.4);
  --parchment:#f5e8c8;--ink:#0e0800;--panel:rgba(8,4,0,.88);
  --crimson:#8b0000;
  /* スマホ縦画面基準サイズ変数 */
  --h-header:52px;
  --h-nationbar:28px;
  --h-partyrow:70px;
  --h-actionrow:62px;
  --h-bottom-pad:max(env(safe-area-inset-bottom,0px),8px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:var(--ink);
  font-family:'Noto Serif JP',serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  /* iOSバウンス防止 */
  position:fixed;
  touch-action:none;
}

/* ─── 背景 ─── */
#sky{position:fixed;inset:0;z-index:0;background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);}
.star{position:fixed;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.7}}
.mist{position:fixed;left:-20%;width:140%;background:linear-gradient(90deg,transparent,rgba(245,228,180,.06),rgba(245,228,180,.1),rgba(245,228,180,.06),transparent);border-radius:50%;animation:drift linear infinite;pointer-events:none;}
.mist:nth-child(1){height:40px;top:30%;animation-duration:32s;}
.mist:nth-child(2){height:50px;top:48%;animation-duration:26s;animation-delay:-11s;opacity:.65;}
.mist:nth-child(3){height:35px;top:40%;animation-duration:42s;animation-delay:-20s;opacity:.45;}
@keyframes drift{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(7%) scaleY(1.4)}100%{transform:translateX(-8%) scaleY(1)}}
.petal{position:fixed;border-radius:50% 0 50% 0;background:radial-gradient(ellipse,rgba(255,200,200,.9) 0%,rgba(255,130,130,.25) 100%);animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg) translateX(0);opacity:0}7%{opacity:.9}93%{opacity:.5}100%{transform:translateY(102vh) rotate(760deg) translateX(45px);opacity:0}}

/* ─── メインレイアウト（縦画面厳密固定） ─── */
#main{
  position:fixed;inset:0;
  z-index:10;
  display:grid;
  grid-template-rows:var(--h-header) 1fr auto;
  width:100%;
  height:100%;
}

/* ─── ヘッダー ─── */
#header{
  height:var(--h-header);
  padding:max(env(safe-area-inset-top,0px),8px) 12px 4px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:6px;
  flex-shrink:0;
}
#game-title{
  color:var(--gold);
  font-size:clamp(13px,4.2vw,17px);
  font-weight:900;
  letter-spacing:.25em;
  text-shadow:0 0 16px rgba(200,150,12,.7);
  line-height:1.3;
  white-space:nowrap;
}
#game-title .sub{
  display:block;
  font-size:clamp(7px,1.8vw,9px);
  letter-spacing:.4em;
  color:var(--gold-d);
  font-weight:400;
  margin-top:1px;
}
#status-panel{display:flex;flex-direction:row;align-items:center;gap:5px;}
.stat-chip{
  display:flex;align-items:center;gap:3px;
  background:var(--panel);
  border:1px solid var(--gold-d);
  border-radius:16px;
  padding:3px 8px;
}
.sl{font-size:8px;color:rgba(245,232,200,.5);letter-spacing:.1em;}
.sv{font-size:13px;font-weight:700;color:var(--gold-l);}
.su{font-size:8px;color:var(--gold-d);}

/* ─── ISOフィールド（残り全高さ） ─── */
#iso-field{position:relative;overflow:hidden;min-height:0;}
#iso-canvas{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
}
#bubble-layer{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}
.facility-activity{
  position:absolute;font-size:9px;
  font-family:'Noto Serif JP',serif;
  color:#ffdd88;pointer-events:none;
  text-shadow:0 1px 3px #000;white-space:nowrap;
  transform:translateX(-50%);
  animation:actPop 0.3s ease-out;
}
@keyframes actPop{0%{opacity:0;transform:translateX(-50%) scale(0.5)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.float-text{
  position:absolute;font-size:10px;
  font-family:'Noto Serif JP',serif;
  pointer-events:none;text-shadow:0 1px 3px #000;
  white-space:nowrap;transform:translateX(-50%);
  animation:floatUp 1.8s ease-out forwards;
}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-36px)}}

/* ─── ボトムUI ─── */
#bottom-ui{
  flex-shrink:0;
  padding:0 10px var(--h-bottom-pad);
  background:linear-gradient(0deg,rgba(6,3,0,.98) 0%,rgba(6,3,0,.82) 80%,transparent 100%);
}

/* 統一バー */
#nation-bar{
  display:flex;align-items:center;gap:7px;
  padding:5px 2px 4px;
  border-bottom:1px solid rgba(200,150,12,.12);
  height:var(--h-nationbar);
}
.nl{font-size:8px;color:var(--gold-d);letter-spacing:.18em;white-space:nowrap;}
.nt{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
.nf{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b0000,var(--gold));transition:width .6s;}
.np{font-size:10px;color:var(--gold-l);font-weight:700;min-width:30px;text-align:right;}

/* パーティ行 */
#party-row{
  display:flex;gap:5px;
  padding:4px 0 3px;
  overflow-x:auto;
  scrollbar-width:none;
  height:var(--h-partyrow);
  align-items:center;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-x;
}
#party-row::-webkit-scrollbar{display:none;}
.party-card{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,150,12,.2);
  border-radius:8px;
  padding:4px 8px;
  min-width:56px;
  cursor:pointer;
  transition:border-color .2s,background .2s;
  touch-action:manipulation;
}
.party-card.head{border-color:var(--gold);background:rgba(200,150,12,.08);}
.party-card:active{background:rgba(200,150,12,.18);}
.pc-role{font-size:7px;color:var(--gold-d);letter-spacing:.08em;}
.pc-name{font-size:9px;color:var(--parchment);font-weight:700;}
.pc-pow{font-size:8px;color:#ffaa44;}
.pc-hp{font-size:7px;}
.pc-loc{font-size:7px;color:#aaddff;margin-top:1px;}

/* アクションボタン行 */
#action-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:5px;
  padding:3px 0 2px;
  height:var(--h-actionrow);
}
.act-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:var(--panel);
  border:1px solid var(--gold-d);
  border-radius:10px;
  padding:0 4px;
  cursor:pointer;
  transition:background .15s,border-color .15s,transform .1s;
  color:var(--parchment);font-family:inherit;
  touch-action:manipulation;
  /* タップ領域拡大 */
  min-height:52px;
}
.act-btn:active{transform:scale(.91);background:rgba(200,150,12,.16);border-color:var(--gold);}
.act-btn .ico{font-size:20px;line-height:1;}
.act-btn .lbl{font-size:9px;letter-spacing:.12em;color:rgba(245,232,200,.72);}
.act-btn.primary{border-color:var(--gold);background:rgba(139,0,0,.45);}
.act-btn.primary .lbl{color:var(--gold-l);}

/* ─── 合戦画面（ピクセルアートバトル） ─── */
#battle-screen{
  position:fixed;inset:0;z-index:500;
  background:#0e0600;
  display:none;flex-direction:column;
  font-family:'DotGothic16',monospace;
}
#battle-screen.show{display:flex;}
#bscr-inner{
  display:flex;flex-direction:column;
  width:100%;height:100%;
}
#bscr-frame{
  position:relative;
  flex:1;min-height:0;
  border-bottom:3px solid #8b6914;
  box-shadow:0 4px 20px #c8960033;
  overflow:hidden;
}
#bg-canvas,#battle-main-canvas{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
}
#battle-log-bar{
  flex-shrink:0;
  height:26px;
  background:#0a0600;
  border-bottom:1px solid #4a3000;
  color:#e8c060;
  font-size:clamp(9px,2.8vw,13px);
  display:flex;align-items:center;
  padding:0 10px;
  letter-spacing:.06em;
  overflow:hidden;white-space:nowrap;
}
#battle-ui-panel{
  flex-shrink:0;
  height:72px;
  display:flex;gap:3px;padding:4px;
  background:#1a0800;
}
.bunit-panel{
  flex:1;
  background:linear-gradient(180deg,#e8dcc0,#d4c090 40%,#c0a860);
  border:2px solid #7a5800;border-radius:4px;
  padding:4px 8px;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:inset 0 1px 0 #fff8,inset 0 -1px 0 #0004;
}
.bunit-top{display:flex;align-items:baseline;justify-content:space-between;}
.bunit-name{font-size:clamp(10px,3.5vw,14px);color:#1a0800;letter-spacing:.04em;}
.bhp-group{display:flex;align-items:baseline;gap:3px;}
.bhp-label{font-size:clamp(7px,1.8vw,9px);color:#6a4000;}
.bhp-value{font-size:clamp(14px,4vw,20px);color:#1a0800;letter-spacing:.08em;min-width:30px;text-align:right;}
.bpower-label{font-size:clamp(7px,2vw,9px);color:#5a3800;line-height:1;}
.bpower-wrap{
  width:100%;height:clamp(8px,2.5vw,13px);
  background:#2a1800;border:1px solid #5a3000;
  border-radius:2px;overflow:hidden;position:relative;
}
.bpower-bar{
  height:100%;
  background:linear-gradient(90deg,#2060c0,#2080e0 40%,#40a0ff);
  transition:width .35s ease;
}
.bpower-bar-enemy{
  background:linear-gradient(90deg,#c01010,#e82020 40%,#ff4040);
}
.bpower-ticks{position:absolute;inset:0;display:flex;pointer-events:none;}
.bpower-ticks span{flex:1;border-right:1px solid #0003;}
/* 結果パネル */
#battle-result-panel{
  display:none;position:absolute;inset:0;
  align-items:center;justify-content:center;
  flex-direction:column;gap:0;
  background:#000b;z-index:10;
}
#battle-result-panel.show{display:flex;}
#result-box{
  background:linear-gradient(180deg,#f4e080,#c89020);
  border:3px solid #7a5000;border-radius:10px;
  padding:18px 32px;text-align:center;
  box-shadow:0 8px 40px #00000099;
}
.bres-title{
  font-family:'DotGothic16',monospace;
  font-size:clamp(14px,5vw,20px);
  color:#1a0800;letter-spacing:.2em;margin-bottom:12px;
  display:block;
}
.bres-detail{
  font-family:'DotGothic16',monospace;
  font-size:clamp(10px,3vw,13px);
  color:#3a1400;text-align:center;
  line-height:1.9;white-space:pre-line;margin-bottom:14px;
}
.bres-btn{
  font-family:'DotGothic16',monospace;
  font-size:clamp(11px,3.2vw,14px);
  background:linear-gradient(180deg,#e05010,#a02808);
  color:#fff8e0;border:2px solid #601000;border-radius:6px;
  padding:8px 24px;cursor:pointer;touch-action:manipulation;
}

/* ─── 系譜モーダル ─── */
#pedigree-modal{position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;justify-content:center;background:rgba(8,4,0,.92);}
#pedigree-modal.show{display:flex;}
.ped-shell{
  width:100%;max-width:480px;
  height:88%;
  background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));
  border:1px solid rgba(200,150,12,.35);
  border-radius:18px 18px 0 0;
  overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;
}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
.ped-head{
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(200,150,12,.15);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.ped-title{font-size:14px;color:var(--gold);font-weight:700;letter-spacing:.3em;}
.close-btn{
  background:none;border:1px solid rgba(200,150,12,.3);
  color:var(--gold);font-size:13px;padding:5px 14px;
  border-radius:20px;cursor:pointer;font-family:inherit;
  touch-action:manipulation;
}
#pedigree-content{overflow-y:auto;padding:12px 14px;flex:1;-webkit-overflow-scrolling:touch;}
.gen-block{margin-bottom:14px;}
.gen-label{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-bottom:5px;}
.gen-list{display:flex;flex-wrap:wrap;gap:5px;}
.gen-card{
  background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.18);
  border-radius:8px;padding:7px 10px;font-size:9px;color:var(--parchment);line-height:1.6;
}
.gen-card .gn{font-size:11px;font-weight:700;color:var(--gold-l);}
.gen-card .gp{color:#ffaa44;}

/* ─── 武将モーダル ─── */
#warrior-modal{position:fixed;inset:0;z-index:700;display:none;align-items:flex-end;justify-content:center;background:rgba(8,4,0,.92);}
#warrior-modal.show{display:flex;}
.wm-shell{
  width:100%;max-width:480px;
  background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));
  border:1px solid rgba(200,150,12,.35);
  border-radius:18px 18px 0 0;
  overflow:hidden;
  animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;
}
.wm-head{padding:16px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);}
.wm-name{font-size:18px;font-weight:900;color:var(--gold-l);letter-spacing:.2em;}
.wm-role{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-top:2px;}
.wm-body{padding:10px 16px max(env(safe-area-inset-bottom,0px),16px);}
.wm-stat{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.wm-stat .wsk{color:rgba(245,228,180,.6);}
.wm-stat .wsv{color:var(--parchment);font-weight:700;}
.wm-hp-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin:2px 0 6px;}
.wm-hp-fill{height:100%;border-radius:3px;transition:width .4s;}
.wm-close{
  display:block;width:100%;background:none;
  border:1px solid rgba(200,150,12,.3);color:var(--gold);
  font-family:inherit;font-size:12px;padding:11px;
  border-radius:8px;cursor:pointer;margin-top:10px;letter-spacing:.3em;
  touch-action:manipulation;
}

/* ─── 縁組モーダル ─── */
#engumi-modal{position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;justify-content:center;background:rgba(8,4,0,.92);}
#engumi-modal.show{display:flex;}
.modal-shell{
  position:relative;width:100%;max-width:480px;
  height:92%;
  background:linear-gradient(160deg,rgba(14,8,2,.99) 0%,rgba(10,5,1,1) 100%);
  border:1px solid rgba(200,150,12,.35);
  border-radius:18px 18px 0 0;
  box-shadow:0 0 0 1px rgba(200,150,12,.1),0 -20px 60px rgba(139,0,0,.2);
  overflow:hidden;display:flex;flex-direction:column;
  animation:slideUp .4s cubic-bezier(.22,.68,0,1.1) both;
}
.modal-deco-top{height:3px;background:linear-gradient(90deg,transparent,var(--gold),rgba(200,150,12,.4),var(--gold),transparent);}
.modal-header{
  padding:14px 18px 10px;
  border-bottom:1px solid rgba(200,150,12,.1);
  flex-shrink:0;
}
.modal-kamon{font-size:28px;text-align:center;margin-bottom:4px;text-shadow:0 0 24px rgba(200,150,12,.4);}
.modal-title{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.5em;text-align:center;}
.modal-subtitle{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.35em;text-align:center;margin-top:3px;}
.modal-body{
  flex:1;overflow-y:auto;
  padding:14px 16px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
}
.modal-body::-webkit-scrollbar{display:none;}
.modal-section{margin-bottom:14px;}
.modal-section-title{font-size:9px;color:rgba(200,150,12,.6);letter-spacing:.3em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(200,150,12,.12);}
.engumi-cost{
  text-align:center;padding:8px;
  background:rgba(200,150,12,.06);border:1px solid rgba(200,150,12,.15);
  border-radius:8px;margin-bottom:12px;
}
.engumi-cost .ec-label{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.3em;}
.engumi-cost .ec-val{font-size:20px;font-weight:900;color:var(--gold-l);display:block;margin-top:2px;}
.engumi-cost .ec-unit{font-size:9px;color:rgba(200,150,12,.6);}
.warrior-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.warrior-sel-card{
  background:rgba(255,255,255,.03);border:1px solid rgba(200,150,12,.15);
  border-radius:10px;padding:10px;cursor:pointer;transition:all .2s;
  touch-action:manipulation;
  /* タップ領域確保 */
  min-height:60px;
}
.warrior-sel-card:active,.warrior-sel-card.selected{background:rgba(200,150,12,.12);border-color:var(--gold);}
.wsc-name{font-size:12px;font-weight:700;color:var(--parchment);}
.wsc-stats{font-size:10px;color:rgba(200,150,12,.7);margin-top:3px;}
.wsc-hp{font-size:9px;margin-top:2px;}
.confirm-panel{background:rgba(200,150,12,.05);border:1px solid rgba(200,150,12,.18);border-radius:10px;padding:12px;}
.confirm-pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.confirm-w{text-align:center;}
.confirm-w .cw-name{font-size:13px;font-weight:700;color:var(--parchment);}
.confirm-w .cw-role{font-size:9px;color:var(--gold-d);}
.confirm-heart{font-size:22px;color:var(--crimson);text-shadow:0 0 12px rgba(139,0,0,.5);}
.child-preview{background:rgba(255,255,255,.03);border-radius:8px;padding:9px;margin-top:7px;}
.cp-title{font-size:8px;color:rgba(200,150,12,.5);letter-spacing:.3em;margin-bottom:5px;}
.cp-stat{display:flex;justify-content:space-between;font-size:10px;color:rgba(245,228,180,.7);padding:2px 0;}
.cp-stat .cpv{color:var(--gold-l);font-weight:700;}
.modal-footer{
  padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);
  border-top:1px solid rgba(200,150,12,.1);
  display:flex;gap:8px;flex-shrink:0;
}
.modal-btn{
  flex:1;padding:13px;border-radius:10px;
  font-family:inherit;font-size:12px;letter-spacing:.25em;
  cursor:pointer;transition:all .2s;touch-action:manipulation;
}
.modal-btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:rgba(200,150,12,.6);}
.modal-btn-cancel:active{background:rgba(200,150,12,.08);}
.modal-btn-exec{
  background:linear-gradient(135deg,rgba(139,0,0,.65),rgba(180,30,0,.55));
  border:1px solid rgba(200,150,12,.5);color:var(--gold-l);font-weight:700;
  box-shadow:0 3px 16px rgba(139,0,0,.25);
}
.modal-btn-exec:active{transform:scale(.96);}
.modal-btn-exec:disabled{opacity:.38;cursor:not-allowed;}
.modal-step-indicator{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,150,12,.22);transition:all .3s;}
.step-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(200,150,12,.5);}

/* ─── 成功オーバーレイ ─── */
#success-overlay{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;background:rgba(8,4,0,.96);flex-direction:column;gap:12px;padding:20px;}
#success-overlay.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.suc-kamon{font-size:52px;animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.suc-title{font-size:12px;color:var(--gold-d);letter-spacing:.5em;text-align:center;}

<script>
'use strict';

// ============================================================
//  定数・設定
// ============================================================
const ENGUMI_COST = 600;

const FACILITY_EFFECT = {
  training: { stat:'power',   label:'武力', color:'#ffcc44', range:[5,11], costHp:-6 },
  forge:    { stat:'power',   label:'武力', color:'#ffaa44', range:[4,9],  costHp:-5 },
  academy:  { stat:'wisdom',  label:'知力', color:'#aaddff', range:[5,10], costHp:-4 },
  tea:      { stat:'hp',      label:'体力', color:'#88ffcc', range:[12,18],costHp:8  },
  garden:   { stat:'hp',      label:'体力', color:'#ff88cc', range:[18,25],costHp:15 },
  loyalty:  { stat:'loyalty', label:'忠誠', color:'#ffdd88', range:[7,14], costHp:-3 },
};

const FACILITY_MAP = {
  training:{ name:'鍛錬場', color:'#cc8800', icon:'🏋️' },
  forge:   { name:'鍛冶場', color:'#aa6600', icon:'⚒️' },
  academy: { name:'学問所', color:'#4488cc', icon:'📚' },
  tea:     { name:'茶室',   color:'#88cc88', icon:'🍵' },
  garden:  { name:'庭園',   color:'#cc88aa', icon:'🌸' },
  loyalty: { name:'忠義堂', color:'#ccaa44', icon:'🏮' },
};

const ROLES = {
  0:'当主', 1:'家老', 2:'侍大将', 3:'足軽頭', 4:'兵糧奉行',
  5:'忍頭', 6:'軍師', 7:'外交官', 8:'鉄砲頭', 9:'武者',
};

const SURNAMES = ['織田','豊臣','徳川','武田','上杉','毛利','伊達','島津','長曾我部','北条',
  '今川','斎藤','浅井','朝倉','松永','三好','宇喜多','立花','黒田','細川'];
const GIVEN_NAMES_M = ['信長','秀吉','家康','信玄','謙信','元就','政宗','義久','元親','氏康',
  '義元','道三','長政','義景','久秀','長慶','直家','道雪','如水','幽斎',
  '勝家','利家','光秀','秀長','半兵衛','官兵衛','兼続','慶次','幸村','昌幸'];
const GIVEN_NAMES_F = ['茶々','ねね','帰蝶','お市','松','江','千姫','春日局','淀殿','小督'];

const FACILITY_POSITIONS = [
  {key:'training', tx:0,  ty:1},
  {key:'forge',    tx:1,  ty:2},
  {key:'academy',  tx:-1, ty:2},
  {key:'tea',      tx:2,  ty:0},
  {key:'garden',   tx:-2, ty:0},
  {key:'loyalty',  tx:0,  ty:3},
];

// ============================================================
//  ゲーム状態
// ============================================================
const state = {
  koku: 1200,
  unification: 0,
  turn: 0,
  generation: 1,
  log: [],
  pedigree: [],
};

let gWarriors = [];
let battleAnim = null;
let idleTimer = null;
let engumiStep = 0;
let engumiSelectedFather = null;
let engumiSelectedMother = null;

// ============================================================
//  ユーティリティ
// ============================================================
function rnd(lo, hi) { return Math.floor(lo + Math.random() * (hi - lo + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2200);
}

function addLog(text) {
  const now = new Date();
  const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  state.log.unshift({ time: ts, text });
  if (state.log.length > 80) state.log.pop();
}

function openModal(id) {
  document.getElementById(id).classList.add('show');
  const bg = document.getElementById('modal-bg');
  if (bg) bg.style.display = 'block';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  // 全モーダルが閉じたらBGも消す
  const allModals = document.querySelectorAll('#pedigree-modal.show,#warrior-modal.show,#engumi-modal.show,#dev-modal.show,#history-modal.show');
  if (allModals.length === 0) {
    const bg = document.getElementById('modal-bg');
    if (bg) bg.style.display = 'none';
  }
}
function closeAllModals() {
  ['pedigree-modal','warrior-modal','engumi-modal','dev-modal','history-modal'].forEach(id => {
    document.getElementById(id)?.classList.remove('show');
  });
  const bg = document.getElementById('modal-bg');
  if (bg) bg.style.display = 'none';
}

// ============================================================
//  星・花びら生成
// ============================================================
function spawnStars() {
  const sky = document.getElementById('sky');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*70}%;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*6}s;`;
    sky.appendChild(s);
  }
}

function spawnPetals() {
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const sz = 4 + Math.random() * 8;
    p.style.cssText = `left:${Math.random()*100}%;width:${sz}px;height:${sz*0.7}px;animation-duration:${6+Math.random()*8}s;animation-delay:${-Math.random()*14}s;`;
    document.body.appendChild(p);
  }
}

// ============================================================
//  IsoWarrior クラス
// ============================================================
class IsoWarrior {
  constructor(name, jobId, power, offsetX, speed, gender) {
    this.name    = name;
    this.jobId   = jobId;
    this.gender  = gender || (Math.random() < 0.75 ? 'male' : 'female');
    this.offsetX = offsetX || 0;
    this.speed   = speed || (2 + Math.random() * 3);
    this.stats   = {
      power:  clamp(power || rnd(20,45), 1, 99),
      wisdom: rnd(15, 45),
      hp:     100,
      maxHp:  100,
      level:  1,
      exp:    0,
    };
    this._loyalty    = rnd(60, 95);
    this._generation = 1;
    this._parents    = null;
    this._birthTurn  = state.turn;

    // ISO座標
    this.isoX = (Math.random() - 0.5) * 4;
    this.isoY = (Math.random() - 0.5) * 4;
    this.dirX = (Math.random() > 0.5 ? 1 : -1);
    this.dirY = (Math.random() > 0.5 ? 1 : -1);

    this._currentFacility = null;
    this._facilityTimer   = 0;
    this._facilityStayMax = 0;
    this._moveTimer       = rnd(60, 180);
    this._color = this._pickColor();
  }

  _pickColor() {
    const cols = ['#c8960c','#cc4444','#4488cc','#44cc88','#cc88cc','#ccaa44','#44aacc','#cc6644'];
    return cols[Math.floor(Math.random() * cols.length)];
  }

  get loyalty() { return this._loyalty; }

  locationLabel() {
    if (!this._currentFacility) return '巡回中';
    const f = FACILITY_MAP[this._currentFacility];
    return f ? f.name : '巡回中';
  }

  tick() {
    if (this._currentFacility) {
      this._facilityTimer++;
      if (this._facilityTimer >= this._facilityStayMax) {
        this._leaveFacility();
      } else if (this._facilityTimer % 90 === 45) {
        this._applyEffect(this._currentFacility, false);
      }
    } else {
      this._moveTimer--;
      if (this._moveTimer <= 0) {
        this._tryEnterFacility();
        this._moveTimer = rnd(40, 120);
      }
      this._walk();
    }
    this._checkLevelUp();
  }

  _walk() {
    const spd = this.speed * 0.012;
    this.isoX += this.dirX * spd;
    this.isoY += this.dirY * spd;
    const bound = 3.5;
    if (this.isoX > bound)  { this.isoX =  bound;  this.dirX = -1; }
    if (this.isoX < -bound) { this.isoX = -bound; this.dirX =  1; }
    if (this.isoY > bound)  { this.isoY =  bound;  this.dirY = -1; }
    if (this.isoY < -bound) { this.isoY = -bound; this.dirY =  1; }
    if (Math.random() < 0.005) this.dirX *= -1;
    if (Math.random() < 0.005) this.dirY *= -1;
  }

  _tryEnterFacility() {
    // 体力が低いなら回復施設を優先
    const hpPct = this.stats.hp / this.stats.maxHp;
    let candidates;
    if (hpPct < 0.4) {
      candidates = ['tea','garden','tea']; // 回復優先
    } else {
      candidates = Object.keys(FACILITY_MAP);
    }
    const key = candidates[Math.floor(Math.random() * candidates.length)];
    const fp = FACILITY_POSITIONS.find(f => f.key === key);
    if (!fp) return;
    this._currentFacility  = key;
    this.isoX              = fp.tx + (Math.random() - 0.5) * 0.4;
    this.isoY              = fp.ty + (Math.random() - 0.5) * 0.4;
    this._facilityTimer    = 0;
    this._facilityStayMax  = rnd(120, 300);
    this._applyEffect(key, true);
  }

  _leaveFacility() {
    this._currentFacility = null;
    this._facilityTimer   = 0;
    this.dirX = (Math.random() > 0.5 ? 1 : -1);
    this.dirY = (Math.random() > 0.5 ? 1 : -1);
  }

  _applyEffect(key, isEntry) {
    const eff = FACILITY_EFFECT[key];
    if (!eff) return;

    const [lo, hi] = eff.range;
    const base = isEntry
      ? Math.floor(lo + Math.random() * (hi - lo))
      : Math.floor(1 + Math.random() * 2);
    const mul  = bloodlineFacilityMul(this);
    const gain = Math.floor(base * mul);

    // 体力消費 / 回復 (costHp: 正=回復, 負=消費)
    let hpChange = 0;
    if (isEntry) {
      hpChange = eff.costHp > 0
        ? Math.floor(eff.costHp * (0.8 + Math.random() * 0.4))
        : Math.floor(eff.costHp * (0.7 + Math.random() * 0.6));
    }

    // ステータス変化
    if (eff.stat === 'power') {
      this.stats.power = clamp(this.stats.power + gain, 1, 99);
    } else if (eff.stat === 'wisdom') {
      this.stats.wisdom = clamp(this.stats.wisdom + gain, 1, 99);
    } else if (eff.stat === 'hp') {
      this.stats.hp = clamp(this.stats.hp + gain, 1, this.stats.maxHp);
    } else if (eff.stat === 'loyalty') {
      this._loyalty = clamp(this._loyalty + gain, 0, 100);
    }

    // 体力変動
    this.stats.hp = clamp(this.stats.hp + hpChange, 1, this.stats.maxHp);

    // フロートテキスト
    if (isEntry && (gain > 0 || hpChange !== 0)) {
      let text = '';
      if (eff.stat === 'hp') {
        text = `体力 +${gain}`;
      } else if (hpChange < 0) {
        text = `${eff.label}+${gain} 疲労${hpChange}`;
      } else {
        text = `${eff.label} +${gain}`;
      }
      createFloatText(this, text, eff.color);
      showFacilityActivity(this, `${this.name}が${FACILITY_MAP[key].name}を使用`, eff.color);
      addLog(`${this.name}が${FACILITY_MAP[key].name}（${eff.label}+${gain} / HP${hpChange >= 0 ? '+' + hpChange : hpChange}）`);
    }

    updatePartyRow();
    updateStatusUI();
  }

  _checkLevelUp() {
    const needed = this.stats.level * 120 + 80;
    if (this.stats.exp >= needed) {
      this.stats.exp -= needed;
      this.stats.level++;
      this.stats.power   = clamp(this.stats.power   + rnd(2,5), 1, 99);
      this.stats.wisdom  = clamp(this.stats.wisdom  + rnd(1,3), 1, 99);
      this.stats.maxHp  += rnd(5, 12);
      this.stats.hp      = Math.min(this.stats.maxHp, this.stats.hp + rnd(10,20));
      createFloatText(this, `Lv${this.stats.level} UP!`, '#ffffaa');
      addLog(`${this.name}がLv${this.stats.level}に上昇！`);
      updatePartyRow();
    }
  }
}

// ============================================================
//  補助関数
// ============================================================
function bloodlineFacilityMul(w) {
  if (!w._parents) return 1.0;
  const gen = w._generation || 1;
  return 1 + (gen - 1) * 0.08; // 世代が上がるごとにわずかにボーナス
}

function randName(gender) {
  const sn = SURNAMES[Math.floor(Math.random() * SURNAMES.length)];
  const gn = gender === 'female'
    ? GIVEN_NAMES_F[Math.floor(Math.random() * GIVEN_NAMES_F.length)]
    : GIVEN_NAMES_M[Math.floor(Math.random() * GIVEN_NAMES_M.length)];
  return `${sn}${gn}`;
}

function createChildStats(father, mother) {
  const p = clamp(Math.round(father.stats.power * 0.65 + mother.stats.power * 0.45) + rnd(5,12), 10, 98);
  const w = clamp(Math.round(father.stats.wisdom * 0.45 + mother.stats.wisdom * 0.65) + rnd(8,14), 10, 98);
  const maxHp = clamp(Math.round((father.stats.maxHp + mother.stats.maxHp) / 1.8) + rnd(10,20), 100, 200);
  return { power: p, wisdom: w, hp: maxHp, maxHp };
}

//  フロートテキスト・施設アクティビティ
// ============================================================
function getWarriorScreenPos(warrior) {
  const canvas = document.getElementById('iso-canvas');
  if (!canvas) return { x: 0, y: 0 };
  const rect  = canvas.getBoundingClientRect();
  const cx    = canvas.width / 2;
  const cy    = canvas.height * 0.55;
  const tileW = Math.min(canvas.width, canvas.height) * 0.18;
  const tileH = tileW * 0.5;
  const sx    = cx + (warrior.isoX - warrior.isoY) * tileW * 0.5;
  const sy    = cy + (warrior.isoX + warrior.isoY) * tileH * 0.5;
  return { x: rect.left + sx, y: rect.top + sy };
}

function createFloatText(warrior, text, color) {
  const layer = document.getElementById('bubble-layer');
  if (!layer) return;
  const pos = getWarriorScreenPos(warrior);
  const layerRect = layer.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = text;
  el.style.color = color || '#ffffff';
  el.style.left  = (pos.x - layerRect.left) + 'px';
  el.style.top   = (pos.y - layerRect.top - 20) + 'px';
  layer.appendChild(el);
  setTimeout(() => el.remove(), 1900);
}

function showFacilityActivity(warrior, text, color) {
  const layer = document.getElementById('bubble-layer');
  if (!layer) return;
  const pos = getWarriorScreenPos(warrior);
  const layerRect = layer.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'facility-activity';
  el.textContent = text;
  el.style.color = color || '#ffdd88';
  el.style.left  = (pos.x - layerRect.left) + 'px';
  el.style.top   = (pos.y - layerRect.top - 40) + 'px';
  layer.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}

function renderEngumiStep() {

        <div class="wsc-hp" style="color:${hpColor}">体 ${hpPct}%</div>
      </div>`;
    });
    html += '</div></div>';
    content.innerHTML = html;
  } else if (engumiStep === 1) {
    // 母を選ぶ
    nextBtn.textContent = '縁組 →';
    nextBtn.disabled    = !engumiSelectedMother;
    cancelBtn.textContent = '← 戻る';

    const females = gWarriors.filter((w, idx) => idx !== engumiSelectedFather);
    let html = `
      <div class="modal-section">
        <div class="modal-section-title">母となる武将を選べ</div>
        <div class="warrior-select-grid">`;
    females.forEach(w => {
      const hpPct = Math.round((w.stats.hp / w.stats.maxHp) * 100);
      const hpColor = hpPct > 60 ? '#88dd88' : hpPct > 30 ? '#ffaa44' : '#ff6666';
      const idx = gWarriors.indexOf(w);
      html += `<div class="warrior-sel-card ${engumiSelectedMother === idx ? 'selected' : ''}" onclick="selectMother(${idx})">
        <div class="wsc-name">${w.name}</div>
        <div class="wsc-stats">武${w.stats.power} 知${w.stats.wisdom}</div>
        <div class="wsc-hp" style="color:${hpColor}">体 ${hpPct}%</div>
      </div>`;
    });
    html += '</div></div>';

    if (engumiSelectedFather !== null && engumiSelectedMother !== null) {
      const f = gWarriors[engumiSelectedFather];
      const m = gWarriors[engumiSelectedMother];
      const cs = createChildStats(f, m);
      html += `<div class="modal-section">
        <div class="modal-section-title">子の予測能力</div>
        <div class="confirm-pair">
          <div class="confirm-w"><div class="cw-name">${f.name}</div><div class="cw-role">父</div></div>
          <div class="confirm-heart">❤</div>

        </div>

          <div class="cp-title">子の予測ステータス</div>

          <div class="cp-stat"><span>知力</span><span class="cpv">~${cs.wisdom}</span></div>
          <div class="cp-stat"><span>体力上限</span><span class="cpv">~${cs.maxHp}</span></div>
        </div>
      </div>`;
    }

  } else if (engumiStep === 2) {
    // 確認
    nextBtn.textContent = '成立させる';
    nextBtn.disabled    = false;
    cancelBtn.textContent = '← 戻る';

    const f  = gWarriors[engumiSelectedFather];
    const m  = gWarriors[engumiSelectedMother];
    const cs = createChildStats(f, m);
    content.innerHTML = `
      <div class="modal-section">
        <div class="modal-section-title">縁組の確認</div>
        <div class="confirm-panel">
          <div class="confirm-pair">

function selectFather(idx) {
  engumiSelectedFather = idx;
  if (engumiSelectedMother === idx) engumiSelectedMother = null;
  const nextBtn = document.getElementById('engumi-next-btn');
  if (nextBtn) nextBtn.disabled = false;
  renderEngumiStep();
}

function selectMother(idx) {
  if (idx === engumiSelectedFather) { showToast('父と同じ武将は選べません'); return; }
  engumiSelectedMother = idx;
  const nextBtn = document.getElementById('engumi-next-btn');
  if (nextBtn) nextBtn.disabled = false;
  renderEngumiStep();
}

function engumiNext() {
  if (engumiStep === 0) {
    if (engumiSelectedFather === null) { showToast('父を選んでください'); return; }
    engumiStep = 1;
    renderEngumiStep();
  } else if (engumiStep === 1) {
    if (engumiSelectedMother === null) {
      // 戻るボタンとして機能
      engumiStep = 0;
      renderEngumiStep();
      return;
    }
    const cancelBtn = document.getElementById('engumi-cancel-btn');
    cancelBtn.onclick = () => { engumiStep = 1; renderEngumiStep(); };
    engumiStep = 2;
    renderEngumiStep();
  } else if (engumiStep === 2) {
    doEngumi();
  }
}

// 縁組キャンセル・戻るロジックを修正
document.addEventListener('DOMContentLoaded', () => {
  const cancelBtn = document.getElementById('engumi-cancel-btn');
  if (cancelBtn) {
    cancelBtn.onclick = () => {
      if (engumiStep === 0) {
        closeEngumi();
      } else {
        engumiStep--;
        renderEngumiStep();
      }
    };
  }
});

function doEngumi() {
  if (state.koku < ENGUMI_COST) {
    showToast(`石高が足りません（必要：${ENGUMI_COST}石）`);
    return;
  }
  if (engumiSelectedFather === null || engumiSelectedMother === null) {
    showToast('父母を選択してください');
    return;
  }

  const f  = gWarriors[engumiSelectedFather];
  const m  = gWarriors[engumiSelectedMother];
  const cs = createChildStats(f, m);

  state.koku -= ENGUMI_COST;
  state.generation++;

  const gender   = Math.random() < 0.5 ? 'male' : 'female';
  const childName = randName(gender);
  const jobId    = Math.floor(Math.random() * Object.keys(ROLES).length);

  const child = new IsoWarrior(childName, jobId, cs.power, (Math.random()-0.5)*2, 2.5+Math.random()*2, gender);
  child.stats.wisdom = cs.wisdom;
  child.stats.hp     = cs.hp;
  child.stats.maxHp  = cs.maxHp;
  child._generation  = Math.max(f._generation, m._generation) + 1;
  child._parents     = { father: f.name, mother: m.name };

  gWarriors.push(child);

  state.pedigree.push({
    childName, father: f.name, mother: m.name,
    power: cs.power, wisdom: cs.wisdom,
    generation: child._generation,
  });

  addLog(`縁組成立：${f.name} × ${m.name} → ${childName}（第${child._generation}世代）`);
  closeEngumi();

  // 成功オーバーレイ表示
  document.getElementById('suc-name').textContent = childName;
  document.getElementById('suc-stats').innerHTML =
    `武力 ${cs.power}　知力 ${cs.wisdom}　体力 ${cs.maxHp}<br>` +
    `${ROLES[jobId]}　第${child._generation}世代<br>${f.name} × ${m.name}の子`;
  openModal('success-overlay');

  updateStatusUI();
  updatePartyRow();
}

function bDrawSoldier(c, x, y, pal, dir, wf, st) {
  c.save();
  if (dir < 0) { c.translate(x + 8, y); c.scale(-1, 1); c.translate(-8, 0); } else c.translate(x, y);
  const bob = (st === 'walk' && wf === 1) ? 1 : 0;
  bpx(c, pal.armor,  2,  8 + bob, 12, 8); bpx(c, pal.shadow, 2, 14 + bob, 12, 2); bpx(c, pal.acc, 4,  8 + bob, 8, 1);
  bpx(c, pal.skin,   3,  2 + bob, 10, 8);
  bpx(c, pal.helm,   2,  0 + bob, 12, 4); bpx(c, pal.helm, 1, 1 + bob, 14, 2);
  bpx(c, pal.acc,    6, -1 + bob,  4, 2);
  bpx(c, pal.eye,    5,  5 + bob,  2, 2); bpx(c, pal.eye, 9, 5 + bob, 2, 2);
  if (wf === 0) { bpx(c, pal.armor, 3, 16 + bob, 4, 4); bpx(c, pal.armor, 9, 14 + bob, 4, 5); }
  else          { bpx(c, pal.armor, 3, 14 + bob, 4, 5); bpx(c, pal.armor, 9, 16 + bob, 4, 4); }
  if (st === 'attack') { bpx(c, pal.skin, 14, 9 + bob, 5, 3); bpx(c, pal.acc, 17, 8 + bob, 3, 5); bpx(c, pal.armor, 0, 10 + bob, 3, 3); }
  else { bpx(c, pal.armor, 0, 10 + bob, 3, 4); bpx(c, pal.armor, 13, 10 + bob, 3, 4); }
  if (st === 'hit') { c.fillStyle = '#ffffff88'; c.fillRect(0, 0, 16, 20); }
  c.restore();
}

function bDrawGeneral(c, x, y, pal, dir, wf, st) {
  c.save();
  if (dir < 0) { c.translate(x + 12, y); c.scale(-1, 1); c.translate(-12, 0); } else c.translate(x, y);
  const bob = wf === 1 ? 1 : 0;
  bpx(c, pal.armor,  2, 12 + bob, 20, 12); bpx(c, pal.shadow, 2, 22 + bob, 20, 2); bpx(c, pal.acc, 4, 12 + bob, 16, 2);
  bpx(c, pal.acc,    0, 14 + bob,  3, 10); bpx(c, pal.acc, 21, 14 + bob, 3, 10);
  bpx(c, pal.skin,   4,  4 + bob, 16, 10);
  bpx(c, pal.helm,   2,  0 + bob, 20,  6); bpx(c, pal.helm, 1, 1 + bob, 22, 4);
  bpx(c, pal.acc,    9, -2 + bob,  6,  3); bpx(c, pal.acc, 8, -3 + bob, 8, 2);
  bpx(c, pal.eye,    7,  8 + bob,  3,  2); bpx(c, pal.eye, 14, 8 + bob, 3, 2);
  bpx(c, pal.shadow, 8, 11 + bob,  8,  1);
  if (wf === 0) { bpx(c, pal.armor, 4, 24 + bob, 7, 6); bpx(c, pal.armor, 14, 20 + bob, 7, 9); }
  else          { bpx(c, pal.armor, 4, 20 + bob, 7, 9); bpx(c, pal.armor, 14, 24 + bob, 7, 6); }
  if (st === 'attack') { bpx(c, pal.skin, 22, 13 + bob, 5, 5); bpx(c, pal.acc, 24, 8 + bob, 3, 16); bpx(c, pal.shadow, 0, 13 + bob, 3, 5); }
  else { bpx(c, pal.armor, 0, 13 + bob, 3, 10); bpx(c, pal.armor, 21, 13 + bob, 3, 10); }
  if (st === 'hit') { c.fillStyle = '#ffffff88'; c.fillRect(0, 0, 24, 30); }
  c.restore();
}

// ── 吹き出し描画 ─────────────────────────────────────────
function bDrawSpeechBubble(c, gx, gy, text, side, alpha) {
  if (!text || alpha <= 0) return;
  c.save(); c.globalAlpha = Math.min(1, alpha);
  const FONT = 'bold 9px DotGothic16,monospace';
  c.font = FONT;
  const tw = c.measureText(text).width, pad = 5;
  const bw = tw + pad * 2, bh = 14, tailH = 5;
  let bx = gx + 12 - bw / 2;
  let by = gy - bh - tailH - 6;
  bx = Math.max(2, Math.min(BW - bw - 2, bx));
  by = Math.max(62, by);
  const r = 3, tailX = Math.max(bx + 8, Math.min(bx + bw - 8, gx + 12));
  c.shadowColor = '#0008'; c.shadowBlur = 3; c.shadowOffsetY = 1;
  c.fillStyle = side === 'p' ? '#f0ecff' : '#fff0f4';
  c.beginPath();
  c.moveTo(bx + r, by); c.lineTo(bx + bw - r, by);
  c.quadraticCurveTo(bx + bw, by, bx + bw, by + r);
  c.lineTo(bx + bw, by + bh - r);
  c.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh);
  c.lineTo(tailX + 4, by + bh); c.lineTo(tailX, by + bh + tailH); c.lineTo(tailX - 4, by + bh);
  c.lineTo(bx + r, by + bh);
  c.quadraticCurveTo(bx, by + bh, bx, by + bh - r);
  c.lineTo(bx, by + r); c.quadraticCurveTo(bx, by, bx + r, by);
  c.closePath(); c.fill();
  c.shadowBlur = 0; c.shadowOffsetY = 0;
  c.strokeStyle = side === 'p' ? '#4830a0' : '#a02060'; c.lineWidth = 1.5; c.stroke();
  c.fillStyle = '#1a0800'; c.font = FONT;
  c.fillText(text, bx + pad, by + bh - 3);
  c.restore();
}

// ── バトル状態 ───────────────────────────────────────────
let bSoldiers, bGenerals, bParticles, bDamageNums;
let bGameState, bTickCount, bLoopId;
let bLogText = '', bLogTimer = 0;
let bBubbles = [];

function bSetLog(t)         { if (bLogTimer <= 0) { bLogText = t; bLogTimer = B_LOG_HOLD; } }
function bForceLog(t, h=B_LOG_HOLD) { bLogText = t; bLogTimer = h; }
function bTickLog()         { if (bLogTimer > 0) bLogTimer--; document.getElementById('battle-log-bar').textContent = bLogText; }
function bAddBubble(side, text, life = 130) {
  bBubbles = bBubbles.filter(b => b.side !== side);
  bBubbles.push({ side, text, life, maxLife: life });
}
function bTickBubbles() { bBubbles = bBubbles.filter(b => (b.life--, b.life > 0)); }

function bAddPt(x, y, color, n = 6) {
  for (let i = 0; i < n; i++) bParticles.push({
    x, y, vx: (Math.random() - .5) * 5, vy: (Math.random() - .9) * 5,
    life: 18 + Math.random() * 14 | 0, maxLife: 32, color, size: 2 + Math.random() * 3 | 0,
  });
}
function bAddDmg(x, y, dmg, color = '#ffee40') {
  bDamageNums.push({ x, y, vy: -2.2, life: 44, text: String(dmg), color });
}
function bUpdateParticles() {
  bParticles = bParticles.filter(p => p.life > 0);
  bParticles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--; });
  bDamageNums = bDamageNums.filter(d => d.life > 0);
  bDamageNums.forEach(d => { d.y += d.vy; d.vy *= .92; d.life--; });
}

function bUpdateBattleUI() {
  const ph = Math.max(0, bGenerals.p.hp), eh = Math.max(0, bGenerals.e.hp);
  document.getElementById('bhp-player').textContent = ph;
  document.getElementById('bhp-enemy').textContent  = eh;
  document.getElementById('bbar-player').style.width = (ph / B_MAX_HP * 100).toFixed(1) + '%';
  document.getElementById('bbar-enemy').style.width  = (eh / B_MAX_HP * 100).toFixed(1) + '%';
}

function bNearest(list, x, y) {
  return list.reduce((b, t) => Math.hypot(t.x - x, t.y - y) < Math.hypot(b.x - x, b.y - y) ? t : b);
}
function bFindTarget(s) {
  const foes = bSoldiers.filter(t => t.side !== s.side && !t.dead);
  return foes.length ? bNearest(foes, s.x, s.y) : null;
}

// ── 兵士AI ───────────────────────────────────────────────
function bUpdateSoldiers() {
  bSoldiers.forEach(s => {
    if (s.dead) return;
    if (s.stateTimer > 0) { s.stateTimer--; return; }
    if (!s.target || s.target.dead) s.target = bFindTarget(s);

    if (!s.target) {
      const gen = bGenerals[s.side === 'p' ? 'e' : 'p'];
      if (gen.dead) return;
      const dx = (gen.x + 12) - (s.x + 8), dy = (gen.y + 15) - (s.y + 10);
      const dist = Math.hypot(dx, dy) || 1;
      if (dist < B_ATTACK_RANGE + 8) {
        s.state = 'attack'; s.stateTimer = 22;
        const dmg = 2 + Math.random() * 3 | 0;
        gen.hp -= dmg; gen.state = 'hit'; gen.stateTimer = 14;
        bAddPt(gen.x + 12, gen.y + 10, '#ffaaaa');
        bAddDmg(gen.x + 6, gen.y - 4, dmg, '#ff5050');
        bSetLog(`${s.side === 'p' ? '我が軍' : '敵軍'}が大将に${dmg}撃！`);
      } else {
        s.state = 'walk';
        s.x += dx / dist * 1.3; s.y += dy / dist * 1.3;
        s.y = Math.max(B_FIELD_Y_MIN, Math.min(B_FIELD_Y_MAX, s.y));
      }
      return;
    }

    const t = s.target;
    const dx = t.x - s.x, dy = t.y - s.y, dist = Math.hypot(dx, dy) || 1;
    if (dist < B_ATTACK_RANGE) {
      s.state = 'attack'; s.stateTimer = 16;
      const dmg = 3 + Math.random() * 4 | 0;
      t.hp -= dmg; t.state = 'hit'; t.stateTimer = 10;
      bAddPt(t.x + 8, t.y + 8, '#ffddaa'); bAddDmg(t.x + 4, t.y - 2, dmg);
      if (t.hp <= 0) {
        t.dead = true; bAddPt(t.x + 8, t.y + 8, '#ffd040', 10);
        bSetLog(`${s.side === 'p' ? '敵軍' : '我が軍'}の兵士が倒れた！`);
      }
    } else {
      s.state = 'walk';
      const spd = 1.0 + Math.random() * .3;
      s.x += dx / dist * spd; s.y += dy / dist * spd;
      s.y = Math.max(B_FIELD_Y_MIN, Math.min(B_FIELD_Y_MAX, s.y));
    }
  });
}

// ── 将軍AI ───────────────────────────────────────────────
function bUpdateGenerals() {
  ['p', 'e'].forEach(side => {
    const g = bGenerals[side], foe = bGenerals[side === 'p' ? 'e' : 'p'];
    if (g.dead) return;
    if (g.stateTimer > 0) { g.stateTimer--; return; }
    g.state = 'charge';

    const interval = side === 'p' ? 0 : 80;
    if (bTickCount % 160 === interval) {
      const arr = side === 'p' ? LINES_P : LINES_E;
      bAddBubble(side, arr[Math.floor(Math.random() * arr.length)], 130);
    }

    const foeTroops = bSoldiers.filter(s => s.side !== side && !s.dead);
    if (foeTroops.length) {
      const tgt = bNearest(foeTroops, g.x + 12, g.y + 15);
      const tx = tgt.x + 8, ty = tgt.y + 10;
      const dist = Math.hypot(tx - (g.x + 12), ty - (g.y + 15)) || 1;
      if (dist < B_GEN_ATK_RANGE) {
        g.state = 'attack'; g.stateTimer = 18;
        const dmg = 8 + Math.random() * 8 | 0;
        tgt.hp -= dmg; tgt.state = 'hit'; tgt.stateTimer = 12;
        bAddPt(tgt.x + 8, tgt.y + 8, '#fff060', 8); bAddDmg(tgt.x, tgt.y - 6, dmg, '#ffdd20');
        if (tgt.hp <= 0) { tgt.dead = true; bSetLog('大将が敵兵を薙ぎ払った！'); }
      } else {
        g.x += ((tx - (g.x + 12)) / dist) * B_GEN_CHARGE_SPEED;
        g.y += ((ty - (g.y + 15)) / dist) * B_GEN_CHARGE_SPEED;
        g.y = Math.max(B_FIELD_Y_MIN - 10, Math.min(B_FIELD_Y_MAX + 10, g.y));
      }
    } else {
      const tx = foe.x + 12, ty = foe.y + 15;
      const dist = Math.hypot(tx - (g.x + 12), ty - (g.y + 15)) || 1;
      if (dist < B_GEN_ATK_RANGE) {
        g.state = 'attack'; g.stateTimer = 26;
        const dmg = 10 + Math.random() * 10 | 0;
        foe.hp -= dmg; foe.state = 'hit'; foe.stateTimer = 22;
        bAddPt(foe.x + 12, foe.y + 15, '#ff8040', 12); bAddDmg(foe.x + 6, foe.y - 8, dmg, '#ff4020');
        const dl = DUEL_LINES[Math.floor(Math.random() * DUEL_LINES.length)];
        bAddBubble(side, dl, 110);
        bForceLog(`大将同士の一騎討ち！ ${dmg}ダメージ！`, B_LOG_HOLD * 2 | 0);
      } else {
        g.x += ((tx - (g.x + 12)) / dist) * B_GEN_CHARGE_SPEED;
        g.y += ((ty - (g.y + 15)) / dist) * B_GEN_CHARGE_SPEED;
        g.y = Math.max(B_FIELD_Y_MIN - 10, Math.min(B_FIELD_Y_MAX + 10, g.y));
      }
    }
  });
}

// ── 合戦メインループ ─────────────────────────────────────
function bGameLoop(bgCtx, ctx) {
  bTickCount++;
  const animFrame = (bTickCount >> 3) & 1;

  if (bGameState === 'battle') {
    bUpdateSoldiers();
    bUpdateGenerals();
    bUpdateParticles();
    bTickLog();
    bTickBubbles();

    // 勝敗判定
    if (bGenerals.p.hp <= 0 || bGenerals.e.hp <= 0) {
      bGameState = 'end';
      const pWin = bGenerals.p.hp > 0;
      bAddBubble(pWin ? 'p' : 'e', '勝ったぞ！', 400);
      bEndBattle(pWin);
    }
  }

  // 描画
  ctx.clearRect(0, 0, BW, BH);
  const allUnits = [
    ...bSoldiers.filter(s => !s.dead).map(s => ({
      type: 'soldier', side: s.side, x: s.x, y: s.y, state: s.state,
      wf: (bTickCount + s.walkOffset) >> 3 & 1,
    })),
    ...['p', 'e'].filter(sd => !bGenerals[sd].dead).map(sd => ({
      type: 'general', side: sd, x: bGenerals[sd].x, y: bGenerals[sd].y,
      state: bGenerals[sd].state, wf: animFrame,
    })),
  ];
  allUnits.sort((a, b) => a.y - b.y);
  allUnits.forEach(u => {
    const pal = u.side === 'p' ? PAL_P : PAL_E;
    const dir = u.side === 'p' ? 1 : -1;
    if (u.type === 'soldier') bDrawSoldier(ctx, u.x | 0, u.y | 0, pal, dir, u.wf, u.state);
    else                      bDrawGeneral(ctx, u.x | 0, u.y | 0, pal, dir, u.wf, u.state);
  });

  bParticles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x | 0, p.y | 0, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  bDamageNums.forEach(d => {
    ctx.font = 'bold 11px DotGothic16,monospace';
    ctx.strokeStyle = '#0009'; ctx.lineWidth = 3;
    ctx.strokeText(d.text, d.x, d.y);
    ctx.fillStyle = d.color;
    ctx.fillText(d.text, d.x, d.y);
  });

  bBubbles.forEach(b => {
    const g = bGenerals[b.side];
    if (!g || g.dead) return;
    bDrawSpeechBubble(ctx, g.x, g.y, b.text, b.side, Math.min(1, b.life / 20));
  });

  bUpdateBattleUI();

  if (bGameState !== 'end') bLoopId = requestAnimationFrame(() => bGameLoop(bgCtx, ctx));
}

// ── 合戦終了処理 ─────────────────────────────────────────
function bEndBattle(isWin) {
  const titleEl  = document.getElementById('bres-title-text');
  const detailEl = document.getElementById('bres-detail-text');

  if (isWin) {
    const reward  = rnd(1800, 2400);
    const uniGain = 4 + Math.random() * 3;
    state.koku += reward;
    state.unification = Math.min(100, state.unification + uniGain);
    gWarriors.forEach(w => {
      w.stats.power = clamp(w.stats.power + rnd(3, 7), 1, 99);
      w.stats.exp  += rnd(60, 120);
      w.stats.hp    = Math.min(w.stats.maxHp, w.stats.hp + rnd(8, 15));
    });
    titleEl.textContent  = '勝利！';
    detailEl.textContent = `石高 +${reward.toLocaleString()}\n統一度 +${uniGain.toFixed(1)}%`;
    addLog(`合戦勝利（報酬${reward}石）`);
  } else {
    const loss = rnd(400, 700);
    state.koku = Math.max(0, state.koku - loss);
    gWarriors.forEach(w => { w.stats.hp = Math.max(1, w.stats.hp - rnd(15, 25)); });
    titleEl.textContent  = '敗北…';
    detailEl.textContent = `石高 -${loss.toLocaleString()}\n武将が負傷した`;
    addLog(`合戦敗北（損失${loss}石）`);
  }

  document.getElementById('battle-result-panel').classList.add('show');
  updateStatusUI();
  updatePartyRow();
}

// ── openBattle / closeBattle ─────────────────────────────
function openBattle() {
  if (gWarriors.length === 0) { showToast('武将がいません'); return; }

  // 前回のループを止める
  if (bLoopId) { cancelAnimationFrame(bLoopId); bLoopId = null; }

  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-result-panel').classList.remove('show');
  document.getElementById('battle-log-bar').textContent = '両軍、突撃開始！';

  // Canvas 取得とリサイズ
  const bgCv  = document.getElementById('bg-canvas');
  const mainCv = document.getElementById('battle-main-canvas');
  const frame  = document.getElementById('bscr-frame');

  function resizeBattle() {
    const rw = frame.clientWidth, rh = frame.clientHeight;
    [bgCv, mainCv].forEach(cv => {
      cv.width = BW; cv.height = BH;
      cv.style.width = rw + 'px'; cv.style.height = rh + 'px';
    });
  }
  resizeBattle();

  const bgCtx  = bgCv.getContext('2d');
  const ctx    = mainCv.getContext('2d');
  [bgCtx, ctx].forEach(c => c.imageSmoothingEnabled = false);
  bDrawBackground(bgCtx);

  // 状態初期化
  bGameState = 'battle'; bTickCount = 0;
  bLogText = '両軍、突撃開始！'; bLogTimer = B_LOG_HOLD * 2;
  bParticles = []; bDamageNums = []; bBubbles = [];

  // 武将名を UI に反映
  const leader = gWarriors[0];
  document.getElementById('bunit-pname').textContent = leader ? leader.name.slice(-3) : '我が軍';

  // 将軍HP は我が軍の総合戦力に基づく
  const playerPower = clamp(
    gWarriors.reduce((s, w) => s + w.stats.power + w.stats.wisdom, 0) / gWarriors.length,
    60, 150
  ) | 0;
  const enemyPower = clamp(B_MAX_HP + Math.floor(state.unification * 0.4), 60, 180) | 0;

  // 兵士生成
  bSoldiers = [];
  const soldierCount = Math.min(8, 4 + gWarriors.length);
  for (let i = 0; i < soldierCount; i++) {
    const col = i % 2, row = Math.floor(i / 2);
    bSoldiers.push({
      side: 'p', x: 18 + col * 26, y: B_FIELD_Y_MIN + 14 + row * 42,
      state: 'walk', stateTimer: 0, hp: 20, maxHp: 20, target: null, dead: false,
      walkOffset: (i * 7) % 12,
    });
  }
  const enemyCount = 3 + Math.floor(state.unification / 20);
  for (let i = 0; i < Math.min(enemyCount, 8); i++) {
    const col = i % 2, row = Math.floor(i / 2);
    bSoldiers.push({
      side: 'e', x: BW - 22 - col * 26, y: B_FIELD_Y_MIN + 14 + row * 42,
      state: 'walk', stateTimer: 0, hp: 20, maxHp: 20, target: null, dead: false,
      walkOffset: (i * 11) % 12,
    });
  }

  // 将軍生成
  bGenerals = {
    p: { x: 30,      y: BH / 2 - 15, hp: playerPower, maxHp: playerPower, state: 'charge', stateTimer: 0, dead: false },
    e: { x: BW - 54, y: BH / 2 - 15, hp: enemyPower,  maxHp: enemyPower,  state: 'charge', stateTimer: 0, dead: false },
  };
  // HPバーの最大値を動的に設定
  document.getElementById('bhp-player').textContent = playerPower;
  document.getElementById('bhp-enemy').textContent  = enemyPower;

  // 開幕セリフ
  bAddBubble('p', LINES_P[0], 150);
  bAddBubble('e', LINES_E[0], 150);
  bAddPt(bGenerals.p.x + 12, bGenerals.p.y + 15, '#ffe060', 10);
  bAddPt(bGenerals.e.x + 12, bGenerals.e.y + 15, '#ffe060', 10);

  bLoopId = requestAnimationFrame(() => bGameLoop(bgCtx, ctx));
}

function closeBattle() {
  if (bLoopId) { cancelAnimationFrame(bLoopId); bLoopId = null; }
  document.getElementById('battle-screen').classList.remove('show');
}

// ============================================================
//  アイドルティック（自動成長）
// ============================================================
function performIdleTick() {
  state.turn++;
  gWarriors.forEach(w => {
    w.stats.exp += rnd(3, 8);
    if (Math.random() < 0.4)  w.stats.power  = clamp(w.stats.power  + 1, 1, 99);
    if (Math.random() < 0.25) w.stats.wisdom  = clamp(w.stats.wisdom + 1, 1, 99);
    // 自然回復（体力が低いほど回復しやすい）
    const hpPct = w.stats.hp / w.stats.maxHp;
    if (hpPct < 0.9) {
      const naturalRec = Math.floor((1 - hpPct) * 4 + 1);
      w.stats.hp = Math.min(w.stats.maxHp, w.stats.hp + naturalRec);
    }
  });
  state.koku       += rnd(70, 120);
  state.unification = Math.min(100, state.unification + 0.08);
  updateStatusUI();
  updatePartyRow();
}

// ============================================================
//  ISO キャンバス描画
// ============================================================
let isoAnimFrame = null;

function initIsoCanvas() {
  const canvas = document.getElementById('iso-canvas');
  const field  = document.getElementById('iso-field');
  if (!canvas || !field) return;

  function resize() {
    canvas.width  = field.clientWidth  || window.innerWidth;
    canvas.height = field.clientHeight || Math.floor(window.innerHeight * 0.5);
  }
  resize();
  window.addEventListener('resize', resize);

  const ctx = canvas.getContext('2d');

  function isoToScreen(ix, iy) {
    const w     = canvas.width;
    const h     = canvas.height;
    const cx    = w / 2;
    const cy    = h * 0.5;
    // 縦画面は幅基準でタイルを計算
    const tileW = w * 0.22;
    const tileH = tileW * 0.5;
    return {
      x: cx + (ix - iy) * tileW * 0.5,
      y: cy + (ix + iy) * tileH * 0.5,
    };
  }

  function drawTile(ix, iy, topColor, leftColor, rightColor) {
    const tileW = canvas.width * 0.22;
    const tileH = tileW * 0.5;
    const th    = tileW * 0.3;
    const { x, y } = isoToScreen(ix, iy);

    // 上面
    ctx.fillStyle = topColor;
    ctx.beginPath();
    ctx.moveTo(x,           y - tileH / 2);
    ctx.lineTo(x + tileW/2, y);
    ctx.lineTo(x,           y + tileH / 2);
    ctx.lineTo(x - tileW/2, y);
    ctx.closePath();
    ctx.fill();

    // 左面
    ctx.fillStyle = leftColor;
    ctx.beginPath();
    ctx.moveTo(x - tileW/2, y);
    ctx.lineTo(x,           y + tileH / 2);
    ctx.lineTo(x,           y + tileH / 2 + th);
    ctx.lineTo(x - tileW/2, y + th);
    ctx.closePath();
    ctx.fill();

    // 右面
    ctx.fillStyle = rightColor;
    ctx.beginPath();
    ctx.moveTo(x,           y + tileH / 2);
    ctx.lineTo(x + tileW/2, y);
    ctx.lineTo(x + tileW/2, y + th);
    ctx.lineTo(x,           y + tileH / 2 + th);
    ctx.closePath();
    ctx.fill();
  }

  function drawFacility(fp) {
    const fm = FACILITY_MAP[fp.key];
    if (!fm) return;
    const { x, y } = isoToScreen(fp.tx, fp.ty);
    const tileW = canvas.width * 0.22;
    const iconSz = Math.max(14, Math.round(tileW * 0.55));
    ctx.save();
    ctx.font = `${iconSz}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(fm.icon, x, y - 8);
    ctx.font = `${Math.max(7, Math.round(tileW * 0.22))}px Noto Serif JP`;
    ctx.fillStyle = fm.color;
    ctx.fillText(fm.name, x, y + 8);
    ctx.restore();
  }

  function drawWarrior(w) {
    const { x, y } = isoToScreen(w.isoX, w.isoY);
    const hpPct = w.stats.hp / w.stats.maxHp;
    const r = Math.max(7, Math.round(canvas.width * 0.028)); // タイル比率でサイズ
    const bw = r * 2.6;
    ctx.save();
    // 影
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.beginPath();
    ctx.ellipse(x, y + r * 0.3, r * 1.1, r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // 体
    ctx.fillStyle = w._color;
    ctx.beginPath();
    ctx.arc(x, y - r * 0.7, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // HP バー
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.fillRect(x - bw/2, y + r * 0.5, bw, 3);
    ctx.fillStyle = hpPct > 0.6 ? '#44ff88' : hpPct > 0.3 ? '#ffaa44' : '#ff4444';
    ctx.fillRect(x - bw/2, y + r * 0.5, bw * hpPct, 3);
    // 名前
    ctx.fillStyle = 'rgba(245,232,200,.9)';
    ctx.font = `${Math.max(7, r - 1)}px Noto Serif JP`;
    ctx.textAlign = 'center';
    ctx.fillText(w.name.slice(-1), x, y - r * 0.35);
    ctx.restore();
  }

  let lastTime = 0;
  function loop(ts) {
    const dt = ts - lastTime;
    if (dt > 50) { // 約20fps
      lastTime = ts;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // タイル描画（5×5グリッド）
      for (let iy = -2; iy <= 3; iy++) {
        for (let ix = -2; ix <= 2; ix++) {
          const isPath = (ix === 0 || iy === 0);
          const top   = isPath ? 'rgba(120,90,40,.5)' : 'rgba(60,40,15,.6)';
          const left  = isPath ? 'rgba(80,55,20,.6)'  : 'rgba(35,20,5,.7)';
          const right = isPath ? 'rgba(100,70,30,.5)' : 'rgba(45,28,8,.6)';
          drawTile(ix, iy, top, left, right);
        }
      }

      // 施設描画
      FACILITY_POSITIONS.forEach(fp => drawFacility(fp));

      // 武将 tick & 描画（Y深さでソート）
      gWarriors.forEach(w => w.tick());
      const sorted = [...gWarriors].sort((a, b) => (a.isoX + a.isoY) - (b.isoX + b.isoY));
      sorted.forEach(w => drawWarrior(w));
    }
    isoAnimFrame = requestAnimationFrame(loop);
  }
  isoAnimFrame = requestAnimationFrame(loop);
}

// ============================================================
//  開発者コマンド
// ============================================================
function devAddKoku()        { state.koku += 5000; updateStatusUI(); showToast('石高 +5000'); }
function devAddPower()       { gWarriors.forEach(w => { w.stats.power = clamp(w.stats.power+20,1,99); }); updatePartyRow(); showToast('全武将 武力+20'); }
function devLevelUp()        { gWarriors.forEach(w => { for(let i=0;i<5;i++) { w.stats.exp += w.stats.level*120+80; w._checkLevelUp(); } }); updatePartyRow(); showToast('全武将 Lv+5'); }
function devRestoreHp()      { gWarriors.forEach(w => { w.stats.hp = w.stats.maxHp; }); updatePartyRow(); showToast('全武将 体力全回復'); }
function devSetUnification() { state.unification = Math.min(99.9, state.unification + 30); updateStatusUI(); showToast('統一度 +30%'); }
function devAddWarrior() {
  const gender = Math.random() < 0.5 ? 'male' : 'female';
  const name   = randName(gender);
  const jobId  = Math.floor(Math.random() * Object.keys(ROLES).length);
  const w = new IsoWarrior(name, jobId, rnd(35,65), (Math.random()-0.5)*2, 2+Math.random()*3, gender);
  gWarriors.push(w);
  updatePartyRow();
  showToast(`${name} が加入！`);
  closeModal('dev-modal');
}

// 履歴表示
function openHistoryFromDev() {
  const list = document.getElementById('hist-list');
  list.innerHTML = '';
  state.log.forEach(item => {
    const d = document.createElement('div');
    d.className = 'hist-item';
    d.innerHTML = `<span class="hi-time">${item.time}</span> ${item.text}`;
    list.appendChild(d);
  });
  openModal('history-modal');
}

// ============================================================
//  初期化
// ============================================================
function initGame() {
  spawnStars();
  spawnPetals();

  // 初期武将生成
  const initialWarriors = [
    { name: '織田信長', jobId: 0, power: 72, gender:'male' },
    { name: '豊臣秀吉', jobId: 1, power: 58, gender:'male' },
    { name: '徳川家康', jobId: 2, power: 65, gender:'male' },
    { name: '帰蝶',     jobId: 7, power: 45, gender:'female' },
  ];

  initialWarriors.forEach((cfg, i) => {
    const w = new IsoWarrior(cfg.name, cfg.jobId, cfg.power, (i-1.5)*0.8, 2.5+Math.random()*2, cfg.gender);
    if (cfg.gender === 'female') { w.stats.wisdom = rnd(50,70); }
    gWarriors.push(w);
  });

  // キャンバス初期化
  initIsoCanvas();

  // 縁組キャンセルボタン設定
  const cancelBtn = document.getElementById('engumi-cancel-btn');
  if (cancelBtn) {
    cancelBtn.onclick = () => {
      if (engumiStep === 0) {
        closeEngumi();
      } else {
        engumiStep--;
        renderEngumiStep();
      }
    };
  }

  // アイドル更新
  idleTimer = setInterval(performIdleTick, 3000);

  updateStatusUI();
  updatePartyRow();
  addLog('ゲーム開始。天下統一を目指せ！');

  showToast('戦国血脈 〜覇道の系譜〜 開始！', 3000);
}

window.onload = initGame;
</script>
