<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=DotGothic16&display=swap');
:root{
  --gold:#c8960c;--gold-l:#f0c040;--gold-d:rgba(200,150,12,.4);
  --parchment:#f5e8c8;--ink:#0e0800;--panel:rgba(8,4,0,.88);
  --crimson:#8b0000;
  --spring:#7CFC00;--summer:#00BFFF;--autumn:#FFA500;--winter:#d8d8d8;
  --h-header:58px;
  --h-nationbar:30px;
  --h-partyrow:78px;
  --h-actionrow:64px;
  --h-bottom-pad:max(env(safe-area-inset-bottom,0px),8px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;
  background:var(--ink);
  font-family:'Noto Serif JP',serif;
  overflow:hidden;color:var(--parchment);
  user-select:none;-webkit-user-select:none;
  position:fixed;touch-action:none;
}
button{font:inherit;}

/* ── グレード色 ── */
.sg-S{color:#ffdd44;font-weight:900;text-shadow:0 0 6px rgba(255,220,50,.5);}
.sg-A{color:#88ff88;}
.sg-B{color:#aaddff;}
.sg-C{color:#ffccaa;}
.sg-D{color:#ffaa77;}
.sg-E{color:#ff7777;}
.sg-F{color:#aa4444;}

/* ── 背景 ── */
#sky{position:fixed;inset:0;z-index:0;background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);}
.star{position:fixed;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.75}}
.mist{position:fixed;left:-20%;width:140%;background:linear-gradient(90deg,transparent,rgba(245,228,180,.06),rgba(245,228,180,.1),rgba(245,228,180,.06),transparent);border-radius:50%;animation:drift linear infinite;pointer-events:none;}
.mist:nth-child(1){height:42px;top:30%;animation-duration:32s;}
.mist:nth-child(2){height:54px;top:48%;animation-duration:26s;animation-delay:-11s;opacity:.65;}
.mist:nth-child(3){height:36px;top:40%;animation-duration:42s;animation-delay:-20s;opacity:.45;}
@keyframes drift{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(7%) scaleY(1.4)}100%{transform:translateX(-8%) scaleY(1)}}
.petal{position:fixed;border-radius:50% 0 50% 0;background:radial-gradient(ellipse,rgba(255,200,200,.9) 0%,rgba(255,130,130,.25) 100%);animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg) translateX(0);opacity:0}7%{opacity:.9}93%{opacity:.5}100%{transform:translateY(102vh) rotate(760deg) translateX(45px);opacity:0}}

/* ── メインレイアウト ── */
#main{position:fixed;inset:0;z-index:10;display:grid;grid-template-rows:var(--h-header) 1fr auto;width:100%;height:100%;}

/* ── ヘッダー ── */
#header{
  height:var(--h-header);
  padding:max(env(safe-area-inset-top,0px),8px) 12px 6px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-shrink:0;
}
#game-title{color:var(--gold);font-size:clamp(14px,4.2vw,18px);font-weight:900;letter-spacing:.18em;text-shadow:0 0 16px rgba(200,150,12,.7);line-height:1.25;white-space:nowrap;}
#game-title .sub{display:block;font-size:clamp(7px,1.8vw,9px);letter-spacing:.34em;color:var(--gold-d);font-weight:400;margin-top:2px;}
#status-panel{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:5px;max-width:66%;}
.stat-chip{display:flex;align-items:center;gap:4px;min-height:26px;background:var(--panel);border:1px solid var(--gold-d);border-radius:16px;padding:4px 8px;}
.sl{font-size:8px;color:rgba(245,232,200,.5);letter-spacing:.08em;}
.sv{font-size:13px;font-weight:700;color:var(--gold-l);}
.su{font-size:8px;color:var(--gold-d);}
.season-chip.spring .sv{color:var(--spring);}
.season-chip.summer .sv{color:var(--summer);}
.season-chip.autumn .sv{color:var(--autumn);}
.season-chip.winter .sv{color:var(--winter);}

/* ── ISOフィールド ── */
#iso-field{position:relative;overflow:hidden;min-height:0;}
#iso-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#bubble-layer{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}
.facility-activity{position:absolute;font-size:9px;color:#ffdd88;pointer-events:none;text-shadow:0 1px 3px #000;white-space:nowrap;transform:translateX(-50%);animation:actPop .3s ease-out;}
@keyframes actPop{0%{opacity:0;transform:translateX(-50%) scale(.5)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.float-text{position:absolute;font-size:10px;pointer-events:none;text-shadow:0 1px 3px #000;white-space:nowrap;transform:translateX(-50%);animation:floatUp 1.8s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-36px)}}

/* ── ボトムUI ── */
#bottom-ui{flex-shrink:0;padding:0 10px var(--h-bottom-pad);background:linear-gradient(0deg,rgba(6,3,0,.98) 0%,rgba(6,3,0,.82) 80%,transparent 100%);}
#nation-bar{display:flex;align-items:center;gap:7px;height:var(--h-nationbar);padding:5px 2px 4px;border-bottom:1px solid rgba(200,150,12,.12);}
.nl{font-size:8px;color:var(--gold-d);letter-spacing:.18em;white-space:nowrap;}
.nt{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
.nf{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b0000,var(--gold));transition:width .6s;}
.np{font-size:10px;color:var(--gold-l);font-weight:700;min-width:42px;text-align:right;}

#party-row{display:flex;gap:5px;height:var(--h-partyrow);align-items:center;padding:5px 0 4px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
#party-row::-webkit-scrollbar{display:none;}
.party-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:88px;padding:5px 8px;border-radius:8px;border:1px solid rgba(200,150,12,.2);background:rgba(255,255,255,.04);cursor:pointer;transition:border-color .2s,background .2s;touch-action:manipulation;}
.party-card.head{border-color:var(--gold);background:rgba(200,150,12,.08);}
.party-card.young{opacity:.72;border-color:rgba(200,150,12,.14);}
.party-card.mutant{border-color:#ff44ff;background:rgba(255,0,255,.08);}
.party-card:active{background:rgba(200,150,12,.18);}
.pc-role{font-size:7px;color:var(--gold-d);letter-spacing:.08em;}
.pc-name{font-size:9px;color:var(--parchment);font-weight:700;}
.pc-pow{font-size:8px;color:#ffaa44;}
.pc-hp{font-size:7px;}
.pc-loc{font-size:7px;color:#aaddff;text-align:center;}
.pc-skill{font-size:6px;color:#ff88ff;text-align:center;}

#action-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;height:var(--h-actionrow);padding:3px 0 2px;}
.act-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:56px;padding:0 2px;border-radius:10px;border:1px solid var(--gold-d);background:var(--panel);color:var(--parchment);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;touch-action:manipulation;}
.act-btn:active{transform:scale(.92);background:rgba(200,150,12,.16);border-color:var(--gold);}
.act-btn .ico{font-size:18px;line-height:1;}
.act-btn .lbl{font-size:8px;letter-spacing:.1em;color:rgba(245,232,200,.72);}
.act-btn.primary{border-color:var(--gold);background:rgba(139,0,0,.45);}
.act-btn.primary .lbl{color:var(--gold-l);}

/* ── 合戦画面 ── */
#battle-screen{position:fixed;inset:0;z-index:500;background:#0e0600;display:none;flex-direction:column;font-family:'DotGothic16',monospace;}
#battle-screen.show{display:flex;}
#bscr-inner{display:flex;flex-direction:column;width:100%;height:100%;}
#bscr-frame{position:relative;flex:1;min-height:0;border-bottom:3px solid #8b6914;box-shadow:0 4px 20px #c8960033;overflow:hidden;}
#bg-canvas,#battle-main-canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}
#battle-log-bar{flex-shrink:0;height:26px;background:#0a0600;border-bottom:1px solid #4a3000;color:#e8c060;font-size:clamp(9px,2.8vw,13px);display:flex;align-items:center;padding:0 10px;letter-spacing:.06em;overflow:hidden;white-space:nowrap;}
#battle-ui-panel{flex-shrink:0;height:72px;display:flex;gap:3px;padding:4px;background:#1a0800;}
.bunit-panel{flex:1;background:linear-gradient(180deg,#e8dcc0,#d4c090 40%,#c0a860);border:2px solid #7a5800;border-radius:4px;padding:4px 8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 1px 0 #fff8,inset 0 -1px 0 #0004;}
.bunit-top{display:flex;align-items:baseline;justify-content:space-between;}
.bunit-name{font-size:clamp(10px,3.5vw,14px);color:#1a0800;letter-spacing:.04em;}
.bhp-group{display:flex;align-items:baseline;gap:3px;}
.bhp-label{font-size:clamp(7px,1.8vw,9px);color:#6a4000;}
.bhp-value{font-size:clamp(14px,4vw,20px);color:#1a0800;letter-spacing:.08em;min-width:30px;text-align:right;}
.bpower-label{font-size:clamp(7px,2vw,9px);color:#5a3800;line-height:1;}
.bpower-wrap{width:100%;height:clamp(8px,2.5vw,13px);background:#2a1800;border:1px solid #5a3000;border-radius:2px;overflow:hidden;position:relative;}
.bpower-bar{height:100%;background:linear-gradient(90deg,#2060c0,#2080e0 40%,#40a0ff);transition:width .35s ease;}
.bpower-bar-enemy{background:linear-gradient(90deg,#c01010,#e82020 40%,#ff4040);}
.bpower-ticks{position:absolute;inset:0;display:flex;pointer-events:none;}
.bpower-ticks span{flex:1;border-right:1px solid #0003;}
#battle-result-panel{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;background:#000b;z-index:10;}
#battle-result-panel.show{display:flex;}
#result-box{background:linear-gradient(180deg,#f4e080,#c89020);border:3px solid #7a5000;border-radius:10px;padding:18px 32px;text-align:center;box-shadow:0 8px 40px #00000099;max-width:90vw;}
.bres-title{font-family:'DotGothic16',monospace;font-size:clamp(14px,5vw,20px);color:#1a0800;letter-spacing:.2em;margin-bottom:12px;display:block;}
.bres-detail{font-family:'DotGothic16',monospace;font-size:clamp(10px,3vw,13px);color:#3a1400;text-align:center;line-height:1.9;white-space:pre-line;margin-bottom:14px;}
.bres-btn{font-family:'DotGothic16',monospace;font-size:clamp(11px,3.2vw,14px);background:linear-gradient(180deg,#e05010,#a02808);color:#fff8e0;border:2px solid #601000;border-radius:6px;padding:8px 24px;cursor:pointer;touch-action:manipulation;}

/* ── モーダル共通 ── */
.modal{position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;justify-content:center;background:rgba(8,4,0,.92);}
.modal.show{display:flex;}
.modal-shell{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;box-shadow:0 -20px 60px rgba(0,0,0,.45);}
.modal-tall{height:88%;}
.modal-mid{height:78%;}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
.modal-deco-top{height:3px;background:linear-gradient(90deg,transparent,var(--gold),rgba(200,150,12,.4),var(--gold),transparent);flex-shrink:0;}
.modal-head{padding:14px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-title{font-size:14px;color:var(--gold);font-weight:700;letter-spacing:.28em;}
.close-btn{background:none;border:1px solid rgba(200,150,12,.3);color:var(--gold);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.modal-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-y;}
.modal-body::-webkit-scrollbar{display:none;}
.modal-footer{flex-shrink:0;display:flex;gap:8px;padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);border-top:1px solid rgba(200,150,12,.1);}
.modal-btn{flex:1;padding:13px;border-radius:10px;font-family:inherit;font-size:12px;letter-spacing:.25em;cursor:pointer;transition:all .2s;touch-action:manipulation;}
.modal-btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:rgba(200,150,12,.6);}
.modal-btn-exec{background:linear-gradient(135deg,rgba(139,0,0,.65),rgba(180,30,0,.55));border:1px solid rgba(200,150,12,.5);color:var(--gold-l);font-weight:700;}
.modal-btn-exec:disabled{opacity:.38;cursor:not-allowed;}

/* ── 系譜モーダル ── */
.blood-skill-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.bsk-row{display:flex;align-items:flex-start;gap:8px;padding:7px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;}
.bsk-icon{font-size:16px;flex-shrink:0;}
.bsk-name{font-size:11px;font-weight:700;color:var(--parchment);}
.bsk-desc{font-size:9px;color:rgba(245,228,180,.55);margin-top:1px;}
.gen-block{margin-bottom:14px;}
.gen-label{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-bottom:6px;}
.gen-list{display:flex;flex-wrap:wrap;gap:6px;}
.gen-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.18);border-radius:8px;padding:8px 10px;font-size:9px;color:var(--parchment);line-height:1.6;min-width:140px;}
.gen-card .gn{font-size:11px;font-weight:700;color:var(--gold-l);}
.gen-card .gp{color:#ffaa44;}
.gen-card .gskill{color:#ff88ff;font-size:8px;}
.gen-card .gcomp{color:#88ffcc;font-size:8px;}
.gen-card.mutant-card{border-color:#ff44ff;background:rgba(255,0,255,.06);}

/* ── 武将モーダル ── */
#warrior-modal.modal{z-index:700;}
.wm-shell{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;overflow:hidden;animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;}
.wm-head{padding:16px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);}
.wm-name{font-size:18px;font-weight:900;color:var(--gold-l);letter-spacing:.14em;}
.wm-role{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-top:2px;}
.wm-body{padding:10px 16px max(env(safe-area-inset-bottom,0px),16px);}
.wm-stat{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.wsk{color:rgba(245,228,180,.6);}
.wsv{color:var(--parchment);font-weight:700;text-align:right;}
.wm-hp-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin:2px 0 6px;}
.wm-hp-fill{height:100%;border-radius:3px;transition:width .4s;}
.wm-close{display:block;width:100%;margin-top:10px;padding:11px;border-radius:8px;border:1px solid rgba(200,150,12,.3);background:none;color:var(--gold);letter-spacing:.3em;cursor:pointer;touch-action:manipulation;}

/* ── 縁組モーダル ── */
.modal-kamon{font-size:28px;text-align:center;margin-bottom:4px;text-shadow:0 0 24px rgba(200,150,12,.4);}
.modal-main-title{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.5em;text-align:center;}
.modal-subtitle{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.35em;text-align:center;margin-top:3px;}
.modal-step-indicator{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,150,12,.22);transition:all .3s;}
.step-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(200,150,12,.5);}
.engumi-cost{text-align:center;padding:8px;background:rgba(200,150,12,.06);border:1px solid rgba(200,150,12,.15);border-radius:8px;margin-bottom:12px;}
.ec-label{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.3em;}
.ec-val{display:block;font-size:20px;font-weight:900;color:var(--gold-l);margin-top:2px;}
.ec-unit{font-size:9px;color:rgba(200,150,12,.6);}
.modal-section-title{font-size:9px;color:rgba(200,150,12,.6);letter-spacing:.3em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(200,150,12,.12);}
.warrior-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.warrior-sel-card{min-height:78px;padding:10px;border-radius:10px;border:1px solid rgba(200,150,12,.15);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s;touch-action:manipulation;}
.warrior-sel-card.selected,.warrior-sel-card:active{background:rgba(200,150,12,.12);border-color:var(--gold);}
.warrior-sel-card.mutant-card{border-color:rgba(255,100,255,.3);}
.warrior-sel-card.mutant-card.selected{border-color:#ff44ff;background:rgba(255,0,255,.1);}
.wsc-name{font-size:12px;font-weight:700;color:var(--parchment);}
.wsc-stats{font-size:10px;color:rgba(200,150,12,.7);margin-top:3px;}
.wsc-hp{font-size:9px;margin-top:2px;}
.wsc-skill{font-size:8px;color:#ff88ff;margin-top:2px;}
.confirm-panel{background:rgba(200,150,12,.05);border:1px solid rgba(200,150,12,.18);border-radius:10px;padding:12px;}
.confirm-pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.confirm-w{text-align:center;}
.cw-name{font-size:13px;font-weight:700;color:var(--parchment);}
.cw-role{font-size:9px;color:var(--gold-d);}
.confirm-heart{font-size:22px;color:var(--crimson);text-shadow:0 0 12px rgba(139,0,0,.5);}
.child-preview{background:rgba(255,255,255,.03);border-radius:8px;padding:9px;margin-top:7px;}
.cp-title{font-size:8px;color:rgba(200,150,12,.5);letter-spacing:.3em;margin-bottom:5px;}
.cp-stat{display:flex;justify-content:space-between;font-size:10px;color:rgba(245,228,180,.7);padding:2px 0;}
.cpv{color:var(--gold-l);font-weight:700;}
.cp-compat{font-size:10px;color:#88ffcc;text-align:center;margin-top:5px;padding:4px;background:rgba(0,255,100,.05);border-radius:4px;}

/* ── 成功オーバーレイ ── */
#success-overlay{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px;background:rgba(8,4,0,.96);}
#success-overlay.show{display:flex;animation:fadeIn .4s ease;}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.suc-kamon{font-size:52px;animation:sucPulse 2s ease infinite;}
@keyframes sucPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.suc-title{font-size:12px;color:var(--gold-d);letter-spacing:.5em;text-align:center;}
.suc-name{font-size:24px;font-weight:900;color:var(--gold-l);letter-spacing:.18em;text-shadow:0 0 28px rgba(200,150,12,.6);text-align:center;}
.suc-stats{font-size:11px;color:rgba(245,228,180,.7);text-align:center;line-height:1.9;white-space:pre-line;}
.suc-skill{font-size:13px;color:#ff88ff;text-align:center;letter-spacing:.08em;text-shadow:0 0 12px rgba(255,100,255,.5);}
.suc-compat{font-size:11px;color:#88ffcc;text-align:center;}
.suc-btn{margin-top:6px;padding:13px 28px;border-radius:10px;border:1px solid rgba(200,150,12,.4);background:rgba(200,150,12,.15);color:var(--gold-l);font-family:inherit;font-size:13px;letter-spacing:.35em;cursor:pointer;touch-action:manipulation;}
.mutant-flash{animation:mutantFlash .5s ease 3;}
@keyframes mutantFlash{0%,100%{box-shadow:none}50%{box-shadow:0 0 40px rgba(255,0,255,.8)}}

/* ── 開発者 ── */
.dev-body{padding:12px 16px max(env(safe-area-inset-bottom,0px),16px);display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.dev-btn{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:var(--parchment);font-size:11px;padding:12px 6px;border-radius:8px;cursor:pointer;letter-spacing:.15em;touch-action:manipulation;}
.dev-btn:active{background:rgba(200,150,12,.14);}

function getGrade(val){
  if(val>=95) return {grade:'S',color:'#ffdd44'};
  if(val>=85) return {grade:'A',color:'#88ff88'};
  if(val>=75) return {grade:'B',color:'#aaddff'};
  if(val>=65) return {grade:'C',color:'#ffccaa'};
  if(val>=55) return {grade:'D',color:'#ffaa77'};
  if(val>=45) return {grade:'E',color:'#ff7777'};
  return {grade:'F',color:'#aa4444'};
}
function gradeSpan(val){
  const g=getGrade(val);
  return `<span class="sg-${g.grade}">${g.grade}</span>(${val})`;
}
function hpGradeSpan(hp,maxHp){
  const pct=Math.round(hp/maxHp*100);
  const g=getGrade(Math.floor(pct*0.6+40));
  return `<span class="sg-${g.grade}">${g.grade}</span>(${pct}%)`;
}

function rnd(lo,hi){ return Math.floor(lo+Math.random()*(hi-lo+1)); }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

let toastTimer=null;
function showToast(msg,duration,isMutant){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.toggle('mutant-toast',!!isMutant);
  t.classList.add('show');
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.classList.remove('show');toastTimer=null;},duration??2200);
}
function addLog(text,isMutant){
  const now=new Date();
  const ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  state.log.unshift({time:ts,text,mutant:!!isMutant});
  if(state.log.length>120) state.log.pop();
}

function getSeason(m){ if(m>=3&&m<=5)return 'spring'; if(m>=6&&m<=8)return 'summer'; if(m>=9&&m<=11)return 'autumn'; return 'winter'; }
function compatLabel(score){
  if(score>=45) return '❤️ 運命の縁（最大ボーナス）';
  if(score>=30) return '💛 良縁（中ボーナス）';
  if(score>=15) return '🤝 普通の縁（小ボーナス）';
  return '💔 相性不良';
}
function randName(gender){
  const sn=SURNAMES[Math.floor(Math.random()*SURNAMES.length)];
  const gn=gender==='female'
    ?GIVEN_NAMES_F[Math.floor(Math.random()*GIVEN_NAMES_F.length)]
    :GIVEN_NAMES_M[Math.floor(Math.random()*GIVEN_NAMES_M.length)];
  return sn+gn;
}

// ============================================================
//  相性・子ステータス計算
// ============================================================
function calcCompatibility(a,b){
  let s=0;
  if(a._skillId&&b._skillId&&a._skillId===b._skillId) s+=20;
  if(Math.abs(a.stats.power-b.stats.power)<10) s+=10;
  if(Math.abs(a.stats.wisdom-b.stats.wisdom)>15) s+=8;
  if(Math.abs(a.age-b.age)<8) s+=7;
  s+=Math.floor((a._loyalty+b._loyalty)/20);
  return clamp(s,0,60);
}
function createChildStats(father,mother){
  const compat=calcCompatibility(father,mother);
  const bonus=Math.floor(compat/6);
  const power=clamp(Math.round(father.stats.power*0.65+mother.stats.power*0.45)+rnd(5,12)+bonus,10,98);
  const wisdom=clamp(Math.round(father.stats.wisdom*0.45+mother.stats.wisdom*0.65)+rnd(8,14)+bonus,10,98);
  const maxHp=clamp(Math.round((father.stats.maxHp+mother.stats.maxHp)/1.8)+rnd(10,20)+bonus,100,200);
  return{power,wisdom,hp:maxHp,maxHp,compat,bonus};
}
function inheritSkill(father,mother,compat){
  let skillId=null,isMutant=false;
  const mutantChance=0.05+compat*0.002;
  if(Math.random()<mutantChance){
    skillId=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)].id;
    isMutant=true;
  } else {
    if(father._skillId&&Math.random()<0.5) skillId=father._skillId;
    if(mother._skillId&&Math.random()<0.5) skillId=mother._skillId;
    if(!skillId&&Math.random()<0.05) skillId=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)].id;
  }
  return{skillId,isMutant};
}
function bloodlineFacilityMul(w){
  let mul=1.0;
  if(w._parents) mul+=(w._generation||1-1)*0.08;
  if(w._skillId==='wise'||w._skillId==='loyal') mul*=1.2;
  return mul;
}

// ============================================================
//  IsoWarrior クラス
// ============================================================
class IsoWarrior{
  constructor(name,jobId,power,offsetX,speed,gender,age){
    this.name=name; this.jobId=jobId;
    this.gender=gender||(Math.random()<0.5?'male':'female');
    this.offsetX=offsetX||0;
    this.speed=speed||(2+Math.random()*3);
    this.age=(age!==undefined)?age:25;
    this.stats={power:clamp(power||rnd(20,45),1,99),wisdom:rnd(15,45),hp:100,maxHp:100};
    this._loyalty=rnd(60,95);
    this._generation=1;
    this._parents=null;
    this._skillId=null;
    this._isMutant=false;
    this._compatibility=0;
    this.isoX=(Math.random()-0.5)*4;
    this.isoY=(Math.random()-0.5)*4;
    this.dirX=Math.random()>0.5?1:-1;
    this.dirY=Math.random()>0.5?1:-1;
    this._currentFacility=null;
    this._facilityTimer=0;
    this._facilityStayMax=0;
    this._moveTimer=rnd(60,180);
    this._color=this._pickColor();
  }
  _pickColor(){
    if(this._isMutant) return '#ff44ff';
    const c=['#c8960c','#cc4444','#4488cc','#44cc88','#cc88cc','#ccaa44','#44aacc','#cc6644'];
    return c[Math.floor(Math.random()*c.length)];
  }
  get loyalty(){return this._loyalty;}
  isMature(){return this.age>=MATURE_AGE;}
  statusLabel(){return this.isMature()?'実戦可':'育成中（'+this.age+'歳）';}
  skillName(){
    if(!this._skillId) return '—';
    const sk=getSkillById(this._skillId);
    return sk?sk.icon+' '+sk.name:'—';
  }
  locationLabel(){
    if(!this._currentFacility) return '巡回中';
    return FACILITY_MAP[this._currentFacility]?.name||'巡回中';
  }
  applyBloodSkill(){
    if(!this._skillId) return;
    const sk=getSkillById(this._skillId);
    if(sk) sk.effect(this);
  }
  tick(){
    if(this._currentFacility){
      this._facilityTimer++;
      if(this._facilityTimer>=this._facilityStayMax) this._leaveFacility();
      else if(this._facilityTimer%90===45) this._applyEffect(this._currentFacility,false);
    } else {
      this._moveTimer--;
      if(this._moveTimer<=0){ this._tryEnterFacility(); this._moveTimer=rnd(40,120); }
      this._walk();
    }
  }
  _walk(){
    const spd=this.speed*0.012;
    this.isoX+=this.dirX*spd; this.isoY+=this.dirY*spd;
    const b=3.5;
    if(this.isoX>b){this.isoX=b;this.dirX=-1;}
    if(this.isoX<-b){this.isoX=-b;this.dirX=1;}
    if(this.isoY>b){this.isoY=b;this.dirY=-1;}
    if(this.isoY<-b){this.isoY=-b;this.dirY=1;}
    if(Math.random()<0.005) this.dirX*=-1;
    if(Math.random()<0.005) this.dirY*=-1;
  }
  _tryEnterFacility(){
    const hpPct=this.stats.hp/this.stats.maxHp;
    if(this._skillId==='wise'&&Math.random()<0.4){this._enterFacility('academy');return;}
    if((this._skillId==='brave'||this._skillId==='berserk')&&Math.random()<0.4&&hpPct>0.5){this._enterFacility('training');return;}
    const cands=hpPct<0.4?['tea','garden','tea']:Object.keys(FACILITY_MAP);
    this._enterFacility(cands[Math.floor(Math.random()*cands.length)]);
  }
  _enterFacility(key){
    const fp=FACILITY_POSITIONS.find(f=>f.key===key);
    if(!fp) return;
    this._currentFacility=key;
    this.isoX=fp.tx+(Math.random()-0.5)*0.4;
    this.isoY=fp.ty+(Math.random()-0.5)*0.4;
    this._facilityTimer=0;
    this._facilityStayMax=rnd(120,300);
    this._applyEffect(key,true);
  }
  _leaveFacility(){
    this._currentFacility=null;
    this._facilityTimer=0;
    this.dirX=Math.random()>0.5?1:-1;
    this.dirY=Math.random()>0.5?1:-1;
  }
  _applyEffect(key,isEntry){
    const eff=FACILITY_EFFECT[key];
    if(!eff) return;
    const[lo,hi]=eff.range;
    const base=isEntry?Math.floor(lo+Math.random()*(hi-lo)):Math.floor(1+Math.random()*2);
    const mul=bloodlineFacilityMul(this);
    const gain=Math.max(1,Math.floor(base*mul));
    let hpChange=0;
    if(isEntry){
      hpChange=eff.costHp>0
        ?Math.floor(eff.costHp*(0.8+Math.random()*0.4))
        :Math.floor(eff.costHp*(0.7+Math.random()*0.6));
    }
    if(eff.stat==='power')   this.stats.power=clamp(this.stats.power+gain,1,99);
    if(eff.stat==='wisdom')  this.stats.wisdom=clamp(this.stats.wisdom+gain,1,99);
    if(eff.stat==='hp')      this.stats.hp=clamp(this.stats.hp+gain,1,this.stats.maxHp);
    if(eff.stat==='loyalty') this._loyalty=clamp(this._loyalty+gain,0,100);
    this.stats.hp=clamp(this.stats.hp+hpChange,1,this.stats.maxHp);
    if(isEntry&&(gain>0||hpChange!==0)){
      const text=eff.stat==='hp'?'体力 +'+gain:eff.label+' +'+gain+(hpChange!==0?' / HP'+(hpChange>0?'+':'')+hpChange:'');
      createFloatText(this,text,eff.color);
      updatePartyRow(); updateStatusUI();
    }
  }
}

// ============================================================
//  フロートテキスト
// ============================================================
function getWarriorScreenPos(w){
  const canvas=document.getElementById('iso-canvas');
  if(!canvas) return{x:0,y:0};
  const rect=canvas.getBoundingClientRect();
  const cx=canvas.width/2, cy=canvas.height*0.45;
  const tileW=Math.min(canvas.width*0.22,canvas.height*0.28);
  const tileH=tileW*0.5;
  const sx=cx+(w.isoX-w.isoY)*tileW*0.5;
  const sy=cy+(w.isoX+w.isoY)*tileH*0.5;
  return{x:rect.left+sx,y:rect.top+sy};
}
function createFloatText(w,text,color){
  const layer=document.getElementById('bubble-layer');
  if(!layer) return;
  const pos=getWarriorScreenPos(w);
  const lr=layer.getBoundingClientRect();
  const el=document.createElement('div');
  el.className='float-text'; el.textContent=text;
  el.style.color=color||'#fff';
  el.style.left=(pos.x-lr.left)+'px';
  el.style.top=(pos.y-lr.top-20)+'px';
  layer.appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

function updatePartyRow(){
  const row=document.getElementById('party-row');
  if(!row) return;
  row.innerHTML='';
  gWarriors.forEach((w,i)=>{
    const pG=getGrade(w.stats.power);
    const wG=getGrade(w.stats.wisdom);
    const hpPct=Math.round((w.stats.hp/w.stats.maxHp)*100);
    const hpG=getGrade(Math.floor(hpPct*0.6+40));
    const gIcon=GENDER_ICON[w.gender]||'';
    const card=document.createElement('div');
    card.className='party-card'+(i===0?' head':'')+(w.isMature()?'':' young')+(w._isMutant?' mutant':'');
    card.innerHTML=
      `<div class="pc-role">${ROLES[w.jobId]||'武者'} ${gIcon}</div>`+
      `<div class="pc-name">${w.name}${w._isMutant?' ✨':''}</div>`+
      `<div class="pc-pow">武<span class="sg-${pG.grade}">${pG.grade}</span> 知<span class="sg-${wG.grade}">${wG.grade}</span></div>`+
      `<div class="pc-hp" style="color:${hpG.color}">体<span class="sg-${hpG.grade}">${hpG.grade}</span>(${hpPct}%)</div>`+
      `<div class="pc-loc">${w.locationLabel()}・${w.age}歳</div>`+
      (w._skillId?`<div class="pc-skill">${w.skillName()}</div>`:'');
    card.onclick=()=>openWarriorModal(w);
    row.appendChild(card);
  });
}

function openWarriorModal(w){
  const hpPct=(w.stats.hp/w.stats.maxHp)*100;
  const hpG=getGrade(Math.floor(hpPct*0.6+40));
  const hpBarColor=hpPct>60?'#88dd88':hpPct>30?'#ffaa44':'#ff6666';
  const gIcon=GENDER_ICON[w.gender]||'';
  const gLabel=GENDER_LABEL[w.gender]||'';

  document.getElementById('wm-name-text').textContent=w.name+(w._isMutant?' ✨':'')+' '+gIcon;
  document.getElementById('wm-role-text').textContent=(ROLES[w.jobId]||'武将')+'（'+gLabel+'）';
  document.getElementById('wm-power').innerHTML=gradeSpan(w.stats.power);
  document.getElementById('wm-wisdom').innerHTML=gradeSpan(w.stats.wisdom);
  document.getElementById('wm-hp').innerHTML=`<span class="sg-${hpG.grade}">${hpG.grade}</span> ${w.stats.hp}/${w.stats.maxHp}`;
  document.getElementById('wm-hp-fill').style.width=hpPct+'%';
  document.getElementById('wm-hp-fill').style.background=hpBarColor;
  document.getElementById('wm-loyalty').textContent=w._loyalty;
  document.getElementById('wm-status').textContent=w.statusLabel();
  document.getElementById('wm-location').textContent=w.locationLabel();
  document.getElementById('wm-age').textContent=w.age+'歳 '+gLabel;
  document.getElementById('wm-lineage').textContent=w._parents?w._parents.father+' × '+w._parents.mother:'初代';
  document.getElementById('wm-skill').textContent=w.skillName()+(w._isMutant?'（突然変異！）':'');
  document.getElementById('wm-generation').textContent='第'+w._generation+'世代';
  openModal('warrior-modal');
}

      html+=`<div class="gen-card${p.isMutant?' mutant-card':''}">`+

// ============================================================
function openEngumi(){
  engumiStep=0; engumiSelectedFather=null; engumiSelectedMother=null;
  renderEngumiStep();
  openModal('engumi-modal');
}
function renderEngumiStep(){
  for(let i=0;i<3;i++){
    const dot=document.getElementById('sdot'+i);
    if(dot) dot.classList.toggle('active',i===engumiStep);
  }
  const nextBtn=document.getElementById('engumi-next-btn');
  const cancelBtn=document.getElementById('engumi-cancel-btn');
  const content=document.getElementById('engumi-step-content');
  if(engumiStep===0){
    cancelBtn.textContent='取消'; cancelBtn.onclick=()=>closeModal('engumi-modal');
  } else {
    cancelBtn.textContent='← 戻る'; cancelBtn.onclick=()=>{engumiStep--;renderEngumiStep();};
  }
  if(engumiStep===0){
    nextBtn.textContent='次へ →'; nextBtn.disabled=(engumiSelectedFather===null);
    const males=gWarriors.filter(w=>w.isMature());
    if(males.length===0){
      content.innerHTML='<div style="color:rgba(200,150,12,.6);text-align:center;padding:20px;font-size:12px;">成人した武将がいません（'+MATURE_AGE+'歳以上）</div>';
      nextBtn.disabled=true; return;
    }
    let html='<div class="engumi-cost"><div class="ec-label">縁組費用</div><span class="ec-val">'+ENGUMI_COST.toLocaleString()+'</span><span class="ec-unit"> 石</span></div>';
    html+='<div class="modal-section-title">父となる武将を選べ（'+MATURE_AGE+'歳以上）</div><div class="warrior-select-grid">';
    males.forEach(w=>{
      const pG=getGrade(w.stats.power);
      const wG=getGrade(w.stats.wisdom);
      const hpPct=Math.round((w.stats.hp/w.stats.maxHp)*100);
      const hpG=getGrade(Math.floor(hpPct*0.6+40));
      const idx=gWarriors.indexOf(w);
      const gIcon=GENDER_ICON[w.gender]||'';
      html+=`<div class="warrior-sel-card${engumiSelectedFather===idx?' selected':''}${w._isMutant?' mutant-card':''}" onclick="selectFather(${idx})">`+
        `<div class="wsc-name">${w.name}${w._isMutant?' ✨':''} ${gIcon}　${w.age}歳</div>`+
        `<div class="wsc-stats">武<span class="sg-${pG.grade}">${pG.grade}</span> 知<span class="sg-${wG.grade}">${wG.grade}</span></div>`+
        `<div class="wsc-hp" style="color:${hpG.color}">体<span class="sg-${hpG.grade}">${hpG.grade}</span>(${hpPct}%)</div>`+
        (w._skillId?`<div class="wsc-skill">${w.skillName()}</div>`:'')+
        '</div>';
    });
    html+='</div>'; content.innerHTML=html;
  } else if(engumiStep===1){
    nextBtn.textContent='次へ →'; nextBtn.disabled=(engumiSelectedMother===null);
    const candidates=gWarriors.filter((_,i)=>i!==engumiSelectedFather&&gWarriors[i].isMature());
    if(candidates.length===0){
      content.innerHTML='<div style="color:rgba(200,150,12,.6);text-align:center;padding:20px;font-size:12px;">成人した母となる武将がいません</div>';
      nextBtn.disabled=true; return;
    }
    let html='<div class="modal-section-title">母となる武将を選べ（'+MATURE_AGE+'歳以上）</div><div class="warrior-select-grid">';
    candidates.forEach(w=>{
      const pG=getGrade(w.stats.power);
      const wG=getGrade(w.stats.wisdom);
      const hpPct=Math.round((w.stats.hp/w.stats.maxHp)*100);
      const hpG=getGrade(Math.floor(hpPct*0.6+40));
      const idx=gWarriors.indexOf(w);
      const comp=engumiSelectedFather!==null&&gWarriors[engumiSelectedFather]?calcCompatibility(gWarriors[engumiSelectedFather],w):0;
      const gIcon=GENDER_ICON[w.gender]||'';
      html+=`<div class="warrior-sel-card${engumiSelectedMother===idx?' selected':''}${w._isMutant?' mutant-card':''}" onclick="selectMother(${idx})">`+
        `<div class="wsc-name">${w.name}${w._isMutant?' ✨':''} ${gIcon}　${w.age}歳</div>`+
        `<div class="wsc-stats">武<span class="sg-${pG.grade}">${pG.grade}</span> 知<span class="sg-${wG.grade}">${wG.grade}</span></div>`+
        `<div class="wsc-hp" style="color:${hpG.color}">体<span class="sg-${hpG.grade}">${hpG.grade}</span>(${hpPct}%)</div>`+
        (w._skillId?`<div class="wsc-skill">${w.skillName()}</div>`:'')+
        `<div style="font-size:9px;color:#88ffcc;margin-top:2px;">相性: ${comp}pt</div>`+
        '</div>';
    });
    html+='</div>';
    if(engumiSelectedMother!==null&&gWarriors[engumiSelectedMother]){
      const f=gWarriors[engumiSelectedFather],m=gWarriors[engumiSelectedMother];
      const cs=createChildStats(f,m);
      html+='<div style="margin-top:12px;"><div class="modal-section-title">子の予測値</div>'+
        '<div class="child-preview"><div class="cp-title">誕生する子の予測ステータス</div>'+
        '<div class="cp-stat"><span>武力</span><span class="cpv">〜'+cs.power+'</span></div>'+
        '<div class="cp-stat"><span>知力</span><span class="cpv">〜'+cs.wisdom+'</span></div>'+
        '<div class="cp-stat"><span>体力上限</span><span class="cpv">〜'+cs.maxHp+'</span></div>'+
        '<div class="cp-compat">'+compatLabel(cs.compat)+'（+'+cs.bonus+'ボーナス）</div>'+
        '</div></div>';
    }
    content.innerHTML=html;
  } else if(engumiStep===2){
    nextBtn.textContent='成立させる'; nextBtn.disabled=false;
    const f=gWarriors[engumiSelectedFather],m=gWarriors[engumiSelectedMother];
    if(!f||!m){showToast('選択が無効です');engumiStep=0;renderEngumiStep();return;}
    const cs=createChildStats(f,m);
    const{skillId,isMutant}=inheritSkill(f,m,cs.compat);

function selectFather(idx){
  engumiSelectedFather=idx;

}
function selectMother(idx){
  if(idx===engumiSelectedFather){showToast('父と同じ武将は選べません');return;}

}
function engumiNext(){
  if(engumiStep===0){
    if(engumiSelectedFather===null){showToast('父を選んでください');return;}
    engumiStep=1; renderEngumiStep();
  } else if(engumiStep===1){
    if(engumiSelectedMother===null){showToast('母を選んでください');return;}
    engumiStep=2; renderEngumiStep();
  } else {

function doEngumi(){
  if(state.koku<ENGUMI_COST){showToast('石高が足りません（必要：'+ENGUMI_COST+'石）');return;}
  const f=gWarriors[engumiSelectedFather],m=gWarriors[engumiSelectedMother];
  if(!f||!m){showToast('選択が無効です');closeModal('engumi-modal');return;}
  const cs=createChildStats(f,m);
  const{skillId,isMutant}=inheritSkill(f,m,cs.compat);
  const sk=skillId?getSkillById(skillId):null;
  state.koku-=ENGUMI_COST;
  const gender=Math.random()<0.5?'male':'female';
  const childName=randName(gender);
  const jobId=Math.floor(Math.random()*Object.keys(ROLES).length);
  const child=new IsoWarrior(childName,jobId,cs.power,0,2.5+Math.random()*2,gender,0);
  child.stats.wisdom=cs.wisdom; child.stats.hp=cs.hp; child.stats.maxHp=cs.maxHp;
  child._generation=Math.max(f._generation,m._generation)+1;
  child._parents={father:f.name,mother:m.name};
  child._skillId=skillId; child._isMutant=isMutant; child._compatibility=cs.compat;
  if(skillId) child.applyBloodSkill();
  if(isMutant) child._color='#ff44ff';
  gWarriors.push(child);
  state.pedigree.push({childName,father:f.name,mother:m.name,power:child.stats.power,wisdom:child.stats.wisdom,generation:child._generation,skillId,skillName:child.skillName(),compat:cs.compat,isMutant});
  addLog('縁組成立：'+f.name+' × '+m.name+' → '+childName+'（第'+child._generation+'世代・0歳）'+(skillId?'　血統:'+child.skillName():'')+(isMutant?'　★突然変異！':''),isMutant);
  closeModal('engumi-modal');

  const gIcon=GENDER_ICON[gender]||'';
  document.getElementById('suc-kamon').textContent=isMutant?'🔥':'👶';
  document.getElementById('suc-name').textContent=childName+(isMutant?' ✨':'')+' '+gIcon;
  document.getElementById('suc-stats').innerHTML=
    `武力 ${child.stats.power}　知力 ${child.stats.wisdom}　体力 ${child.stats.maxHp}\n${ROLES[jobId]}　第${child._generation}世代　0歳　${GENDER_LABEL[gender]}\n${f.name} ${GENDER_ICON[f.gender]||''} × ${m.name} ${GENDER_ICON[m.gender]||''} の子\n親相性: ${cs.compat}pt（+${cs.bonus}ボーナス）`;
  document.getElementById('suc-skill').textContent=sk?(isMutant?'🔥 突然変異！ ':'血統継承: ')+sk.icon+' '+sk.name:'';
  document.getElementById('suc-compat').textContent=compatLabel(cs.compat);
  if(isMutant){
    showToast('🔥 突然変異血統発現！ '+sk.name,4000,true);
    document.getElementById('success-overlay').classList.add('mutant-flash');
    setTimeout(()=>document.getElementById('success-overlay').classList.remove('mutant-flash'),2000);
  }
  openModal('success-overlay');
  updateStatusUI(); updatePartyRow();
}

function playerProvinceCount(){
  return PROVINCES.filter(p=>p.clan==='player').length;
}
function drawStrategicMap(){
  const canvas=document.getElementById('strategic-map');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // 背景
  ctx.fillStyle='#08100a';
  ctx.fillRect(0,0,W,H);

  // グリッドライン（薄く）
  ctx.strokeStyle='rgba(200,150,12,.05)';
  ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // 隣接線
  PROVINCES.forEach(p=>{
    p.adj.forEach(adjId=>{
      if(adjId<=p.id) return;
      const q=PROVINCES.find(x=>x.id===adjId);
      if(!q) return;
      ctx.strokeStyle='rgba(200,150,12,.18)';
      ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();
    });
  });

  // 国を描画
  PROVINCES.forEach(p=>{
    const isPlayer=(p.clan==='player');
    const isSelected=(selectedProvince&&selectedProvince.id===p.id);
    const color=CLAN_COLORS[p.clan]||'#444';
    const r=18;

    // 影
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.beginPath();ctx.ellipse(p.x+2,p.y+2,r+2,r*0.6+2,0,0,Math.PI*2);ctx.fill();

    // 本体
    ctx.fillStyle=color;
    ctx.strokeStyle=isSelected?'#ffee44':isPlayer?'#ffcc00':'rgba(255,255,255,.2)';
    ctx.lineWidth=isSelected?3:isPlayer?2:1;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();

    // 選択グロー
    if(isSelected){
      ctx.shadowColor='#ffee44';ctx.shadowBlur=16;
      ctx.strokeStyle='#ffee44';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }
    if(isPlayer){
      ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    }

    // 国名
    ctx.fillStyle=isPlayer?'#ffee88':'#f0e8c8';
    ctx.font='bold 9px DotGothic16,monospace';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.name,p.x,p.y);

    // 勢力値（下部）
    ctx.fillStyle='rgba(245,228,180,.6)';
    ctx.font='7px sans-serif';
    ctx.fillText(p.strength,p.x,p.y+r+9);
  });

  // 凡例
  ctx.fillStyle='rgba(200,150,12,.8)';
  ctx.font='9px DotGothic16,monospace';
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.fillText('🟡 自領地  ● 敵国',6,H-16);
  ctx.fillStyle='rgba(245,228,180,.5)';
  ctx.fillText('支配: '+playerProvinceCount()+'/'+PROVINCES.length+'国',6,H-6);
}

function openMap(){
  selectedProvince=null;
  document.getElementById('selected-province-info').textContent='国をタップして侵攻先を選択';
  document.getElementById('invade-btn').style.display='none';
  openModal('map-modal');

  // canvasサイズをモーダル幅に合わせる
  setTimeout(()=>{
    const canvas=document.getElementById('strategic-map');
    const body=canvas.parentElement;
    if(body){
      canvas.width=body.clientWidth-20;
      canvas.height=Math.max(400, body.clientHeight-60);
    }
    drawStrategicMap();

    canvas.onclick=function(e){
      const rect=canvas.getBoundingClientRect();
      const scaleX=canvas.width/rect.width;
      const scaleY=canvas.height/rect.height;
      const mx=(e.clientX-rect.left)*scaleX;
      const my=(e.clientY-rect.top)*scaleY;

      const hit=PROVINCES.find(p=>Math.hypot(p.x-mx,p.y-my)<22);
      if(!hit) return;

      if(hit.clan==='player'){
        // 自領地をタップ
        selectedProvince=null;
        document.getElementById('selected-province-info').innerHTML=
          `<span style="color:var(--gold)">【自領地】${hit.name}　勢力: ${hit.strength}</span>`;
        document.getElementById('invade-btn').style.display='none';
      } else {
        // 隣接チェック（プレイヤー領地と隣接しているか）
        const playerIds=PROVINCES.filter(p=>p.clan==='player').map(p=>p.id);
        const isAdjacent=hit.adj.some(id=>playerIds.includes(id));
        selectedProvince=hit;

        if(isAdjacent){
          document.getElementById('selected-province-info').innerHTML=
            `<span style="color:#ffdd44">侵攻先: ${hit.name}　${hit.clan}氏　勢力 ${hit.strength}</span>`;
          document.getElementById('invade-btn').style.display='block';
        } else {
          document.getElementById('selected-province-info').innerHTML=
            `<span style="color:#ff8888">${hit.name}（隣接していないため侵攻不可）</span>`;
          document.getElementById('invade-btn').style.display='none';
        }
      }
      drawStrategicMap();
    };
  },120);
}

function startInvasion(){
  if(!selectedProvince) return;
  currentEnemy={name:selectedProvince.name+'勢',strength:selectedProvince.strength,province:selectedProvince};
  closeModal('map-modal');
  openBattle(true);
}

function bDrawSpeechBubble(c,gx,gy,text,side,alpha){
  if(!text||alpha<=0) return;
  c.save();c.globalAlpha=Math.min(1,alpha);
  const FONT='bold 9px DotGothic16,monospace';c.font=FONT;
  const tw=c.measureText(text).width,pad=5;
  const bw=tw+pad*2,bh=14,tailH=5;
  let bx=gx+12-bw/2,by=gy-bh-tailH-6;
  bx=Math.max(2,Math.min(BW-bw-2,bx));by=Math.max(62,by);
  const r=3,tailX=Math.max(bx+8,Math.min(bx+bw-8,gx+12));
  c.shadowColor='#0008';c.shadowBlur=3;c.shadowOffsetY=1;
  c.fillStyle=side==='p'?'#f0ecff':'#fff0f4';
  c.beginPath();
  c.moveTo(bx+r,by);c.lineTo(bx+bw-r,by);c.quadraticCurveTo(bx+bw,by,bx+bw,by+r);
  c.lineTo(bx+bw,by+bh-r);c.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);
  c.lineTo(tailX+4,by+bh);c.lineTo(tailX,by+bh+tailH);c.lineTo(tailX-4,by+bh);
  c.lineTo(bx+r,by+bh);c.quadraticCurveTo(bx,by+bh,bx,by+bh-r);
  c.lineTo(bx,by+r);c.quadraticCurveTo(bx,by,bx+r,by);
  c.closePath();c.fill();
  c.shadowBlur=0;c.shadowOffsetY=0;
  c.strokeStyle=side==='p'?'#4830a0':'#a02060';c.lineWidth=1.5;c.stroke();
  c.fillStyle='#1a0800';c.font=FONT;c.fillText(text,bx+pad,by+bh-3);
  c.restore();
}

function bUpdateParticles(){
  bParticles=bParticles.filter(p=>p.life>0);
  bParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;});
  bDamageNums=bDamageNums.filter(d=>d.life>0);
  bDamageNums.forEach(d=>{d.y+=d.vy;d.vy*=.92;d.life--;});
}
function bUpdateBattleUI(){
  const ph=Math.max(0,bGenerals.p.hp),eh=Math.max(0,bGenerals.e.hp);
  document.getElementById('bhp-player').textContent=ph;
  document.getElementById('bhp-enemy').textContent=eh;
  document.getElementById('bbar-player').style.width=(ph/bGenMaxHp.p*100).toFixed(1)+'%';
  document.getElementById('bbar-enemy').style.width=(eh/bGenMaxHp.e*100).toFixed(1)+'%';
}
function bNearest(list,x,y){return list.reduce((b,t)=>Math.hypot(t.x-x,t.y-y)<Math.hypot(b.x-x,b.y-y)?t:b);}
function bFindTarget(s){const foes=bSoldiers.filter(t=>t.side!==s.side&&!t.dead);return foes.length?bNearest(foes,s.x,s.y):null;}
function bUpdateSoldiers(){
  bSoldiers.forEach(s=>{
    if(s.dead) return;
    if(s.stateTimer>0){s.stateTimer--;return;}
    if(!s.target||s.target.dead) s.target=bFindTarget(s);
    if(!s.target){
      const gen=bGenerals[s.side==='p'?'e':'p'];
      if(gen.dead) return;
      const dx=(gen.x+12)-(s.x+8),dy=(gen.y+15)-(s.y+10),dist=Math.hypot(dx,dy)||1;
      if(dist<B_ATTACK_RANGE+8){
        s.state='attack';s.stateTimer=22;
        const dmg=(2+Math.random()*3)|0;
        gen.hp-=dmg;gen.state='hit';gen.stateTimer=14;
        bAddPt(gen.x+12,gen.y+10,'#ffaaaa');bAddDmg(gen.x+6,gen.y-4,dmg,'#ff5050');
        bSetLog((s.side==='p'?'我が軍':'敵軍')+'が大将に'+dmg+'撃！');
      } else {
        s.state='walk';s.x+=dx/dist*1.3;s.y+=dy/dist*1.3;
        s.y=Math.max(B_FIELD_Y_MIN,Math.min(B_FIELD_Y_MAX,s.y));
      }
      return;
    }
    const t=s.target,dx=t.x-s.x,dy=t.y-s.y,dist=Math.hypot(dx,dy)||1;
    if(dist<B_ATTACK_RANGE){
      s.state='attack';s.stateTimer=16;
      const dmg=(3+Math.random()*4)|0;
      t.hp-=dmg;t.state='hit';t.stateTimer=10;
      bAddPt(t.x+8,t.y+8,'#ffddaa');bAddDmg(t.x+4,t.y-2,dmg);
      if(t.hp<=0){t.dead=true;bAddPt(t.x+8,t.y+8,'#ffd040',10);bSetLog((s.side==='p'?'敵軍':'我が軍')+'の兵士が倒れた！');}
    } else {
      s.state='walk';const spd=1.0+Math.random()*.3;
      s.x+=dx/dist*spd;s.y+=dy/dist*spd;
      s.y=Math.max(B_FIELD_Y_MIN,Math.min(B_FIELD_Y_MAX,s.y));
    }
  });
}
function bUpdateGenerals(){
  ['p','e'].forEach(side=>{
    const g=bGenerals[side],foe=bGenerals[side==='p'?'e':'p'];
    if(g.dead) return;
    if(g.stateTimer>0){g.stateTimer--;return;}
    g.state='charge';
    const interval=side==='p'?0:80;
    if(bTickCount%160===interval){
      const arr=side==='p'?LINES_P:LINES_E;
      bAddBubble(side,arr[Math.floor(Math.random()*arr.length)],130);
    }
    const foeTroops=bSoldiers.filter(s=>s.side!==side&&!s.dead);
    if(foeTroops.length){
      const tgt=bNearest(foeTroops,g.x+12,g.y+15);
      const tx=tgt.x+8,ty=tgt.y+10,dist=Math.hypot(tx-(g.x+12),ty-(g.y+15))||1;
      if(dist<B_GEN_ATK_RANGE){
        g.state='attack';g.stateTimer=18;
        const dmg=(8+Math.random()*8)|0;
        tgt.hp-=dmg;tgt.state='hit';tgt.stateTimer=12;
        bAddPt(tgt.x+8,tgt.y+8,'#fff060',8);bAddDmg(tgt.x,tgt.y-6,dmg,'#ffdd20');
        if(tgt.hp<=0){tgt.dead=true;bSetLog('大将が敵兵を薙ぎ払った！');}
      } else {
        g.x+=((tx-(g.x+12))/dist)*B_GEN_CHARGE_SPEED;g.y+=((ty-(g.y+15))/dist)*B_GEN_CHARGE_SPEED;
        g.y=Math.max(B_FIELD_Y_MIN-10,Math.min(B_FIELD_Y_MAX+10,g.y));
      }
    } else {
      const tx=foe.x+12,ty=foe.y+15,dist=Math.hypot(tx-(g.x+12),ty-(g.y+15))||1;
      if(dist<B_GEN_ATK_RANGE){
        g.state='attack';g.stateTimer=26;
        const dmg=(10+Math.random()*10)|0;
        foe.hp-=dmg;foe.state='hit';foe.stateTimer=22;
        bAddPt(foe.x+12,foe.y+15,'#ff8040',12);bAddDmg(foe.x+6,foe.y-8,dmg,'#ff4020');
        bAddBubble(side,DUEL_LINES[Math.floor(Math.random()*DUEL_LINES.length)],110);
        bForceLog('大将同士の一騎討ち！ '+dmg+'ダメージ！',(B_LOG_HOLD*2)|0);
      } else {
        g.x+=((tx-(g.x+12))/dist)*B_GEN_CHARGE_SPEED;g.y+=((ty-(g.y+15))/dist)*B_GEN_CHARGE_SPEED;
        g.y=Math.max(B_FIELD_Y_MIN-10,Math.min(B_FIELD_Y_MAX+10,g.y));
      }
    }
  });
}
function bGameLoop(bgCtx,ctx){
  bTickCount++;
  const animFrame=(bTickCount>>3)&1;
  if(bGameState==='battle'){
    bUpdateSoldiers();bUpdateGenerals();bUpdateParticles();bTickLog();bTickBubbles();
    if(bGenerals.p.hp<=0||bGenerals.e.hp<=0){
      bGameState='end';
      const pWin=bGenerals.p.hp>0;
      bAddBubble(pWin?'p':'e','勝ったぞ！',400);
      bEndBattle(pWin); return;
    }
  }
  ctx.clearRect(0,0,BW,BH);
  const allUnits=[
    ...bSoldiers.filter(s=>!s.dead).map(s=>({type:'soldier',side:s.side,x:s.x,y:s.y,state:s.state,wf:((bTickCount+s.walkOffset)>>3)&1})),
    ...['p','e'].filter(sd=>!bGenerals[sd].dead).map(sd=>({type:'general',side:sd,x:bGenerals[sd].x,y:bGenerals[sd].y,state:bGenerals[sd].state,wf:animFrame,isMutant:bGenerals[sd].isMutant||false})),
  ];
  allUnits.sort((a,b)=>a.y-b.y);
  allUnits.forEach(u=>{
    const pal=u.side==='p'?PAL_P:PAL_E;
    const dir=u.side==='p'?1:-1;
    if(u.type==='soldier') bDrawSoldier(ctx,u.x|0,u.y|0,pal,dir,u.wf,u.state);
    else bDrawGeneral(ctx,u.x|0,u.y|0,pal,dir,u.wf,u.state,u.isMutant);
  });
  bParticles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x|0,p.y|0,p.size,p.size);});
  ctx.globalAlpha=1;
  bDamageNums.forEach(d=>{ctx.font='bold 11px DotGothic16,monospace';ctx.strokeStyle='#0009';ctx.lineWidth=3;ctx.strokeText(d.text,d.x,d.y);ctx.fillStyle=d.color;ctx.fillText(d.text,d.x,d.y);});
  bBubbles.forEach(b=>{const g=bGenerals[b.side];if(!g||g.dead)return;bDrawSpeechBubble(ctx,g.x,g.y,b.text,b.side,Math.min(1,b.life/20));});
  bUpdateBattleUI();
  bLoopId=requestAnimationFrame(()=>bGameLoop(bgCtx,ctx));
}
function bEndBattle(isWin){
  if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
  const titleEl=document.getElementById('bres-title-text');
  const detailEl=document.getElementById('bres-detail-text');
  if(isWin){
    let reward=rnd(1800,2400);
    let uniGain=4+Math.random()*3;
    let extraMsg='';

    // 天下図侵攻からの勝利
    if(currentEnemy&&currentEnemy.province){
      const p=currentEnemy.province;
      p.clan='player';
      uniGain=8+Math.random()*4;
      reward+=rnd(800,1400);
      extraMsg='\n【'+p.name+'】を平定！';
      addLog('【天下図】'+p.name+'を制圧（'+currentEnemy.clan+'氏を降伏させた）');
      showToast('🎉 '+p.name+' を平定！',4000);
    }

    state.koku+=reward;state.unification=Math.min(100,state.unification+uniGain);
    gWarriors.forEach(w=>{
      if(w.isMature()){
        let powBonus=rnd(3,7);
        if(w._skillId==='brave'||w._skillId==='berserk') powBonus+=3;
        w.stats.power=clamp(w.stats.power+powBonus,1,99);
        w.stats.hp=Math.min(w.stats.maxHp,w.stats.hp+rnd(8,15));
      }
    });
    titleEl.textContent='勝利！';
    detailEl.textContent='石高 +'+reward.toLocaleString()+'\n統一度 +'+uniGain.toFixed(1)+'%'+extraMsg;
    addLog('合戦勝利（報酬'+reward+'石）');
  } else {
    const loss=rnd(400,700);state.koku=Math.max(0,state.koku-loss);
    gWarriors.forEach(w=>{w.stats.hp=Math.max(1,w.stats.hp-rnd(15,25));});
    titleEl.textContent='敗北…';
    detailEl.textContent='石高 -'+loss.toLocaleString()+'\n武将が負傷した';
    addLog('合戦敗北（損失'+loss+'石）');
  }
  currentEnemy=null;
  document.getElementById('battle-result-panel').classList.add('show');
  updateStatusUI();updatePartyRow();
}

function openBattle(fromMap){
  if(gWarriors.length===0){showToast('武将がいません');return;}
  if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-result-panel').classList.remove('show');
  document.getElementById('battle-log-bar').textContent='両軍、突撃開始！';

  const bgCv=document.getElementById('bg-canvas');
  const mainCv=document.getElementById('battle-main-canvas');
  const frame=document.getElementById('bscr-frame');
  function resizeBattle(){
    const rw=frame.clientWidth,rh=frame.clientHeight;
    [bgCv,mainCv].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=rw+'px';cv.style.height=rh+'px';});
  }
  resizeBattle();
  const bgCtx=bgCv.getContext('2d');
  const ctx=mainCv.getContext('2d');
  [bgCtx,ctx].forEach(c=>c.imageSmoothingEnabled=false);
  bDrawBackground(bgCtx);
  bGameState='battle';bTickCount=0;bLogText='両軍、突撃開始！';bLogTimer=B_LOG_HOLD*2;
  bParticles=[];bDamageNums=[];bBubbles=[];
  const matures=gWarriors.filter(w=>w.isMature());
  const active=matures.length>0?matures:gWarriors;
  const leader=active[0];
  document.getElementById('bunit-pname').textContent=leader?leader.name.slice(-3):'我が軍';

  // 天下図からの侵攻なら敵名を反映
  if(fromMap&&currentEnemy){
    document.getElementById('bunit-ename').textContent=currentEnemy.name;
  } else {
    document.getElementById('bunit-ename').textContent='敵　軍';
  }

  let totalPower=active.reduce((s,w)=>{
    let p=w.stats.power+w.stats.wisdom;
    if(w._skillId==='brave'||w._skillId==='swift') p*=1.15;
    if(w._skillId==='berserk') p*=1.3;
    if(w._skillId==='sage') p*=1.1;
    return s+p;
  },0);
  const playerPower=clamp(Math.floor(totalPower/active.length),60,180);

  // 天下図侵攻ならその国の勢力を使用
  let enemyBase=120+Math.floor(state.unification*0.4);
  if(fromMap&&currentEnemy) enemyBase=clamp(currentEnemy.strength*1.5,60,220);
  const enemyPower=clamp(enemyBase,60,220)|0;

  bGenMaxHp={p:playerPower,e:enemyPower};
  bSoldiers=[];
  const soldierCount=Math.min(8,4+gWarriors.length);
  for(let i=0;i<soldierCount;i++){
    const col=i%2,row=Math.floor(i/2);
    bSoldiers.push({side:'p',x:18+col*26,y:B_FIELD_Y_MIN+14+row*42,state:'walk',stateTimer:0,hp:20,maxHp:20,target:null,dead:false,walkOffset:(i*7)%12});
  }
  const enemyCount=Math.min(3+Math.floor(state.unification/20),8);
  for(let i=0;i<enemyCount;i++){
    const col=i%2,row=Math.floor(i/2);
    bSoldiers.push({side:'e',x:BW-22-col*26,y:B_FIELD_Y_MIN+14+row*42,state:'walk',stateTimer:0,hp:20,maxHp:20,target:null,dead:false,walkOffset:(i*11)%12});
  }
  bGenerals={
    p:{x:30,y:BH/2-15,hp:playerPower,maxHp:playerPower,state:'charge',stateTimer:0,dead:false,isMutant:leader&&leader._isMutant},
    e:{x:BW-54,y:BH/2-15,hp:enemyPower,maxHp:enemyPower,state:'charge',stateTimer:0,dead:false,isMutant:false},
  };
  document.getElementById('bhp-player').textContent=playerPower;
  document.getElementById('bhp-enemy').textContent=enemyPower;
  document.getElementById('bbar-player').style.width='100%';
  document.getElementById('bbar-enemy').style.width='100%';
  bAddBubble('p',LINES_P[0],150);bAddBubble('e',LINES_E[0],150);
  bAddPt(bGenerals.p.x+12,bGenerals.p.y+15,'#ffe060',10);
  bAddPt(bGenerals.e.x+12,bGenerals.e.y+15,'#ffe060',10);
  bLoopId=requestAnimationFrame(()=>bGameLoop(bgCtx,ctx));
}
function closeBattle(){
  if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
  document.getElementById('battle-screen').classList.remove('show');
}

function performIdleTick(){
  state.turn++;
  ageTickCounter++;
  if(state.turn%MONTH_ADVANCE_EVERY===0){
    state.month++;
    if(state.month>12){state.month=1;state.year++;}
    state.season=getSeason(state.month);
  }
  gWarriors.forEach(w=>{
    let powGain=Math.random()<0.4?1:0;
    let wisGain=Math.random()<0.25?1:0;
    if(w._skillId==='brave'&&Math.random()<0.2) powGain++;
    if(w._skillId==='wise'&&Math.random()<0.2) wisGain++;
    if(w._skillId==='sage'&&Math.random()<0.15){powGain++;wisGain++;}
    w.stats.power=clamp(w.stats.power+powGain,1,99);
    w.stats.wisdom=clamp(w.stats.wisdom+wisGain,1,99);
    const hpPct=w.stats.hp/w.stats.maxHp;
    if(hpPct<0.9){
      let rec=Math.floor((1-hpPct)*4+1);
      if(w._skillId==='iron') rec=Math.floor(rec*1.5);
      w.stats.hp=Math.min(w.stats.maxHp,w.stats.hp+rec);
    }
  });
  if(ageTickCounter%5===0){
    gWarriors.forEach(w=>{
      if(w.age<70){
        w.age++;
        if(w.age===MATURE_AGE){
          showToast(w.name+' が成人しました！（縁組・合戦参加可能）',3000);
          addLog(w.name+' が'+MATURE_AGE+'歳になり成人');
        }
      }
    });
  }
  state.koku+=rnd(70,120);
  state.unification=Math.min(100,state.unification+0.08);
  updateStatusUI();
  updatePartyRow();
}

function initIsoCanvas(){
  const canvas=document.getElementById('iso-canvas');
  const field=document.getElementById('iso-field');
  if(!canvas||!field) return;
  function resize(){
    canvas.width=field.clientWidth||window.innerWidth;
    canvas.height=Math.max(field.clientHeight||200,200);
  }
  resize();
  window.addEventListener('resize',resize);
  const ctx=canvas.getContext('2d');
  function isoToScreen(ix,iy){
    const cx=canvas.width/2,cy=canvas.height*0.45;
    const tileW=Math.min(canvas.width*0.22,canvas.height*0.28);
    const tileH=tileW*0.5;
    return{x:cx+(ix-iy)*tileW*0.5,y:cy+(ix+iy)*tileH*0.5};
  }
  function drawTile(ix,iy,topC,leftC,rightC){
    const tileW=Math.min(canvas.width*0.22,canvas.height*0.28);
    const tileH=tileW*0.5,th=tileW*0.3;
    const{x,y}=isoToScreen(ix,iy);
    ctx.fillStyle=topC;
    ctx.beginPath();
    ctx.moveTo(x,y-tileH/2);ctx.lineTo(x+tileW/2,y);ctx.lineTo(x,y+tileH/2);ctx.lineTo(x-tileW/2,y);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=leftC;
    ctx.beginPath();
    ctx.moveTo(x-tileW/2,y);ctx.lineTo(x,y+tileH/2);ctx.lineTo(x,y+tileH/2+th);ctx.lineTo(x-tileW/2,y+th);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=rightC;
    ctx.beginPath();
    ctx.moveTo(x,y+tileH/2);ctx.lineTo(x+tileW/2,y);ctx.lineTo(x+tileW/2,y+th);ctx.lineTo(x,y+tileH/2+th);
    ctx.closePath();ctx.fill();
  }
  function drawFacility(fp){
    const fm=FACILITY_MAP[fp.key];
    if(!fm) return;
    const{x,y}=isoToScreen(fp.tx,fp.ty);
    if(x<-20||x>canvas.width+20||y<-20||y>canvas.height+20) return;
    const tileW=Math.min(canvas.width*0.22,canvas.height*0.28);
    const iconSz=Math.max(14,Math.round(tileW*0.55));
    ctx.save();
    ctx.font=iconSz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(fm.icon,x,y-8);
    ctx.font=Math.max(7,Math.round(tileW*0.22))+'px Noto Serif JP';
    ctx.fillStyle=fm.color;ctx.fillText(fm.name,x,y+8);
    ctx.restore();
  }
  function drawWarrior(w){
    const{x,y}=isoToScreen(w.isoX,w.isoY);
    const hpPct=w.stats.hp/w.stats.maxHp;
    const r=Math.max(7,Math.round(canvas.width*0.028));
    const bw=r*2.6;
    const gIcon=GENDER_ICON[w.gender]||'';
    ctx.save();
    if(w._isMutant){ctx.shadowColor='#ff44ff';ctx.shadowBlur=8;}
    ctx.fillStyle='rgba(0,0,0,.3)';
    ctx.beginPath();ctx.ellipse(x,y+r*0.3,r*1.1,r*0.4,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=w._isMutant?8:0;
    ctx.fillStyle=w._color;
    ctx.beginPath();ctx.arc(x,y-r*0.7,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=w._isMutant?'#ff88ff':'rgba(255,255,255,.4)';
    ctx.lineWidth=w._isMutant?2:1;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-bw/2,y+r*0.5,bw,3);
    ctx.fillStyle=hpPct>0.6?'#44ff88':hpPct>0.3?'#ffaa44':'#ff4444';
    ctx.fillRect(x-bw/2,y+r*0.5,bw*hpPct,3);
    ctx.fillStyle='rgba(245,232,200,.9)';
    ctx.font=Math.max(7,r-1)+'px Noto Serif JP';
    ctx.textAlign='center';ctx.fillText(w.name.slice(-1),x,y-r*0.35);
    ctx.font=Math.max(6,r-3)+'px sans-serif';
    ctx.fillStyle=w.gender==='female'?'#ffaacc':'#aaccff';
    ctx.fillText(gIcon,x+r*0.85,y-r*1.05);
    if(!w.isMature()){
      ctx.fillStyle='#ffdd88';ctx.font='6px sans-serif';ctx.fillText(w.age+'歳',x,y+r*1.0);
    }
    if(w._skillId&&w.isMature()){
      const sk=getSkillById(w._skillId);
      if(sk){ctx.font=Math.max(7,r)+'px serif';ctx.fillText(sk.icon,x+r*1.1,y-r*1.2);}
    }
    ctx.restore();
  }
  let lastTime=0;
  function loop(ts){
    const dt=ts-lastTime;
    if(dt>50){
      lastTime=ts;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      for(let iy=-2;iy<=3;iy++) for(let ix=-2;ix<=2;ix++){
        const isPath=(ix===0||iy===0);
        drawTile(ix,iy,
          isPath?'rgba(120,90,40,.5)':'rgba(60,40,15,.6)',
          isPath?'rgba(80,55,20,.6)':'rgba(35,20,5,.7)',
          isPath?'rgba(100,70,30,.5)':'rgba(45,28,8,.6)'
        );
      }
      FACILITY_POSITIONS.forEach(fp=>drawFacility(fp));
      gWarriors.forEach(w=>w.tick());
      const sorted=[...gWarriors].sort((a,b)=>(a.isoX+a.isoY)-(b.isoX+b.isoY));
      sorted.forEach(w=>drawWarrior(w));
    }
    isoAnimFrame=requestAnimationFrame(loop);
  }
  isoAnimFrame=requestAnimationFrame(loop);
}

  const jobId=Math.floor(Math.random()*Object.keys(ROLES).length);
  const age=rnd(20,35);
  const w=new IsoWarrior(name,jobId,rnd(35,65),0,2+Math.random()*3,gender,age);
  if(Math.random()<0.4){
    const sk=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)];
    w._skillId=sk.id;w.applyBloodSkill();
  }
  gWarriors.push(w);updatePartyRow();
  showToast(name+' が加入！（'+age+'歳 '+GENDER_LABEL[gender]+'）'+(w._skillId?'　'+w.skillName():''));
  closeModal('dev-modal');
}

// ============================================================
//  星・花びら
// ============================================================
function spawnStars(){
  const sky=document.getElementById('sky');
  for(let i=0;i<60;i++){
    const s=document.createElement('div');s.className='star';
    s.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*70)+'%;'+
      'width:'+(1+Math.random()*2.2)+'px;height:'+(1+Math.random()*2.2)+'px;'+
      'animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+(-Math.random()*6)+'s;';
    sky.appendChild(s);
  }
}
function spawnPetals(){
  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='petal';
    const sz=8+Math.random()*6;
    p.style.cssText='left:'+(Math.random()*100)+'%;width:'+sz+'px;height:'+(sz*0.85)+'px;'+
      'animation-duration:'+(12+Math.random()*10)+'s;animation-delay:'+(-Math.random()*16)+'s;';
    document.body.appendChild(p);
  }
}

// ============================================================
//  初期化
// ============================================================
function initGame(){
  spawnStars();spawnPetals();
  const initialWarriors=[
    {name:'織田信長',jobId:0,power:72,gender:'male',  age:28,skillId:'brave' },
    {name:'豊臣秀吉',jobId:1,power:58,gender:'male',  age:32,skillId:'wise'  },
    {name:'徳川家康',jobId:2,power:65,gender:'male',  age:35,skillId:'iron'  },
    {name:'帰蝶',    jobId:7,power:45,gender:'female',age:26,skillId:'loyal' },
  ];
  initialWarriors.forEach((cfg,i)=>{
    const w=new IsoWarrior(cfg.name,cfg.jobId,cfg.power,(i-1.5)*0.8,2.5+Math.random()*2,cfg.gender,cfg.age);
    w.stats.wisdom=cfg.gender==='female'?rnd(50,70):rnd(30,55);
    if(cfg.skillId){w._skillId=cfg.skillId;w.applyBloodSkill();}
    gWarriors.push(w);
  });
  initIsoCanvas();
  idleTimer=setInterval(performIdleTick,3000);
  updateStatusUI();updatePartyRow();
  addLog('ゲーム開始。天下統一を目指せ！');
  showToast('戦国血脈 〜覇道の系譜〜 開始！',3000);
}

window.onload=initGame;
</script>
