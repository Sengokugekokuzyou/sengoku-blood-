<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');

  :root {
    --ink: #1a0f00;
    --parchment: #f5e8c8;
    --crimson: #8b0000;
    --gold: #c8960c;
    --gold-light: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  /* ... (既存の全スタイルは省略せず全部保持) ... */
  /* ここに元の<style>内容をすべて貼り付け (変更なし) */

  /* 新規追加: 引退・家督関連スタイル */
  .retired { filter: grayscale(0.85) brightness(0.75); opacity: 0.65; pointer-events: none; }
  .retired .warrior-svg { filter: brightness(0.6); }

  #succession-modal {
    position: fixed; inset: 0; z-index: 400;
    background: radial-gradient(ellipse at center, rgba(200,150,12,0.4) 0%, transparent 70%);
    display: none; align-items: center; justify-content: center;
  }
  #succession-modal.show { display: flex; }
  .succession-content {
    background: linear-gradient(160deg, #1a0f00, #0a0500);
    border: 2px solid var(--gold-light);
    border-radius: 8px;
    width: 340px;
    padding: 24px 20px;
    text-align: center;
    box-shadow: 0 0 80px rgba(200,150,12,0.6);
  }
  .succession-title { font-size: 12px; letter-spacing: 4px; color: var(--gold); margin-bottom: 12px; }
  .heir-candidate { 
    background: rgba(40,25,5,0.9); border: 1px solid rgba(200,150,12,0.5);
    margin: 8px 0; padding: 10px; border-radius: 4px; cursor: pointer;
  }
  .heir-candidate:hover { background: rgba(80,50,10,0.9); border-color: var(--gold-light); }
</style>
</head>
<body>

<!-- ... (元の全HTML構造はそのまま) ... -->

<script>
// =============================================
// ======== 既存の全コード (RANK_CHAINS, Warriorクラスなど) ========
// =============================================
// （ここに元の<script>内の全コードをそのまま貼り付け）

// ====================== 新規: 家督継承システム ======================
let currentHouseHead = null; // 現在の当主 {warrior, familyName}
const RETIRE_AGE_THRESHOLD = 0.92; // 壮年を過ぎて寿命の92%経過で引退候補

function checkRetirement(warrior) {
  if (warrior.stage !== 'adult') return;
  if (warrior.growthPct < RETIRE_AGE_THRESHOLD) return;
  if (warrior._retiring) return;

  warrior._retiring = true;
  addLog(`【引退】\( {warrior.def.name}（ \){warrior.jobDef.label}）が壮年を過ぎ、隠居を望んでいます。`, true);

  // 当主だった場合、家督継承を促す
  if (currentHouseHead && currentHouseHead.warrior === warrior) {
    setTimeout(() => triggerSuccession(warrior), 1200);
  } else {
    // 一般武将は自然消滅（城から退出）
    setTimeout(() => retireWarrior(warrior), 1800);
  }
}

function retireWarrior(warrior) {
  const idx = warriors.indexOf(warrior);
  if (idx === -1) return;
  warrior.el.classList.add('retired');
  warriors.splice(idx, 1);
  updateWarriorCount();
  addLog(`【隠居】${warrior.def.name}が城を去りました。`);
}

function triggerSuccession(oldHead) {
  const candidates = warriors
    .filter(w => w !== oldHead && w.stage === 'adult' && w.growthPct > 0.6)
    .sort((a,b) => (b.def.power + b.def.intel + b.def.loyalty) - (a.def.power + a.def.intel + a.def.loyalty));

  if (candidates.length === 0) {
    addLog(`【家督断絶】後継者がいません…`);
    currentHouseHead = null;
    return;
  }

  // モーダル表示
  const modal = document.getElementById('succession-modal') || createSuccessionModal();
  modal.innerHTML = `
    <div class="succession-content">
      <div class="succession-title">■ 家督相続 ■</div>
      <div style="color:#ffdd88;font-size:13px;margin:12px 0;">${oldHead.def.name}が隠居<br>次代当主を誰に？</div>
      <div id="heir-list"></div>
      <button onclick="cancelSuccession()" style="margin-top:16px;padding:8px 32px;background:#4a2a0a;color:#f5e8c8;border:1px solid #c8960c;border-radius:4px;cursor:pointer;">後回し</button>
    </div>
  `;

  const list = modal.querySelector('#heir-list');
  candidates.slice(0, 4).forEach((heir, i) => {
    const div = document.createElement('div');
    div.className = 'heir-candidate';
    div.innerHTML = `
      <strong>${heir.def.name}</strong><br>
      <small>\( {heir.jobDef.label}　武力 \){heir.def.power} 知力${heir.def.intel}</small>
    `;
    div.onclick = () => confirmHeir(heir, oldHead);
    list.appendChild(div);
  });

  modal.classList.add('show');
}

function createSuccessionModal() {
  const modal = document.createElement('div');
  modal.id = 'succession-modal';
  document.body.appendChild(modal);
  return modal;
}

window.confirmHeir = function(newHead, oldHead) {
  document.getElementById('succession-modal').classList.remove('show');
  
  currentHouseHead = { warrior: newHead, familyName: oldHead.def.name.split(' ')[0] };
  
  // 視覚効果
  newHead.el.style.boxShadow = '0 0 30px #ffdd44';
  setTimeout(() => newHead.el.style.boxShadow = '', 3000);

  addLog(`【家督継承】${newHead.def.name}が新当主に！`, true);
  newHead.showSpeechText(`「我が家を継ぎ、天下を目指す！」`, 4500);
  newHead.showEmotion('👑');

  // 旧当主は引退
  retireWarrior(oldHead);
};

window.cancelSuccession = function() {
  document.getElementById('succession-modal').classList.remove('show');
  addLog(`家督継承は先送りされました。`);
};

// ====================== 合戦システム（簡易版） ======================
window.startBattle = function(e) {
  const btn = e.currentTarget;
  btn.style.borderColor = 'rgba(255,68,68,0.9)';
  btn.style.color = '#ffaaaa';

  setTimeout(() => {
    if (!currentHouseHead) {
      alert('当主が不在です。家督を継承してください。');
      btn.style.borderColor = '';
      btn.style.color = '';
      return;
    }

    const head = currentHouseHead.warrior;
    const powerTotal = warriors.reduce((sum, w) => sum + w.def.power, 0);
    const intelTotal = warriors.reduce((sum, w) => sum + w.def.intel, 0);

    const enemyPower = 120 + Math.floor(Math.random() * 80);
    const result = (powerTotal + head.def.power * 1.5) > enemyPower ? "勝利" : "苦戦";

    const msg = `【合戦】${currentHouseHead.familyName}軍 vs 敵軍\n` +
                `総武力: ${powerTotal}　総知力: ${intelTotal}\n` +
                `当主 ${head.def.name} の采配により…\n` +
                `<b>${result}！</b>`;

    alert(msg);

    // 勝利時は全武将にボーナス
    if (result === "勝利") {
      warriors.forEach(w => {
        w.def.power = Math.min(99, w.def.power + 3);
        w.def.loyalty = Math.min(99, w.def.loyalty + 5);
        if (w._isSelected) {
          document.getElementById('val-power').textContent = w.def.power;
          document.getElementById('val-loyalty').textContent = w.def.loyalty;
        }
      });
      addLog(`合戦勝利！全軍の士気が高まりました。`, true);
    }

    btn.style.borderColor = '';
    btn.style.color = '';
  }, 280);
};

// ====================== ゲームループ拡張 ======================
const originalUpdate = Warrior.prototype.update;
Warrior.prototype.update = function() {
  originalUpdate.call(this);
  checkRetirement(this);
};

// 初期当主設定
window.addEventListener('load', () => {
  // ... 元の初期化コード ...

  // 当主を一番強い武将に
  setTimeout(() => {
    if (warriors.length > 0) {
      const strongest = warriors.reduce((a,b) => 
        (a.def.power + a.def.intel) > (b.def.power + b.def.intel) ? a : b
      );
      currentHouseHead = { warrior: strongest, familyName: strongest.def.name.split(' ')[0] };
      addLog(`【当主】${strongest.def.name}が家督を継ぎました。`, true);
    }
  }, 800);
});
</script>
</body>
</html>
