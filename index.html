<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');
:root {
  --gold:#c8960c;--gold-l:#f0c040;--gold-d:rgba(200,150,12,.4);
  --parchment:#f5e8c8;--ink:#0e0800;--panel:rgba(8,4,0,.85);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--ink);font-family:'Noto Serif JP',serif;overflow:hidden;user-select:none;-webkit-user-select:none;}
#sky{position:fixed;inset:0;z-index:0;background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);}
.star{position:fixed;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.7}}
.mist{position:fixed;left:-20%;width:140%;background:linear-gradient(90deg,transparent,rgba(245,228,180,.06),rgba(245,228,180,.1),rgba(245,228,180,.06),transparent);border-radius:50%;animation:drift linear infinite;pointer-events:none;}
.mist:nth-child(1){height:55px;top:30%;animation-duration:32s;}
.mist:nth-child(2){height:70px;top:48%;animation-duration:26s;animation-delay:-11s;opacity:.65;}
.mist:nth-child(3){height:45px;top:40%;animation-duration:42s;animation-delay:-20s;opacity:.45;}
@keyframes drift{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(7%) scaleY(1.4)}100%{transform:translateX(-8%) scaleY(1)}}
.petal{position:fixed;border-radius:50% 0 50% 0;background:radial-gradient(ellipse,rgba(255,200,200,.9) 0%,rgba(255,130,130,.25) 100%);animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg) translateX(0);opacity:0}7%{opacity:.9}93%{opacity:.5}100%{transform:translateY(102vh) rotate(760deg) translateX(45px);opacity:0}}
#main{position:relative;z-index:10;width:100%;height:100%;display:flex;flex-direction:column;}
#header{flex-shrink:0;padding:max(env(safe-area-inset-top,0px),12px) 16px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
#game-title{color:var(--gold);font-size:clamp(15px,4.8vw,20px);font-weight:900;letter-spacing:.3em;text-shadow:0 0 20px rgba(200,150,12,.75);line-height:1.5;}
#game-title .sub{display:block;font-size:clamp(8px,2vw,10px);letter-spacing:.5em;color:var(--gold-d);font-weight:400;margin-top:1px;}
#status-panel{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.stat-chip{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--gold-d);border-radius:20px;padding:4px 11px;}
.sl{font-size:9px;color:rgba(245,232,200,.5);letter-spacing:.15em;}.sv{font-size:14px;font-weight:700;color:var(--gold-l);}.su{font-size:9px;color:var(--gold-d);}
#time-display{position:absolute;top:max(env(safe-area-inset-top,0px),8px);left:12px;font-size:11px;color:var(--gold);opacity:.8;z-index:20;pointer-events:none;}
#iso-field{flex:1;position:relative;overflow:hidden;min-height:0;}
#iso-canvas{position:absolute;bottom:0;left:50%;transform:translateX(-50%);pointer-events:none;}
#bubble-layer{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}
.speech-bubble{position:absolute;background:rgba(245,232,180,.96);border:2px solid var(--gold);border-radius:12px;padding:5px 10px;font-size:11px;font-family:'Noto Serif JP',serif;color:#2a1800;white-space:nowrap;transform:translateX(-50%);box-shadow:0 3px 12px rgba(0,0,0,.6);animation:bubblePop .25s ease-out;z-index:31;}
.speech-bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--gold);}
@keyframes bubblePop{0%{transform:translateX(-50%) scale(0.4);opacity:0}60%{transform:translateX(-50%) scale(1.08)}100%{transform:translateX(-50%) scale(1);opacity:1}}
.relation-label{position:absolute;font-size:10px;font-family:'Noto Serif JP',serif;color:rgba(240,192,64,.9);pointer-events:none;text-shadow:0 1px 4px #000;animation:fadeInOut 2.5s ease-in-out forwards;}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
/* 施設アクティブ表示 */
.facility-activity{position:absolute;font-size:10px;font-family:'Noto Serif JP',serif;color:#ffdd88;pointer-events:none;text-shadow:0 1px 4px #000;white-space:nowrap;transform:translateX(-50%);animation:actPop 0.3s ease-out;}
@keyframes actPop{0%{opacity:0;transform:translateX(-50%) scale(0.5)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
#bottom-ui{flex-shrink:0;padding:0 12px max(env(safe-area-inset-bottom,0px),12px);background:linear-gradient(0deg,rgba(6,3,0,.97) 0%,rgba(6,3,0,.75) 80%,transparent 100%);}
#nation-bar{display:flex;align-items:center;gap:8px;padding:8px 4px 5px;border-bottom:1px solid rgba(200,150,12,.15);}
.nl{font-size:9px;color:var(--gold-d);letter-spacing:.2em;white-space:nowrap;}
.nt{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;}
.nf{height:100%;border-radius:3px;background:linear-gradient(90deg,#8b0000,var(--gold));transition:width .6s;}
.np{font-size:11px;color:var(--gold-l);font-weight:700;min-width:32px;text-align:right;}
#party-row{display:flex;gap:7px;padding:6px 0 5px;overflow-x:auto;scrollbar-width:none;}
#party-row::-webkit-scrollbar{display:none;}
.party-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);border-radius:8px;padding:5px 10px;min-width:56px;cursor:pointer;transition:border-color .2s,background .2s;}
.party-card.head{border-color:var(--gold);background:rgba(200,150,12,.08);}
.party-card:active{background:rgba(200,150,12,.15);}
.pc-role{font-size:8px;color:var(--gold-d);letter-spacing:.1em;}
.pc-name{font-size:10px;color:var(--parchment);font-weight:700;}
.pc-pow{font-size:9px;color:#ffaa44;}
.pc-loc{font-size:8px;color:#aaddff;margin-top:1px;}
.pc-rel{font-size:8px;color:#88ffaa;margin-top:0px;}
#action-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;padding:5px 0 3px;}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--panel);border:1px solid var(--gold-d);border-radius:10px;padding:10px 4px 8px;cursor:pointer;transition:background .15s,border-color .15s,transform .1s;color:var(--parchment);font-family:inherit;}
.act-btn:active{transform:scale(.92);background:rgba(200,150,12,.14);border-color:var(--gold);}
.act-btn .ico{font-size:21px;line-height:1;}.act-btn .lbl{font-size:10px;letter-spacing:.15em;color:rgba(245,232,200,.72);}
.act-btn.primary{border-color:var(--gold);background:rgba(139,0,0,.4);}
.act-btn.primary .lbl{color:var(--gold-l);}
#battle-screen{position:fixed;inset:0;z-index:500;background:linear-gradient(#060200,#180f00);display:none;flex-direction:column;color:var(--parchment);}
#battle-screen.show{display:flex;}
.bh{flex-shrink:0;padding:max(env(safe-area-inset-top,0px),14px) 20px 12px;background:rgba(0,0,0,.88);border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;align-items:center;}
.bt{font-size:clamp(14px,4.5vw,19px);letter-spacing:.2em;color:var(--gold-l);}.bc{font-size:24px;color:#ffaaaa;cursor:pointer;padding:4px 8px;line-height:1;}
.bf{flex:1;min-height:0;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75));display:flex;align-items:flex-end;justify-content:space-around;padding-bottom:55px;}
.army{text-align:center;width:42%;}.army-title{font-size:13px;margin-bottom:10px;letter-spacing:.2em;}
.our-army .army-title{color:#ffdd88;}.enemy-army .army-title{color:#ff8888;}
.wi{font-size:clamp(34px,10vw,50px);margin:5px 4px;display:inline-block;filter:drop-shadow(0 4px 12px #000);}
.blog{flex-shrink:0;height:165px;background:rgba(6,3,0,.97);border-top:2px solid var(--gold);padding:10px 14px;overflow-y:auto;font-size:13px;line-height:1.7;}
.ll{margin:3px 0;}.ll.ally{color:#bbffbb;}
.bfooter{flex-shrink:0;padding:10px 12px max(env(safe-area-inset-bottom,0px),10px);background:rgba(0,0,0,.9);display:flex;gap:10px;}
.bbtn{flex:1;padding:15px 8px;font-size:15px;font-weight:700;background:linear-gradient(#5a2a0a,#2a1800);border:1px solid var(--gold);color:var(--parchment);cursor:pointer;border-radius:6px;font-family:inherit;transition:filter .15s;}
.bbtn:active{filter:brightness(1.3);}
.modal{position:fixed;inset:0;z-index:700;background:rgba(8,4,0,.94);display:none;flex-direction:column;align-items:center;justify-content:center;}
.modal-content{position:relative;background:var(--panel);width:92%;max-width:420px;border:3px solid var(--gold);border-radius:16px;padding:20px;color:var(--parchment);box-shadow:0 0 30px rgba(200,150,12,.6);}
</style>
</head>
<body>
<div id="sky"></div>
<div class="star" style="left:6%;top:4%;width:2px;height:2px;animation-duration:3.1s;"></div>
<div class="star" style="left:19%;top:8%;width:1px;height:1px;animation-duration:4.3s;animation-delay:-.7s;"></div>
<div class="star" style="left:33%;top:3%;width:2px;height:2px;animation-duration:2.9s;animation-delay:-1.3s;"></div>

<div class="star" style="left:82%;top:7%;width:1px;height:1px;animation-duration:4.2s;animation-delay:-.2s;"></div>
<div class="star" style="left:91%;top:11%;width:2px;height:2px;animation-duration:3.3s;animation-delay:-1.8s;"></div>
<div class="mist"></div><div class="mist"></div><div class="mist"></div>
<div class="petal" style="left:3%;width:7px;height:7px;animation-duration:8.2s;"></div>
<div class="petal" style="left:14%;width:5px;height:5px;animation-duration:10.5s;animation-delay:-2.8s;"></div>
<div class="petal" style="left:28%;width:8px;height:8px;animation-duration:9.1s;animation-delay:-5.5s;"></div>
<div class="petal" style="left:47%;width:6px;height:6px;animation-duration:13.2s;animation-delay:-1.2s;"></div>
<div class="petal" style="left:61%;width:5px;height:5px;animation-duration:10.8s;animation-delay:-4.2s;"></div>
<div class="petal" style="left:76%;width:7px;height:7px;animation-duration:12s;animation-delay:-7.1s;"></div>
<div class="petal" style="left:89%;width:6px;height:6px;animation-duration:9.6s;animation-delay:-2.4s;"></div>

<div id="time-display">第1年 1月 1日</div>

<div id="battle-screen">
  <div class="bh"><div class="bt" id="battle-family">織田軍 出陣</div><div class="bc" onclick="endBattle()">✕</div></div>
  <div class="bf">
    <div class="army our-army"><div class="army-title">我が軍</div><div id="our-warriors"></div></div>
    <div style="font-size:clamp(30px,9vw,42px);color:var(--gold);align-self:center;margin-top:-40px;font-weight:900;">VS</div>
    <div class="army enemy-army"><div class="army-title">敵軍</div><div id="enemy-warriors"></div></div>
  </div>
  <div class="blog" id="battle-log"></div>
  <div class="bfooter">
    <button class="bbtn" onclick="startBattleSimulation()">⚔ 戦闘開始</button>
    <button class="bbtn" onclick="endBattle()" style="background:linear-gradient(#4a1010,#180606);">撤退</button>
  </div>
</div>

<div id="warrior-modal" class="modal">
  <div class="modal-content">
    <div onclick="closeWarriorModal()" style="position:absolute;top:14px;right:20px;font-size:32px;line-height:1;cursor:pointer;color:var(--gold);">✕</div>
    <div id="modal-warrior-name" style="font-size:22px;font-weight:900;color:var(--gold-l);text-align:center;margin-bottom:10px;"></div>
    <div id="modal-stats" style="background:rgba(255,255,255,.08);border-radius:10px;padding:12px;margin-bottom:10px;font-size:14px;line-height:1.7;text-align:center;"></div>
    <div id="modal-relations" style="background:rgba(255,255,255,.05);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;line-height:1.8;"></div>
    <div style="margin-bottom:20px;">
      <div onclick="talkToWarrior(currentModalIndex,'encourage')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid var(--gold-d);border-radius:10px;margin-bottom:8px;"><span>激励する</span><span style="color:#88ff88;font-weight:700;">+忠誠</span></div>
      <div onclick="talkToWarrior(currentModalIndex,'train')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid var(--gold-d);border-radius:10px;margin-bottom:8px;"><span>訓練する</span><span style="color:#ffcc66;font-weight:700;">+武力</span></div>
      <div onclick="talkToWarrior(currentModalIndex,'teach')" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(255,255,255,.06);border:1px solid var(--gold-d);border-radius:10px;"><span>教えを請う</span><span style="color:#aaddff;font-weight:700;">+知力</span></div>
    </div>
    <button onclick="closeWarriorModal()" style="width:100%;padding:12px;background:var(--gold);color:#0e0800;font-weight:700;border:none;border-radius:10px;font-size:15px;">城に戻る</button>
  </div>
</div>

<div id="dev-modal" class="modal">
  <div class="modal-content">
    <div onclick="closeDevModal()" style="position:absolute;top:14px;right:20px;font-size:32px;line-height:1;cursor:pointer;color:var(--gold);">✕</div>
    <h2 style="text-align:center;color:var(--gold-l);margin-bottom:14px;font-size:20px;letter-spacing:.15em;">内政 ─ 施設整備</h2>
    <div id="facilities-list" style="max-height:360px;overflow-y:auto;"></div>
    <button onclick="closeDevModal()" style="margin-top:16px;width:100%;padding:12px;background:rgba(139,0,0,.6);color:var(--parchment);border:1px solid var(--gold);border-radius:10px;">閉じる</button>
  </div>
</div>

<div id="history-modal" class="modal">
  <div class="modal-content" style="max-height:80vh;overflow:hidden;display:flex;flex-direction:column;">
    <div onclick="closeHistory()" style="position:absolute;top:14px;right:20px;font-size:32px;cursor:pointer;color:var(--gold);">✕</div>
    <h2 style="text-align:center;color:var(--gold-l);margin-bottom:12px;font-size:20px;letter-spacing:.15em;">戦国記録</h2>
    <div id="history-list" style="flex:1;overflow-y:auto;font-size:13px;line-height:1.6;padding-right:4px;"></div>
    <button onclick="closeHistory()" style="margin-top:14px;padding:12px;background:var(--gold);color:#0e0800;font-weight:700;border:none;border-radius:10px;font-size:14px;cursor:pointer;">閉じる</button>
  </div>
</div>

<div id="main">
  <div id="header">
    <div id="game-title">戦国血脈<span class="sub">〜 覇道の系譜 〜</span></div>
    <div id="status-panel">
      <div class="stat-chip"><span class="sl">天下統一</span><span class="sv" id="unification-pct">12</span><span class="su">%</span></div>
      <div class="stat-chip"><span class="sl">第</span><span class="sv" id="gen-num">1</span><span class="su">世代</span></div>
    </div>
  </div>
  <div id="iso-field">
    <canvas id="iso-canvas"></canvas>
    <div id="bubble-layer"></div>
  </div>
  <div id="bottom-ui">
    <div id="nation-bar">
      <span class="nl">国力</span>
      <div class="nt"><div class="nf" id="nfill" style="width:42%"></div></div>
      <span class="np" id="koku-display">4,200</span><span class="nl" style="margin-left:1px">石</span>
    </div>
    <div id="party-row"></div>
    <div id="action-row">
      <button class="act-btn primary" onclick="startBattle()"><span class="ico">⚔️</span><span class="lbl">合戦</span></button>
      <button class="act-btn" onclick="showBloodline()"><span class="ico">🌸</span><span class="lbl">配合</span></button>
      <button class="act-btn" onclick="showHistory()"><span class="ico">📜</span><span class="lbl">歴史</span></button>
      <button class="act-btn" onclick="showDev()"><span class="ico">🏯</span><span class="lbl">内政</span></button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   アイソメトリック エンジン
══════════════════════════════════════ */
const canvas = document.getElementById('iso-canvas');
const ctx    = canvas.getContext('2d');
const TILE   = 44;
const ISO_ANG = Math.PI / 6;

function isoToScreen(tx,ty,tz){
  const sx=(tx-ty)*Math.cos(ISO_ANG)*TILE;
  const sy=(tx+ty)*Math.sin(ISO_ANG)*TILE-tz*TILE*0.88;
  return{x:sx,y:sy};
}
let CX,CY;
function resizeCanvas(){
  const f=document.getElementById('iso-field');
  canvas.width=f.clientWidth; canvas.height=f.clientHeight;
  CX=canvas.width/2; CY=canvas.height*0.72;
}

/* ══════════════════════════════════════
   施設データ
   配置: 天守を中心に 3×3 グリッド
   [訓練場]  [鍛冶場]  [学問所]
   [茶室]    天守      [庭園]
   [忠誠殿]  [──]    [──]
   ※ 指定レイアウトに合わせて座標設定
══════════════════════════════════════ */
const FACILITY_MAP = {
  training: { name:'訓練場', icon:'⚔',  x:-3.5, y:-3.2, level:1, type:'power',    color:'#8b2020' },
  forge:    { name:'鍛冶場', icon:'🔥', x:-0.5, y:-3.5, level:1, type:'power',    color:'#555533' },
  academy:  { name:'学問所', icon:'📖', x: 2.5, y:-3.2, level:1, type:'wisdom',   color:'#223355' },
  tea:      { name:'茶室',   icon:'🍵', x:-3.5, y: 0.2, level:1, type:'social',   color:'#5a3a1e' },
  garden:   { name:'庭園',   icon:'🌸', x:-0.5, y: 2.8, level:1, type:'heal',     color:'#2a5a2a' },
  loyalty:  { name:'忠誠殿', icon:'🌟', x: 2.5, y: 2.8, level:1, type:'loyalty',  color:'#7a1a1a' },
};

// 施設入口（武将が向かう座標）
const FACILITY_ENTRANCE = {
  training: { x:-3.0, y:-2.8 },
  forge:    { x:-0.2, y:-3.0 },
  academy:  { x: 2.8, y:-2.8 },
  tea:      { x:-3.0, y: 0.5 },
  garden:   { x:-0.2, y: 2.5 },
  loyalty:  { x: 2.8, y: 2.5 },
};

// 施設の効果テキスト（入場時に出る）
const FACILITY_EFFECT = {
  training: { stat:'power',   label:'武力', color:'#ffcc44', range:[4,9]  },
  forge:    { stat:'power',   label:'武力', color:'#ffaa44', range:[3,7]  },
  academy:  { stat:'wisdom',  label:'知力', color:'#aaddff', range:[4,8]  },
  tea:      { stat:'loyalty', label:'忠誠', color:'#88ffaa', range:[5,10] },
  garden:   { stat:'hp',      label:'回復', color:'#ff88cc', range:[3,6]  },
  loyalty:  { stat:'loyalty', label:'忠誠', color:'#ffdd88', range:[6,12] },
};

// 施設内でのセリフ
const FACILITY_SPEECH = {
  training: ['うりゃーっ！','もっと強く！','千本素振り！','気合だ！'],
  forge:    ['いい刃だ…','打ち直すか','熱い…','業物になるぞ'],
  academy:  ['ふむふむ…','これは深い','兵法書か','なるほど！'],
  tea:      ['心が安らぐ…','一服どうぞ','静かじゃ','よい茶だ'],
  garden:   ['美しい…','花が咲いた','英気を養う','心洗われる'],
  loyalty:  ['お館様の御為に！','命を捧げん','忠義を尽くす','必ずや！'],
};

/* ══════════════════════════════════════
   ゲーム状態
══════════════════════════════════════ */
let state = {
  unification:12, genNum:1, koku:4200,
};
let gameTime={year:1,month:1,day:1};

function updateTime(){
  if(++gameTime.day>30){gameTime.day=1;gameTime.month++;}
  if(gameTime.month>12){gameTime.month=1;gameTime.year++;}
  document.getElementById('time-display').textContent=`第${gameTime.year}年 ${gameTime.month}月 ${gameTime.day}日`;
}

let gameLog=[];
function addLog(text,type='normal'){
  gameLog.push({text,type,time:`${gameTime.year}年${gameTime.month}月`});
  if(gameLog.length>60)gameLog.shift();
}

/* ══════════════════════════════════════
   関係システム
══════════════════════════════════════ */
let relations={};
function initRelations(ws){
  relations={};
  ws.forEach((_,i)=>ws.forEach((_,j)=>{
    if(i===j)return;
    const k=relKey(i,j);
    if(relations[k]===undefined) relations[k]=Math.floor(-20+Math.random()*60);
  }));
}
function relKey(i,j){return i<j?`${i}_${j}`:`${j}_${i}`;}
function getRel(i,j){const k=relKey(i,j);return relations[k]!==undefined?relations[k]:0;}
function changeRel(i,j,d){const k=relKey(i,j);if(relations[k]===undefined)relations[k]=0;relations[k]=Math.max(-100,Math.min(100,relations[k]+d));}
function relLabel(v){if(v>=70)return'莫逆の友';if(v>=40)return'友好';if(v>=10)return'普通';if(v>=-20)return'やや対立';if(v>=-50)return'反目';return'宿敵';}
function relColor(v){if(v>=40)return'#88ffaa';if(v>=10)return'#aaddff';if(v>=-20)return'#ffdd88';return'#ff8888';}

function drawBox(tx,ty,tz,w,d,h,cT,cL,cR2){
  const p=(x,y,z)=>{const s=isoToScreen(x,y,z);return[CX+s.x,CY+s.y];};
  const[ax,ay]=p(tx,ty,tz+h),[bx,by]=p(tx+w,ty,tz+h);
  const[cx2,cy2]=p(tx+w,ty+d,tz+h),[dx,dy]=p(tx,ty+d,tz+h);
  const[ex,ey]=p(tx,ty,tz),[fx,fy]=p(tx+w,ty,tz);
  const[gx,gy]=p(tx+w,ty+d,tz),[hx,hy]=p(tx,ty+d,tz);
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx2,cy2);ctx.lineTo(dx,dy);ctx.closePath();ctx.fillStyle=cT;ctx.fill();
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ex,ey);ctx.lineTo(hx,hy);ctx.lineTo(dx,dy);ctx.closePath();ctx.fillStyle=cL;ctx.fill();
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(fx,fy);ctx.lineTo(gx,gy);ctx.lineTo(cx2,cy2);ctx.closePath();ctx.fillStyle=cR2;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(cx2,cy2);ctx.lineTo(dx,dy);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ex,ey);ctx.lineTo(hx,hy);ctx.lineTo(dx,dy);ctx.closePath();ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(fx,fy);ctx.lineTo(gx,gy);ctx.lineTo(cx2,cy2);ctx.closePath();ctx.stroke();
}
function drawRoof(tx,ty,tz,w,d,rh,c1,c2){
  const p=(x,y,z)=>{const s=isoToScreen(x,y,z);return[CX+s.x,CY+s.y];};
  const mx=tx+w/2,my=ty+d/2;
  const[ax,ay]=p(tx,ty,tz),[bx,by]=p(tx+w,ty,tz);
  const[cx2,cy2]=p(tx+w,ty+d,tz),[dx,dy]=p(tx,ty+d,tz);
  const[px2,py2]=p(mx,my,tz+rh);
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(px2,py2);ctx.lineTo(dx,dy);ctx.closePath();ctx.fillStyle=c2;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(px2,py2);ctx.lineTo(cx2,cy2);ctx.closePath();ctx.fillStyle=c1;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.lineTo(px2,py2);ctx.closePath();ctx.fillStyle=c2;ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(dx,dy);ctx.lineTo(cx2,cy2);ctx.lineTo(px2,py2);ctx.closePath();ctx.fillStyle=c1;ctx.fill();ctx.stroke();
}
function drawFlag(tx,ty,tz,t){
  const base=isoToScreen(tx,ty,tz),top=isoToScreen(tx,ty,tz+0.9);
  const bx=CX+base.x,by=CY+base.y,tx2=CX+top.x,ty2=CY+top.y;
  ctx.strokeStyle='#c8960c';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(tx2,ty2);ctx.stroke();
  const wave=Math.sin(t*0.07)*4;
  ctx.fillStyle='#8b0000';ctx.beginPath();ctx.moveTo(tx2,ty2);ctx.lineTo(tx2+14+wave,ty2+6);ctx.lineTo(tx2+12,ty2+13);ctx.closePath();ctx.fill();
}

const TERRAIN=[];
function buildTerrain(){
  TERRAIN.length=0;
  for(let r=0;r<10;r++) for(let c=0;c<10;c++){

/* ══════════════════════════════════════
   武将クラス
══════════════════════════════════════ */
const COLOR_SETS={
  c_red: {armor:'#8b0000',sub:'#4a0000',skin:'#d4a574',acc:'#ff4444',dark:'#6a1010'},
  c_blue:{armor:'#1a3a5c',sub:'#0a1e30',skin:'#c8a87a',acc:'#4488cc',dark:'#0a2a4a'},
  c_pink:{armor:'#8b3060',sub:'#5a1040',skin:'#e8c0a0',acc:'#ff88cc',dark:'#6a1050'},
};
let gWarriors=[];
let currentHouseHead=null, currentModalIndex=-1;
const roles={bukan:'武官',hime:'姫',bunkan:'文官'};

class IsoWarrior{
  constructor(name,jobId,power,tx,ty){
    this.name=name; this.jobId=jobId;
    this.tileX=tx; this.tileY=ty;
    this.color=jobId==='hime'?'c_pink':jobId==='bunkan'?'c_blue':'c_red';
    this.stats={power,loyalty:jobId==='hime'?92:jobId==='bunkan'?72:65,wisdom:jobId==='bunkan'?84:jobId==='hime'?58:52,level:1,exp:0};

    // 移動
    this.destX=tx; this.destY=ty;
    this.moving=false;
    this.moveSpeed=0.028+Math.random()*0.012;
    this.idleTicks=0;
    this.idleMax=80+Math.floor(Math.random()*100);
    this.walkFrame=0; this.frameCount=0;

    // 施設入退場
    this.state='idle';          // idle|moving|entering|acting|exiting
    this.target=null;            // 目的施設key
    this.insideFacility=null;    // 現在滞在中の施設key
    this.wait=0;
    this.anim={type:null,t:0};
    this.visible=true;

    // AI
    this.speechTimer=Math.floor(Math.random()*200);

    gWarriors.push(this);
  }

  /* ─── メインティック ─────────── */
  tick(myIdx){
    this._moveTick();
    this._aiTick(myIdx);
  }

  /* ─── 移動＆施設入退場 ────────── */
  _moveTick(){
    if(this.state==='idle'){
      if(++this.idleTicks>this.idleMax){
        this.idleTicks=0;
        this.idleMax=80+Math.floor(Math.random()*100);
        this._pickDest();
      }
    }

    else if(this.state==='moving'){
      const dx=this.destX-this.tileX, dy=this.destY-this.tileY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<0.08){
        this.tileX=this.destX; this.tileY=this.destY;
        if(++this.frameCount>=8){this.frameCount=0;this.walkFrame=(this.walkFrame+1)%4;}
        // 施設入口に到着？
        if(this.target){
          this.state='entering';
          this.anim={type:'enter',t:0};
          // 入場セリフ
          const speechPool=FACILITY_SPEECH[this.target]||['…'];
          showSpeechBubble(this, speechPool[Math.floor(Math.random()*speechPool.length)], 1600);
        } else {
          this.state='idle';
        }
      } else {
        this.tileX+=dx/dist*this.moveSpeed;
        this.tileY+=dy/dist*this.moveSpeed;
        if(++this.frameCount>=8){this.frameCount=0;this.walkFrame=(this.walkFrame+1)%4;}
      }
    }

    else if(this.state==='entering'){
      this.anim.t+=0.045;
      if(this.anim.t>=1){
        this.visible=false;
        this.state='acting';
        this.insideFacility=this.target;
        this.wait=100+Math.random()*120;
        // 施設効果を即時付与（一部）
        this._applyFacilityEffect(this.target, true);
      }
    }

    else if(this.state==='acting'){
      // 滞在中は施設効果を少しずつ受ける
      if(Math.random()<0.04) this._applyFacilityEffect(this.insideFacility, false);
      if(--this.wait<=0){
        this.state='exiting';
        this.anim={type:'exit',t:0};
        this.visible=true;
        const e=FACILITY_ENTRANCE[this.insideFacility];
        this.tileX=e.x; this.tileY=e.y;
        this.insideFacility=null;
        this.target=null;
      }
    }

    else if(this.state==='exiting'){
      this.anim.t+=0.045;
      if(this.anim.t>=1){
        this.state='idle';
        this.anim={type:null,t:0};
      }
    }
  }

  _pickDest(){
    // 50%: ランダム施設へ向かう  50%: 他の武将の近くへ
    if(Math.random()<0.5){
      const keys=Object.keys(FACILITY_MAP);
      const key=keys[Math.floor(Math.random()*keys.length)];
      const e=FACILITY_ENTRANCE[key];
      this.destX=e.x+(Math.random()*0.3-0.15);
      this.destY=e.y+(Math.random()*0.3-0.15);
      this.target=key;
      this.state='moving';
    } else {
      const others=gWarriors.filter(w=>w!==this);
      if(others.length>0 && Math.random()<0.5){
        const t=others[Math.floor(Math.random()*others.length)];
        this.destX=t.tileX+(Math.random()*1.0-0.5);
        this.destY=t.tileY+(Math.random()*1.0-0.5);
      } else {
        // 城周辺をうろうろ
        this.destX=(Math.random()*6-3);
        this.destY=(Math.random()*6-3);
      }
      this.target=null;
      this.state='moving';
    }
  }

  /* 施設効果を武将に適用 */
  _applyFacilityEffect(key, isEntry){
    const eff=FACILITY_EFFECT[key];
    if(!eff)return;
    const fac=FACILITY_MAP[key];
    const [lo,hi]=eff.range;
    const gain=isEntry
      ? Math.floor(lo+Math.random()*(hi-lo))
      : Math.floor(1+Math.random()*2);

    if(eff.stat==='power')  this.stats.power+=gain;
    if(eff.stat==='wisdom') this.stats.wisdom=Math.min(99,this.stats.wisdom+gain);
    if(eff.stat==='loyalty')this.stats.loyalty=Math.min(100,this.stats.loyalty+gain);
    if(eff.stat==='hp')     this.stats.loyalty=Math.min(100,this.stats.loyalty+gain); // 庭園は忠誠回復

    if(gain>0){
      createFloatText(this, `+${gain}${eff.label}`, eff.color);
      if(isEntry){
        showFacilityActivity(key, `${this.name}が${fac.name}で鍛練！ +${gain}${eff.label}`, eff.color);
        addLog(`${this.name}が${fac.name}で${eff.label}+${gain}`, 'normal');
      }
    }
    updatePartyRow();
    updateStatusUI();
  }

  /* ─── AI（セリフ・関係） ──────── */
  _aiTick(myIdx){
    this.speechTimer=Math.max(0,this.speechTimer-1);
    if(this.speechTimer===0&&Math.random()<0.005){
      let sit='idle';
      if(this.stats.loyalty>80&&Math.random()<0.3) sit='highLoyalty';
      else if(this.stats.loyalty<35&&Math.random()<0.4) sit='lowLoyalty';
      showSpeechBubble(this,getSpeech(this,sit));
      this.speechTimer=180+Math.floor(Math.random()*280);
    }
    // 近接武将との関係変動
    if(this.state==='idle'&&Math.random()<0.004){
      gWarriors.forEach((other,j)=>{
        if(j===myIdx)return;
        const dx=this.tileX-other.tileX, dy=this.tileY-other.tileY;
        if(Math.sqrt(dx*dx+dy*dy)<1.6) this._interact(myIdx,j,other);
      });
    }
  }

  _interact(mi,oi,other){
    const rel=getRel(mi,oi);
    let delta,sitA,sitB;
    if(rel>=20&&Math.random()<0.65){ delta=Math.floor(3+Math.random()*8); sitA=sitB='friendly'; }
    else if(rel<-20&&Math.random()<0.55){ delta=-Math.floor(3+Math.random()*8); sitA=sitB='rival'; }
    else { delta=Math.floor(-4+Math.random()*9); sitA=sitB=delta>=0?'friendly':'rival'; }
    changeRel(mi,oi,delta);
    const nv=getRel(mi,oi);
    if(Math.random()<0.65) showSpeechBubble(this,getSpeech(this,sitA),1800);
    setTimeout(()=>{ if(Math.random()<0.65) showSpeechBubble(other,getSpeech(other,sitB),1800); },700);
    if(Math.abs(delta)>=5){
      const sign=delta>0?'▲':'▼';
      const s=isoToScreen((this.tileX+other.tileX)/2+0.5,(this.tileY+other.tileY)/2+0.5,1.0);
      const field=document.getElementById('iso-field');
      const fR=field.getBoundingClientRect(),cR=canvas.getBoundingClientRect();
      const el=document.createElement('div');
      el.className='relation-label';
      el.style.left=(cR.left-fR.left+CX+s.x)+'px';
      el.style.top=(cR.top-fR.top+CY+s.y-40)+'px';
      el.style.color=relColor(nv);
      el.textContent=`${sign} ${relLabel(nv)}`;
      bubbleLayer.appendChild(el);
      setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},2800);
      if(Math.abs(delta)>=8) addLog(`${this.name}と${other.name}の仲が${delta>0?'深まった':'険悪になった'}（${relLabel(nv)}）`,delta>0?'success':'betrayal');
    }
    updatePartyRow();
  }

  /* ─── 描画 ────────────────────── */
  draw(){
    if(!this.visible&&this.state!=='exiting') return;

    const s=this.walkFrame%4;
    const c=COLOR_SETS[this.color];
    const foot=isoToScreen(this.tileX+0.5,this.tileY+0.5,0.25);
    const fx=CX+foot.x, fy=CY+foot.y;
    const H=Math.round(canvas.height*0.09);
    const W=H*0.55;

    // 入退場フェード
    let scale=1, alpha=1;
    if(this.state==='entering'){ scale=1-this.anim.t; alpha=1-this.anim.t; }
    if(this.state==='exiting') { scale=this.anim.t;   alpha=this.anim.t;   }
    if(scale<=0||alpha<=0) return;

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(fx,fy); ctx.scale(scale,scale); ctx.translate(-fx,-fy);

    if(this.jobId==='bukan')       this._drawBukan(fx,fy,H,W,s,c);
    else if(this.jobId==='hime')   this._drawHime(fx,fy,H,W,s,c);
    else                            this._drawBunkan(fx,fy,H,W,c);

    ctx.font=`${Math.round(canvas.width*0.027)}px 'Noto Serif JP',serif`;
    ctx.textAlign='center';
    ctx.fillStyle='rgba(240,192,64,.95)';
    ctx.shadowColor='#000'; ctx.shadowBlur=5;
    ctx.fillText(this.name, fx, fy-H*1.22);
    ctx.shadowBlur=0;

    // 施設へ向かっているときの行先ラベル
    if(this.state==='moving'&&this.target){
      const fac=FACILITY_MAP[this.target];
      ctx.font=`${Math.round(canvas.width*0.021)}px 'Noto Serif JP',serif`;
      ctx.fillStyle='rgba(200,200,255,.8)';
      ctx.fillText('→'+fac.name, fx, fy-H*1.44);
    }

    ctx.restore();

    // 入場エフェクト
    if(this.state==='entering'){
      const es=isoToScreen(this.tileX+0.5,this.tileY+0.5,0.4);
      ctx.save();
      ctx.globalAlpha=0.4*(1-this.anim.t);
      ctx.beginPath();
      ctx.arc(CX+es.x,CY+es.y,22*(1+this.anim.t),0,Math.PI*2);
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    }
  }

  _drawBukan(fx,fy,H,W,s,c){
    const legW=W*0.28;
    const legSwing=[0,H*0.06,0,-H*0.06][s];
    const armSwing=[H*0.05,0,-H*0.05,0][s];
    const bob=Math.abs([0,1,0,-1][s])*1.5;
    const bY=fy-bob;
    const hH=H*0.22,bH=H*0.32,lH=H*0.38,aH=H*0.28;
    const headY=bY-lH-bH-hH, bodyY=bY-lH-bH;
    ctx.beginPath();ctx.ellipse(fx,bY+2,W*0.6,H*0.05,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
    ctx.fillStyle=c.sub;
    ctx.save();ctx.translate(fx-legW*0.6,bY-lH/2);ctx.rotate(legSwing*0.04);ctx.beginPath();ctx.roundRect(-legW/2,0,legW,lH,3);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(fx+legW*0.6,bY-lH/2);ctx.rotate(-legSwing*0.04);ctx.beginPath();ctx.roundRect(-legW/2,0,legW,lH,3);ctx.fill();ctx.restore();
    ctx.fillStyle=c.dark;
    ctx.beginPath();ctx.roundRect(fx-W*0.32,bY-3,W*0.28,5,2);ctx.fill();
    ctx.beginPath();ctx.roundRect(fx+W*0.04,bY-3,W*0.28,5,2);ctx.fill();
    ctx.fillStyle=c.armor;ctx.beginPath();ctx.roundRect(fx-W*0.44,bodyY,W*0.88,bH,3);ctx.fill();
    ctx.fillStyle=c.dark;ctx.beginPath();ctx.roundRect(fx-W*0.38,bodyY+2,W*0.76,bH-4,2);ctx.fill();
    ctx.fillStyle=c.armor;
    ctx.save();ctx.translate(fx-W*0.52,bodyY+4);ctx.rotate(armSwing*0.05);ctx.beginPath();ctx.roundRect(-W*0.18,0,W*0.22,aH,4);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(fx+W*0.52,bodyY+4);ctx.rotate(-armSwing*0.05);ctx.beginPath();ctx.roundRect(-W*0.04,0,W*0.22,aH,4);ctx.fill();
    ctx.strokeStyle='#b8b8b8';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*0.1,aH*0.5);ctx.lineTo(W*0.4,-aH*0.5);ctx.stroke();
    ctx.fillStyle=c.acc;ctx.beginPath();ctx.arc(W*0.12,aH*0.45,3,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle=c.armor;ctx.beginPath();ctx.ellipse(fx,headY+hH*0.45,W*0.38,hH*0.55,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.skin;ctx.beginPath();ctx.ellipse(fx,headY+hH*0.55,W*0.28,hH*0.42,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#3a2010';
    ctx.beginPath();ctx.arc(fx-W*0.1,headY+hH*0.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+W*0.1,headY+hH*0.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=c.acc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(fx,headY);ctx.lineTo(fx,headY-hH*0.4);ctx.stroke();
    ctx.fillStyle=c.acc;ctx.beginPath();ctx.moveTo(fx-4,headY-hH*0.2);ctx.lineTo(fx+4,headY-hH*0.2);ctx.lineTo(fx,headY-hH*0.5);ctx.fill();
  }
  _drawHime(fx,fy,H,W,s,c){
    const bob=Math.abs([0,1,0,-1][s])*1.2, bY=fy-bob;
    ctx.beginPath();ctx.ellipse(fx,bY+2,W*0.55,H*0.045,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fill();
    const grd=ctx.createLinearGradient(fx-W*0.55,0,fx+W*0.55,0);
    grd.addColorStop(0,c.dark);grd.addColorStop(0.5,c.armor);grd.addColorStop(1,c.dark);
    ctx.fillStyle=grd;
    ctx.beginPath();ctx.moveTo(fx-W*0.22,bY-H*0.55);ctx.lineTo(fx+W*0.22,bY-H*0.55);ctx.lineTo(fx+W*0.5,bY);ctx.lineTo(fx-W*0.5,bY);ctx.closePath();ctx.fill();
    ctx.fillStyle=c.acc;ctx.beginPath();ctx.roundRect(fx-W*0.22,bY-H*0.42,W*0.44,H*0.1,2);ctx.fill();
    ctx.fillStyle=c.armor;
    ctx.save();ctx.translate(fx-W*0.28,bY-H*0.52);ctx.rotate(-0.2);ctx.beginPath();ctx.ellipse(0,0,W*0.15,H*0.2,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.translate(fx+W*0.28,bY-H*0.52);ctx.rotate(0.2);ctx.beginPath();ctx.ellipse(0,0,W*0.15,H*0.2,0,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.ellipse(fx,bY-H*0.78,W*0.3,H*0.18,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.skin;ctx.beginPath();ctx.ellipse(fx,bY-H*0.73,W*0.22,H*0.15,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#8b3060';
    ctx.beginPath();ctx.arc(fx-W*0.09,bY-H*0.74,1.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+W*0.09,bY-H*0.74,1.4,0,Math.PI*2);ctx.fill();
    for(let i=-1;i<=1;i++){ctx.fillStyle=i===0?c.acc:'rgba(255,140,200,.8)';ctx.beginPath();ctx.arc(fx+i*W*0.18,bY-H*0.9,3.5,0,Math.PI*2);ctx.fill();}
  }
  _drawBunkan(fx,fy,H,W,c){
    ctx.beginPath();ctx.ellipse(fx,fy+2,W*0.5,H*0.04,0,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fill();
    ctx.fillStyle=c.armor;ctx.beginPath();ctx.roundRect(fx-W*0.32,fy-H*0.65,W*0.64,H*0.65,3);ctx.fill();
    ctx.fillStyle=c.sub;ctx.beginPath();ctx.roundRect(fx-W*0.25,fy-H*0.6,W*0.5,H*0.5,2);ctx.fill();
    ctx.fillStyle=c.armor;
    ctx.beginPath();ctx.ellipse(fx-W*0.42,fy-H*0.48,W*0.16,H*0.22,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(fx+W*0.42,fy-H*0.48,W*0.16,H*0.22,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#c8a850';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(fx+W*0.28,fy-H*0.55);ctx.lineTo(fx+W*0.2,fy-H*0.2);ctx.stroke();
    ctx.fillStyle=c.skin;ctx.beginPath();ctx.ellipse(fx,fy-H*0.76,W*0.25,H*0.16,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a0a00';
    ctx.beginPath();ctx.moveTo(fx-W*0.2,fy-H*0.82);ctx.lineTo(fx+W*0.2,fy-H*0.82);ctx.lineTo(fx+W*0.05,fy-H*1.0);ctx.lineTo(fx-W*0.05,fy-H*1.0);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.roundRect(fx-W*0.2,fy-H*0.85,W*0.4,H*0.07,1);ctx.fill();
    ctx.fillStyle='#4a3a2a';
    ctx.beginPath();ctx.arc(fx-W*0.07,fy-H*0.77,1.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(fx+W*0.07,fy-H*0.77,1.3,0,Math.PI*2);ctx.fill();
  }
}

/* ══════════════════════════════════════
   シーン描画
══════════════════════════════════════ */
function drawScene(tick){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 地形
  const sorted=[...TERRAIN].sort((a,b)=>(a.r+a.c)-(b.r+b.c));
  for(const t of sorted){
    const tx=t.c-4.5, ty=t.r-4.5;
    if(t.type==='grass') drawBox(tx,ty,0,1,1,0.18,'#2d4a1e','#1c3010','#233c16');
    else{ const even=(t.c+t.r)%2===0; drawBox(tx,ty,0,1,1,0.25,even?'#4e4032':'#443828','#2e2416','#382e1c'); }
  }

  // 濠
  const moat=[[-3,-3],[-2,-3],[-1,-3],[0,-3],[1,-3],[2,-3],[3,-3],[3,-2],[3,-1],[3,0],[3,1],[3,2],[3,3],[2,3],[1,3],[0,3],[-1,3],[-2,3],[-3,3],[-3,2],[-3,1],[-3,0],[-3,-1],[-3,-2]];
  for(const[mc,mr]of moat){
    const p1=isoToScreen(mc,mr,0),p2=isoToScreen(mc+1,mr,0),p3=isoToScreen(mc+1,mr+1,0),p4=isoToScreen(mc,mr+1,0);
    ctx.beginPath();ctx.moveTo(CX+p1.x,CY+p1.y);ctx.lineTo(CX+p2.x,CY+p2.y);ctx.lineTo(CX+p3.x,CY+p3.y);ctx.lineTo(CX+p4.x,CY+p4.y);ctx.closePath();
    const sh=0.5+0.12*Math.sin(tick*0.04+mc*0.5+mr*0.3);
    ctx.fillStyle=`rgba(12,28,52,${sh})`;ctx.fill();
    ctx.strokeStyle='rgba(20,50,90,.5)';ctx.lineWidth=0.5;ctx.stroke();
  }

  // 外壁
  for(let i=-2;i<=2;i++) drawBox(i,-2,0.25,1,1,0.5,'#4a3a28','#322514','#5c4a34');
  for(let i=-2;i<=2;i++) drawBox(i, 2,0.25,1,1,0.5,'#4a3a28','#322514','#5c4a34');
  for(let i=-1;i<=1;i++){
    drawBox(-2,i,0.25,1,1,0.5,'#4a3a28','#322514','#5c4a34');
    drawBox( 2,i,0.25,1,1,0.5,'#4a3a28','#322514','#5c4a34');
  }

  // 施設（天守より先に描く）
  drawFacilities(tick);

  // 天守
  drawBox(-1,-1,0.75,2,2,0.9,'#5a4a35','#3a2c1a','#4a3a25');
  drawBox(-0.8,-0.8,1.65,1.6,1.6,1.4,'#4a3826','#3a2a18','#4a3826');
  drawBox(-0.6,-0.6,1.65,0.7,0.7,0.9,'#4a3826','#3a2a18','#4a3826');
  drawRoof(-1.1,-1.1,2.65+1.4,    2.2,2.2,0.9,'#241608','#1a0e04');
  drawRoof(-0.9,-0.9,2.65+1.4+0.7,1.8,1.8,0.7,'#1a0e04','#120900');
  drawRoof(-0.65,-0.65,2.65+1.4+1.1,1.3,1.3,0.55,'#241608','#1a0e04');
  drawRoof(-0.4,-0.4,2.65+1.4+1.5,0.8,0.8,0.4,'#1a0e04','#100800');
  drawFlag(-0.05,-0.05,2.65+1.4+1.85,tick);
  const la=isoToScreen(0,0,2.65+1.4+2.3);
  const a2=0.7+0.3*Math.sin(tick*0.03);
  ctx.font=`bold ${Math.round(canvas.width*0.036)}px 'Noto Serif JP',serif`;
  ctx.textAlign='center';ctx.fillStyle=`rgba(240,192,64,${a2})`;
  ctx.shadowColor='rgba(200,150,12,.8)';ctx.shadowBlur=10;
  ctx.fillText('安土城',CX+la.x,CY+la.y);ctx.shadowBlur=0;

  // 武将（ソートして描画）
  const sw=[...gWarriors].sort((a,b)=>(a.tileX+a.tileY)-(b.tileX+b.tileY));
  sw.forEach(w=>w.draw());

  drawFloatingTexts();
}

/* ══════════════════════════════════════
   UI 更新
══════════════════════════════════════ */
function updateStatusUI(){
  document.getElementById('unification-pct').textContent=Math.floor(state.unification);
  document.getElementById('gen-num').textContent=state.genNum;
  document.getElementById('koku-display').textContent=state.koku.toLocaleString('ja-JP');
  document.getElementById('nfill').style.width=Math.min(100,Math.floor(state.koku/100))+'%';
}

function locationLabel(w){
  if(w.insideFacility) return FACILITY_MAP[w.insideFacility].name+'で鍛練中';
  if(w.target&&w.state==='moving') return FACILITY_MAP[w.target]?.name+'へ向かう中';
  return '城内';
}

function updatePartyRow(){
  const row=document.getElementById('party-row');
  row.innerHTML='';
  gWarriors.forEach((w,i)=>{
    const card=document.createElement('div');
    card.className='party-card'+(i===0?' head':'');
    let relText='';
    gWarriors.forEach((_,j)=>{
      if(j===i)return;
      const rv=getRel(i,j);
      if(!relText||Math.abs(rv)>30) relText=gWarriors[j].name.split(' ')[1]||gWarriors[j].name+'：'+relLabel(rv);
    });
    card.innerHTML=`
      <span class="pc-role">${roles[w.jobId]||'武将'}</span>
      <span class="pc-name">${w.name}</span>
      <span class="pc-pow">武力 ${w.stats.power} Lv${w.stats.level}</span>
      <span class="pc-loc">${locationLabel(w)}</span>
      ${relText?`<span class="pc-rel">${relText}</span>`:''}`;
    card.onclick=()=>showWarriorModal(i);
    row.appendChild(card);
  });
}

/* ══════════════════════════════════════
   武将モーダル
══════════════════════════════════════ */
function showWarriorModal(i){
  currentModalIndex=i;
  const w=gWarriors[i];
  document.getElementById('warrior-modal').style.display='flex';
  document.getElementById('modal-warrior-name').innerHTML=
    `${w.name}<br><span style="font-size:13px;color:#c8960c;">${roles[w.jobId]||'武将'}　Lv.${w.stats.level}</span>`;
  document.getElementById('modal-stats').innerHTML=
    `<span style="color:#ffcc66">武力 ${w.stats.power}</span>　｜　`+
    `<span style="color:#88ff88">忠誠 ${w.stats.loyalty}</span>　｜　`+
    `<span style="color:#aaddff">知力 ${w.stats.wisdom}</span>`;
  let relHtml='<div style="color:var(--gold-d);font-size:11px;margin-bottom:4px;letter-spacing:.1em;">─ 人間関係 ─</div>';
  gWarriors.forEach((other,j)=>{
    if(j===i)return;
    const rv=getRel(i,j);
    relHtml+=`<div style="display:flex;justify-content:space-between;padding:2px 0;">
      <span>${other.name}</span>
      <span style="color:${relColor(rv)};">${relLabel(rv)}（${rv>=0?'+':''}${rv}）</span></div>`;
  });
  document.getElementById('modal-relations').innerHTML=relHtml;
}
function closeWarriorModal(){document.getElementById('warrior-modal').style.display='none';currentModalIndex=-1;}

function talkToWarrior(index,type){
  if(index<0||index>=gWarriors.length)return;
  const w=gWarriors[index];
  let msg='',col='#ffdd88',gain=0,sit='';
  if(type==='encourage'){gain=Math.floor(5+Math.random()*7);w.stats.loyalty=Math.min(100,w.stats.loyalty+gain);msg=`+${gain}忠`;col='#88ff88';sit='highLoyalty';}
  else if(type==='train'){gain=Math.floor(4+Math.random()*5);w.stats.power+=gain;msg=`+${gain}武力`;col='#ffcc66';sit='train';}
  else if(type==='teach'){gain=Math.floor(3+Math.random()*4);w.stats.wisdom=Math.min(99,w.stats.wisdom+gain);msg=`+${gain}知`;col='#aaddff';sit='train';}
  createFloatText(w,msg,col);
  showSpeechBubble(w,getSpeech(w,sit));
  state.koku=Math.max(0,state.koku-35);
  updateStatusUI();updatePartyRow();
  if(currentModalIndex===index)showWarriorModal(index);
}

/* ══════════════════════════════════════
   内政モーダル（施設アップグレード）
══════════════════════════════════════ */
function showDev(){document.getElementById('dev-modal').style.display='flex';renderFacilities();}
function closeDevModal(){document.getElementById('dev-modal').style.display='none';}
function renderFacilities(){
  const COST_BASE={training:450,forge:380,academy:520,tea:310,garden:280,loyalty:680};
  let html='';
  Object.entries(FACILITY_MAP).forEach(([key,f])=>{
    const cost=Math.floor((COST_BASE[key]||400)*Math.pow(1.65,f.level-1));
    html+=`<div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.07);padding:12px 14px;border-radius:12px;margin-bottom:10px;">
      <div style="font-size:28px;width:40px;text-align:center;">${f.icon}</div>
      <div style="flex:1;">
        <div style="font-size:16px;font-weight:700;">${f.name} <span style="font-size:12px;color:#c8960c;">Lv.${f.level}</span></div>
        <div style="font-size:11px;color:rgba(245,232,200,.7);">${FACILITY_EFFECT[key]?.label||''}が鍛えられる施設</div>
      </div>
      <button onclick="upgradeFacility('${key}',${cost})" style="background:var(--gold);color:#0e0800;padding:7px 13px;border:none;border-radius:9999px;white-space:nowrap;font-weight:700;cursor:pointer;font-size:12px;">${cost}石<br>強化</button>
    </div>`;
  });
  document.getElementById('facilities-list').innerHTML=html;
}
window.upgradeFacility=function(key,cost){
  if(state.koku<cost){alert('国力が不足しています！');return;}
  state.koku-=cost;
  FACILITY_MAP[key].level++;
  gWarriors.forEach(w=>{
    const b=Math.floor(2+Math.random()*4);
    w.stats.power+=b;
    createFloatText(w,`施設+${b}`,'#ffdd88');
    showSpeechBubble(w,getSpeech(w,'train'));
  });
  addLog(`${FACILITY_MAP[key].name}が強化された！`,'success');
  updateStatusUI();updatePartyRow();renderFacilities();
};

/* ══════════════════════════════════════
   歴史モーダル
══════════════════════════════════════ */
window.showHistory=function(){
  const list=document.getElementById('history-list');
  list.innerHTML=gameLog.length
    ? gameLog.slice().reverse().map(l=>{
        let col='#ddd';
        if(l.type==='awakening')col='#ff6666';
        if(l.type==='betrayal')col='#ff3333';
        if(l.type==='success')col='#ffcc66';
        return`<div style="margin-bottom:6px;color:${col};border-bottom:1px solid rgba(200,150,12,.1);padding-bottom:4px;"><span style="color:var(--gold-d);font-size:11px;">【${l.time}】</span> ${l.text}</div>`;
      }).join('')
    : '<div style="color:rgba(245,232,200,.5);text-align:center;padding:20px;">まだ歴史は刻まれていない…</div>';
  document.getElementById('history-modal').style.display='flex';
};
window.closeHistory=function(){document.getElementById('history-modal').style.display='none';};

/* ══════════════════════════════════════
   放置ティック・イベント
══════════════════════════════════════ */
function performIdleTick(){
  gWarriors.forEach(w=>{
    let eg=Math.floor(5+Math.random()*11);
    w.stats.exp+=eg;
    let lv=false;
    while(w.stats.exp>=100){w.stats.exp-=100;w.stats.level++;lv=true;const pu=Math.floor(2+Math.random()*3);w.stats.power+=pu;createFloatText(w,`+${pu}武力`,'#ffcc66');}
    if(lv){createFloatText(w,`Lv${w.stats.level}↑`,'#ffeeaa');showSpeechBubble(w,getSpeech(w,'levelUp'),2500);addLog(`${w.name}がLv${w.stats.level}に！`);}
    if(Math.random()<0.6) w.stats.power++;
    if(Math.random()<0.35) w.stats.wisdom=Math.min(99,w.stats.wisdom+1);
    if(Math.random()<0.3)  w.stats.loyalty=Math.min(100,w.stats.loyalty+Math.floor(1+Math.random()*3));
  });
  state.koku+=Math.floor(62+Math.random()*98);
  state.unification=Math.min(99.9,state.unification+0.12);
  updateStatusUI();updatePartyRow();
}

function triggerEvent(){
  if(Math.random()>0.35)return;
  const w=gWarriors[Math.floor(Math.random()*gWarriors.length)];
  if(!w)return;
  const roll=Math.random();
  if(roll<0.15){const up=10+Math.floor(Math.random()*10);w.stats.power+=up;createFloatText(w,`覚醒 +${up}`,'#ff4444');showSpeechBubble(w,'目覚めた…！',2500);addLog(`${w.name}が覚醒した！`,'awakening');}
  else if(roll<0.25){w.stats.loyalty=Math.max(0,w.stats.loyalty-30);createFloatText(w,'裏切り兆候','#ff0000');showSpeechBubble(w,getSpeech(w,'lowLoyalty'),2500);addLog(`${w.name}に裏切りの兆し…`,'betrayal');}
  else if(roll<0.5){const g=500+Math.floor(Math.random()*500);state.koku+=g;addLog(`内政大成功！ +${g}石`,'success');}
  else{w.stats.power+=3;createFloatText(w,'+3','#ffdd88');addLog(`${w.name}が成長した`);}
  updateStatusUI();updatePartyRow();
}

/* ══════════════════════════════════════
   合戦
══════════════════════════════════════ */
window.startBattle=()=>{
  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-family').textContent=(currentHouseHead?currentHouseHead.familyName:'織田')+'軍 出陣';
  document.getElementById('our-warriors').innerHTML=gWarriors.map(w=>`<span class="wi">${w.jobId==='hime'?'🌸':'⚔️'}</span>`).join('');
  document.getElementById('enemy-warriors').innerHTML='<span class="wi">⚔️</span><span class="wi">⚔️</span><span class="wi">⚔️</span>';
  document.getElementById('battle-log').innerHTML='<div class="ll ally">敵軍が城に迫っています！</div>';
};
window.startBattleSimulation=function(){
  const log=document.getElementById('battle-log');
  log.innerHTML+=`<div class="ll ally">${gWarriors[0]?.name||'武将'}が先陣を切った！</div>`;
  setTimeout(()=>{
    log.innerHTML+='<div class="ll ally" style="color:#ffdd88">大勝利！天下に名を轟かせた！</div>';
    log.scrollTop=log.scrollHeight;
    state.koku+=1680; state.unification=Math.min(100,state.unification+4.5);
    gWarriors.forEach((w,i)=>{
      w.stats.power+=5;createFloatText(w,'+5武力','#ffdd88');
      w.stats.loyalty=Math.min(100,w.stats.loyalty+8);
      showSpeechBubble(w,getSpeech(w,'highLoyalty'),2000);
      gWarriors.forEach((_,j)=>{if(i!==j)changeRel(i,j,Math.floor(3+Math.random()*5));});
    });
    addLog('合戦大勝利！','success');updateStatusUI();updatePartyRow();
  },1400);
};
window.endBattle=()=>document.getElementById('battle-screen').classList.remove('show');

window.showBloodline=()=>{
  if(state.genNum>=5){alert('すでに最終世代です！');return;}
  if(confirm('次世代へ進みますか？')){
    state.genNum++;
    const nw=new IsoWarrior('織田 次郎','bukan',75+Math.floor(Math.random()*25),-1.5,3.5);
    const ni=gWarriors.length-1;
    gWarriors.forEach((_,i)=>{if(i!==ni)changeRel(i,ni,Math.floor(10+Math.random()*30));});
    addLog(`第${state.genNum}世代開始！`,'success');
    updatePartyRow();updateStatusUI();
    alert(`第${state.genNum}世代開始！`);
  }
};

/* ══════════════════════════════════════
   メインループ・初期化
══════════════════════════════════════ */
let tick=0;
function gameLoop(){
  tick++;
  gWarriors.forEach((w,i)=>w.tick(i));
  drawScene(tick);
  requestAnimationFrame(gameLoop);
}

function initGame(){
  gWarriors=[];
  buildTerrain();
  resizeCanvas();

  new IsoWarrior('織田 信廣','bukan', 88,  0.2,  3.5);
  new IsoWarrior('お 市',    'hime',  72, -1.8,  3.2);
  new IsoWarrior('明智 光忠','bunkan',65,  1.8,  3.0);

  currentHouseHead={warrior:gWarriors[0],familyName:'織田'};
  initRelations(gWarriors);

  setTimeout(()=>showSpeechBubble(gWarriors[0],'天下を取るぞ！',2500),1200);
  setTimeout(()=>showSpeechBubble(gWarriors[1],'桜が綺麗ですね…',2500),2200);
  setTimeout(()=>showSpeechBubble(gWarriors[2],'謀略が要りますな',2500),3100);

  updatePartyRow();updateStatusUI();

  canvas.style.pointerEvents='auto';
  canvas.addEventListener('click',()=>{
    const w=gWarriors[Math.floor(Math.random()*gWarriors.length)];
    if(!w)return;
    const g=1+Math.floor(Math.random()*3);
    w.stats.power+=g;
    createFloatText(w,`+${g}`,'#ffaa44');
    showSpeechBubble(w,getSpeech(w,'train'));
    addLog(`${w.name}を強化`);
    updatePartyRow();
  });

  setInterval(performIdleTick,1800);
  setInterval(()=>{updateTime();triggerEvent();},2200);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden){for(let i=0;i<5;i++)performIdleTick();addLog('放置ボーナス発生！','success');}
  });

  gameLoop();
}

window.onload=initGame;
window.addEventListener('resize',resizeCanvas);
</script>
</body>
</html>
