function rnd(lo,hi){return Math.floor(lo+Math.random()*(hi-lo+1));}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function getAgeModifier(age){if(age>=MATURE_AGE)return 1;if(age<=14)return .6;return .7+(age-15)*.06;}
let toastTimer=null;
function showToast(msg,dur){const t=$('toast');t.textContent=msg;t.classList.add('show');if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.classList.remove('show');toastTimer=null;},dur||2200);}
function addLog(text){const now=new Date();const ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');state.log.unshift({time:ts,text});if(state.log.length>100)state.log.pop();}
function openModal(id){document.getElementById(id).classList.add('show');const bg=$('modal-bg');if(bg)bg.style.display='block';}

function refreshModalBg(){const ids=['pedigree-modal','warrior-modal','engumi-modal','dev-modal','history-modal','formation-modal','castle-modal','map-modal'];const any=ids.some(i=>document.getElementById(i).classList.contains('show'));$('modal-bg').style.display=any?'block':'none';}
function closeAllModals(){['pedigree-modal','warrior-modal','engumi-modal','dev-modal','history-modal','formation-modal','castle-modal','map-modal'].forEach(id=>document.getElementById(id).classList.remove('show'));$('modal-bg').style.display='none';}
function generateJob(gender){if(gender==='male')return Math.random()<.65?JOB_DEFS[0]:JOB_DEFS[1];return Math.random()<.55?JOB_DEFS[2]:JOB_DEFS[3];}
function randName(gender){return SURNAMES[Math.floor(Math.random()*SURNAMES.length)]+(gender==='female'?GIVEN_NAMES_F[Math.floor(Math.random()*GIVEN_NAMES_F.length)]:GIVEN_NAMES_M[Math.floor(Math.random()*GIVEN_NAMES_M.length)]);}
function spawnStars(){const sky=$('sky');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';s.style.cssText='left:'+(Math.random()*100)+'%;top:'+(Math.random()*70)+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+(-Math.random()*6)+'s;';sky.appendChild(s);}}

function castleLvData(){return CASTLE_LEVELS[Math.min(state.castle.lv-1,CASTLE_LEVELS.length-1)];}
function addCastleExp(exp){const d=castleLvData();if(state.castle.lv>=CASTLE_LEVELS.length){state.castle.exp=d.maxExp;updateCastleUI();return;}state.castle.exp+=exp;if(state.castle.exp>=d.maxExp)state.castle.exp=d.maxExp;updateCastleUI();}
function updateCastleUI(){const d=castleLvData();$('castle-lv-text').textContent='Lv.'+state.castle.lv+' '+d.name;const pct=Math.min(100,(state.castle.exp/d.maxExp)*100);$('castle-exp-fill').style.width=pct+'%';const btn=$('castle-upgrade-btn');const canUpgrade=state.castle.lv<CASTLE_LEVELS.length&&state.castle.exp>=d.maxExp&&state.koku>=d.upgCost;btn.textContent=canUpgrade?'★強化可!':'強化';btn.style.borderColor=canUpgrade?'var(--gold-l)':'var(--gold-d)';btn.style.color=canUpgrade?'#fff':'';}
function openCastleModal(){const d=castleLvData();const next=CASTLE_LEVELS[state.castle.lv];let html='<div class="castle-upgrade-row"><div class="cur-name">🏯 '+d.name+' Lv.'+state.castle.lv+'</div><div class="cur-desc">石高収入 ×'+d.kokuBonus+'<br>武将強さ ×'+d.powerBonus+'<br>城EXP：'+state.castle.exp+' / '+d.maxExp+'</div>';if(next){html+='<div class="cur-desc">次：<b>'+next.name+' Lv.'+next.lv+'</b><br>'+next.upgDesc+'<br>収入→×'+next.kokuBonus+' / 強さ→×'+next.powerBonus+'</div>';const canExp=state.castle.exp>=d.maxExp,canKoku=state.koku>=d.upgCost;html+='<div class="cur-cost">費用：'+d.upgCost.toLocaleString()+'石　（現在：'+Math.floor(state.koku).toLocaleString()+'石）';if(!canExp)html+='<br><span style="color:#ff6666;font-size:9px;">※ 城EXPが不足（戦闘・縁組で稼ごう）</span>';if(!canKoku)html+='<br><span style="color:#ff6666;font-size:9px;">※ 石高不足</span>';html+='</div>';const ok=canExp&&canKoku;html+='<button class="cur-btn" '+(ok?'':'disabled')+' onclick="doUpgradeCastle()">城を強化する（'+d.upgCost.toLocaleString()+'石）</button>';}else{html+='<div class="cur-desc" style="color:var(--gold);">★ 最高レベルに達しました！</div>';}html+='</div>';$('castle-modal-body').innerHTML=html;openModal('castle-modal');}
function doUpgradeCastle(){if(state.castle.lv>=CASTLE_LEVELS.length){showToast('すでに最高レベルです');return;}const d=castleLvData();if(state.castle.exp<d.maxExp){showToast('城EXPが不足しています');return;}if(state.koku<d.upgCost){showToast('石高が不足しています');return;}state.koku-=d.upgCost;state.castle.lv++;state.castle.exp=0;const nd=castleLvData();addLog('城が強化された！→ '+nd.name+' Lv.'+state.castle.lv);showToast('🏯 城が'+nd.name+'に昇格！',3000);closeModal('castle-modal');updateCastleUI();updateStatusUI();}
class IsoWarrior{
constructor(name,jobDef,power,offsetX,speed,gender,age,bloodlineId){
this.name=name;this.gender=gender||(Math.random()<.7?'male':'female');
const blId=(bloodlineId!=null&&bloodlineId>=0)?bloodlineId:Math.floor(Math.random()*BLOODLINES.length);
this.bloodlineId=blId;this.bloodline=BLOODLINES[blId];
const jd=jobDef||generateJob(this.gender);this.jobId=jd.id;this.jobName=jd.name;this.jobIcon=jd.icon;
this.offsetX=offsetX||0;this.speed=speed||(2+Math.random()*3);this.age=age??25;
this.stats={power:clamp(power||rnd(20,45),1,99),wisdom:rnd(15,45),hp:100,maxHp:100};
this._loyalty=rnd(60,95);this._generation=1;this._parents=null;this._birthTurn=state.turn;
this.uid=Math.random().toString(36).slice(2,9);
this.isParent=false;this.isStaff=false;this.staffLevel=0;this.staffJob=null;this.useCount=0;this.level=1;
this.isoX=(Math.random()-.5)*4;this.isoY=(Math.random()-.5)*4;
this.dirX=Math.random()>.5?1:-1;this.dirY=Math.random()>.5?1:-1;
this._currentFacility=null;this._facilityTimer=0;this._facilityStayMax=0;this._moveTimer=rnd(60,180);
}
getEffectivePower(){let mod=getAgeModifier(this.age);if(this.bloodline?.bonus==='power')mod*=1.12;const lvMul=1+(this.level-1)*.08;const castleMul=castleLvData().powerBonus;return Math.floor(this.stats.power*mod*lvMul*castleMul);}
getEffectiveWisdom(){let mod=getAgeModifier(this.age);if(this.bloodline?.bonus==='wisdom')mod*=1.12;const lvMul=1+(this.level-1)*.06;return Math.floor(this.stats.wisdom*mod*lvMul);}
get loyalty(){return this._loyalty;}
isMature(){return this.age>=MATURE_AGE||(this.isParent&&!this.isStaff);}
locationLabel(){if(!this._currentFacility)return '巡回中';return FACILITY_MAP[this._currentFacility]?.name||'巡回中';}
tick(){if(this._currentFacility){this._facilityTimer++;if(this._facilityTimer>=this._facilityStayMax)this._leaveFacility();else if(this._facilityTimer%90===45)this._applyEffect(this._currentFacility,false);}else{this._moveTimer--;if(this._moveTimer<=0){this._tryEnterFacility();this._moveTimer=rnd(40,120);}this._walk();}}
_walk(){const spd=this.speed*.012;this.isoX+=this.dirX*spd;this.isoY+=this.dirY*spd;const b=3.5;if(this.isoX>b){this.isoX=b;this.dirX=-1;}if(this.isoX<-b){this.isoX=-b;this.dirX=1;}if(this.isoY>b){this.isoY=b;this.dirY=-1;}if(this.isoY<-b){this.isoY=-b;this.dirY=1;}if(Math.random()<.005)this.dirX*=-1;if(Math.random()<.005)this.dirY*=-1;}
_tryEnterFacility(){const hpPct=this.stats.hp/this.stats.maxHp;const cands=hpPct<.4?['tea','garden','tea']:Object.keys(FACILITY_MAP);const key=cands[Math.floor(Math.random()*cands.length)];const fp=FACILITY_POSITIONS.find(f=>f.key===key);if(!fp)return;this._currentFacility=key;this.isoX=fp.tx+(Math.random()-.5)*.4;this.isoY=fp.ty+(Math.random()-.5)*.4;this._facilityTimer=0;this._facilityStayMax=rnd(120,300);this._applyEffect(key,true);}
_leaveFacility(){this._currentFacility=null;this._facilityTimer=0;this.dirX=Math.random()>.5?1:-1;this.dirY=Math.random()>.5?1:-1;}
_applyEffect(key,isEntry){
const eff=FACILITY_EFFECT[key];if(!eff)return;
const[lo,hi]=eff.range;const base=isEntry?Math.floor(lo+Math.random()*(hi-lo)):Math.floor(1+Math.random()*2);
const gen=this._generation||1;const mul=this._parents?1+(gen-1)*.08:1;const gain=Math.floor(base*mul);
let hpChange=0;if(isEntry)hpChange=eff.costHp>0?Math.floor(eff.costHp*(.8+Math.random()*.4)):Math.floor(eff.costHp*(.7+Math.random()*.6));
if(eff.stat==='power')this.stats.power=clamp(this.stats.power+gain,1,99);
else if(eff.stat==='wisdom')this.stats.wisdom=clamp(this.stats.wisdom+gain,1,99);
else if(eff.stat==='hp')this.stats.hp=clamp(this.stats.hp+gain,1,this.stats.maxHp);
else if(eff.stat==='loyalty')this._loyalty=clamp(this._loyalty+gain,0,100);
this.stats.hp=clamp(this.stats.hp+hpChange,1,this.stats.maxHp);
if(isEntry&&gain>0){const text=eff.stat==='hp'?'体力 +'+gain:eff.label+'+'+gain+(hpChange<0?' 疲労'+hpChange:'');createFloatText(this,text,eff.color);showFacilityActivity(this,this.name+'が'+FACILITY_MAP[key].name+'を使用',eff.color);addLog(this.name+'が'+FACILITY_MAP[key].name+'（'+eff.label+'+'+gain+'）');addCastleExp(2);}
updatePartyRow();updateStatusUI();
}
}
function getWarriorScreenPos(w){const canvas=$('iso-canvas');if(!canvas)return{x:0,y:0};const rect=canvas.getBoundingClientRect();const cx=canvas.width/2,cy=canvas.height*.55,tileW=canvas.width*.22,tileH=tileW*.5;return{x:rect.left+cx+(w.isoX-w.isoY)*tileW*.5,y:rect.top+cy+(w.isoX+w.isoY)*tileH*.5};}
function createFloatText(w,text,color){const layer=$('bubble-layer');if(!layer)return;const pos=getWarriorScreenPos(w);const lr=layer.getBoundingClientRect();const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color||'#fff';el.style.left=(pos.x-lr.left)+'px';el.style.top=(pos.y-lr.top-20)+'px';layer.appendChild(el);setTimeout(()=>el.remove(),1900);}
function showFacilityActivity(w,text,color){const layer=$('bubble-layer');if(!layer)return;const pos=getWarriorScreenPos(w);const lr=layer.getBoundingClientRect();const el=document.createElement('div');el.className='facility-activity';el.textContent=text;el.style.color=color||'#ffdd88';el.style.left=(pos.x-lr.left)+'px';el.style.top=(pos.y-lr.top-40)+'px';layer.appendChild(el);setTimeout(()=>el.remove(),2800);}
let eventPopTimer=null;
function pickGrowthEvent(){const r=Math.random();const tier=r<EVENT_TIER_WEIGHTS.divine?'divine':r<EVENT_TIER_WEIGHTS.divine+EVENT_TIER_WEIGHTS.rare?'rare':'daily';const pool=GROWTH_EVENTS.filter(e=>e.tier===tier);return pool[Math.floor(Math.random()*pool.length)];}
function fireGrowthEvent(warrior){const ev=pickGrowthEvent();const result=ev.apply(warrior);const popup=$('event-popup');$('ev-badge').textContent=ev.icon+' '+ev.label;$('ev-badge').className='ev-badge '+ev.tier;$('ev-warrior').textContent=warrior.name+'（'+warrior.age+'歳）';$('ev-desc').textContent=ev.desc;$('ev-effect').textContent=result.text;$('ev-effect').style.color=result.color;popup.classList.add('show');if(ev.tier==='divine'){const f=$('divine-flash');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),600);addLog('【神イベント】'+warrior.name+'：'+ev.label+' → '+result.text);showToast('⚡ '+ev.label+'　'+warrior.name,4000);}else if(ev.tier==='rare')addLog('【レア】'+warrior.name+'：'+ev.label+' → '+result.text);else addLog(warrior.name+'：'+ev.label);addCastleExp(ev.tier==='divine'?20:ev.tier==='rare'?8:1);if(eventPopTimer)clearTimeout(eventPopTimer);eventPopTimer=setTimeout(()=>{popup.classList.remove('show');eventPopTimer=null;},ev.tier==='divine'?4500:ev.tier==='rare'?3000:1800);}
function updateStatusUI(){$('koku-val').textContent=Math.floor(state.koku).toLocaleString();const uni=Math.min(state.unification>=100?100:99.9,state.unification);$('uni-val').textContent=uni.toFixed(1);$('uni-bar').style.width=Math.min(uni,100)+'%';$('uni-pct').textContent=uni.toFixed(1)+'%';updateCastleUI();if(state.unification>=100)showToast('🎉 天下統一を達成せり！',5000);}
function updatePartyRow(){const row=$('party-row');if(!row)return;row.innerHTML='';gWarriors.forEach((w,i)=>{const hpPct=Math.round(w.stats.hp/w.stats.maxHp*100);const hpc=hpPct>60?'#88dd88':hpPct>30?'#ffaa44':'#ff6666';const mature=w.isMature();const card=document.createElement('div');card.className='party-card'+(i===0?' head':'')+(!mature?' growing':'');card.innerHTML='<span class="pc-role">'+(w.jobIcon||'')+(mature?'':' 育成中')+'</span><span class="pc-name">'+w.name+'</span><span class="pc-pow">武'+w.getEffectivePower()+'　'+w.age+'歳</span><span class="pc-bl" style="color:'+w.bloodline.color+'">'+w.bloodline.name+'</span><span class="pc-hp" style="color:'+hpc+'">体 '+hpPct+'%</span>';card.onclick=()=>showWarriorModal('child',i);row.appendChild(card);});gParents.forEach((w,i)=>{const hpPct=Math.round(w.stats.hp/w.stats.maxHp*100);const hpc=hpPct>60?'#88dd88':hpPct>30?'#ffaa44':'#ff6666';const card=document.createElement('div');card.className='party-card parent-card';card.innerHTML='<span class="pc-role">親　Lv.'+w.level+'</span><span class="pc-name">'+w.name+'</span><span class="pc-pow">武'+w.getEffectivePower()+'　知'+w.getEffectiveWisdom()+'</span><span class="pc-bl" style="color:'+w.bloodline.color+'">'+w.bloodline.name+'</span><span class="pc-hp" style="color:'+hpc+'">体 '+hpPct+'%</span>';card.onclick=()=>showWarriorModal('parent',i);row.appendChild(card);});updateStaffUI();}
function updateStaffUI(){const row=$('staff-row');if(!row)return;row.innerHTML='';if(gStaff.length===0){row.style.display='none';return;}row.style.display='flex';gStaff.forEach((s,i)=>{const card=document.createElement('div');card.className='staff-card';card.innerHTML='<span class="sc-label">家臣 '+(i+1)+'/'+MAX_STAFF+'</span><span class="sc-name">'+s.name+'</span><span class="sc-job">'+(s.staffJob||'教育係')+'</span><span class="sc-lv">教育Lv.'+s.staffLevel+'</span>';card.onclick=()=>showWarriorModal('staff',i);row.appendChild(card);});}
function enqueueRetire(w){if(!retireQueue.includes(w))retireQueue.push(w);if(!retireTarget)processRetireQueue();}
function processRetireQueue(){if(retireQueue.length===0){retireTarget=null;return;}showRetireModal(retireQueue.shift());}
function showRetireModal(w){retireTarget=w;$('retire-warrior-name').textContent=w.name;$('retire-staff-note').textContent='家臣団 '+gStaff.length+' / '+MAX_STAFF+' 名';$('retire-btn-staff').disabled=gStaff.length>=MAX_STAFF;$('retire-modal').classList.add('show');}
function chooseRetire(choice){const w=retireTarget;if(!w)return;$('retire-modal').classList.remove('show');retireTarget=null;gWarriors=gWarriors.filter(x=>x!==w);if(choice===1){w.isParent=true;w.isStaff=false;gParents.push(w);addLog(w.name+' が親として血脈を紡ぐ');showToast(w.name+' を親リストに迎えました',2500);}else{if(gStaff.length>=MAX_STAFF){w.isParent=true;w.isStaff=false;gParents.push(w);showToast('家臣団が満員のため親リストに移しました',2500);}else{w.isStaff=true;w.isParent=false;w.staffLevel=1;w.staffJob=Math.random()<.5?'武芸師範':'学問師範';gStaff.push(w);addLog(w.name+' が家臣団（'+w.staffJob+'）に就いた');showToast(w.name+' を家臣団に迎えました！',2500);}}updatePartyRow();setTimeout(processRetireQueue,400);}
function applyStaffEducation(){if(gStaff.length===0)return;gWarriors.forEach(w=>{if(w.age>=RETIRE_AGE)return;const nearby=gStaff.filter(s=>Math.hypot(s.isoX-w.isoX,s.isoY-w.isoY)<2.8);if(!nearby.length)return;const bonus=1+nearby.reduce((s,st)=>s+st.staffLevel*.05,0);if(Math.random()<.15){w.stats.power=clamp(w.stats.power+Math.floor(1*bonus),1,99);w.stats.wisdom=clamp(w.stats.wisdom+Math.floor(1*bonus),1,99);}});if(state.turn%100===0)gStaff.forEach(s=>{s.staffLevel=Math.min(20,s.staffLevel+1);});}
function showWarriorModal(type,idx){const w=type==='parent'?gParents[idx]:type==='staff'?gStaff[idx]:gWarriors[idx];if(!w)return;const hpPct=w.stats.hp/w.stats.maxHp*100;const hpc=hpPct>60?'#88dd88':hpPct>30?'#ffaa44':'#ff6666';$('wm-name-text').textContent=w.name;$('wm-role-text').textContent=(w.jobIcon||'')+' '+(w.jobName||'武将');$('wm-power').textContent=w.stats.power+'（実効:'+w.getEffectivePower()+'）';$('wm-wisdom').textContent=w.stats.wisdom+'（実効:'+w.getEffectiveWisdom()+'）';$('wm-hp').textContent=w.stats.hp+' / '+w.stats.maxHp;$('wm-loyalty').textContent=w._loyalty;$('wm-age').textContent=w.isStaff?'家臣団（'+(w.staffJob||'教育係')+'）':w.isParent?'引退（縁組専念）':w.age+'歳　'+(w.isMature()?'成人':'育成中');$('wm-bloodline').textContent=w.bloodline.name;$('wm-bloodline').style.color=w.bloodline.color;$('wm-job').textContent=w.isStaff?(w.staffJob||'教育係')+'　教育Lv.'+w.staffLevel:w.jobName;$('wm-location').textContent=w.locationLabel();$('wm-lineage').textContent=w._parents?w._parents.father+' × '+w._parents.mother+'の子':'初代';const lvRow=$('wm-level-row');if(w.isParent&&!w.isStaff){lvRow.style.display='flex';$('wm-level').textContent='Lv.'+w.level+'（縁組'+w.useCount+'回）';}else lvRow.style.display='none';const fill=$('wm-hp-fill');fill.style.width=hpPct+'%';fill.style.background=hpc;openModal('warrior-modal');}

function renderEngumiStep(){for(let i=0;i<3;i++)document.getElementById('sdot'+i).classList.toggle('active',i===engumiStep);const nb=$('engumi-next-btn'),cb=$('engumi-cancel-btn'),content=$('engumi-step-content');if(engumiStep===0){cb.textContent='取消';cb.onclick=()=>closeEngumi();}else{cb.textContent='← 戻る';cb.onclick=()=>{engumiStep--;renderEngumiStep();};}if(engumiStep===0){nb.textContent='次へ →';nb.disabled=engumiSelectedFather===null;const fathers=gParents.filter(p=>p.gender!=='female');if(!fathers.length){content.innerHTML='<div style="color:rgba(200,150,12,.6);text-align:center;padding:20px;font-size:12px;">父となれる親武将がいません。縁組で子を育ててください。</div>';nb.disabled=true;return;}let html='<div class="engumi-cost"><div class="ec-label">縁組費用</div><span class="ec-val">'+ENGUMI_COST.toLocaleString()+'</span><span class="ec-unit">石</span></div><div class="modal-section"><div class="modal-section-title">父となる武将を選べ</div><div class="warrior-select-grid">';fathers.forEach(w=>{const idx=gParents.indexOf(w);html+='<div class="warrior-sel-card '+(engumiSelectedFather===idx?'selected':'')+'" onclick="selectFather('+idx+')"><div class="wsc-name">'+w.name+'</div><div class="wsc-stats">武'+w.getEffectivePower()+'　知'+w.getEffectiveWisdom()+'</div><div class="wsc-bl" style="color:'+w.bloodline.color+'">'+w.bloodline.name+'</div><div class="wsc-lv">Lv.'+w.level+'　縁組'+w.useCount+'回</div></div>';});html+='</div></div>';content.innerHTML=html;}else if(engumiStep===1){nb.textContent='次へ →';nb.disabled=engumiSelectedMother===null;const mothers=gParents.filter((p,idx)=>idx!==engumiSelectedFather&&p.gender!=='male');if(!mothers.length){content.innerHTML='<div style="color:rgba(200,150,12,.6);text-align:center;padding:20px;font-size:12px;">母となれる親武将がいません</div>';nb.disabled=true;return;}let html='<div class="modal-section"><div class="modal-section-title">母となる武将を選べ</div><div class="warrior-select-grid">';mothers.forEach(w=>{const idx=gParents.indexOf(w);html+='<div class="warrior-sel-card '+(engumiSelectedMother===idx?'selected':'')+'" onclick="selectMother('+idx+')"><div class="wsc-name">'+w.name+'</div><div class="wsc-stats">武'+w.getEffectivePower()+'　知'+w.getEffectiveWisdom()+'</div><div class="wsc-bl" style="color:'+w.bloodline.color+'">'+w.bloodline.name+'</div><div class="wsc-lv">Lv.'+w.level+'　縁組'+w.useCount+'回</div></div>';});html+='</div></div>';content.innerHTML=html;}else{nb.textContent='成立させる';nb.disabled=false;const f=gParents[engumiSelectedFather],m=gParents[engumiSelectedMother];const cs=createChildStats(f,m);const childBL=Math.random()<.6?f.bloodlineId:m.bloodlineId;content.innerHTML='<div class="modal-section"><div class="modal-section-title">縁組の確認</div><div class="confirm-panel"><div class="confirm-pair"><div class="confirm-w"><div class="cw-name">'+f.name+'</div><div class="cw-role" style="color:'+f.bloodline.color+'">'+f.bloodline.name+'</div></div><div class="confirm-heart">❤</div><div class="confirm-w"><div class="cw-name">'+m.name+'</div><div class="cw-role" style="color:'+m.bloodline.color+'">'+m.bloodline.name+'</div></div></div><div class="child-preview"><div class="cp-title">誕生する子の予測値</div><div class="cp-stat"><span>武力</span><span class="cpv">〜'+cs.power+'</span></div><div class="cp-stat"><span>知力</span><span class="cpv">〜'+cs.wisdom+'</span></div><div class="cp-stat"><span>体力</span><span class="cpv">〜'+cs.maxHp+'</span></div><div class="cp-stat"><span>継承血統</span><span class="cpv" style="color:'+BLOODLINES[childBL].color+'">'+BLOODLINES[childBL].name+'</span></div></div></div><div style="margin-top:12px;font-size:11px;color:rgba(200,150,12,.6);text-align:center;letter-spacing:.2em;">費用 '+ENGUMI_COST.toLocaleString()+' 石を消費します</div></div>';}}
function createChildStats(f,m){const p=clamp(Math.round(f.stats.power*.65+m.stats.power*.45)+rnd(5,12),10,98);const w=clamp(Math.round(f.stats.wisdom*.45+m.stats.wisdom*.65)+rnd(8,14),10,98);const maxHp=clamp(Math.round((f.stats.maxHp+m.stats.maxHp)/1.8)+rnd(10,20),100,200);return{power:p,wisdom:w,hp:maxHp,maxHp};}
function selectFather(idx){engumiSelectedFather=idx;if(engumiSelectedMother===idx)engumiSelectedMother=null;renderEngumiStep();}
function selectMother(idx){if(idx===engumiSelectedFather){showToast('父と同じ武将は選べません');return;}engumiSelectedMother=idx;renderEngumiStep();}
function engumiNext(){if(engumiStep===0){if(engumiSelectedFather===null){showToast('父を選んでください');return;}engumiStep=1;renderEngumiStep();}else if(engumiStep===1){if(engumiSelectedMother===null){showToast('母を選んでください');return;}engumiStep=2;renderEngumiStep();}else doEngumi();}
function doEngumi(){if(state.koku<ENGUMI_COST){showToast('石高が足りません（必要：'+ENGUMI_COST+'石）');return;}if(engumiSelectedFather===null||engumiSelectedMother===null){showToast('父母を選択してください');return;}const f=gParents[engumiSelectedFather],m=gParents[engumiSelectedMother];const cs=createChildStats(f,m);state.koku-=ENGUMI_COST;state.generation++;f.useCount++;m.useCount++;if(f.useCount%3===0)f.level=Math.min(9,f.level+1);if(m.useCount%3===0)m.level=Math.min(9,m.level+1);const childBLId=Math.random()<.6?f.bloodlineId:m.bloodlineId;const gender=Math.random()<.5?'male':'female';const jobDef=generateJob(gender);const childName=randName(gender);const child=new IsoWarrior(childName,jobDef,cs.power,(Math.random()-.5)*2,2.5+Math.random()*2,gender,0,childBLId);child.stats.wisdom=cs.wisdom;child.stats.hp=cs.hp;child.stats.maxHp=cs.maxHp;child._generation=Math.max(f._generation,m._generation)+1;child._parents={father:f.name,mother:m.name};gWarriors.push(child);state.pedigree.push({childName,father:f.name,mother:m.name,power:cs.power,wisdom:cs.wisdom,generation:child._generation,bloodlineId:childBLId,jobName:jobDef.name,jobIcon:jobDef.icon});addLog('縁組成立：'+f.name+' × '+m.name+' → '+childName+'（'+child.bloodline.name+'・0歳）');addCastleExp(30);closeEngumi();$('suc-name').textContent=childName;$('suc-stats').innerHTML=child.bloodline.name+'　'+jobDef.icon+jobDef.name+'<br>武力 '+cs.power+'　知力 '+cs.wisdom+'　体力 '+cs.maxHp+'<br>第'+child._generation+'世代　0歳<br>'+f.name+' × '+m.name+'の子';openModal('success-overlay');updateStatusUI();updatePartyRow();}

function playerProvinceCount(){return PROVINCES.filter(p=>p.clan==='player').length;}
function drawStrategicMap(){
const canvas=$('strategic-map');if(!canvas)return;
const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
ctx.clearRect(0,0,W,H);ctx.fillStyle='#060e04';ctx.fillRect(0,0,W,H);
ctx.strokeStyle='rgba(200,150,12,.04)';ctx.lineWidth=1;
for(let x=0;x<W;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
PROVINCES.forEach(p=>{p.adj.forEach(adjId=>{if(adjId<=p.id)return;const q=PROVINCES.find(x=>x.id===adjId);if(!q)return;ctx.strokeStyle='rgba(200,150,12,.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();});});
PROVINCES.forEach(p=>{
const isPlayer=p.clan==='player',isSel=selectedProvince&&selectedProvince.id===p.id;
const color=CLAN_COLORS[p.clan]||'#444';const r=17;
ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(p.x+2,p.y+2,r+2,r*.55+2,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle=color;ctx.strokeStyle=isSel?'#ffee44':isPlayer?'#ffc800':'rgba(255,255,255,.18)';ctx.lineWidth=isSel?3:isPlayer?2:1;
ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
if(isSel){ctx.save();ctx.shadowColor='#ffee44';ctx.shadowBlur=16;ctx.strokeStyle='#ffee44';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.stroke();ctx.restore();}
if(isPlayer){ctx.save();ctx.shadowColor='#ffc800';ctx.shadowBlur=8;ctx.strokeStyle='#ffc800';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2);ctx.stroke();ctx.restore();}
ctx.fillStyle=isPlayer?'#ffee88':'#f0e8c8';ctx.font='bold 9px DotGothic16,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.name,p.x,p.y);
ctx.fillStyle='rgba(245,228,180,.5)';ctx.font='7px sans-serif';ctx.fillText(p.strength,p.x,p.y+r+8);
});
ctx.fillStyle='rgba(200,150,12,.7)';ctx.font='9px DotGothic16,monospace';ctx.textAlign='left';ctx.textBaseline='top';
ctx.fillText('🟡 自領地　支配:'+playerProvinceCount()+'/'+PROVINCES.length+'国',6,H-16);
}
function openMap(){
selectedProvince=null;$('map-province-info').textContent='国をタップして侵攻先を選択';$('invade-btn').style.display='none';
openModal('map-modal');
setTimeout(()=>{
const canvas=$('strategic-map');if(!canvas)return;
const body=canvas.parentElement;if(body){canvas.width=body.clientWidth-20||320;canvas.height=Math.max(350,body.clientHeight-56);}
drawStrategicMap();
canvas.onclick=e=>{
const rect=canvas.getBoundingClientRect();
const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
const mx=(e.clientX-rect.left)*sx,my=(e.clientY-rect.top)*sy;
const hit=PROVINCES.find(p=>Math.hypot(p.x-mx,p.y-my)<21);
if(!hit)return;
if(hit.clan==='player'){
selectedProvince=null;$('invade-btn').style.display='none';
$('map-province-info').innerHTML='<span style="color:var(--gold)">【自領地】'+hit.name+'　勢力: '+hit.strength+'</span>';
}else{
const playerIds=PROVINCES.filter(p=>p.clan==='player').map(p=>p.id);
const isAdj=hit.adj.some(id=>playerIds.includes(id));
selectedProvince=hit;
if(isAdj){$('map-province-info').innerHTML='<span style="color:#ffdd44">侵攻先: '+hit.name+'　勢力 '+hit.strength+'</span>';$('invade-btn').style.display='block';}
else{$('map-province-info').innerHTML='<span style="color:#ff8888">'+hit.name+'（隣接していないため侵攻不可）</span>';$('invade-btn').style.display='none';}
}
drawStrategicMap();
};
},120);
}

function bFindFoe(s){const foes=bSoldiers.filter(t=>t.side!==s.side&&!t.dead);return foes.length?bNearest(foes,s.x,s.y):null;}
function bEl(id,cls){if(!bField)return document.createElement('div');let el=$('bu-'+id);if(!el){el=document.createElement('div');el.id='bu-'+id;el.className=cls;bField.appendChild(el);}return el;}
function bRender(u){const isGen=u.type==='general';const pal=u.side==='p'?PAL_A:PAL_E;const frame=(bTickCount>>3)&1;const cls='dot-unit'+(u.dead?' du-die':'')+(u.state==='hit'?' du-hit':'')+(u.state==='walk'&&!u.dead?' du-walk':'')+(u.awaken?' du-awaken':'');const el=bEl(u.id,cls);const _hash=frame+'|'+u.state+'|'+u.dead;if(el.className!==cls)el.className=cls;if(el._sh!==_hash){el._sh=_hash;el.style.boxShadow=isGen?makeGeneralShadow(pal,frame,u.state):makeSoldierShadow(pal,frame,u.state);}el.style.left=Math.round(u.x)+'px';el.style.top=Math.round(u.y)+'px';if(u.dead&&u._deadAt&&Date.now()-u._deadAt>700)el.style.display='none';if(isGen){const lel=bEl('lbl-'+u.id,'gen-label');lel.textContent=u.name;lel.style.left=(u.x+12)+'px';lel.style.top=(u.y-15)+'px';lel.style.display=u.dead?'none':'block';}const hbg=bEl('hpbg-'+u.id,'unit-hpbar');if(!u.dead){const bw=isGen?27:24;hbg.style.display='';hbg.style.width=bw+'px';hbg.style.left=(u.x-bw/2+(isGen?12.5:12))+'px';hbg.style.top=(u.y-9)+'px';let hfill=document.getElementById('bu-hpf-'+u.id);if(!hfill){hfill=document.createElement('div');hfill.className='unit-hpfill';hfill.id='bu-hpf-'+u.id;hbg.appendChild(hfill);}const pct=Math.max(0,u.hp/u.maxHp*100);hfill.style.width=pct+'%';hfill.style.background=pct>60?'#44ff88':pct>30?'#ffcc44':'#ff4444';}else hbg.style.display='none';}
function bAddDmg(x,y,val,color){const el=document.createElement('div');el.className='dmg-num';el.textContent=(val>0?'-':val<0?'+':'')+Math.abs(val);el.style.color=color||'#ffee40';el.style.left=x+'px';el.style.top=y+'px';bField.appendChild(el);setTimeout(()=>el.remove(),1050);}

function bAddBubble(side,text){const g=bGenerals[side];if(!g||g.dead)return;const old=document.getElementById('bu-bbl-'+side);if(old)old.remove();const el=document.createElement('div');el.id='bu-bbl-'+side;el.className='dot-bubble'+(side==='e'?' ene':'');el.textContent=text;el.style.left=(g.x+15)+'px';el.style.top=(g.y-32)+'px';bField.appendChild(el);setTimeout(()=>{if(el.parentNode)el.remove();},1900);}

function bUpdateUI(){if(!bGenerals)return;const ph=Math.max(0,bGenerals.p.hp),eh=Math.max(0,bGenerals.e.hp);$('bhp-player').textContent=ph;$('bhp-enemy').textContent=eh;$('bbar-player').style.width=Math.min(100,(ph/bGenMaxHp.p*100)).toFixed(1)+'%';$('bbar-enemy').style.width=Math.min(100,(eh/bGenMaxHp.e*100)).toFixed(1)+'%';$('bskill-bar-p').style.width=(bSkillGauge.p/B_SKILL_MAX*100)+'%';$('bskill-bar-e').style.width=(bSkillGauge.e/B_SKILL_MAX*100)+'%';$('bskill-btn-p').disabled=bSkillGauge.p<B_SKILL_MAX||bGameState==='end';}
function fireSkill(side){if(!bGenerals||bSkillGauge[side]<B_SKILL_MAX||bGameState==='end')return;bSkillGauge[side]=0;const sk=SKILLS[side][Math.floor(Math.random()*SKILLS[side].length)];const g=bGenerals['p'];bAddBubble('p','【'+sk.name+'】');bAddSkillFlash(g.x+15,g.y+15,sk.color,90);bAddSkillText(g.x+15,g.y-20,'【'+sk.name+'】',sk.color);bForceLog('必殺技【'+sk.name+'】発動！',B_LOG_HOLD*2);if(sk.name==='士気高揚'){bSoldiers.filter(s=>s.side==='p'&&!s.dead).forEach(s=>{s.hp=Math.min(s.maxHp,s.hp+15);});bGenerals.p.hp=Math.min(bGenMaxHp.p,bGenerals.p.hp+Math.floor(bGenMaxHp.p*.15));bAddDmg(g.x+15,g.y-10,-(Math.floor(bGenMaxHp.p*.15)),'#44ff88');addLog('必殺技【'+sk.name+'】：味方HP回復！');}else if(sk.aoe){const dmg=Math.floor((bGenMaxHp.p*.08+rnd(5,15))*sk.dmg);bSoldiers.filter(s=>s.side==='e'&&!s.dead).forEach(s=>{s.hp-=dmg;s.state='hit';s.stateTimer=14;if(s.hp<=0){s.dead=true;s._deadAt=Date.now();}});bGenerals.e.hp-=Math.floor(dmg*.5);bGenerals.e.state='hit';bGenerals.e.stateTimer=20;bAddSkillFlash(bFW()/2,bFH()/2,sk.color,180);bAddDmg(bFW()/2,bFH()/3,dmg,sk.color);addLog('必殺技【'+sk.name+'】：全敵に'+dmg+'ダメージ！');}else{const dmg=Math.floor((bGenMaxHp.p*.2+rnd(10,25))*sk.dmg);bGenerals.e.hp-=dmg;bGenerals.e.state='hit';bGenerals.e.stateTimer=30;bAddSkillFlash(bGenerals.e.x+18,bGenerals.e.y+15,sk.color,80);bAddDmg(bGenerals.e.x+18,bGenerals.e.y-15,dmg,sk.color);addLog('必殺技【'+sk.name+'】：敵将に'+dmg+'の大ダメージ！');}}
function bEnemySkillAI(){if(bSkillGauge.e<B_SKILL_MAX)return;bSkillGauge.e=0;const sk=SKILLS.e[Math.floor(Math.random()*SKILLS.e.length)];bAddBubble('e','【'+sk.name+'】');bAddSkillFlash(bGenerals.e.x+18,bGenerals.e.y+15,sk.color,80);bForceLog('敵の必殺技【'+sk.name+'】！',B_LOG_HOLD*2);if(sk.aoe){const dmg=Math.floor((bGenMaxHp.e*.07+rnd(4,12))*sk.dmg);bSoldiers.filter(s=>s.side==='p'&&!s.dead).forEach(s=>{s.hp-=dmg;s.state='hit';s.stateTimer=12;if(s.hp<=0){s.dead=true;s._deadAt=Date.now();}});bGenerals.p.hp-=Math.floor(dmg*.4);bGenerals.p.state='hit';bGenerals.p.stateTimer=16;bAddSkillFlash(bFW()/3,bFH()/2,sk.color,140);}else{const dmg=Math.floor((bGenMaxHp.e*.18+rnd(8,20))*sk.dmg);bGenerals.p.hp-=dmg;bGenerals.p.state='hit';bGenerals.p.stateTimer=28;bAddDmg(bGenerals.p.x+15,bGenerals.p.y-15,dmg,'#ff4444');}}
function bUpdateSoldiers(){bSoldiers.forEach(s=>{if(s.dead)return;if(s.stateTimer>0){s.stateTimer--;return;}s.target=s.target&&!s.target.dead?s.target:bFindFoe(s);const yMin=bYMin(),yMax=bYMax();if(!s.target){const gen=bGenerals[s.side==='p'?'e':'p'];if(gen.dead)return;const dx=gen.x+12-s.x,dy=gen.y+15-s.y,dist=Math.hypot(dx,dy)||1;if(dist<24){s.state='attack';s.stateTimer=22;const dmg=rnd(2,4);gen.hp-=dmg;gen.state='hit';gen.stateTimer=12;bAddDmg(gen.x+PX*2,gen.y-8,dmg,'#ff5050');bSetLog((s.side==='p'?'我が軍':'敵軍')+'が大将に'+dmg+'撃！');bSkillGauge.p=Math.min(B_SKILL_MAX,bSkillGauge.p+(s.side==='p'?3:0));bSkillGauge.e=Math.min(B_SKILL_MAX,bSkillGauge.e+(s.side==='e'?3:0));}else{s.state='walk';s.x+=dx/dist*1.4;s.y+=dy/dist*1.4;s.y=Math.max(yMin,Math.min(yMax,s.y));}return;}const t=s.target,dx=t.x-s.x,dy=t.y-s.y,dist=Math.hypot(dx,dy)||1;if(dist<21){s.state='attack';s.stateTimer=16;const dmg=rnd(3,6);t.hp-=dmg;t.state='hit';t.stateTimer=10;bAddDmg(t.x+PX,t.y-8,dmg);bSkillGauge.p=Math.min(B_SKILL_MAX,bSkillGauge.p+(s.side==='p'?5:2));bSkillGauge.e=Math.min(B_SKILL_MAX,bSkillGauge.e+(s.side==='e'?5:2));if(t.hp<=0){t.dead=true;t._deadAt=Date.now();bSetLog((s.side==='p'?'敵軍':'我が軍')+'の兵士が倒れた！');}}else{s.state='walk';s.x+=dx/dist*1.1;s.y+=dy/dist*1.1;s.y=Math.max(yMin,Math.min(yMax,s.y));}});}
function bUpdateGenerals(){['p','e'].forEach(side=>{const g=bGenerals[side],foe=bGenerals[side==='p'?'e':'p'];if(g.dead)return;if(g.stateTimer>0){g.stateTimer--;return;}g.state='charge';const yMin=bYMin()-14,yMax=bYMax()+14;if(bTickCount%(side==='p'?160:180)===(side==='p'?0:80))bAddBubble(side,(side==='p'?B_LINES_P:B_LINES_E)[Math.floor(Math.random()*5)]);const foeTroops=bSoldiers.filter(s=>s.side!==side&&!s.dead);const tgt=foeTroops.length?bNearest(foeTroops,g.x,g.y):null;const atk=30;if(tgt){const dx=tgt.x-g.x,dy=tgt.y-g.y,dist=Math.hypot(dx,dy)||1;if(dist<atk){g.state='attack';g.stateTimer=18;const dmg=rnd(9,15);tgt.hp-=dmg;tgt.state='hit';tgt.stateTimer=12;bAddDmg(tgt.x,tgt.y-10,dmg,'#ffdd20');bSkillGauge[side]=Math.min(B_SKILL_MAX,bSkillGauge[side]+8);if(tgt.hp<=0){tgt.dead=true;tgt._deadAt=Date.now();bSetLog('大将が敵兵を薙ぎ払った！');}}else{g.x+=dx/dist*1.9;g.y+=dy/dist*1.9;g.y=Math.max(yMin,Math.min(yMax,g.y));}}else{const dx=foe.x-g.x,dy=foe.y-g.y,dist=Math.hypot(dx,dy)||1;if(dist<36){g.state='attack';g.stateTimer=28;const dmg=rnd(14,22);foe.hp-=dmg;foe.state='hit';foe.stateTimer=24;bAddDmg(foe.x+PX,foe.y-14,dmg,'#ff4020');bAddBubble(side,B_DUEL[Math.floor(Math.random()*B_DUEL.length)]);bSkillGauge[side]=Math.min(B_SKILL_MAX,bSkillGauge[side]+12);bForceLog('大将同士の一騎討ち！ '+dmg+'ダメージ！',B_LOG_HOLD*2);}else{g.x+=dx/dist*1.9;g.y+=dy/dist*1.9;g.y=Math.max(yMin,Math.min(yMax,g.y));}}});}
function bEndBattle(isWin){
const castleBonus=castleLvData().kokuBonus;
let extraMsg='';
if(isWin){
let reward=Math.floor(rnd(1800,2400)*castleBonus),uniGain=4+Math.random()*3;
if(currentEnemy&&currentEnemy.province){
const p=currentEnemy.province;p.clan='player';
uniGain=8+Math.random()*4;reward+=rnd(800,1400);
extraMsg='\n【'+p.name+'】を平定！';
addLog('【天下図】'+p.name+'を制圧');showToast('🎉 '+p.name+' を平定！',4000);
}
state.koku+=reward;state.unification=Math.min(100,state.unification+uniGain);
bActiveWarriors.forEach(w=>{w.stats.power=clamp(w.stats.power+rnd(3,7),1,99);w.stats.hp=Math.min(w.stats.maxHp,w.stats.hp+rnd(8,15));});
$('bres-title-text').textContent='勝利！';$('bres-detail-text').textContent='石高 +'+reward.toLocaleString()+'\n統一度 +'+uniGain.toFixed(1)+'%'+extraMsg;
addLog('合戦勝利（報酬'+reward+'石）');addCastleExp(50);
}else{
const loss=rnd(400,700);state.koku=Math.max(0,state.koku-loss);
bActiveWarriors.forEach(w=>{w.stats.hp=Math.max(1,w.stats.hp-rnd(15,25));});
$('bres-title-text').textContent='敗北…';$('bres-detail-text').textContent='石高 -'+loss.toLocaleString()+'\n武将が負傷した';
addLog('合戦敗北（損失'+loss+'石）');addCastleExp(10);
}
currentEnemy=null;
$('battle-result-panel').classList.add('show');updateStatusUI();updatePartyRow();
}
function bGameLoop(){bTickCount++;if(bGameState==='battle'&&bGenerals&&bSoldiers){bUpdateSoldiers();bUpdateGenerals();bTickLog();bUpdateBubblePos();if(bTickCount%60===0)bEnemySkillAI();bSoldiers.forEach(s=>bRender(s));bRender(bGenerals.p);bRender(bGenerals.e);bUpdateUI();if(bGenerals.p.hp<=0||bGenerals.e.hp<=0){bGameState='end';bEndBattle(bGenerals.p.hp>0);}}if(bGameState!=='end')bLoopId=requestAnimationFrame(bGameLoop);}
function launchBattle(warriors){
if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
bActiveWarriors=warriors;
$('battle-screen').classList.add('show');$('battle-result-panel').classList.remove('show');$('battle-log-bar').textContent='両軍、突撃開始！';
bField=$('dot-field');bField.innerHTML='';bSkillGauge={p:0,e:0};
const fw=bFW(),yMin=bYMin(),yMax=bYMax();
const leader=warriors[0];
$('bunit-pname').textContent=leader?leader.name.slice(-3):'我が軍';
$('bunit-ename').textContent=currentEnemy?currentEnemy.name:'敵　軍';
const playerPower=clamp(Math.round(warriors.reduce((s,w)=>s+w.getEffectivePower()+w.getEffectiveWisdom(),0)/warriors.length),60,160);

function drawFacilityDot(ctx,x,y,key,tick){const s=HPX*1.5;const t=(tick>>3)&3;ctx.save();ctx.imageSmoothingEnabled=false;const dp=(px,py,c,sz)=>{ctx.fillStyle=c;ctx.fillRect(Math.round(x+px*(sz||s)),Math.round(y+py*(sz||s)),(sz||s),(sz||s));};if(key==='training'){const c='#cc8800',d='#664400',l='#ffcc44';[[2,0,c],[3,0,c],[2,1,c],[3,1,c],[1,2,d],[2,2,d],[3,2,d],[4,2,d],[2,3,d],[3,3,d],[2,4,d],[3,4,d],[1,5,d],[4,5,d],[5,1,l],[6,0,l],[7,-1,l],[6,2,l]].forEach(([px,py,cl])=>dp(px,py,cl));}else if(key==='forge'){const c='#aa6600',f=t<2?'#ff6600':'#ff8800',g='#ffcc00';[[1,2,c],[2,2,c],[3,2,c],[4,2,c],[1,3,c],[4,3,c],[1,4,c],[2,4,c],[3,4,c],[4,4,c],[2,3,g],[3,3,g],[2,1,f],[3,0,f],[3,1,f]].forEach(([px,py,cl])=>dp(px,py,cl));}else if(key==='academy'){const c='#4488cc',p='#f5e8c8',r='#cc4444';[[1,1,c],[2,1,c],[3,1,c],[4,1,c],[5,1,c],[1,2,c],[5,2,c],[1,3,p],[2,3,p],[3,3,r],[4,3,p],[5,3,c],[1,4,p],[2,4,p],[3,4,p],[4,4,p],[5,4,c],[1,5,c],[2,5,c],[3,5,c],[4,5,c],[5,5,c]].forEach(([px,py,cl])=>dp(px,py,cl));}else if(key==='tea'){const c='#88cc88',b='#4a3010',w='#e8d090';[[2,1,b],[3,1,b],[4,1,b],[1,2,b],[2,2,w],[3,2,w],[4,2,w],[5,2,b],[1,3,b],[2,3,w],[3,3,c],[4,3,w],[5,3,b],[2,4,b],[3,4,b],[4,4,b],[2,5,b],[3,5,b],[4,5,b],[1,6,b],[2,6,b],[3,6,b],[4,6,b],[5,6,b]].forEach(([px,py,cl])=>dp(px,py,cl));}else if(key==='garden'){const p=t<2?'#ff99cc':'#ffaadd',g='#228833',k='#5a3010';[[3,0,p],[2,1,p],[3,1,p],[4,1,p],[1,2,p],[2,2,p],[3,2,p],[4,2,p],[5,2,p],[2,3,p],[3,3,p],[4,3,p],[3,4,k],[3,5,g],[3,6,g],[2,6,g],[4,6,g]].forEach(([px,py,cl])=>dp(px,py,cl));}else if(key==='loyalty'){const c='#ccaa44',r=t<2?'#ff6600':'#ff4400',w='#f5e8c8';[[2,0,c],[3,0,c],[4,0,c],[1,1,c],[5,1,c],[1,2,r],[2,2,r],[3,2,r],[4,2,r],[5,2,r],[1,3,w],[2,3,r],[3,3,r],[4,3,r],[5,3,w],[1,4,c],[2,4,c],[3,4,c],[4,4,c],[5,4,c],[2,5,c],[3,5,c],[4,5,c],[2,6,c],[4,6,c],[3,7,c]].forEach(([px,py,cl])=>dp(px,py,cl));}const fm=FACILITY_MAP[key];if(fm){ctx.font='bold 7px monospace';ctx.fillStyle='rgba(0,0,0,0.7)';ctx.textAlign='center';ctx.fillText(fm.name,x+s*3.5+1,y+s*9.5+1);ctx.fillStyle=fm.color;ctx.fillText(fm.name,x+s*3.5,y+s*9.5);}ctx.restore();}
function drawCastleDot(ctx,cx,cy,lv,tick){const s=HPX*1.8;const t=(tick>>4)&1;ctx.save();ctx.imageSmoothingEnabled=false;const dp=(px,py,c)=>{ctx.fillStyle=c;ctx.fillRect(Math.round(cx+px*s-s*6),Math.round(cy+py*s-s*14),s,s);};const W='#8a7a60',D='#5a4a38',R='#c8a020',T='#4a6888',F='#cc3333';for(let i=0;i<12;i++){dp(i,10,W);dp(i,11,D);}for(let i=1;i<11;i++){dp(i,8,W);dp(i,9,W);}for(let i=3;i<9;i++){dp(i,6,W);dp(i,7,W);}if(lv>=2){for(let i=4;i<8;i++){dp(i,3,T);dp(i,4,T);dp(i,5,T);}dp(4,2,T);dp(5,2,T);dp(6,2,T);dp(7,2,T);}if(lv>=3){for(let i=5;i<7;i++){dp(i,0,T);dp(i,1,T);}dp(5,-1,R);dp(6,-1,R);}if(lv>=4){dp(5,-2,F);dp(6,-2,F);dp(5,-3,F);dp(6,-3,F);}if(lv>=5){for(let i=4;i<8;i++)dp(i,-4,t?'#ffdd00':'#ff8800');dp(5,-5,'#ffff88');dp(6,-5,'#ffff88');}dp(2,5,D);dp(2,6,D);dp(2,7,D);dp(3,5,F);dp(4,5,F);dp(3,6,F);dp(9,5,D);dp(9,6,D);dp(9,7,D);dp(8,5,'#1840b8');dp(7,5,'#1840b8');dp(8,6,'#1840b8');dp(5,9,D);dp(6,9,D);dp(5,10,D);dp(6,10,D);dp(0,7,t?'#ff6600':'#ff8800');dp(11,7,t?'#ff6600':'#ff8800');ctx.restore();}
let _homeTick=0;
function getHomeDotEl(id,cls){const layer=$('bubble-layer');if(!layer)return document.createElement('div');let el=document.getElementById('hd-'+id);if(!el){el=document.createElement('div');el.id='hd-'+id;el.className=cls;el.style.position='absolute';el.style.width='1px';el.style.height='1px';el.style.imageRendering='pixelated';layer.appendChild(el);}return el;}
function renderHomeDotWarrior(w,sx,sy,tick,isStaff){const id='w-'+w.uid;const frame=(tick>>3)&1;const el=getHomeDotEl(id,'');el.style.left=Math.round(sx)+'px';el.style.top=Math.round(sy)+'px';const ns=makeHomeWarriorDot(w,frame,isStaff);if(el._sh!==ns){el._sh=ns;el.style.boxShadow=ns;}const hpId='hp-'+w.uid;let hpEl=document.getElementById('hd-'+hpId);if(!hpEl){hpEl=document.createElement('div');hpEl.id='hd-'+hpId;hpEl.style.position='absolute';hpEl.style.height='2px';hpEl.style.background='#111';hpEl.style.border='1px solid #333';const fill=document.createElement('div');fill.style.height='100%';hpEl.appendChild(fill);$('bubble-layer').appendChild(hpEl);}const bw=HPX*10;hpEl.style.width=bw+'px';hpEl.style.left=Math.round(sx-bw/2+HPX*4)+'px';hpEl.style.top=Math.round(sy+HPX*10+2)+'px';const hpPct=w.stats.hp/w.stats.maxHp;const fill=hpEl.firstChild;fill.style.width=(hpPct*100)+'%';fill.style.background=hpPct>.6?'#44ff88':hpPct>.3?'#ffaa44':'#ff4444';const nmId='nm-'+w.uid;let nmEl=document.getElementById('hd-'+nmId);if(!nmEl){nmEl=document.createElement('div');nmEl.id='hd-'+nmId;nmEl.style.position='absolute';nmEl.style.fontFamily="'DotGothic16',monospace";nmEl.style.fontSize='7px';nmEl.style.textAlign='center';nmEl.style.whiteSpace='nowrap';nmEl.style.textShadow='1px 1px 0 #000';nmEl.style.pointerEvents='none';$('bubble-layer').appendChild(nmEl);}nmEl.textContent=w.name;nmEl.style.color=w.bloodline.color;nmEl.style.left=Math.round(sx+HPX*3.5)+'px';nmEl.style.top=Math.round(sy+HPX*10+7)+'px';nmEl.style.transform='translateX(-50%)';const bdId='bd-'+w.uid;let bdEl=document.getElementById('hd-'+bdId);if(!bdEl){bdEl=document.createElement('div');bdEl.id='hd-'+bdId;bdEl.style.position='absolute';bdEl.style.fontSize='6px';bdEl.style.padding='1px 3px';bdEl.style.borderRadius='3px';bdEl.style.fontFamily='monospace';$('bubble-layer').appendChild(bdEl);}if(isStaff){bdEl.textContent='家臣';bdEl.style.background='rgba(0,180,80,0.8)';bdEl.style.color='#e0ffee';bdEl.style.display='block';}else if(w.age<RETIRE_AGE){bdEl.textContent=w.age+'歳';bdEl.style.background='rgba(100,200,100,0.7)';bdEl.style.color='#0a2008';bdEl.style.display='block';}else bdEl.style.display='none';bdEl.style.left=Math.round(sx+HPX*7)+'px';bdEl.style.top=Math.round(sy-HPX*2)+'px';}
function cleanupHomeDotEls(activeIds){const layer=$('bubble-layer');if(!layer)return;Array.from(layer.children).forEach(el=>{if(el.id&&el.id.startsWith('hd-')&&!activeIds.has(el.id))el.remove();});}
function initIsoCanvas(){
const canvas=$('iso-canvas'),field=$('iso-field');if(!canvas||!field)return;
function resize(){canvas.width=field.clientWidth||window.innerWidth;canvas.height=field.clientHeight||Math.floor(window.innerHeight*.5);}
resize();window.addEventListener('resize',resize);
const ctx=canvas.getContext('2d');
function isoToScreen(ix,iy){const cx=canvas.width/2,cy=canvas.height*.48,tw=canvas.width*.22,th=tw*.5;return{x:cx+(ix-iy)*tw*.5,y:cy+(ix+iy)*th*.5};}
function drawTile(ix,iy,top,left,right){const tw=canvas.width*.22,th=tw*.5,depth=tw*.32;const{x,y}=isoToScreen(ix,iy);ctx.fillStyle=top;ctx.beginPath();ctx.moveTo(x,y-th/2);ctx.lineTo(x+tw/2,y);ctx.lineTo(x,y+th/2);ctx.lineTo(x-tw/2,y);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,200,0.04)';ctx.lineWidth=0.5;ctx.stroke();ctx.fillStyle=left;ctx.beginPath();ctx.moveTo(x-tw/2,y);ctx.lineTo(x,y+th/2);ctx.lineTo(x,y+th/2+depth);ctx.lineTo(x-tw/2,y+depth);ctx.closePath();ctx.fill();ctx.fillStyle=right;ctx.beginPath();ctx.moveTo(x,y+th/2);ctx.lineTo(x+tw/2,y);ctx.lineTo(x+tw/2,y+depth);ctx.lineTo(x,y+th/2+depth);ctx.closePath();ctx.fill();}
function drawFacilityOnCanvas(fp){const{x,y}=isoToScreen(fp.tx,fp.ty);const s=HPX*1.5;drawFacilityDot(ctx,Math.round(x-s*3.5),Math.round(y-s*5),fp.key,_homeTick);}
let lastTime=0;
function loop(ts){const dt=ts-lastTime;if(dt>50){lastTime=ts;_homeTick++;ctx.clearRect(0,0,canvas.width,canvas.height);for(let iy=-2;iy<=3;iy++){for(let ix=-2;ix<=2;ix++){const isPath=ix===0||iy===0,isCenter=ix===0&&iy===0;drawTile(ix,iy,isCenter?'rgba(160,120,60,.55)':isPath?'rgba(130,95,42,.5)':'rgba(55,38,14,.58)',isCenter?'rgba(100,70,28,.7)':isPath?'rgba(82,57,22,.62)':'rgba(32,20,5,.7)',isCenter?'rgba(120,85,35,.65)':isPath?'rgba(102,72,28,.55)':'rgba(42,26,8,.62)');}}const{x:cx,y:cy}=isoToScreen(0,0);drawCastleDot(ctx,cx,cy,state.castle.lv,_homeTick);FACILITY_POSITIONS.forEach(fp=>drawFacilityOnCanvas(fp));gWarriors.forEach(w=>w.tick());gStaff.forEach(w=>w.tick());const allW=[...gWarriors,...gStaff].sort((a,b)=>(a.isoX+a.isoY)-(b.isoX+b.isoY));const activeIds=new Set();const layer=$('bubble-layer');const lr=layer?layer.getBoundingClientRect():{left:0,top:0};const cRect=canvas.getBoundingClientRect();allW.forEach(w=>{const{x,y}=isoToScreen(w.isoX,w.isoY);const sx=(cRect.left-lr.left)+x;const sy=(cRect.top-lr.top)+y;renderHomeDotWarrior(w,sx,sy,_homeTick,w.isStaff);['hd-w-','hd-hp-','hd-nm-','hd-bd-'].forEach(prefix=>{activeIds.add(prefix+w.uid);});});cleanupHomeDotEls(activeIds);}isoAnimFrame=requestAnimationFrame(loop);}
isoAnimFrame=requestAnimationFrame(loop);
}
