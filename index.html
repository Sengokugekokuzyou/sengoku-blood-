<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');

  :root {
    --ink: #1a0f00;
    --parchment: #f5e8c8;
    --crimson: #8b0000;
    --gold: #c8960c;
    --gold-light: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  #bg { position: fixed; inset: 0; background: linear-gradient(180deg, #2a1a08 0%, #1a0f00 40%, #0d0800 100%); }
  #mountains { position: fixed; bottom: 0; left: 0; right: 0; height: 45%; opacity: 0.22; }

  .mist-layer {
    position: fixed; left: -20%; width: 140%; height: 80px;
    background: linear-gradient(90deg, transparent, rgba(245,232,200,0.05), rgba(245,232,200,0.08), rgba(245,232,200,0.04), transparent);
    border-radius: 50%; animation: drift linear infinite;
  }
  .mist-layer:nth-child(1) { top: 35%; animation-duration: 28s; }
  .mist-layer:nth-child(2) { top: 55%; animation-duration: 22s; animation-delay: -8s; opacity: 0.7; }
  .mist-layer:nth-child(3) { top: 45%; animation-duration: 35s; animation-delay: -15s; opacity: 0.5; }
  @keyframes drift {
    0% { transform: translateX(-10%) scaleY(1); } 50% { transform: translateX(5%) scaleY(1.3); } 100% { transform: translateX(-10%) scaleY(1); }
  }

  .petal {
    position: fixed;
    background: radial-gradient(ellipse, rgba(255,200,200,0.9) 0%, rgba(255,150,150,0.4) 100%);
    border-radius: 50% 0 50% 0; animation: fall linear infinite; pointer-events: none;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg) translateX(0px); opacity: 0; }
    10% { opacity: 0.8; } 90% { opacity: 0.6; }
    100% { transform: translateY(100vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  #main { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; }

  #titlebar { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  #game-title { color: var(--gold); font-size: 13px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 20px rgba(200,150,12,0.6); line-height: 1.8; }
  #game-title span { display: block; font-size: 9px; letter-spacing: 6px; color: rgba(200,150,12,0.6); font-weight: 400; }
  #stats-bar { text-align: right; color: rgba(245,232,200,0.7); font-size: 10px; letter-spacing: 2px; line-height: 2; }
  #stats-bar strong { color: var(--gold-light); font-size: 13px; }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), rgba(200,150,12,0.3), transparent); margin: 0 16px; opacity: 0.5; }

  #castle-field { flex: 1; position: relative; overflow: hidden; padding: 10px 0 0; }

  #ground-plane {
    position: absolute; bottom: 0; left: 0; right: 0; height: 110px;
    background: linear-gradient(180deg, transparent 0%, rgba(40,25,5,0.3) 40%, rgba(30,18,0,0.6) 100%);
    pointer-events: none;
  }
  #ground-line {
    position: absolute; bottom: 84px; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(200,150,12,0.2), rgba(200,150,12,0.4), rgba(200,150,12,0.2), transparent);
    pointer-events: none;
  }

  #castle-base {
    position: absolute; bottom: 86px; left: 50%; transform: translateX(-50%);
    text-align: center; animation: castleFloat 6s ease-in-out infinite; pointer-events: none;
  }
  @keyframes castleFloat { 0%,100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-4px); } }

  .warrior { position: absolute; bottom: 86px; cursor: pointer; z-index: 15; transition: filter 0.2s; }
  .warrior.selected-for-breed { filter: drop-shadow(0 0 8px rgba(240,192,64,0.9)) drop-shadow(0 0 16px rgba(255,140,0,0.5)) !important; }
  .retired { filter: grayscale(0.85) brightness(0.75); opacity: 0.65; pointer-events: none; }
  .retired .warrior-svg { filter: brightness(0.6); }

  /* 合戦画面スタイル */
  #battle-screen {
    position: fixed; inset: 0; z-index: 500;
    background: linear-gradient(#0a0500, #1a0f00);
    display: none; flex-direction: column;
    color: var(--parchment);
  }
  #battle-screen.show { display: flex; }

  .battle-header {
    padding: 12px 20px; background: rgba(0,0,0,0.7); border-bottom: 2px solid var(--gold);
    display: flex; justify-content: space-between; align-items: center;
  }
  .battle-title { font-size: 18px; letter-spacing: 3px; color: var(--gold-light); }

  .battle-field {
    flex: 1; position: relative; overflow: hidden;
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1015/1200/600') center/cover;
    display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 60px;
  }

  .army { text-align: center; width: 45%; }
  .army-title { font-size: 13px; margin-bottom: 8px; letter-spacing: 2px; }
  .our-army .army-title { color: #ffdd88; }
  .enemy-army .army-title { color: #ff8888; }

  .warrior-icon {
    width: 52px; height: 68px; margin: 4px; display: inline-block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
  }

  .battle-log {
    height: 180px; background: rgba(10,6,0,0.95); border-top: 2px solid var(--gold);
    padding: 12px; overflow-y: auto; font-size: 13px; line-height: 1.5;
  }
  .log-line { margin: 3px 0; }
  .log-line.ally { color: #aaffaa; }
  .log-line.enemy { color: #ffaaaa; }

  .battle-footer {
    padding: 12px; background: rgba(0,0,0,0.8); display: flex; gap: 12px;
  }
  .battle-btn {
    flex: 1; padding: 12px; background: linear-gradient(#4a2a0a, #2a1800);
    border: 1px solid var(--gold); color: var(--parchment); font-size: 15px;
    cursor: pointer; border-radius: 4px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div class="mist-layer"></div><div class="mist-layer"></div><div class="mist-layer"></div>

<div id="battle-screen">
  <div class="battle-header">
    <div class="battle-title" id="battle-family">織田軍</div>
    <div onclick="endBattle()" style="cursor:pointer; font-size:18px;">✕</div>
  </div>
  <div class="battle-field">
    <div class="army our-army">
      <div class="army-title">我が軍</div>
      <div id="our-warriors"></div>
    </div>
    <div style="text-align:center; font-size:32px; color:var(--gold); align-self:center; margin-top:-30px;">VS</div>
    <div class="army enemy-army">
      <div class="army-title">敵軍</div>
      <div id="enemy-warriors"></div>
    </div>
  </div>
  <div class="battle-log" id="battle-log"></div>
  <div class="battle-footer">
    <button class="battle-btn" onclick="startBattleSimulation()">戦闘開始</button>
    <button class="battle-btn" onclick="endBattle()" style="background:#3a1a1a;">撤退</button>
  </div>
</div>

<!-- ここから元のゲーム本体（簡略化して最低限動作する形にまとめています） -->
<div id="main">
  <div id="titlebar">
    <div id="game-title">戦国血脈<span>〜 覇道の系譜 〜</span></div>
    <div id="stats-bar">
      <span>天下統一率</span><br>
      <strong id="unification-pct">12</strong><span style="font-size:9px">%</span><br>
      <span style="font-size:9px;color:rgba(200,150,12,0.5)">第 <strong id="gen-num">1</strong> 世代</span>
    </div>
  </div>
  <div class="divider"></div>

  <div id="castle-field">
    <div id="castle-base">
      <div id="castle-name">安土城</div>
    </div>
  </div>

  <div id="bottom-panel">
    <div id="action-buttons">
      <button class="action-btn" onclick="showBloodline()">配合</button>
      <button class="action-btn" onclick="startBattle(event)" style="border-color:rgba(200,150,12,0.6);">合戦</button>
    </div>
  </div>
</div>

<script>
// ====================== 簡易版ゲーム本体 ======================
let warriors = [];
let currentHouseHead = null;

class Warrior {
  constructor(name, job, power, color) {
    this.def = { name, jobId: job, power, color: color || 'c_red' };
    this.el = document.createElement('div');
    this.el.style.position = 'absolute';
    this.el.style.bottom = '100px';
    this.el.style.left = (50 + warriors.length * 60) + 'px';
    this.el.innerHTML = `<div style="font-size:40px;">\( {job === 'bukan' ? '⚔️' : '🌸'}</div><div style="font-size:10px;"> \){name}</div>`;
    document.getElementById('castle-field').appendChild(this.el);
    warriors.push(this);
  }
}

// 初期武将
new Warrior('織田 信廣', 'bukan', 85, 'c_red');
new Warrior('お 市', 'hime', 65, 'c_pink');

// 当主設定
currentHouseHead = { warrior: warriors[0], familyName: '織田' };

// 合戦画面関数
function showBattleScreen() {
  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-family').textContent = `${currentHouseHead.familyName}軍`;
  renderOurWarriors();
  generateEnemies();
}

function renderOurWarriors() {
  const container = document.getElementById('our-warriors');
  container.innerHTML = '';
  warriors.forEach(w => {
    const div = document.createElement('div');
    div.className = 'warrior-icon';
    div.innerHTML = `<span style="font-size:42px;">${w.def.jobId === 'bukan' ? '⚔️' : '🌸'}</span>`;
    container.appendChild(div);
  });
}

let currentBattleEnemies = [];
function generateEnemies() {
  currentBattleEnemies = [
    {name: "武田 信玄", power: 92},
    {name: "上杉 謙信", power: 88},
    {name: "今川 義元", power: 65}
  ];
  const container = document.getElementById('enemy-warriors');
  container.innerHTML = '';
  currentBattleEnemies.forEach(e => {
    const div = document.createElement('div');
    div.className = 'warrior-icon';
    div.innerHTML = `<span style="font-size:42px;">⚔️</span>`;
    container.appendChild(div);
  });
}

function startBattleSimulation() {
  const log = document.getElementById('battle-log');
  log.innerHTML = '<div class="log-line ally">戦闘開始！</div>';
  
  setTimeout(() => log.innerHTML += '<div class="log-line ally">織田 信廣が敵を3名討ち取った！</div>', 800);
  setTimeout(() => log.innerHTML += '<div class="log-line ally">お 市が味方を鼓舞した！</div>', 1600);
  setTimeout(() => {
    log.innerHTML += '<div class="log-line ally" style="font-size:18px;color:#ffdd88;">● 大勝利 ●</div>';
  }, 2800);
}

function endBattle() {
  document.getElementById('battle-screen').classList.remove('show');
}

window.startBattle = function() {
  showBattleScreen();
};

// 起動
console.log("%c戦国血脈 正常起動", "color:#ffdd88;font-size:14px");
</script>
</body>
</html>
