<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戦国血統 - 乱世の覇者</title>
<style>
:root{--accent:#c8102e;--gold:#ffd700}
body{margin:0;background:linear-gradient(#0a0a0a,#1a0000);color:#0f0;font-family:"Yu Gothic",sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
#header{padding:12px;background:#111;text-align:center;font-size:18px;letter-spacing:2px;border-bottom:3px solid var(--accent)}
#main{flex:1;overflow:auto;padding:12px}
#footer{display:flex;background:#111;border-top:3px solid var(--accent)}
.button{flex:1;padding:14px;text-align:center;font-weight:bold}
.card{background:#111;padding:12px;margin:8px 0;border-radius:12px;border-left:6px solid var(--accent);display:flex;align-items:center;gap:12px}
.card img{width:64px;height:64px;border-radius:8px;object-fit:cover;border:2px solid var(--gold)}
.sel{outline:3px solid var(--gold)}
#mixPanel{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:4px solid var(--gold);padding:14px;z-index:100;display:none}
.log{font-size:12px;opacity:0.85}
.title-screen{
  position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),url('https://picsum.photos/id/1015/1200/800') center/cover;
  display:flex;flex-direction:column;justify-content:center;align-items:center;color:#ffd700;
  z-index:1000;
}
</style>
</head>
<body>
<div id="app">
  <div id="header">戦国血統 - 乱世の覇者 <span id="time"></span></div>
  <div id="main"></div>
  <div id="footer">
    <div class="button" onclick="setView(0)">武将</div>
    <div class="button" onclick="setView(1)">家系</div>
    <div class="button" onclick="setView(2)">戦況</div>
  </div>
</div>

<div id="mixPanel"></div>

<div id="titleScreen" class="title-screen">
  <h1 style="font-size:42px;margin:0">戦国血統</h1>
  <p style="margin:10px 0 30px">天文二十三年　天下布武の乱世</p>
  <div onclick="startGame()" style="background:#c8102e;color:#fff;padding:16px 40px;border-radius:12px;font-size:18px;cursor:pointer">
    乱世に身を投じる
  </div>
</div>

<script>
// ==================== CONFIG ====================
const CONFIG = { MAX_UNITS: 450, BIRTH_RATE: 0.24, WAR_INTERVAL: 80 };

// ==================== STATE ====================
let state = {
  time: 0,
  units: [],
  map: {oda:6,takeda:5,tokugawa:4,uesugi:4},
  logs: []
};

let selectedParents = [];
let view = 0;
let globalTension = 0;
let gameStarted = false;

// ==================== BLOODS ====================
const BLOODS = {
  oda: {name:"織田",color:"#c8102e"},
  takeda: {name:"武田",color:"#d52b1e"},
  tokugawa: {name:"徳川",color:"#1e3a8a"},
  uesugi: {name:"上杉",color:"#1a3c34"},
  hojo: {name:"北条",color:"#8b4513"},
  oni: {name:"鬼",color:"#800080"}
};

// ==================== UNIT ====================
function createUnit() {
  const keys = Object.keys(BLOODS);
  return {
    id: Date.now() + Math.random(),
    name: ["信長","信玄","家康","謙信","氏康","元就"][Math.floor(Math.random()*6)] || "武将",
    blood: keys[Math.floor(Math.random()*keys.length)],
    power: 20 + Math.floor(Math.random()*65),
    generation: 0,
    alive: true
  };
}

// ==================== MIX ====================
function selectParent(id) {
  if (selectedParents.includes(id)) selectedParents = selectedParents.filter(x => x !== id);
  else if (selectedParents.length < 2) selectedParents.push(id);
  renderMixPanel();
}

function manualMix() {
  if (selectedParents.length !== 2) return;
  const a = state.units.find(u => u.id === selectedParents[0]);
  const b = state.units.find(u => u.id === selectedParents[1]);
  if (!a || !b) return;

  const child = createUnit();
  child.blood = Math.random() < 0.5 ? a.blood : b.blood;
  child.power = Math.floor((a.power + b.power) / 2 + Math.random() * 18);
  child.generation = Math.max(a.generation, b.generation) + 1;

  state.units.push(child);
  log(`🎉 ${a.name} × ${b.name} → ${child.name}誕生`);

  selectedParents = [];
  renderMixPanel();
}

// ==================== EVENTS ====================
function updateDestiny() {
  state.units.forEach(u => {
    if (!u.alive) return;
    if (!u.destiny) u.destiny = [];
    u.destiny.forEach(d => {
      if (d.done) return;
      const target = state.units.find(x => x.id === d.targetId);
      if (target && target.alive && u.power > target.power) {
        target.alive = false;
        d.done = true;
        log("💀 親殺し発生");
      }
    });
  });
}

function godEvents() {
  globalTension += 0.0008;
  state.units.forEach(u => {
    if (Math.random() < 0.008 + globalTension * 0.01) {
      u.power = Math.min(100, u.power + 18);
      log("🔥 覚醒");
    }
  });
}

function doWar() {
  const keys = Object.keys(state.map);
  const a = keys[Math.floor(Math.random()*keys.length)];
  const b = keys[Math.floor(Math.random()*keys.length)];
  if (a === b) return;

  const win = Math.random() < 0.5 ? a : b;
  const lose = win === a ? b : a;

  state.map[win] = (state.map[win]||0) + 1;
  state.map[lose] = Math.max(0, (state.map[lose]||0) - 1);

  log(`⚔ ${a} vs ${b} → ${win}勝利`);
}

// ==================== LOG ====================
function log(text) {
  state.logs.unshift(`[${state.time}] ${text}`);
  if (state.logs.length > 60) state.logs.pop();
}

// ==================== UI ====================
function setView(v) {
  view = v;
  render();
}

function renderMixPanel() {
  const panel = document.getElementById("mixPanel");
  if (selectedParents.length !== 2) {
    panel.style.display = "none";
    return;
  }
  panel.style.display = "block";

  const a = state.units.find(u => u.id === selectedParents[0]);
  const b = state.units.find(u => u.id === selectedParents[1]);

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <div>${a.name}</div>
      <div style="font-size:20px">×</div>
      <div>${b.name}</div>
    </div>
    <div onclick="manualMix()" style="background:#ffd700;color:#000;padding:14px;text-align:center;border-radius:8px;font-weight:bold">
      配合する
    </div>
  `;
}

function render() {
  const main = document.getElementById("main");
  let html = "";

  if (view === 0) {
    html = `<h3 style="color:#ffd700">現役武将 (${state.units.length})</h3>`;
    html += state.units.slice(-28).map(u => {
      const sel = selectedParents.includes(u.id) ? "sel" : "";
      return `<div class="card \( {sel}" onclick="selectParent( \){u.id})">
        <img src="https://picsum.photos/id/${80 + (u.id % 50)}/64/64" alt="">
        <div>
          <b>${u.name}</b><br>
          <span style="color:\( {BLOODS[u.blood].color}">[ \){BLOODS[u.blood].name}]</span>　力:${u.power}
        </div>
      </div>`;
    }).join("");
  } else if (view === 1) {
    html = `<h3>家系図</h3>` + state.units.slice(-100).map(u => 
      `<div class="card">\( {u.name} [ \){BLOODS[u.blood].name}]</div>`).join("");
  } else if (view === 2) {
    html = `<h3>戦況</h3>` + Object.keys(state.map).map(k => 
      `<div class="card">${k} : ${state.map[k]}</div>`).join("");
  }

  html += `<h3 style="color:#ffd700;margin-top:20px">戦国ログ</h3>` + 
          state.logs.slice(0,15).map(l => `<div class="log">${l}</div>`).join("");

  main.innerHTML = html;
  renderMixPanel();
  document.getElementById("time").textContent = `第${state.time}年`;
}

// ==================== LOOP ====================
function tick() {
  state.time++;

  if (Math.random() < CONFIG.BIRTH_RATE && state.units.length > 1) {
    const a = state.units[Math.floor(Math.random()*state.units.length)];
    const b = state.units[Math.floor(Math.random()*state.units.length)];
    if (a && b && a.id !== b.id) {
      // 自動配合も少し残す
    }
  }

  updateDestiny();
  godEvents();

  if (state.time % CONFIG.WAR_INTERVAL === 0) doWar();

  if (state.units.length > CONFIG.MAX_UNITS) {
    state.units = state.units.slice(0, CONFIG.MAX_UNITS);
  }
}

function gameLoop() {
  tick();
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== START ====================
function startGame() {
  document.getElementById("titleScreen").style.display = "none";
  init();
  gameLoop();
}

function init() {
  for (let i = 0; i < 22; i++) state.units.push(createUnit());
  log("天文二十三年　天下布武の乱世、始まる…");
  render();
}

// タイトル画面は自動表示
document.getElementById("titleScreen").style.display = "flex";
</script>
</body>
</html>
