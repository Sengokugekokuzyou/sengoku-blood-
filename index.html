<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=DotGothic16&display=swap');
:root{
  --gold:#c8960c;--gold-l:#f0c040;--gold-d:rgba(200,150,12,.4);
  --parchment:#f5e8c8;--ink:#0e0800;--panel:rgba(8,4,0,.88);
  --crimson:#8b0000;
  --spring:#7CFC00;--summer:#00BFFF;--autumn:#FFA500;--winter:#d8d8d8;
  --h-header:58px;
  --h-timebar:28px;
  --h-nationbar:30px;
  --h-partyrow:78px;
  --h-actionrow:64px;
  --h-bottom-pad:max(env(safe-area-inset-bottom,0px),8px);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;height:100%;background:var(--ink);
  font-family:'Noto Serif JP',serif;
  overflow:hidden;color:var(--parchment);
  user-select:none;-webkit-user-select:none;
  position:fixed;touch-action:none;
}
button{font:inherit;}

/* ── グレード色 ── */
.sg-S{color:#ffdd44;font-weight:900;text-shadow:0 0 6px rgba(255,220,50,.5);}
.sg-A{color:#88ff88;}
.sg-B{color:#aaddff;}
.sg-C{color:#ffccaa;}
.sg-D{color:#ffaa77;}
.sg-E{color:#ff7777;}
.sg-F{color:#aa4444;}

/* ── 背景 ── */
#sky{position:fixed;inset:0;z-index:0;background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);transition:background 3s ease;}
#sky.spring{background:linear-gradient(175deg,#150a10 0%,#251520 35%,#301828 65%,#201015 100%);}
#sky.summer{background:linear-gradient(175deg,#050a18 0%,#0a1525 35%,#0d1c30 65%,#081018 100%);}
#sky.autumn{background:linear-gradient(175deg,#150800 0%,#251200 35%,#30180a 65%,#1a0d05 100%);}
#sky.winter{background:linear-gradient(175deg,#080d15 0%,#10151f 35%,#121820 65%,#0a1018 100%);}
.star{position:fixed;border-radius:50%;background:#fff;opacity:0;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.75}}
.mist{position:fixed;left:-20%;width:140%;background:linear-gradient(90deg,transparent,rgba(245,228,180,.06),rgba(245,228,180,.1),rgba(245,228,180,.06),transparent);border-radius:50%;animation:drift linear infinite;pointer-events:none;}
.mist:nth-child(1){height:42px;top:30%;animation-duration:32s;}
.mist:nth-child(2){height:54px;top:48%;animation-duration:26s;animation-delay:-11s;opacity:.65;}
.mist:nth-child(3){height:36px;top:40%;animation-duration:42s;animation-delay:-20s;opacity:.45;}
@keyframes drift{0%{transform:translateX(-8%) scaleY(1)}50%{transform:translateX(7%) scaleY(1.4)}100%{transform:translateX(-8%) scaleY(1)}}
.petal{position:fixed;border-radius:50% 0 50% 0;background:radial-gradient(ellipse,rgba(255,200,200,.9) 0%,rgba(255,130,130,.25) 100%);animation:petalFall linear infinite;pointer-events:none;}
@keyframes petalFall{0%{transform:translateY(-10px) rotate(0deg) translateX(0);opacity:0}7%{opacity:.9}93%{opacity:.5}100%{transform:translateY(102vh) rotate(760deg) translateX(45px);opacity:0}}
.snowflake{position:fixed;color:#cde;font-size:12px;opacity:0;animation:snowFall linear infinite;pointer-events:none;}
@keyframes snowFall{0%{opacity:0;transform:translateY(-10px) rotate(0deg)}10%{opacity:.7}90%{opacity:.4}100%{opacity:0;transform:translateY(102vh) rotate(360deg)}}
.firefly{position:fixed;width:3px;height:3px;border-radius:50%;background:#aaff44;opacity:0;animation:fireflyAnim ease-in-out infinite;pointer-events:none;}
@keyframes fireflyAnim{0%,100%{opacity:0;transform:translate(0,0)}30%{opacity:.9}50%{opacity:.5;transform:translate(var(--fx),var(--fy))}70%{opacity:.8}}

/* ── メインレイアウト ── */
#main{position:fixed;inset:0;z-index:10;display:grid;grid-template-rows:var(--h-header) 1fr auto;width:100%;height:100%;}

/* ── ヘッダー ── */
#header{
  height:var(--h-header);
  padding:max(env(safe-area-inset-top,0px),8px) 12px 4px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-shrink:0;
}
#game-title{color:var(--gold);font-size:clamp(14px,4.2vw,18px);font-weight:900;letter-spacing:.18em;text-shadow:0 0 16px rgba(200,150,12,.7);line-height:1.25;white-space:nowrap;}
#game-title .sub{display:block;font-size:clamp(7px,1.8vw,9px);letter-spacing:.34em;color:var(--gold-d);font-weight:400;margin-top:2px;}
#status-panel{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:4px;max-width:72%;}
.stat-chip{display:flex;align-items:center;gap:3px;min-height:24px;background:var(--panel);border:1px solid var(--gold-d);border-radius:14px;padding:3px 6px;}
.sl{font-size:7px;color:rgba(245,232,200,.5);letter-spacing:.06em;}
.sv{font-size:11px;font-weight:700;color:var(--gold-l);}
.su{font-size:7px;color:var(--gold-d);}
.season-chip.spring .sv{color:var(--spring);}
.season-chip.summer .sv{color:var(--summer);}
.season-chip.autumn .sv{color:var(--autumn);}
.season-chip.winter .sv{color:var(--winter);}

/* ── ISOフィールド ── */
#iso-field{position:relative;overflow:hidden;min-height:0;}
#iso-canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#bubble-layer{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}
.facility-activity{position:absolute;font-size:9px;color:#ffdd88;pointer-events:none;text-shadow:0 1px 3px #000;white-space:nowrap;transform:translateX(-50%);animation:actPop .3s ease-out;}
@keyframes actPop{0%{opacity:0;transform:translateX(-50%) scale(.5)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
.float-text{position:absolute;font-size:10px;pointer-events:none;text-shadow:0 1px 3px #000;white-space:nowrap;transform:translateX(-50%);animation:floatUp 1.8s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-36px)}}

/* 季節バナー */
#season-banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;font-size:10px;letter-spacing:.35em;padding:3px 14px;border-radius:12px;background:rgba(8,4,0,.7);border:1px solid rgba(200,150,12,.3);color:var(--gold-l);opacity:0;transition:opacity .5s;white-space:nowrap;}
#season-banner.visible{opacity:1;}

/* 季節イベントオーバーレイ */
#season-event-overlay{position:fixed;inset:0;z-index:450;display:none;align-items:center;justify-content:center;background:rgba(8,4,0,.0);pointer-events:none;}
#season-event-overlay.show{display:flex;animation:seasonFadeInOut 3.5s ease forwards;}
@keyframes seasonFadeInOut{0%{opacity:0}10%{opacity:1}70%{opacity:1}100%{opacity:0}}
.sev-box{text-align:center;padding:22px 32px;border-radius:16px;border:1px solid rgba(200,150,12,.3);backdrop-filter:blur(6px);}
.sev-box.spring{background:rgba(10,30,5,.92);border-color:rgba(124,252,0,.4);}
.sev-box.summer{background:rgba(5,10,30,.92);border-color:rgba(0,191,255,.4);}
.sev-box.autumn{background:rgba(30,15,0,.92);border-color:rgba(255,165,0,.4);}
.sev-box.winter{background:rgba(10,15,25,.92);border-color:rgba(170,200,230,.4);}
.sev-season{font-size:11px;letter-spacing:.5em;margin-bottom:4px;}
.sev-season.spring{color:var(--spring);}
.sev-season.summer{color:var(--summer);}
.sev-season.autumn{color:var(--autumn);}
.sev-season.winter{color:var(--winter);}
.sev-icon{font-size:38px;margin-bottom:6px;}
.sev-title{font-size:17px;font-weight:900;color:var(--gold-l);letter-spacing:.3em;margin-bottom:4px;}
.sev-desc{font-size:11px;color:rgba(245,228,180,.75);letter-spacing:.15em;line-height:1.7;}

/* ── ボトムUI ── */
#bottom-ui{flex-shrink:0;padding:0 10px var(--h-bottom-pad);background:linear-gradient(0deg,rgba(6,3,0,.98) 0%,rgba(6,3,0,.82) 80%,transparent 100%);}

/* 時間バー */
#time-bar{display:flex;align-items:center;gap:7px;height:var(--h-timebar);padding:4px 2px 3px;border-bottom:1px solid rgba(200,150,12,.08);}
.tl{font-size:8px;color:var(--gold-d);letter-spacing:.18em;white-space:nowrap;}
#time-display{display:flex;align-items:center;gap:5px;flex:1;}
.time-year{font-size:13px;font-weight:900;color:var(--gold-l);}
.time-month{font-size:11px;color:var(--parchment);}
.time-season-icon{font-size:14px;line-height:1;}
.month-track{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
.month-fill{height:100%;border-radius:2px;transition:width .5s,background .8s;}
.month-fill.spring{background:linear-gradient(90deg,#7CFC00,#c8f5a0);}
.month-fill.summer{background:linear-gradient(90deg,#0080ff,#00BFFF);}
.month-fill.autumn{background:linear-gradient(90deg,#cc5500,#FFA500);}
.month-fill.winter{background:linear-gradient(90deg,#4488cc,#aaccee);}
.season-event-tag{font-size:8px;padding:1px 7px;border-radius:8px;white-space:nowrap;font-family:'Noto Serif JP',serif;letter-spacing:.12em;}
.season-event-tag.spring{background:rgba(124,252,0,.15);color:var(--spring);border:1px solid rgba(124,252,0,.3);}
.season-event-tag.summer{background:rgba(0,191,255,.15);color:var(--summer);border:1px solid rgba(0,191,255,.3);}
.season-event-tag.autumn{background:rgba(255,165,0,.15);color:var(--autumn);border:1px solid rgba(255,165,0,.3);}
.season-event-tag.winter{background:rgba(170,200,230,.15);color:var(--winter);border:1px solid rgba(170,200,230,.3);}

/* 国力バー */
#nation-bar{display:flex;align-items:center;gap:7px;height:var(--h-nationbar);padding:5px 2px 4px;border-bottom:1px solid rgba(200,150,12,.12);}
.nl{font-size:8px;color:var(--gold-d);letter-spacing:.18em;white-space:nowrap;}
.nt{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
.nf{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b0000,var(--gold));transition:width .6s;}
.np{font-size:10px;color:var(--gold-l);font-weight:700;min-width:42px;text-align:right;}

/* パーティ行 */
#party-row{display:flex;gap:5px;height:var(--h-partyrow);align-items:center;padding:4px 0 3px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
#party-row::-webkit-scrollbar{display:none;}
.party-card{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:90px;padding:5px 8px;border-radius:8px;border:1px solid rgba(200,150,12,.2);background:rgba(255,255,255,.04);cursor:pointer;transition:border-color .2s,background .2s;touch-action:manipulation;}
.party-card.head{border-color:var(--gold);background:rgba(200,150,12,.08);}
.party-card.young{opacity:.72;border-color:rgba(200,150,12,.14);}
.party-card.mutant{border-color:#ff44ff;background:rgba(255,0,255,.08);}
.party-card:active{background:rgba(200,150,12,.18);}
.pc-role{font-size:7px;color:var(--gold-d);letter-spacing:.08em;}
.pc-name{font-size:9px;color:var(--parchment);font-weight:700;}
.pc-pow{font-size:8px;color:#ffaa44;}
.pc-hp{font-size:7px;}
.pc-loc{font-size:7px;color:#aaddff;text-align:center;}
.pc-skill{font-size:6px;color:#ff88ff;text-align:center;}

/* アクション行 */
#action-row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;height:var(--h-actionrow);padding:3px 0 2px;}
.act-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:56px;padding:0 2px;border-radius:10px;border:1px solid var(--gold-d);background:var(--panel);color:var(--parchment);cursor:pointer;transition:background .15s,border-color .15s,transform .1s;touch-action:manipulation;}
.act-btn:active{transform:scale(.92);background:rgba(200,150,12,.16);border-color:var(--gold);}
.act-btn .ico{font-size:18px;line-height:1;}
.act-btn .lbl{font-size:8px;letter-spacing:.1em;color:rgba(245,232,200,.72);}
.act-btn.primary{border-color:var(--gold);background:rgba(139,0,0,.45);}
.act-btn.primary .lbl{color:var(--gold-l);}

/* ── 合戦画面 ── */
#battle-screen{position:fixed;inset:0;z-index:500;background:#0e0600;display:none;flex-direction:column;font-family:'DotGothic16',monospace;}
#battle-screen.show{display:flex;}
#bscr-inner{display:flex;flex-direction:column;width:100%;height:100%;}
#bscr-frame{position:relative;flex:1;min-height:0;border-bottom:3px solid #8b6914;box-shadow:0 4px 20px #c8960033;overflow:hidden;}
#bg-canvas,#battle-main-canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}
#battle-log-bar{flex-shrink:0;height:26px;background:#0a0600;border-bottom:1px solid #4a3000;color:#e8c060;font-size:clamp(9px,2.8vw,13px);display:flex;align-items:center;padding:0 10px;letter-spacing:.06em;overflow:hidden;white-space:nowrap;}
#battle-ui-panel{flex-shrink:0;height:72px;display:flex;gap:3px;padding:4px;background:#1a0800;}
.bunit-panel{flex:1;background:linear-gradient(180deg,#e8dcc0,#d4c090 40%,#c0a860);border:2px solid #7a5800;border-radius:4px;padding:4px 8px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 1px 0 #fff8,inset 0 -1px 0 #0004;}
.bunit-top{display:flex;align-items:baseline;justify-content:space-between;}
.bunit-name{font-size:clamp(10px,3.5vw,14px);color:#1a0800;letter-spacing:.04em;}
.bhp-group{display:flex;align-items:baseline;gap:3px;}
.bhp-label{font-size:clamp(7px,1.8vw,9px);color:#6a4000;}
.bhp-value{font-size:clamp(14px,4vw,20px);color:#1a0800;letter-spacing:.08em;min-width:30px;text-align:right;}
.bpower-label{font-size:clamp(7px,2vw,9px);color:#5a3800;line-height:1;}
.bpower-wrap{width:100%;height:clamp(8px,2.5vw,13px);background:#2a1800;border:1px solid #5a3000;border-radius:2px;overflow:hidden;position:relative;}
.bpower-bar{height:100%;background:linear-gradient(90deg,#2060c0,#2080e0 40%,#40a0ff);transition:width .35s ease;}
.bpower-bar-enemy{background:linear-gradient(90deg,#c01010,#e82020 40%,#ff4040);}
.bpower-ticks{position:absolute;inset:0;display:flex;pointer-events:none;}
.bpower-ticks span{flex:1;border-right:1px solid #0003;}
#battle-result-panel{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;background:#000b;z-index:10;}
#battle-result-panel.show{display:flex;}
#result-box{background:linear-gradient(180deg,#f4e080,#c89020);border:3px solid #7a5000;border-radius:10px;padding:18px 32px;text-align:center;box-shadow:0 8px 40px #00000099;max-width:90vw;}
.bres-title{font-family:'DotGothic16',monospace;font-size:clamp(14px,5vw,20px);color:#1a0800;letter-spacing:.2em;margin-bottom:12px;display:block;}
.bres-detail{font-family:'DotGothic16',monospace;font-size:clamp(10px,3vw,13px);color:#3a1400;text-align:center;line-height:1.9;white-space:pre-line;margin-bottom:14px;}
.bres-btn{font-family:'DotGothic16',monospace;font-size:clamp(11px,3.2vw,14px);background:linear-gradient(180deg,#e05010,#a02808);color:#fff8e0;border:2px solid #601000;border-radius:6px;padding:8px 24px;cursor:pointer;touch-action:manipulation;}

/* ── モーダル共通 ── */
.modal{position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;justify-content:center;background:rgba(8,4,0,.92);}
.modal.show{display:flex;}
.modal-shell{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;}
.modal-tall{height:88%;}
.modal-mid{height:78%;}
@keyframes slideUp{0%{transform:translateY(100%)}100%{transform:translateY(0)}}
.modal-deco-top{height:3px;background:linear-gradient(90deg,transparent,var(--gold),rgba(200,150,12,.4),var(--gold),transparent);flex-shrink:0;}
.modal-head{padding:14px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.modal-title{font-size:14px;color:var(--gold);font-weight:700;letter-spacing:.28em;}
.close-btn{background:none;border:1px solid rgba(200,150,12,.3);color:var(--gold);font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;touch-action:manipulation;}
.modal-body{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;touch-action:pan-y;}
.modal-body::-webkit-scrollbar{display:none;}
.modal-footer{flex-shrink:0;display:flex;gap:8px;padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);border-top:1px solid rgba(200,150,12,.1);}
.modal-btn{flex:1;padding:13px;border-radius:10px;font-family:inherit;font-size:12px;letter-spacing:.25em;cursor:pointer;transition:all .2s;touch-action:manipulation;}
.modal-btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:rgba(200,150,12,.6);}
.modal-btn-exec{background:linear-gradient(135deg,rgba(139,0,0,.65),rgba(180,30,0,.55));border:1px solid rgba(200,150,12,.5);color:var(--gold-l);font-weight:700;}
.modal-btn-exec:disabled{opacity:.38;cursor:not-allowed;}

/* 系譜 */
.blood-skill-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.bsk-row{display:flex;align-items:flex-start;gap:8px;padding:7px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:8px;}
.bsk-icon{font-size:16px;flex-shrink:0;}
.bsk-name{font-size:11px;font-weight:700;color:var(--parchment);}
.bsk-desc{font-size:9px;color:rgba(245,228,180,.55);margin-top:1px;}
.gen-block{margin-bottom:14px;}
.gen-label{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-bottom:6px;}
.gen-list{display:flex;flex-wrap:wrap;gap:6px;}
.gen-card{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.18);border-radius:8px;padding:8px 10px;font-size:9px;color:var(--parchment);line-height:1.6;min-width:140px;}
.gen-card .gn{font-size:11px;font-weight:700;color:var(--gold-l);}
.gen-card .gp{color:#ffaa44;}
.gen-card .gskill{color:#ff88ff;font-size:8px;}
.gen-card .gcomp{color:#88ffcc;font-size:8px;}
.gen-card.mutant-card{border-color:#ff44ff;background:rgba(255,0,255,.06);}

/* 武将モーダル */
#warrior-modal.modal{z-index:700;}
.wm-shell{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;overflow:hidden;animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;}
.wm-head{padding:16px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);}
.wm-name{font-size:18px;font-weight:900;color:var(--gold-l);letter-spacing:.14em;}
.wm-role{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-top:2px;}
.wm-body{padding:10px 16px max(env(safe-area-inset-bottom,0px),16px);}
.wm-stat{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
.wsk{color:rgba(245,228,180,.6);}
.wsv{color:var(--parchment);font-weight:700;text-align:right;}
.wm-hp-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin:2px 0 6px;}
.wm-hp-fill{height:100%;border-radius:3px;transition:width .4s;}
.wm-close{display:block;width:100%;margin-top:10px;padding:11px;border-radius:8px;border:1px solid rgba(200,150,12,.3);background:none;color:var(--gold);letter-spacing:.3em;cursor:pointer;touch-action:manipulation;}

/* 縁組モーダル */
.modal-kamon{font-size:28px;text-align:center;margin-bottom:4px;text-shadow:0 0 24px rgba(200,150,12,.4);}
.modal-main-title{font-size:16px;font-weight:900;color:var(--gold);letter-spacing:.5em;text-align:center;}
.modal-subtitle{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.35em;text-align:center;margin-top:3px;}
.modal-step-indicator{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
.step-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,150,12,.22);transition:all .3s;}
.step-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(200,150,12,.5);}
.engumi-cost{text-align:center;padding:8px;background:rgba(200,150,12,.06);border:1px solid rgba(200,150,12,.15);border-radius:8px;margin-bottom:12px;}
.ec-label{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.3em;}
.ec-val{display:block;font-size:20px;font-weight:900;color:var(--gold-l);margin-top:2px;}
.ec-unit{font-size:9px;color:rgba(200,150,12,.6);}
.modal-section-title{font-size:9px;color:rgba(200,150,12,.6);letter-spacing:.3em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(200,150,12,.12);}
.warrior-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.warrior-sel-card{min-height:78px;padding:10px;border-radius:10px;border:1px solid rgba(200,150,12,.15);background:rgba(255,255,255,.03);cursor:pointer;transition:all .2s;touch-action:manipulation;}
.warrior-sel-card.selected,.warrior-sel-card:active{background:rgba(200,150,12,.12);border-color:var(--gold);}
.warrior-sel-card.mutant-card{border-color:rgba(255,100,255,.3);}
.warrior-sel-card.mutant-card.selected{border-color:#ff44ff;background:rgba(255,0,255,.1);}
.wsc-name{font-size:12px;font-weight:700;color:var(--parchment);}
.wsc-stats{font-size:10px;color:rgba(200,150,12,.7);margin-top:3px;}
.wsc-hp{font-size:9px;margin-top:2px;}
.wsc-skill{font-size:8px;color:#ff88ff;margin-top:2px;}

.confirm-pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.confirm-w{text-align:center;}
.cw-name{font-size:13px;font-weight:700;color:var(--parchment);}
.cw-role{font-size:9px;color:var(--gold-d);}
.confirm-heart{font-size:22px;color:var(--crimson);text-shadow:0 0 12px rgba(139,0,0,.5);}
.child-preview{background:rgba(255,255,255,.03);border-radius:8px;padding:9px;margin-top:7px;}
.cp-title{font-size:8px;color:rgba(200,150,12,.5);letter-spacing:.3em;margin-bottom:5px;}
.cp-stat{display:flex;justify-content:space-between;font-size:10px;color:rgba(245,228,180,.7);padding:2px 0;}

.cp-compat{font-size:10px;color:#88ffcc;text-align:center;margin-top:5px;padding:4px;background:rgba(0,255,100,.05);border-radius:4px;}

/* 成功オーバーレイ */
#success-overlay{position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:20px;background:rgba(8,4,0,.96);}

<script>
'use strict';
// ============================================================
//  定数
// ============================================================
const ENGUMI_COST  = 600;
const MATURE_AGE   = 20;
const TICKS_PER_MONTH = 5;

// ── グレード ──
function getGrade(val){
  if(val>=95) return{grade:'S',color:'#ffdd44'};
  if(val>=85) return{grade:'A',color:'#88ff88'};
  if(val>=75) return{grade:'B',color:'#aaddff'};
  if(val>=65) return{grade:'C',color:'#ffccaa'};
  if(val>=55) return{grade:'D',color:'#ffaa77'};
  if(val>=45) return{grade:'E',color:'#ff7777'};
  return{grade:'F',color:'#aa4444'};
}
function gradeSpan(val){ const g=getGrade(val); return `<span class="sg-${g.grade}">${g.grade}</span>(${val})`; }
function hpGradeSpan(hp,maxHp){ const pct=Math.round(hp/maxHp*100); const g=getGrade(Math.floor(pct*0.6+40)); return `<span class="sg-${g.grade}">${g.grade}</span>(${pct}%)`; }

const GENDER_ICON ={male:'♂',female:'♀'};
const GENDER_LABEL={male:'男',female:'女'};

// ── 血統スキル ──
const BLOOD_SKILLS=[
  {id:'brave',  name:'猛将の血',  icon:'🔥',desc:'武力×1.3倍',      effect:u=>{u.stats.power=Math.min(99,Math.floor(u.stats.power*1.3));}},
  {id:'wise',   name:'軍師の血',  icon:'📖',desc:'知力×1.3倍',      effect:u=>{u.stats.wisdom=Math.min(99,Math.floor(u.stats.wisdom*1.3));}},
  {id:'berserk',name:'狂戦士の血',icon:'💀',desc:'武力×1.5・体力-30',effect:u=>{u.stats.power=Math.min(99,Math.floor(u.stats.power*1.5));u.stats.maxHp=Math.max(60,u.stats.maxHp-30);u.stats.hp=Math.min(u.stats.hp,u.stats.maxHp);}},
  {id:'iron',   name:'鉄壁の血',  icon:'🛡️',desc:'体力上限+40',     effect:u=>{u.stats.maxHp+=40;u.stats.hp=Math.min(u.stats.maxHp,u.stats.hp+40);}},

// ============================================================
function calcCompatibility(a,b){
  let s=0;
  if(a._skillId&&b._skillId&&a._skillId===b._skillId)s+=20;
  if(Math.abs(a.stats.power-b.stats.power)<10)s+=10;
  if(Math.abs(a.stats.wisdom-b.stats.wisdom)>15)s+=8;
  if(Math.abs(a.age-b.age)<8)s+=7;
  s+=Math.floor((a._loyalty+b._loyalty)/20);
  return clamp(s,0,60);
}
function compatLabel(score){
  if(score>=45)return'❤️ 運命の縁（最大ボーナス）';
  if(score>=30)return'💛 良縁（中ボーナス）';
  if(score>=15)return'🤝 普通の縁（小ボーナス）';
  return'💔 相性不良';
}
function createChildStats(father,mother){
  const compat=calcCompatibility(father,mother);
  const bonus=Math.floor(compat/6);
  const seasonBonus=state.engumiDiscount?5:0;
  const power=clamp(Math.round(father.stats.power*0.65+mother.stats.power*0.45)+rnd(5,12)+bonus+seasonBonus,10,98);
  const wisdom=clamp(Math.round(father.stats.wisdom*0.45+mother.stats.wisdom*0.65)+rnd(8,14)+bonus+seasonBonus,10,98);
  const maxHp=clamp(Math.round((father.stats.maxHp+mother.stats.maxHp)/1.8)+rnd(10,20)+bonus,100,200);
  return{power,wisdom,hp:maxHp,maxHp,compat,bonus:bonus+seasonBonus};
}
function inheritSkill(father,mother,compat){
  let skillId=null,isMutant=false;
  const mc=0.05+compat*0.002;
  if(Math.random()<mc){skillId=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)].id;isMutant=true;}
  else{if(father._skillId&&Math.random()<.5)skillId=father._skillId;if(mother._skillId&&Math.random()<.5)skillId=mother._skillId;if(!skillId&&Math.random()<.05)skillId=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)].id;}
  return{skillId,isMutant};
}
function bloodlineFacilityMul(w){
  let mul=1.0;
  const gen=(w._generation||1);
  if(w._parents) mul+=(gen-1)*0.08;
  if(w._skillId==='wise'||w._skillId==='loyal') mul*=1.2;
  return mul;
}

function advanceMonth(){
  state.ticksSinceMonth=0;
  const prevSeason=getSeason(state.month);
  state.month++;
  if(state.month>12){state.month=1;state.year++;addLog('新年 '+state.year+'年 を迎えた',false,true);showToast('🎊 '+state.year+'年 新年',3000,false,true);}
  const newSeason=getSeason(state.month);
  if(prevSeason.id!==newSeason.id){
    state.engumiDiscount=false;state.tanabataDiscount=false;
    updateWeatherEffect(newSeason);
    showSeasonBanner(SEASON_ICONS[newSeason.id]+'　'+newSeason.name+'の到来');
    showSeasonEventOverlay(newSeason);
    addLog(newSeason.name+'の到来（'+state.year+'年'+state.month+'月）',false,true);
  } else {
    if(state.month!==7)state.tanabataDiscount=false;
  }
  const me=MONTHLY_EVENTS[state.month];
  if(me){
    me.apply();
    addLog('【月例行事】'+me.icon+' '+me.name+'：'+me.desc,false,true);
    showToast(me.icon+' '+me.name,3500,false,true);
  }
  processSeasonalEvents(newSeason);
  const kokuGain=Math.floor(rnd(70,120)*newSeason.kokuMul);
  state.koku+=kokuGain;

}
function processSeasonalEvents(season){

      if(fn)fn();
      addLog('【'+season.name+'の出来事】'+ev.icon+' '+ev.name+'：'+ev.desc,false,true);
      showToast(ev.icon+' '+ev.name,3200,false,true);
    }
  });
}

function drawStrategicMap(){
  const canvas=document.getElementById('strategic-map');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#08100a';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(200,150,12,.05)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  PROVINCES.forEach(p=>{
    p.adj.forEach(aid=>{
      if(aid<=p.id)return;const q=PROVINCES.find(x=>x.id===aid);if(!q)return;
      ctx.strokeStyle='rgba(200,150,12,.18)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();
    });
  });
  PROVINCES.forEach(p=>{
    const isPlayer=(p.clan==='player');
    const isSel=(selectedProvince&&selectedProvince.id===p.id);
    const color=CLAN_COLORS[p.clan]||'#444';
    const r=18;
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.ellipse(p.x+2,p.y+2,r+2,r*.6+2,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=color;ctx.strokeStyle=isSel?'#ffee44':isPlayer?'#ffcc00':'rgba(255,255,255,.2)';ctx.lineWidth=isSel?3:isPlayer?2:1;
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fill();ctx.stroke();
    if(isSel){ctx.shadowColor='#ffee44';ctx.shadowBlur=16;ctx.strokeStyle='#ffee44';ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
    if(isPlayer){ctx.shadowColor='#ffcc00';ctx.shadowBlur=10;ctx.strokeStyle='#ffcc00';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;}
    ctx.fillStyle=isPlayer?'#ffee88':'#f0e8c8';ctx.font='bold 9px DotGothic16,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.name,p.x,p.y);
    ctx.fillStyle='rgba(245,228,180,.6)';ctx.font='7px sans-serif';ctx.fillText(p.strength,p.x,p.y+r+9);
  });
  ctx.fillStyle='rgba(200,150,12,.8)';ctx.font='9px DotGothic16,monospace';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('🟡 自領地  ● 敵国',6,H-16);
  ctx.fillStyle='rgba(245,228,180,.5)';ctx.fillText('支配: '+playerProvinceCount()+'/'+PROVINCES.length+'国',6,H-6);
}

class IsoWarrior{
  constructor(name,jobId,power,offsetX,speed,gender,age){
    this.name=name;this.jobId=jobId;
    this.gender=gender||(Math.random()<.5?'male':'female');
    this.offsetX=offsetX||0;
    this.speed=speed||(2+Math.random()*3);
    this.age=(age!==undefined)?age:25;
    this.stats={power:clamp(power||rnd(20,45),1,99),wisdom:rnd(15,45),hp:100,maxHp:100};
    this._loyalty=rnd(60,95);
    this._generation=1;this._parents=null;this._skillId=null;this._isMutant=false;this._compatibility=0;
    this.isoX=(Math.random()-.5)*4;this.isoY=(Math.random()-.5)*4;
    this.dirX=Math.random()>.5?1:-1;this.dirY=Math.random()>.5?1:-1;
    this._currentFacility=null;this._facilityTimer=0;this._facilityStayMax=0;this._moveTimer=rnd(60,180);
    this._color=this._pickColor();
  }
  _pickColor(){
    if(this._isMutant)return'#ff44ff';
    const c=['#c8960c','#cc4444','#4488cc','#44cc88','#cc88cc','#ccaa44','#44aacc','#cc6644'];
    return c[Math.floor(Math.random()*c.length)];
  }
  get loyalty(){return this._loyalty;}
  isMature(){return this.age>=MATURE_AGE;}
  statusLabel(){return this.isMature()?'実戦可':'育成中（'+this.age+'歳）';}
  skillName(){const sk=getSkillById(this._skillId);return sk?sk.icon+' '+sk.name:'—';}
  locationLabel(){return FACILITY_MAP[this._currentFacility]?.name||'巡回中';}
  applyBloodSkill(){const sk=getSkillById(this._skillId);if(sk)sk.effect(this);}
  tick(){
    if(this._currentFacility){
      this._facilityTimer++;
      if(this._facilityTimer>=this._facilityStayMax)this._leaveFacility();
      else if(this._facilityTimer%90===45)this._applyEffect(this._currentFacility,false);
    } else {
      this._moveTimer--;
      if(this._moveTimer<=0){this._tryEnterFacility();this._moveTimer=rnd(40,120);}
      this._walk();
    }
  }
  _walk(){
    const season=getSeason(state.month);
    const spd=this.speed*0.012*(season.id==='winter'?.7:1.0);
    this.isoX+=this.dirX*spd;this.isoY+=this.dirY*spd;
    const b=3.5;
    if(this.isoX>b){this.isoX=b;this.dirX=-1;}if(this.isoX<-b){this.isoX=-b;this.dirX=1;}
    if(this.isoY>b){this.isoY=b;this.dirY=-1;}if(this.isoY<-b){this.isoY=-b;this.dirY=1;}
    if(Math.random()<.005)this.dirX*=-1;if(Math.random()<.005)this.dirY*=-1;
  }
  _tryEnterFacility(){
    const hpPct=this.stats.hp/this.stats.maxHp;
    const sid=getSeason(state.month).id;
    if(sid==='winter'&&Math.random()<.5){this._enterFacility(['tea','clinic','garden'][Math.floor(Math.random()*3)]);return;}
    if(this._skillId==='wise'&&Math.random()<.4){this._enterFacility(Math.random()<.6?'academy':'spy');return;}
    if((this._skillId==='brave'||this._skillId==='berserk')&&Math.random()<.4&&hpPct>.5){this._enterFacility(Math.random()<.5?'training':'arsenal');return;}
    if(this._skillId==='iron'&&Math.random()<.35&&hpPct<.8){this._enterFacility('clinic');return;}
    const cands=hpPct<.4?['tea','garden','clinic','tea','clinic']:Object.keys(FACILITY_MAP);
    this._enterFacility(cands[Math.floor(Math.random()*cands.length)]);
  }
  _enterFacility(key){
    const fp=FACILITY_POSITIONS.find(f=>f.key===key);if(!fp)return;
    this._currentFacility=key;
    this.isoX=fp.tx+(Math.random()-.5)*.4;this.isoY=fp.ty+(Math.random()-.5)*.4;
    this._facilityTimer=0;this._facilityStayMax=rnd(120,300);
    this._applyEffect(key,true);
  }
  _leaveFacility(){this._currentFacility=null;this._facilityTimer=0;this.dirX=Math.random()>.5?1:-1;this.dirY=Math.random()>.5?1:-1;}
  _applyEffect(key,isEntry){
    const eff=FACILITY_EFFECT[key];if(!eff)return;
    const season=getSeason(state.month);
    const[lo,hi]=eff.range;
    const base=isEntry?Math.floor(lo+Math.random()*(hi-lo)):Math.floor(1+Math.random()*2);
    const mul=bloodlineFacilityMul(this)*season.growthMul;
    const gain=Math.max(1,Math.floor(base*mul));
    let hpChange=0;
    if(isEntry)hpChange=eff.costHp>0?Math.floor(eff.costHp*(.8+Math.random()*.4)):Math.floor(eff.costHp*(.7+Math.random()*.6));
    if(eff.stat==='power')  this.stats.power=clamp(this.stats.power+gain,1,99);
    if(eff.stat==='wisdom') this.stats.wisdom=clamp(this.stats.wisdom+gain,1,99);
    if(eff.stat==='hp')     this.stats.hp=clamp(this.stats.hp+gain,1,this.stats.maxHp);
    if(eff.stat==='loyalty')this._loyalty=clamp(this._loyalty+gain,0,100);
    this.stats.hp=clamp(this.stats.hp+hpChange,1,this.stats.maxHp);
    if(eff.special==='defense'&&isEntry){this.stats.maxHp=Math.min(250,this.stats.maxHp+5);this.stats.hp=Math.min(this.stats.maxHp,this.stats.hp+5);}
    if(eff.special==='unification'&&isEntry){state.unification=Math.min(100,state.unification+0.2+this.stats.wisdom*.005);}
    if(isEntry&&(gain>0||hpChange!==0)){
      const text=eff.stat==='hp'?'体力 +'+gain:eff.label+' +'+gain+(hpChange<0?' / 疲労'+hpChange:'');
      createFloatText(this,text,eff.color);
      updatePartyRow();updateStatusUI();
    }
  }
}

function getWarriorScreenPos(w){
  const canvas=document.getElementById('iso-canvas');if(!canvas)return{x:0,y:0};
  const rect=canvas.getBoundingClientRect();
  const cx=canvas.width/2,cy=canvas.height*.45;
  const tileW=Math.min(canvas.width*.22,canvas.height*.28);
  const sx=cx+(w.isoX-w.isoY)*tileW*.5,sy=cy+(w.isoX+w.isoY)*tileW*.25;
  return{x:rect.left+sx,y:rect.top+sy};
}
function createFloatText(w,text,color){
  const layer=document.getElementById('bubble-layer');if(!layer)return;
  const pos=getWarriorScreenPos(w);const lr=layer.getBoundingClientRect();
  const el=document.createElement('div');el.className='float-text';el.textContent=text;el.style.color=color||'#fff';
  el.style.left=(pos.x-lr.left)+'px';el.style.top=(pos.y-lr.top-20)+'px';
  layer.appendChild(el);setTimeout(()=>el.remove(),1900);
}

function selectFather(idx){engumiSelectedFather=idx;if(engumiSelectedMother===idx)engumiSelectedMother=null;renderEngumiStep();}
function selectMother(idx){if(idx===engumiSelectedFather){showToast('父と同じ武将は選べません');return;}engumiSelectedMother=idx;renderEngumiStep();}
function engumiNext(){
  if(engumiStep===0){if(engumiSelectedFather===null){showToast('父を選んでください');return;}engumiStep=1;renderEngumiStep();}
  else if(engumiStep===1){if(engumiSelectedMother===null){showToast('母を選んでください');return;}engumiStep=2;renderEngumiStep();}
  else doEngumi();
}
function doEngumi(){
  const effectiveCost=state.engumiDiscount?Math.floor(ENGUMI_COST/2):state.tanabataDiscount?Math.floor(ENGUMI_COST*.7):ENGUMI_COST;
  if(state.koku<effectiveCost){showToast('石高が足りません（必要：'+effectiveCost+'石）');return;}
  const f=gWarriors[engumiSelectedFather],m=gWarriors[engumiSelectedMother];
  if(!f||!m){showToast('選択が無効です');closeModal('engumi-modal');return;}
  const cs=createChildStats(f,m);const{skillId,isMutant}=inheritSkill(f,m,cs.compat);const sk=skillId?getSkillById(skillId):null;
  state.koku-=effectiveCost;state.generation++;
  const season=getSeason(state.month);
  const gender=Math.random()<.5?'male':'female';
  const childName=randName(gender);const jobId=Math.floor(Math.random()*10);
  const child=new IsoWarrior(childName,jobId,cs.power,0,2.5+Math.random()*2,gender,0);
  child.stats.wisdom=cs.wisdom;child.stats.hp=cs.hp;child.stats.maxHp=cs.maxHp;
  child._generation=Math.max(f._generation,m._generation)+1;
  child._parents={father:f.name,mother:m.name};
  child._skillId=skillId;child._isMutant=isMutant;child._compatibility=cs.compat;
  if(skillId)child.applyBloodSkill();if(isMutant)child._color='#ff44ff';
  gWarriors.push(child);
  state.pedigree.push({childName,father:f.name,mother:m.name,power:child.stats.power,wisdom:child.stats.wisdom,generation:child._generation,skillId,skillName:child.skillName(),compat:cs.compat,isMutant});
  addLog('縁組成立：'+f.name+' × '+m.name+' → '+childName+'（第'+child._generation+'世代・0歳）'+(skillId?'　血統:'+child.skillName():'')+(isMutant?'　★突然変異！':''),isMutant);
  closeModal('engumi-modal');
  const gIcon=GENDER_ICON[gender]||'';
  document.getElementById('suc-kamon').textContent=isMutant?'🔥':(season.id==='spring'?'🌸':'👶');
  document.getElementById('suc-name').textContent=childName+(isMutant?' ✨':'')+' '+gIcon;
  document.getElementById('suc-stats').innerHTML=`武力 ${child.stats.power}　知力 ${child.stats.wisdom}　体力 ${child.stats.maxHp}\n${ROLES[jobId]}　第${child._generation}世代　0歳\n${f.name} ${GENDER_ICON[f.gender]||''} × ${m.name} ${GENDER_ICON[m.gender]||''} の子\n親相性: ${cs.compat}pt（+${cs.bonus}ボーナス）`;
  document.getElementById('suc-skill').textContent=sk?(isMutant?'🔥 突然変異！ ':'血統継承: ')+sk.icon+' '+sk.name:'';
  document.getElementById('suc-compat').textContent=compatLabel(cs.compat);
  if(isMutant){showToast('🔥 突然変異血統発現！ '+sk.name,4000,true);document.getElementById('success-overlay').classList.add('mutant-flash');setTimeout(()=>document.getElementById('success-overlay').classList.remove('mutant-flash'),2000);}
  openModal('success-overlay');updateStatusUI();updatePartyRow();
}

function bDrawSpeechBubble(c,gx,gy,text,side,alpha){

function bForceLog(t,h){bLogText=t;bLogTimer=h??B_LOG_HOLD;}
function bTickLog(){if(bLogTimer>0)bLogTimer--;document.getElementById('battle-log-bar').textContent=bLogText;}
function bAddBubble(side,text,life){life=life??130;bBubbles=bBubbles.filter(b=>b.side!==side);bBubbles.push({side,text,life,maxLife:life});}
function bTickBubbles(){bBubbles=bBubbles.filter(b=>(b.life--,b.life>0));}
function bAddPt(x,y,color,n){n=n??6;for(let i=0;i<n;i++)bParticles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.9)*5,life:(18+Math.random()*14)|0,maxLife:32,color,size:(2+Math.random()*3)|0});}
function bAddDmg(x,y,dmg,color){bDamageNums.push({x,y,vy:-2.2,life:44,text:String(dmg),color:color||'#ffee40'});}
function bUpdateParticles(){bParticles=bParticles.filter(p=>p.life>0);bParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life--;});bDamageNums=bDamageNums.filter(d=>d.life>0);bDamageNums.forEach(d=>{d.y+=d.vy;d.vy*=.92;d.life--;});}
function bUpdateBattleUI(){const ph=Math.max(0,bGenerals.p.hp),eh=Math.max(0,bGenerals.e.hp);document.getElementById('bhp-player').textContent=ph;document.getElementById('bhp-enemy').textContent=eh;document.getElementById('bbar-player').style.width=(ph/bGenMaxHp.p*100).toFixed(1)+'%';document.getElementById('bbar-enemy').style.width=(eh/bGenMaxHp.e*100).toFixed(1)+'%';}
function bNearest(list,x,y){return list.reduce((b,t)=>Math.hypot(t.x-x,t.y-y)<Math.hypot(b.x-x,b.y-y)?t:b);}
function bFindTarget(s){const foes=bSoldiers.filter(t=>t.side!==s.side&&!t.dead);return foes.length?bNearest(foes,s.x,s.y):null;}
function bUpdateSoldiers(){
  bSoldiers.forEach(s=>{
    if(s.dead)return;if(s.stateTimer>0){s.stateTimer--;return;}
    if(!s.target||s.target.dead)s.target=bFindTarget(s);
    if(!s.target){const gen=bGenerals[s.side==='p'?'e':'p'];if(gen.dead)return;const dx=(gen.x+12)-(s.x+8),dy=(gen.y+15)-(s.y+10),dist=Math.hypot(dx,dy)||1;if(dist<B_ATTACK_RANGE+8){s.state='attack';s.stateTimer=22;const dmg=(2+Math.random()*3)|0;gen.hp-=dmg;gen.state='hit';gen.stateTimer=14;bAddPt(gen.x+12,gen.y+10,'#ffaaaa');bAddDmg(gen.x+6,gen.y-4,dmg,'#ff5050');bSetLog((s.side==='p'?'我が軍':'敵軍')+'が大将に'+dmg+'撃！');}else{s.state='walk';s.x+=dx/dist*1.3;s.y+=dy/dist*1.3;s.y=Math.max(B_FIELD_Y_MIN,Math.min(B_FIELD_Y_MAX,s.y));}return;}
    const t=s.target,dx=t.x-s.x,dy=t.y-s.y,dist=Math.hypot(dx,dy)||1;
    if(dist<B_ATTACK_RANGE){s.state='attack';s.stateTimer=16;const dmg=(3+Math.random()*4)|0;t.hp-=dmg;t.state='hit';t.stateTimer=10;bAddPt(t.x+8,t.y+8,'#ffddaa');bAddDmg(t.x+4,t.y-2,dmg);if(t.hp<=0){t.dead=true;bAddPt(t.x+8,t.y+8,'#ffd040',10);bSetLog((s.side==='p'?'敵軍':'我が軍')+'の兵士が倒れた！');}}
    else{s.state='walk';const spd=1.0+Math.random()*.3;s.x+=dx/dist*spd;s.y+=dy/dist*spd;s.y=Math.max(B_FIELD_Y_MIN,Math.min(B_FIELD_Y_MAX,s.y));}
  });
}
function bUpdateGenerals(){
  ['p','e'].forEach(side=>{
    const g=bGenerals[side],foe=bGenerals[side==='p'?'e':'p'];
    if(g.dead)return;if(g.stateTimer>0){g.stateTimer--;return;}
    g.state='charge';
    if(bTickCount%160===(side==='p'?0:80)){bAddBubble(side,(side==='p'?LINES_P:LINES_E)[Math.floor(Math.random()*(side==='p'?LINES_P:LINES_E).length)],130);}
    const ft=bSoldiers.filter(s=>s.side!==side&&!s.dead);
    if(ft.length){const tgt=bNearest(ft,g.x+12,g.y+15),tx=tgt.x+8,ty=tgt.y+10,dist=Math.hypot(tx-(g.x+12),ty-(g.y+15))||1;if(dist<B_GEN_ATK_RANGE){g.state='attack';g.stateTimer=18;const dmg=(8+Math.random()*8)|0;tgt.hp-=dmg;tgt.state='hit';tgt.stateTimer=12;bAddPt(tgt.x+8,tgt.y+8,'#fff060',8);bAddDmg(tgt.x,tgt.y-6,dmg,'#ffdd20');if(tgt.hp<=0){tgt.dead=true;bSetLog('大将が敵兵を薙ぎ払った！');}}else{g.x+=((tx-(g.x+12))/dist)*B_GEN_CHARGE_SPEED;g.y+=((ty-(g.y+15))/dist)*B_GEN_CHARGE_SPEED;g.y=Math.max(B_FIELD_Y_MIN-10,Math.min(B_FIELD_Y_MAX+10,g.y));}}
    else{const tx=foe.x+12,ty=foe.y+15,dist=Math.hypot(tx-(g.x+12),ty-(g.y+15))||1;if(dist<B_GEN_ATK_RANGE){g.state='attack';g.stateTimer=26;const dmg=(10+Math.random()*10)|0;foe.hp-=dmg;foe.state='hit';foe.stateTimer=22;bAddPt(foe.x+12,foe.y+15,'#ff8040',12);bAddDmg(foe.x+6,foe.y-8,dmg,'#ff4020');bAddBubble(side,DUEL_LINES[Math.floor(Math.random()*DUEL_LINES.length)],110);bForceLog('大将同士の一騎討ち！ '+dmg+'ダメージ！',(B_LOG_HOLD*2)|0);}else{g.x+=((tx-(g.x+12))/dist)*B_GEN_CHARGE_SPEED;g.y+=((ty-(g.y+15))/dist)*B_GEN_CHARGE_SPEED;g.y=Math.max(B_FIELD_Y_MIN-10,Math.min(B_FIELD_Y_MAX+10,g.y));}}
  });
}
function bGameLoop(bgCtx,ctx){
  bTickCount++;const af=(bTickCount>>3)&1;
  if(bGameState==='battle'){bUpdateSoldiers();bUpdateGenerals();bUpdateParticles();bTickLog();bTickBubbles();if(bGenerals.p.hp<=0||bGenerals.e.hp<=0){bGameState='end';bAddBubble(bGenerals.p.hp>0?'p':'e','勝ったぞ！',400);bEndBattle(bGenerals.p.hp>0);return;}}
  ctx.clearRect(0,0,BW,BH);
  const allUnits=[...bSoldiers.filter(s=>!s.dead).map(s=>({type:'soldier',side:s.side,x:s.x,y:s.y,state:s.state,wf:((bTickCount+s.walkOffset)>>3)&1})),...['p','e'].filter(sd=>!bGenerals[sd].dead).map(sd=>({type:'general',side:sd,x:bGenerals[sd].x,y:bGenerals[sd].y,state:bGenerals[sd].state,wf:af,isMutant:bGenerals[sd].isMutant||false}))];
  allUnits.sort((a,b)=>a.y-b.y);
  allUnits.forEach(u=>{const pal=u.side==='p'?PAL_P:PAL_E;const dir=u.side==='p'?1:-1;if(u.type==='soldier')bDrawSoldier(ctx,u.x|0,u.y|0,pal,dir,u.wf,u.state);else bDrawGeneral(ctx,u.x|0,u.y|0,pal,dir,u.wf,u.state,u.isMutant);});
  bParticles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x|0,p.y|0,p.size,p.size);});
  ctx.globalAlpha=1;
  bDamageNums.forEach(d=>{ctx.font='bold 11px DotGothic16,monospace';ctx.strokeStyle='#0009';ctx.lineWidth=3;ctx.strokeText(d.text,d.x,d.y);ctx.fillStyle=d.color;ctx.fillText(d.text,d.x,d.y);});
  bBubbles.forEach(b=>{const g=bGenerals[b.side];if(!g||g.dead)return;bDrawSpeechBubble(ctx,g.x,g.y,b.text,b.side,Math.min(1,b.life/20));});
  bUpdateBattleUI();
  bLoopId=requestAnimationFrame(()=>bGameLoop(bgCtx,ctx));
}
function bEndBattle(isWin){
  if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
  const season=getSeason(state.month);
  const titleEl=document.getElementById('bres-title-text');
  const detailEl=document.getElementById('bres-detail-text');
  if(isWin){
    let reward=Math.floor(rnd(1800,2400)*season.kokuMul);
    let uniGain=4+Math.random()*3;
    let extraMsg='';
    if(currentEnemy&&currentEnemy.province){
      const p=currentEnemy.province;p.clan='player';
      uniGain=8+Math.random()*4;reward+=rnd(800,1400);
      extraMsg='\n【'+p.name+'】を平定！';
      addLog('【天下図】'+p.name+'を制圧');showToast('🎉 '+p.name+' を平定！',4000);
    }
    state.koku+=reward;state.unification=Math.min(100,state.unification+uniGain);
    gWarriors.forEach(w=>{if(w.isMature()){let pb=rnd(3,7);if(w._skillId==='brave'||w._skillId==='berserk')pb+=3;if(season.id==='summer')pb+=2;w.stats.power=clamp(w.stats.power+pb,1,99);w.stats.hp=Math.min(w.stats.maxHp,w.stats.hp+rnd(8,15));}});
    const seasonNote=season.kokuMul>1?'\n'+season.icon+' '+season.name+'の恩恵 ×'+season.kokuMul.toFixed(1):'';
    titleEl.textContent='勝利！';
    detailEl.textContent='石高 +'+reward.toLocaleString()+'\n統一度 +'+uniGain.toFixed(1)+'%'+seasonNote+extraMsg;
    addLog('合戦勝利（報酬'+reward+'石・'+season.name+'補正）');
  } else {
    const loss=rnd(400,700);state.koku=Math.max(0,state.koku-loss);
    gWarriors.forEach(w=>{w.stats.hp=Math.max(1,w.stats.hp-rnd(15,25));if(season.id==='winter')w.stats.hp=Math.max(1,w.stats.hp-5);});
    titleEl.textContent='敗北…';
    detailEl.textContent='石高 -'+loss.toLocaleString()+'\n武将が負傷した'+(season.id==='winter'?'\n❄ 冬の追加負傷':'');
    addLog('合戦敗北（損失'+loss+'石）');
  }
  currentEnemy=null;
  document.getElementById('battle-result-panel').classList.add('show');
  updateStatusUI();updatePartyRow();
}
function openBattle(fromMap){
  if(!gWarriors.length){showToast('武将がいません');return;}
  if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}
  const sid=getSeason(state.month).id;
  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-result-panel').classList.remove('show');
  document.getElementById('battle-log-bar').textContent='両軍、突撃開始！ '+SEASON_ICONS[sid]+' '+SEASON_NAMES[sid]+'の章';
  const bgCv=document.getElementById('bg-canvas'),mainCv=document.getElementById('battle-main-canvas'),frame=document.getElementById('bscr-frame');
  function resizeBattle(){const rw=frame.clientWidth,rh=frame.clientHeight;[bgCv,mainCv].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=rw+'px';cv.style.height=rh+'px';});}
  resizeBattle();
  const bgCtx=bgCv.getContext('2d'),ctx=mainCv.getContext('2d');
  [bgCtx,ctx].forEach(c=>c.imageSmoothingEnabled=false);
  bDrawBackground(bgCtx,sid);
  bGameState='battle';bTickCount=0;bLogText='両軍、突撃開始！';bLogTimer=B_LOG_HOLD*2;
  bParticles=[];bDamageNums=[];bBubbles=[];
  const matures=gWarriors.filter(w=>w.isMature());const active=matures.length?matures:gWarriors;
  if(!active.length){showToast('出陣できる武将がいません');document.getElementById('battle-screen').classList.remove('show');return;}
  const leader=active[0];
  document.getElementById('bunit-pname').textContent=leader?leader.name.slice(-3):'我が軍';
  document.getElementById('bunit-ename').textContent=(fromMap&&currentEnemy)?currentEnemy.name:'敵　軍';
  let totalPower=active.reduce((s,w)=>{let p=w.stats.power+w.stats.wisdom;if(w._skillId==='brave'||w._skillId==='swift')p*=1.15;if(w._skillId==='berserk')p*=1.3;if(w._skillId==='sage')p*=1.1;return s+p;},0);
  if(sid==='summer')totalPower*=1.1;if(sid==='winter')totalPower*=.9;
  const playerPower=clamp(Math.floor(totalPower/active.length),60,180);
  let enemyBase=120+Math.floor(state.unification*.4);
  if(fromMap&&currentEnemy)enemyBase=clamp(currentEnemy.strength*1.5,60,220);
  const enemyPower=clamp(enemyBase,60,220)|0;
  bGenMaxHp={p:playerPower,e:enemyPower};
  bSoldiers=[];
  const soldierCount=Math.min(8,4+gWarriors.length);
  for(let i=0;i<soldierCount;i++){const col=i%2,row=Math.floor(i/2);bSoldiers.push({side:'p',x:18+col*26,y:B_FIELD_Y_MIN+14+row*42,state:'walk',stateTimer:0,hp:20,maxHp:20,target:null,dead:false,walkOffset:(i*7)%12});}
  const enemyCount=Math.min(3+Math.floor(state.unification/20),8);
  for(let i=0;i<enemyCount;i++){const col=i%2,row=Math.floor(i/2);bSoldiers.push({side:'e',x:BW-22-col*26,y:B_FIELD_Y_MIN+14+row*42,state:'walk',stateTimer:0,hp:20,maxHp:20,target:null,dead:false,walkOffset:(i*11)%12});}
  bGenerals={p:{x:30,y:BH/2-15,hp:playerPower,maxHp:playerPower,state:'charge',stateTimer:0,dead:false,isMutant:leader&&leader._isMutant},e:{x:BW-54,y:BH/2-15,hp:enemyPower,maxHp:enemyPower,state:'charge',stateTimer:0,dead:false,isMutant:false}};
  document.getElementById('bhp-player').textContent=playerPower;document.getElementById('bhp-enemy').textContent=enemyPower;
  document.getElementById('bbar-player').style.width='100%';document.getElementById('bbar-enemy').style.width='100%';
  bAddBubble('p',LINES_P[0],150);bAddBubble('e',LINES_E[0],150);
  bLoopId=requestAnimationFrame(()=>bGameLoop(bgCtx,ctx));
}
function closeBattle(){if(bLoopId){cancelAnimationFrame(bLoopId);bLoopId=null;}document.getElementById('battle-screen').classList.remove('show');}

function performIdleTick(){
  state.turn++;state.ticksSinceMonth++;ageTickCounter++;
  const season=getSeason(state.month);
  gWarriors.forEach(w=>{
    let pg=Math.random()<.4*season.growthMul?1:0;
    let wg=Math.random()<.25*season.growthMul?1:0;
    if(w._skillId==='brave'&&Math.random()<.2)pg++;
    if(w._skillId==='wise'&&Math.random()<.2)wg++;
    if(w._skillId==='sage'&&Math.random()<.15){pg++;wg++;}
    w.stats.power=clamp(w.stats.power+pg,1,99);
    w.stats.wisdom=clamp(w.stats.wisdom+wg,1,99);
    const hpPct=w.stats.hp/w.stats.maxHp;
    if(hpPct<.9){let rec=Math.floor((1-hpPct)*4+1);if(w._skillId==='iron')rec=Math.floor(rec*1.5);if(season.id==='winter')rec=Math.max(1,Math.floor(rec*.7));w.stats.hp=Math.min(w.stats.maxHp,w.stats.hp+rec);}
  });
  if(state.ticksSinceMonth>=TICKS_PER_MONTH)advanceMonth();
  if(ageTickCounter%25===0){
    gWarriors.forEach(w=>{
      if(w.age<70){w.age++;if(w.age===MATURE_AGE){showToast(w.name+' が成人！（'+state.year+'年'+state.month+'月）',3000);addLog(w.name+' が'+MATURE_AGE+'歳で成人');}}
    });
  }
  updateStatusUI();updatePartyRow();
}

function initIsoCanvas(){
  const canvas=document.getElementById('iso-canvas');
  const field=document.getElementById('iso-field');
  if(!canvas||!field)return;
  function resize(){canvas.width=field.clientWidth||window.innerWidth;canvas.height=Math.max(field.clientHeight||200,200);}
  resize();window.addEventListener('resize',resize);
  const ctx=canvas.getContext('2d');
  function isoToScreen(ix,iy){
    const cx=canvas.width/2,cy=canvas.height*.45;
    const tileW=Math.min(canvas.width*.22,canvas.height*.28),tileH=tileW*.5;
    return{x:cx+(ix-iy)*tileW*.5,y:cy+(ix+iy)*tileH*.5};
  }
  function drawTile(ix,iy,topC,leftC,rightC){
    const tileW=Math.min(canvas.width*.22,canvas.height*.28),tileH=tileW*.5,th=tileW*.3;
    const{x,y}=isoToScreen(ix,iy);
    ctx.fillStyle=topC;ctx.beginPath();ctx.moveTo(x,y-tileH/2);ctx.lineTo(x+tileW/2,y);ctx.lineTo(x,y+tileH/2);ctx.lineTo(x-tileW/2,y);ctx.closePath();ctx.fill();
    ctx.fillStyle=leftC;ctx.beginPath();ctx.moveTo(x-tileW/2,y);ctx.lineTo(x,y+tileH/2);ctx.lineTo(x,y+tileH/2+th);ctx.lineTo(x-tileW/2,y+th);ctx.closePath();ctx.fill();
    ctx.fillStyle=rightC;ctx.beginPath();ctx.moveTo(x,y+tileH/2);ctx.lineTo(x+tileW/2,y);ctx.lineTo(x+tileW/2,y+th);ctx.lineTo(x,y+tileH/2+th);ctx.closePath();ctx.fill();
  }
  function drawFacility(fp){
    const fm=FACILITY_MAP[fp.key];if(!fm)return;
    const{x,y}=isoToScreen(fp.tx,fp.ty);
    if(x<-20||x>canvas.width+20||y<-20||y>canvas.height+20)return;
    const tileW=Math.min(canvas.width*.22,canvas.height*.28);
    const iconSz=Math.max(14,Math.round(tileW*.55));
    ctx.save();ctx.font=iconSz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(fm.icon,x,y-8);
    ctx.font=Math.max(7,Math.round(tileW*.22))+'px Noto Serif JP';ctx.fillStyle=fm.color;ctx.fillText(fm.name,x,y+8);ctx.restore();
  }
  function getFieldColors(){
    const sid=getSeason(state.month).id;
    if(sid==='spring')return{top:'rgba(80,110,40,.6)',left:'rgba(50,70,20,.7)',right:'rgba(70,100,30,.6)'};
    if(sid==='summer')return{top:'rgba(50,110,30,.6)',left:'rgba(30,70,15,.7)',right:'rgba(40,90,25,.6)'};
    if(sid==='autumn')return{top:'rgba(80,65,30,.6)',left:'rgba(55,40,15,.7)',right:'rgba(70,55,22,.6)'};
    return{top:'rgba(50,65,85,.6)',left:'rgba(30,45,65,.7)',right:'rgba(40,55,75,.6)'};
  }
  function drawWarrior(w){
    const{x,y}=isoToScreen(w.isoX,w.isoY);
    const hpPct=w.stats.hp/w.stats.maxHp;
    const r=Math.max(7,Math.round(canvas.width*.028));const bw=r*2.6;
    const gIcon=GENDER_ICON[w.gender]||'';
    ctx.save();
    if(w._isMutant){ctx.shadowColor='#ff44ff';ctx.shadowBlur=8;}
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(x,y+r*.3,r*1.1,r*.4,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=w._isMutant?8:0;ctx.fillStyle=w._color;
    ctx.beginPath();ctx.arc(x,y-r*.7,r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=w._isMutant?'#ff88ff':'rgba(255,255,255,.4)';ctx.lineWidth=w._isMutant?2:1;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-bw/2,y+r*.5,bw,3);
    ctx.fillStyle=hpPct>.6?'#44ff88':hpPct>.3?'#ffaa44':'#ff4444';ctx.fillRect(x-bw/2,y+r*.5,bw*hpPct,3);
    ctx.fillStyle='rgba(245,232,200,.9)';ctx.font=Math.max(7,r-1)+'px Noto Serif JP';ctx.textAlign='center';ctx.fillText(w.name.slice(-1),x,y-r*.35);
    ctx.font=Math.max(6,r-3)+'px sans-serif';ctx.fillStyle=w.gender==='female'?'#ffaacc':'#aaccff';ctx.fillText(gIcon,x+r*.85,y-r*1.05);
    if(!w.isMature()){ctx.fillStyle='#ffdd88';ctx.font='6px sans-serif';ctx.fillText(w.age+'歳',x,y+r*1.0);}
    if(w._skillId&&w.isMature()){const sk=getSkillById(w._skillId);if(sk){ctx.font=Math.max(7,r)+'px serif';ctx.fillText(sk.icon,x+r*1.1,y-r*1.2);}}
    ctx.restore();
  }
  let lastTime=0;
  function loop(ts){
    const dt=ts-lastTime;
    if(dt>50){
      lastTime=ts;ctx.clearRect(0,0,canvas.width,canvas.height);
      const fc=getFieldColors();
      for(let iy=-2;iy<=3;iy++)for(let ix=-2;ix<=2;ix++){
        const isPath=(ix===0||iy===0);
        drawTile(ix,iy,isPath?'rgba(120,90,40,.5)':fc.top,isPath?'rgba(80,55,20,.6)':fc.left,isPath?'rgba(100,70,30,.5)':fc.right);
      }
      FACILITY_POSITIONS.forEach(fp=>drawFacility(fp));
      gWarriors.forEach(w=>w.tick());
      const sorted=[...gWarriors].sort((a,b)=>(a.isoX+a.isoY)-(b.isoX+b.isoY));
      sorted.forEach(w=>drawWarrior(w));
    }
    isoAnimFrame=requestAnimationFrame(loop);
  }
  isoAnimFrame=requestAnimationFrame(loop);
}

function devNextMonth(){advanceMonth();showToast('月を進めた：'+state.year+'年'+state.month+'月');closeModal('settings-modal');}
function devNextYear(){for(let i=0;i<12;i++)advanceMonth();showToast('年を進めた：'+state.year+'年');closeModal('settings-modal');}
function devAddWarrior(){
  const gender=Math.random()<.5?'male':'female';
  const name=randName(gender);const jobId=Math.floor(Math.random()*10);const age=rnd(20,35);
  const w=new IsoWarrior(name,jobId,rnd(35,65),0,2+Math.random()*3,gender,age);
  if(Math.random()<.4){const sk=BLOOD_SKILLS[Math.floor(Math.random()*BLOOD_SKILLS.length)];w._skillId=sk.id;w.applyBloodSkill();}
  gWarriors.push(w);updatePartyRow();
  showToast(name+' が加入！（'+age+'歳 '+GENDER_LABEL[gender]+'）'+(w._skillId?'　'+w.skillName():''));
  closeModal('settings-modal');
}

// ── 武将管理モーダル ──
function openWarriorsList(){
  const content=document.getElementById('warriors-list-content');
  if(!content)return;
  renderWarriorsList();
  openModal('warriors-modal');
}
function renderWarriorsList(){
  const content=document.getElementById('warriors-list-content');
  if(!content)return;
  if(!gWarriors.length){content.innerHTML='<div style="text-align:center;padding:32px;color:rgba(200,150,12,.4);font-size:12px;">武将がいません</div>';return;}
  let html='<div style="margin-bottom:10px;font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.3em;padding:0 2px;">タップで詳細 / 引退ボタンで除籍（2名以上の場合）</div>';
  gWarriors.forEach((w,i)=>{
    const pG=getGrade(w.stats.power);const wG=getGrade(w.stats.wisdom);
    const hpPct=Math.round((w.stats.hp/w.stats.maxHp)*100);const hpG=getGrade(Math.floor(hpPct*.6+40));
    const gIcon=GENDER_ICON[w.gender]||'';
    const canRetire=gWarriors.length>2;
    html+=`<div style="display:flex;align-items:center;gap:8px;padding:9px 6px;border-bottom:1px solid rgba(200,150,12,.1);">
      <div style="flex:1;cursor:pointer;" onclick="closeModal('warriors-modal');setTimeout(()=>openWarriorModal(gWarriors[${i}]),80);">
        <div style="font-size:12px;font-weight:700;color:var(--gold-l);">${w.name}${w._isMutant?' ✨':''} <span style="color:rgba(245,228,180,.5);font-size:9px;">${gIcon} ${ROLES[w.jobId]||'武者'}</span></div>
        <div style="font-size:10px;margin-top:2px;color:rgba(245,228,180,.7);">
          武<span class="sg-${pG.grade}">${pG.grade}</span>(${w.stats.power})
          知<span class="sg-${wG.grade}">${wG.grade}</span>(${w.stats.wisdom})
          体<span class="sg-${hpG.grade}">${hpG.grade}</span>(${hpPct}%)
          ・${w.age}歳・第${w._generation}世代
        </div>
        ${w._skillId?'<div style="font-size:8px;color:#ff88ff;margin-top:1px;">'+w.skillName()+'</div>':''}
        <div style="font-size:8px;color:#aaddff;margin-top:1px;">${w.locationLabel()}${!w.isMature()?' 〈育成中〉':''}</div>
      </div>
      ${canRetire?`<button onclick="retireWarrior(${i})" style="flex-shrink:0;background:rgba(139,0,0,.35);border:1px solid rgba(139,0,0,.5);color:#ff8888;font-size:10px;padding:6px 10px;border-radius:6px;cursor:pointer;touch-action:manipulation;letter-spacing:.1em;">引退</button>`:''}
    </div>`;
  });
  content.innerHTML=html;
}
function retireWarrior(idx){
  if(gWarriors.length<=2){showToast('武将が2名以下のため引退できません');return;}
  const w=gWarriors[idx];
  if(!w){renderWarriorsList();return;}
  // 2段階確認: 同じindexを2回押したら実行
  if(retireWarrior._pending===idx){
    retireWarrior._pending=null;
    addLog(w.name+' が引退した（'+w.age+'歳・第'+w._generation+'世代）');
    gWarriors.splice(idx,1);
    updatePartyRow();updateStatusUI();
    showToast(w.name+' が引退した');
    renderWarriorsList();
  } else {
    retireWarrior._pending=idx;
    showToast(w.name+' を引退させます。もう一度「引退」を押して確定');
    setTimeout(()=>{retireWarrior._pending=null;},4000);
  }
}

// ============================================================
//  初期化
// ============================================================
function initGame(){
  spawnStars();
  const initialWarriors=[
    {name:'織田信長',jobId:0,power:72,gender:'male',  age:28,skillId:'brave'},
    {name:'豊臣秀吉',jobId:1,power:58,gender:'male',  age:32,skillId:'wise'},
    {name:'徳川家康',jobId:2,power:65,gender:'male',  age:35,skillId:'iron'},
    {name:'帰蝶',    jobId:7,power:45,gender:'female',age:26,skillId:'loyal'},
  ];
  initialWarriors.forEach((cfg,i)=>{
    const w=new IsoWarrior(cfg.name,cfg.jobId,cfg.power,(i-1.5)*.8,2.5+Math.random()*2,cfg.gender,cfg.age);
    w.stats.wisdom=cfg.gender==='female'?rnd(50,70):rnd(30,55);
    if(cfg.skillId){w._skillId=cfg.skillId;w.applyBloodSkill();}
    gWarriors.push(w);
  });
  const startSeason=getSeason(state.month);
  updateWeatherEffect(startSeason);
  updateTimeUI();
  initIsoCanvas();
  idleTimer=setInterval(performIdleTick,3000);
  updateStatusUI();updatePartyRow();
  addLog('元年1月。天下統一を目指せ！',false,true);
  showToast('戦国血脈 〜覇道の系譜〜 開始！',3000);
}

window.onload=initGame;
</script>
