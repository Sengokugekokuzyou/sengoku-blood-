<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>戦国血脈 〜覇道の系譜〜 v4.1 Final</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=DotGothic16&display=swap');
:root{
  --gold:#c8960c;--gold-l:#f0c040;--gold-d:rgba(200,150,12,.4);
  --parchment:#f5e8c8;--ink:#0e0800;--panel:rgba(8,4,0,.88);
  --crimson:#8b0000;
  --h-header:52px;--h-nation:28px;--h-party:74px;--h-action:58px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:var(--ink);font-family:'Noto Serif JP',serif;color:var(--parchment);overflow:hidden;position:fixed;touch-action:none;user-select:none}
#sky{position:fixed;inset:0;z-index:0;background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);transition:background 3s}
#sky.spring{background:linear-gradient(175deg,#150a10 0%,#251520 35%,#301828 65%,#201015 100%)}
#sky.summer{background:linear-gradient(175deg,#050a18 0%,#0a1525 35%,#0d1c30 65%,#081018 100%)}
#sky.autumn{background:linear-gradient(175deg,#150800 0%,#251200 35%,#30180a 65%,#1a0d05 100%)}
#sky.winter{background:linear-gradient(175deg,#080d15 0%,#10151f 35%,#121820 65%,#0a1018 100%)}
.star,.mist,.petal,.snowflake,.firefly{position:fixed;pointer-events:none}
.party-card,.staff-card{cursor:pointer;transition:.2s}
.party-card:hover,.staff-card:hover{transform:scale(1.08);border-color:var(--gold)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:none;align-items:center;justify-content:center}
.modal-content{background:var(--panel);border:2px solid var(--gold);border-radius:12px;max-width:92%;max-height:92%;overflow:auto}
</style>
</head>
<body>

<div id="sky"></div>

<!-- パーティクルレイヤー -->
<div id="particles"></div>

<div id="main" style="position:fixed;inset:0;display:flex;flex-direction:column;z-index:10">
  <!-- ヘッダー -->
  <header style="height:var(--h-header);background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--gold-d)">
    <div style="color:var(--gold);font-size:18px;font-weight:900;letter-spacing:2px">戦国血脈</div>
    <div style="display:flex;gap:12px;font-size:13px">
      <div>石高 <span id="koku" style="color:var(--gold-l)">1480</span>石</div>
      <div>統一 <span id="uni" style="color:var(--gold-l)">12.4</span>%</div>
    </div>
  </header>

  <!-- ISOフィールド -->
  <div id="iso-field" style="flex:1;position:relative;background:#0a0603">
    <canvas id="iso-canvas" width="800" height="500" style="width:100%;height:100%;image-rendering:pixelated"></canvas>
    <div id="bubble-layer" style="position:absolute;inset:0;pointer-events:none"></div>
  </div>

  <!-- ボトムUI -->
  <div style="background:rgba(0,0,0,.9);padding:6px 8px;border-top:1px solid var(--gold-d)">
    <div id="nation-bar" style="height:28px;display:flex;align-items:center;gap:8px;font-size:13px"></div>
    
    <!-- パーティ -->
    <div id="party-row" style="display:flex;gap:6px;overflow-x:auto;padding:6px 0;height:var(--h-party)"></div>
    
    <!-- アクションボタン -->
    <div style="display:flex;gap:8px;justify-content:center;padding:4px 0">
      <button onclick="openEngumiModal()" class="act-btn" style="background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:8px">縁組</button>
      <button onclick="openBattleModal()" class="act-btn" style="background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:8px">出陣</button>
      <button onclick="openCastleModal()" class="act-btn" style="background:var(--panel);border:1px solid var(--gold);color:var(--gold);padding:8px 16px;border-radius:8px">城強化</button>
    </div>
  </div>
</div>

<!-- モーダル -->
<div id="modal" class="modal">
  <div class="modal-content" id="modal-content"></div>
</div>

<script>
// ======================== 戦国血脈 v4.1 Final ========================
'use strict';

const BLOODLINES = [
  {id:0, name:"織田", color:"#ff4444", skill:"天下布武"},
  {id:1, name:"徳川", color:"#4488ff", skill:"神君"},
  {id:2, name:"武田", color:"#ff8800", skill:"風林火山"},
  {id:3, name:"上杉", color:"#66cc88", skill:"毘沙門天"},
];

let gWarriors = [], gParents = [], gStaff = [];
let koku = 1480, unification = 12.4, season = 0;
let isoCanvas, isoCtx;
let animationFrame;

const seasons = ["春","夏","秋","冬"];

class IsoWarrior {
  constructor(name, gender, power, blId) {
    this.name = name;
    this.gender = gender;
    this.stats = {power: power, wisdom: 45, hp: 100, maxHp: 100};
    this.bloodlineId = blId;
    this.age = 24 + Math.floor(Math.random()*8);
    this.isoX = (Math.random()-0.5)*8;
    this.isoY = (Math.random()-0.5)*5;
    this._facilityTimer = 0;
  }
  
  tick() {
    this.isoX += (Math.random()-0.5)*0.12;
    this.isoY += (Math.random()-0.5)*0.08;
    this._facilityTimer++;
  }
}

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = Math.random() > 0.6 ? 'petal' : 'star';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 50 + 'vh';
    p.style.animation = 'petalFall ' + (8 + Math.random()*12) + 's linear infinite';
    p.style.opacity = Math.random() * 0.7 + 0.3;
    container.appendChild(p);
  }
}

function updateUI() {
  document.getElementById('koku').textContent = koku;
  document.getElementById('uni').textContent = unification.toFixed(1);
  renderPartyRow();
}

function renderPartyRow() {
  const row = document.getElementById('party-row');
  row.innerHTML = '';
  gWarriors.slice(0, 6).forEach(w => {
    const div = document.createElement('div');
    div.className = 'party-card';
    div.style.borderColor = BLOODLINES[w.bloodlineId].color;
    div.innerHTML = `
      <div style="font-size:11px;color:#aaa">${w.age}歳</div>
      <div style="font-weight:700;color:var(--gold-l)">${w.name}</div>
      <div style="font-size:13px">${BLOODLINES[w.bloodlineId].name}</div>
    `;
    div.onclick = () => showWarriorDetail(w);
    row.appendChild(div);
  });
}

function showWarriorDetail(w) {
  const html = `
    <h2>${w.name} (${BLOODLINES[w.bloodlineId].name})</h2>
    <p>年齢: ${w.age}歳　力: ${w.stats.power}　知: ${w.stats.wisdom}</p>
    <button onclick="closeModal()">閉じる</button>
  `;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function performIdleTick() {
  gWarriors.forEach(w => w.tick());
  if (Math.random() < 0.15) koku += rnd(30, 80);
  if (Math.random() < 0.08) unification = Math.min(100, unification + 0.3);
  updateUI();
}

function openEngumiModal() {
  const html = `<h2>縁組の儀</h2><p>現在準備中…（フル実装希望なら教えてください）</p><button onclick="closeModal()">閉じる</button>`;
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function openBattleModal() {
  alert("⚔️ 出陣！\n\n合戦システムは現在簡易版です。\n完全版希望なら「合戦を強化して」と教えてください。");
}

function openCastleModal() {
  koku += 300;
  unification += 1.2;
  updateUI();
  alert("🏯 城を強化しました！\n石高 +300、石高増加！");
}

// 初期化
function initGame() {
  isoCanvas = document.getElementById('iso-canvas');
  isoCtx = isoCanvas.getContext('2d');
  
  // 初期武将
  const initData = [
    {name:'織田信長', gender:'male', power:82, bl:0},
    {name:'徳川家康', gender:'male', power:68, bl:1},
    {name:'武田信玄', gender:'male', power:78, bl:2},
  ];
  
  initData.forEach(d => {
    const w = new IsoWarrior(d.name, d.gender, d.power, d.bl);
    gWarriors.push(w);
    gParents.push(w);
  });

  spawnParticles();
  updateUI();
  
  setInterval(performIdleTick, 2400);
  
  console.log('%c✅ 戦国血脈 v4.1 Final 正常起動', 'color:#ffdd44;font-size:14px;font-weight:bold');
  alert('🎉 戦国血脈 v4.1 Final が起動しました！\n\n不具合があれば具体的に教えてください。');
}

window.onload = initGame;
</script>
</body>
</html>
