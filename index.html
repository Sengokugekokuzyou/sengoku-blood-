<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戦国血統シミュレーター FINAL</title>
<style>
:root{--accent:#0f0}
body{margin:0;background:#000;color:#0f0;font-family:sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
#header{padding:10px;background:#111;text-align:center;border-bottom:2px solid var(--accent)}
#main{flex:1;overflow:auto;padding:10px}
#footer{display:flex;background:#111;border-top:2px solid var(--accent)}
.button{flex:1;padding:12px;text-align:center}
.card{background:#111;padding:10px;margin:6px 0;border-radius:8px;border-left:4px solid var(--accent)}
.sel{outline:3px solid gold}
#mixPanel{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:3px solid gold;padding:12px;z-index:100;display:none}
.log{font-size:11px;opacity:0.8}
</style>
</head>
<body>
<div id="app">
  <div id="header">天文二十三年　戦国血統 <span id="time"></span></div>
  <div id="main"></div>
  <div id="footer">
    <div class="button" onclick="setView(0)">育成</div>
    <div class="button" onclick="setView(1)">家系</div>
    <div class="button" onclick="setView(2)">戦況</div>
  </div>
</div>
<div id="mixPanel"></div>

<script>
// ==================== CONFIG ====================
const CONFIG = { MAX_UNITS: 450, BIRTH_RATE: 0.22, WAR_INTERVAL: 85 };

// ==================== STATE ====================
let state = {
  time: 0,
  units: [],
  map: {oda:5,takeda:5,tokugawa:5,uesugi:5},
  logs: []
};

let selectedParents = [];
let view = 0;
let globalTension = 0;

// ==================== BLOODS ====================
const BLOODS = {
  oda: {name:"織田",color:"#c8102e"},
  takeda: {name:"武田",color:"#d52b1e"},
  tokugawa: {name:"徳川",color:"#1e3a8a"},
  uesugi: {name:"上杉",color:"#1a3c34"},
  hojo: {name:"北条",color:"#8b4513"},
  oni: {name:"鬼",color:"#800080"}
};

// ==================== UTILS ====================
const rand = () => Math.random();
const randInt = n => Math.floor(rand()*n);

// ==================== UNIT ====================
function createUnit() {
  const keys = Object.keys(BLOODS);
  return {
    id: Date.now() + rand(),
    name: "武将" + randInt(9999),
    blood: keys[randInt(keys.length)],
    power: 15 + randInt(55),
    alive: true,
    generation: 0,
    destiny: []
  };
}

// ==================== MIX ====================
function selectParent(id) {
  if (selectedParents.includes(id)) {
    selectedParents = selectedParents.filter(x => x !== id);
  } else if (selectedParents.length < 2) {
    selectedParents.push(id);
  }
  renderMixPanel();
}

function manualMix() {
  if (selectedParents.length !== 2) return;
  const a = state.units.find(u => u.id === selectedParents[0]);
  const b = state.units.find(u => u.id === selectedParents[1]);
  if (!a || !b) return;

  const child = createUnit();
  child.blood = rand() < 0.5 ? a.blood : b.blood;
  child.power = Math.floor((a.power + b.power) / 2 + rand() * 15);
  child.generation = Math.max(a.generation, b.generation) + 1;

  state.units.push(child);
  log(`🧬 ${a.name} × ${b.name} → ${child.name}誕生`);

  selectedParents = [];
  renderMixPanel();
}

// ==================== EVENTS ====================
function updateDestiny() {
  state.units.forEach(u => {
    if (!u.alive) return;
    u.destiny.forEach(d => {
      if (d.done) return;
      const target = state.units.find(x => x.id === d.targetId);
      if (target && target.alive && u.power > target.power) {
        target.alive = false;
        d.done = true;
        log("💀 親殺し発生");
      }
    });
  });
}

function godEvents() {
  globalTension += 0.0008;
  state.units.forEach(u => {
    if (rand() < 0.008 + globalTension * 0.01) {
      u.power = Math.min(100, u.power + 18);
      log("🔥 覚醒");
    }
  });
}

function doWar() {
  const keys = Object.keys(state.map);
  const a = keys[randInt(keys.length)];
  const b = keys[randInt(keys.length)];
  if (a === b) return;

  const win = rand() < 0.5 ? a : b;
  const lose = win === a ? b : a;

  state.map[win] = (state.map[win]||0) + 1;
  state.map[lose] = Math.max(0, (state.map[lose]||0) - 1);

  log(`⚔ ${a} vs ${b} → ${win}勝利`);
}

// ==================== LOG ====================
function log(text) {
  state.logs.unshift(`[${state.time}] ${text}`);
  if (state.logs.length > 60) state.logs.pop();
}

// ==================== UI ====================
function setView(v) {
  view = v;
  render();
}

function renderMixPanel() {
  const panel = document.getElementById("mixPanel");
  if (selectedParents.length !== 2) {
    panel.style.display = "none";
    return;
  }
  panel.style.display = "block";

  const a = state.units.find(u => u.id === selectedParents[0]);
  const b = state.units.find(u => u.id === selectedParents[1]);

  panel.innerHTML = `
    <div style="margin-bottom:8px">${a.name} × ${b.name}</div>
    <div onclick="manualMix()" style="background:#0f0;color:#000;padding:12px;text-align:center;border-radius:8px;font-weight:bold">
      配合する
    </div>
  `;
}

function render() {
  const main = document.getElementById("main");
  let html = "";

  if (view === 0) {
    html = `<h3>現役武将 (${state.units.length})</h3>`;
    html += state.units.slice(-30).map(u => {
      const sel = selectedParents.includes(u.id) ? "sel" : "";
      return `<div class="card \( {sel}" onclick="selectParent( \){u.id})">
        <b>\( {u.name}</b> [ \){u.blood}]　力:${u.power}
      </div>`;
    }).join("");
  } else if (view === 1) {
    html = `<h3>家系図</h3>` + state.units.slice(-100).map(u => 
      `<div class="card">\( {u.name} ( \){u.blood})</div>`
    ).join("");
  } else if (view === 2) {
    html = `<h3>戦況</h3>` + Object.keys(state.map).map(k => 
      `<div class="card">${k} : ${state.map[k]}</div>`
    ).join("");
  }

  html += `<h3>戦国ログ</h3>` + state.logs.slice(0,15).map(l => 
    `<div class="log">${l}</div>`
  ).join("");

  main.innerHTML = html;
  renderMixPanel();
  document.getElementById("time").textContent = `第${state.time}年`;
}

// ==================== LOOP ====================
function tick() {
  state.time++;

  if (rand() < CONFIG.BIRTH_RATE && state.units.length > 1) {
    const a = state.units[randInt(state.units.length)];
    const b = state.units[randInt(state.units.length)];
    if (a && b && a.id !== b.id) mix(a, b);
  }

  updateDestiny();
  godEvents();

  if (state.time % CONFIG.WAR_INTERVAL === 0) doWar();

  if (state.units.length > CONFIG.MAX_UNITS) {
    state.units = state.units.slice(0, CONFIG.MAX_UNITS);
  }
}

function gameLoop() {
  tick();
  render();
  requestAnimationFrame(gameLoop);
}

// ==================== START ====================
function init() {
  for (let i = 0; i < 20; i++) state.units.push(createUnit());
  log("天文二十三年　戦国乱世、始まる");
  render();
  gameLoop();
}

init();
</script>
</body>
</html>
