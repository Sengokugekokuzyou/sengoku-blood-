<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>戦国血脈 〜覇道の系譜〜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&display=swap');

  :root {
    --ink: #1a0f00;
    --parchment: #f5e8c8;
    --crimson: #8b0000;
    --gold: #c8960c;
    --gold-light: #f0c040;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none;
  }

  #bg { position: fixed; inset: 0; background: linear-gradient(180deg, #2a1a08 0%, #1a0f00 40%, #0d0800 100%); }

  .mist-layer {
    position: fixed; left: -20%; width: 140%; height: 80px;
    background: linear-gradient(90deg, transparent, rgba(245,232,200,0.05), rgba(245,232,200,0.08), rgba(245,232,200,0.04), transparent);
    border-radius: 50%; animation: drift linear infinite;
  }
  .mist-layer:nth-child(1) { top: 35%; animation-duration: 28s; }
  .mist-layer:nth-child(2) { top: 55%; animation-duration: 22s; animation-delay: -8s; opacity: 0.7; }
  .mist-layer:nth-child(3) { top: 45%; animation-duration: 35s; animation-delay: -15s; opacity: 0.5; }
  @keyframes drift {
    0% { transform: translateX(-10%) scaleY(1); } 50% { transform: translateX(5%) scaleY(1.3); } 100% { transform: translateX(-10%) scaleY(1); }
  }

  .petal {
    position: fixed;
    background: radial-gradient(ellipse, rgba(255,200,200,0.9) 0%, rgba(255,150,150,0.4) 100%);
    border-radius: 50% 0 50% 0; animation: fall linear infinite; pointer-events: none;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg) translateX(0px); opacity: 0; }
    10% { opacity: 0.8; } 90% { opacity: 0.6; }
    100% { transform: translateY(100vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  #main { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; flex-direction: column; }

  #titlebar { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
  #game-title { color: var(--gold); font-size: 13px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 20px rgba(200,150,12,0.6); line-height: 1.8; }
  #game-title span { display: block; font-size: 9px; letter-spacing: 6px; color: rgba(200,150,12,0.6); font-weight: 400; }
  #stats-bar { text-align: right; color: rgba(245,232,200,0.7); font-size: 10px; letter-spacing: 2px; line-height: 2; }
  #stats-bar strong { color: var(--gold-light); font-size: 13px; }

  #castle-field { flex: 1; position: relative; overflow: hidden; padding: 10px 0 0; }

  #castle-base {
    position: absolute; bottom: 86px; left: 50%; transform: translateX(-50%);
    text-align: center; animation: castleFloat 6s ease-in-out infinite; pointer-events: none;
  }
  #castle-name {
    color: var(--gold); font-size: 12px; letter-spacing: 4px;
    text-shadow: 0 0 12px rgba(200,150,12,0.8);
  }
  @keyframes castleFloat { 0%,100% { transform: translateX(-50%) translateY(0px); } 50% { transform: translateX(-50%) translateY(-4px); } }

  .warrior {
    position: absolute; bottom: 100px; cursor: pointer; z-index: 15;
    transition: filter 0.2s;
    text-align: center;
  }
  .warrior:hover { filter: brightness(1.3); }
  .warrior-name {
    font-size: 11px; color: var(--gold-light); margin-top: 4px;
    text-shadow: 0 1px 4px #000;
  }

  /* 合戦画面 */
  #battle-screen {
    position: fixed; inset: 0; z-index: 500;
    background: linear-gradient(#0a0500, #1a0f00);
    display: none; flex-direction: column;
    color: var(--parchment);
  }
  #battle-screen.show { display: flex; }

  .battle-header {
    padding: 12px 20px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--gold);
    display: flex; justify-content: space-between; align-items: center;
  }
  .battle-title { font-size: 18px; letter-spacing: 3px; color: var(--gold-light); }

  .battle-field {
    flex: 1; position: relative; overflow: hidden;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7));
    display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 80px;
  }

  .army { text-align: center; width: 42%; }
  .army-title { font-size: 14px; margin-bottom: 12px; letter-spacing: 2px; }
  .our-army .army-title { color: #ffdd88; }
  .enemy-army .army-title { color: #ff8888; }

  .warrior-icon { font-size: 48px; margin: 8px 4px; display: inline-block; filter: drop-shadow(0 4px 12px #000); }

  .battle-log {
    height: 190px; background: rgba(10,6,0,0.95); border-top: 2px solid var(--gold);
    padding: 12px; overflow-y: auto; font-size: 13.5px; line-height: 1.6;
  }
  .log-line { margin: 4px 0; }
  .log-line.ally { color: #bbffbb; }

  .battle-footer {
    padding: 12px; background: rgba(0,0,0,0.85); display: flex; gap: 10px;
  }
  .battle-btn {
    flex: 1; padding: 14px; font-size: 15px; font-weight: 700;
    background: linear-gradient(#5a2a0a, #2a1800);
    border: 1px solid var(--gold); color: var(--parchment);
    cursor: pointer; border-radius: 4px;
  }
</style>
</head>
<body>

<div id="bg"></div>
<div class="mist-layer"></div><div class="mist-layer"></div><div class="mist-layer"></div>
<div class="petal" style="left:5%;width:6px;height:6px;animation-duration:8s;"></div>
<div class="petal" style="left:15%;width:8px;height:8px;animation-duration:11s;animation-delay:-3s;"></div>
<div class="petal" style="left:30%;width:5px;height:5px;animation-duration:9s;animation-delay:-6s;"></div>
<div class="petal" style="left:50%;width:8px;height:8px;animation-duration:13s;animation-delay:-1s;"></div>
<div class="petal" style="left:65%;width:7px;height:7px;animation-duration:10s;animation-delay:-4s;"></div>
<div class="petal" style="left:80%;width:5px;height:5px;animation-duration:12s;animation-delay:-7s;"></div>

<!-- 合戦画面 -->
<div id="battle-screen">
  <div class="battle-header">
    <div class="battle-title" id="battle-family">織田軍 出陣</div>
    <div onclick="endBattle()" style="cursor:pointer;font-size:22px;color:#ffaaaa;">✕</div>
  </div>
  <div class="battle-field">
    <div class="army our-army">
      <div class="army-title">我が軍</div>
      <div id="our-warriors"></div>
    </div>
    <div style="font-size:42px;color:var(--gold);align-self:center;margin-top:-40px;">VS</div>
    <div class="army enemy-army">
      <div class="army-title">敵軍</div>
      <div id="enemy-warriors"></div>
    </div>
  </div>
  <div class="battle-log" id="battle-log"></div>
  <div class="battle-footer">
    <button class="battle-btn" onclick="startBattleSimulation()">戦闘開始</button>
    <button class="battle-btn" onclick="endBattle()" style="background:#3a1a1a;">撤退</button>
  </div>
</div>

<div id="main">
  <div id="titlebar">
    <div id="game-title">戦国血脈<span>〜 覇道の系譜 〜</span></div>
    <div id="stats-bar">
      <span>天下統一率</span><br>
      <strong id="unification-pct">12</strong><span style="font-size:9px">%</span><br>
      <span style="font-size:9px;color:rgba(200,150,12,0.5)">第 <strong id="gen-num">1</strong> 世代</span>
    </div>
  </div>

  <div id="castle-field">
    <!-- warriors injected here by JS -->
    <div id="castle-base">
      <svg width="160" height="120" viewBox="0 0 160 120">
        <!-- 石垣 -->
        <rect x="20" y="80" width="120" height="40" rx="2" fill="#4a3a28"/>
        <rect x="30" y="70" width="100" height="15" rx="1" fill="#5a4a35"/>
        <!-- 天守台 -->
        <rect x="45" y="40" width="70" height="35" fill="#3a2a18"/>
        <!-- 屋根1 -->
        <polygon points="40,42 80,10 120,42" fill="#2a1a08"/>
        <polygon points="42,42 80,14 118,42" fill="#1a0d04"/>
        <!-- 屋根2 -->
        <polygon points="50,48 80,28 110,48" fill="#2a1a08"/>
        <!-- 窓 -->
        <rect x="68" y="50" width="10" height="14" rx="1" fill="#8b6914" opacity="0.8"/>
        <rect x="82" y="50" width="10" height="14" rx="1" fill="#8b6914" opacity="0.8"/>
        <!-- 旗 -->
        <line x1="80" y1="10" x2="80" y2="0" stroke="#c8960c" stroke-width="1.5"/>
        <polygon points="80,0 94,5 80,10" fill="#8b0000"/>
      </svg>
      <div id="castle-name">安土城</div>
    </div>
  </div>

  <div style="padding:12px 20px 20px;background:linear-gradient(0deg,rgba(10,6,0,0.95),transparent);display:flex;gap:12px;justify-content:center;">
    <button onclick="showBloodline()" style="padding:12px 28px;background:#2a1a08;border:1px solid var(--gold);color:var(--parchment);border-radius:4px;font-family:inherit;font-size:14px;cursor:pointer;">配合</button>
    <button onclick="startBattle()" style="padding:12px 28px;background:#4a1a1a;border:1px solid var(--gold);color:var(--parchment);border-radius:4px;font-family:inherit;font-size:14px;cursor:pointer;">合戦</button>
  </div>
</div>

<script>
// ─── カラー定義 ───────────────────────────────────────────
const COLOR_SETS = {
  c_red:  { main:'#8b0000', sub:'#4a0000', skin:'#d4a574', acc:'#ff4444', armor:'#6a1010' },
  c_blue: { main:'#1a3a5c', sub:'#0a1e30', skin:'#c8a87a', acc:'#4488cc', armor:'#0a2a4a' },
  c_pink: { main:'#8b3060', sub:'#5a1040', skin:'#e8c0a0', acc:'#ff88cc', armor:'#6a1050' }
};

// ─── SVG武将生成 ──────────────────────────────────────────
function makeSVG(jobId, colorKey, walkStep) {
  const c = COLOR_SETS[colorKey] || COLOR_SETS['c_red'];
  const s = walkStep % 4;

  if (jobId === 'bukan') {
    // 武官（武士）: 歩行アニメ付き
    const legLAngle = ['-18', '-6', '18', '6'][s];
    const legRAngle = [' 18', '  6', '-18', '-6'][s];
    const armLAngle = [' 20', '  6', '-20', '-6'][s];
    const armRAngle = ['-20', ' -6', ' 20', '  6'][s];

    return `<svg width="36" height="72" viewBox="0 0 36 72" xmlns="http://www.w3.org/2000/svg">
      <!-- 兜 -->
      <ellipse cx="18" cy="11" rx="10" ry="8" fill="${c.main}"/>
      <rect x="10" y="10" width="16" height="5" rx="1" fill="${c.armor}"/>
      <line x1="18" y1="3" x2="18" y2="0" stroke="${c.acc}" stroke-width="2"/>
      <polygon points="18,0 23,5 13,5" fill="${c.acc}" opacity="0.9"/>
      <!-- 顔 -->
      <ellipse cx="18" cy="22" rx="8" ry="9" fill="${c.skin}"/>
      <circle cx="14" cy="21" r="1.5" fill="#5a3a1a"/>
      <circle cx="22" cy="21" r="1.5" fill="#5a3a1a"/>
      <!-- 胴鎧 -->
      <rect x="10" y="30" width="16" height="20" rx="2" fill="${c.main}"/>
      <rect x="11" y="32" width="14" height="16" rx="1" fill="${c.armor}" opacity="0.6"/>
      <!-- 左腕 -->
      <g transform="rotate(${armLAngle}, 8, 32)">
        <rect x="4" y="30" width="6" height="15" rx="3" fill="${c.main}"/>
        <rect x="5" y="43" width="4" height="5" rx="2" fill="${c.skin}"/>
      </g>
      <!-- 右腕 -->
      <g transform="rotate(${armRAngle}, 28, 32)">
        <rect x="26" y="30" width="6" height="15" rx="3" fill="${c.main}"/>
        <rect x="27" y="43" width="4" height="5" rx="2" fill="${c.skin}"/>
        <!-- 刀 -->
        <line x1="30" y1="38" x2="36" y2="22" stroke="#c8c8c8" stroke-width="1.5"/>
        <rect x="29" y="37" width="3" height="4" rx="1" fill="${c.acc}"/>
      </g>
      <!-- 左脚 -->
      <g transform="rotate(${legLAngle}, 14, 50)">
        <rect x="11" y="49" width="7" height="18" rx="3" fill="${c.sub}"/>
        <rect x="11" y="65" width="8" height="5" rx="2" fill="${c.main}"/>
      </g>
      <!-- 右脚 -->
      <g transform="rotate(${legRAngle}, 22, 50)">
        <rect x="18" y="49" width="7" height="18" rx="3" fill="${c.sub}"/>
        <rect x="17" y="65" width="8" height="5" rx="2" fill="${c.main}"/>
      </g>
    </svg>`;

  } else if (jobId === 'hime') {
    // 姫: 優雅な歩行
    const bodyShift = [0, 1, 0, -1][s];
    return `<svg width="34" height="72" viewBox="0 0 34 72" xmlns="http://www.w3.org/2000/svg">
      <!-- 髪飾り -->
      <circle cx="12" cy="10" r="3" fill="${c.acc}" opacity="0.9"/>
      <circle cx="17" cy="7"  r="3" fill="${c.acc}" opacity="0.9"/>
      <circle cx="22" cy="10" r="3" fill="${c.acc}" opacity="0.9"/>
      <!-- 髪 -->
      <ellipse cx="17" cy="14" rx="9" ry="8" fill="#1a0a00"/>
      <rect x="13" y="18" width="4" height="20" rx="2" fill="#1a0a00"/>
      <rect x="17" y="18" width="4" height="20" rx="2" fill="#1a0a00"/>
      <!-- 顔 -->
      <ellipse cx="17" cy="20" rx="7" ry="8" fill="${c.skin}"/>
      <circle cx="14" cy="19" r="1.2" fill="#8b3060"/>
      <circle cx="20" cy="19" r="1.2" fill="#8b3060"/>
      <ellipse cx="17" cy="24" rx="2.5" ry="1.2" fill="#ff9090" opacity="0.7"/>
      <!-- 着物 -->
      <g transform="translate(0,${bodyShift})">
        <polygon points="8,28 26,28 30,72 4,72" fill="${c.main}"/>
        <polygon points="11,28 23,28 24,50 10,50" fill="${c.sub}" opacity="0.7"/>
        <!-- 袖 -->
        <ellipse cx="6"  cy="36" rx="5" ry="10" fill="${c.main}" transform="rotate(-15,6,36)"/>
        <ellipse cx="28" cy="36" rx="5" ry="10" fill="${c.main}" transform="rotate(15,28,36)"/>
        <!-- 帯 -->
        <rect x="9" y="40" width="16" height="8" rx="1" fill="${c.acc}" opacity="0.8"/>
      </g>
    </svg>`;

  } else {
    // 文官
    return `<svg width="34" height="72" viewBox="0 0 34 72" xmlns="http://www.w3.org/2000/svg">
      <!-- 烏帽子 -->
      <polygon points="17,2 22,18 12,18" fill="#2a1a08"/>
      <rect x="10" y="16" width="14" height="4" rx="1" fill="#1a0a00"/>
      <!-- 顔 -->
      <ellipse cx="17" cy="26" rx="8" ry="9" fill="${c.skin}"/>
      <!-- 束帯 -->
      <rect x="9" y="34" width="16" height="30" rx="2" fill="${c.main}"/>
      <rect x="10" y="36" width="14" height="8"  rx="1" fill="${c.sub}" opacity="0.7"/>
      <rect x="12" y="46" width="10" height="16" rx="1" fill="${c.sub}" opacity="0.5"/>
      <!-- 笏 -->
      <rect x="24" y="32" width="3" height="20" rx="1" fill="#c8a850"/>
      <!-- 袖 -->
      <ellipse cx="6"  cy="42" rx="5" ry="10" fill="${c.main}"/>
      <ellipse cx="28" cy="42" rx="5" ry="10" fill="${c.main}"/>
    </svg>`;
  }
}

// ─── ゲーム状態 ───────────────────────────────────────────
let warriors = [];
let currentHouseHead = null;
let animTimer = null;

class Warrior {
  constructor(name, jobId, power, leftPx) {
    this.def = {
      name, jobId, power,
      color: jobId === 'hime' ? 'c_pink' : jobId === 'bunkan' ? 'c_blue' : 'c_red'
    };
    this.walkFrame = 0;
    this.frameCount = 0;

    this.el = document.createElement('div');
    this.el.className = 'warrior';
    this.el.style.left = leftPx + 'px';

    this.svgEl = document.createElement('div');
    this.nameEl = document.createElement('div');
    this.nameEl.className = 'warrior-name';
    this.nameEl.textContent = name;

    this.el.appendChild(this.svgEl);
    this.el.appendChild(this.nameEl);
    document.getElementById('castle-field').appendChild(this.el);

    warriors.push(this);
    this.render();
  }

  render() {
    this.svgEl.innerHTML = makeSVG(this.def.jobId, this.def.color, this.walkFrame);
  }

  tick() {
    this.frameCount++;
    if (this.frameCount >= 10) {
      this.frameCount = 0;
      this.walkFrame = (this.walkFrame + 1) % 4;
      this.render();
    }
  }
}

// ─── 初期化 ───────────────────────────────────────────────
function initGame() {
  // 既存の武将を除去
  warriors.forEach(w => w.el.remove());
  warriors = [];
  if (animTimer) clearInterval(animTimer);

  new Warrior('織田 信廣', 'bukan',   88, 60);
  new Warrior('お 市',    'hime',    72, 180);
  new Warrior('明智 光忠', 'bunkan',  65, 300);

  currentHouseHead = { warrior: warriors[0], familyName: '織田' };

  // アニメーションループ (60fps相当)
  animTimer = setInterval(() => {
    warriors.forEach(w => w.tick());
  }, 60);
}

// ─── 合戦 ─────────────────────────────────────────────────
function showBattleScreen() {
  document.getElementById('battle-screen').classList.add('show');
  document.getElementById('battle-family').textContent =
    (currentHouseHead ? currentHouseHead.familyName : '織田') + '軍 出陣';

  document.getElementById('our-warriors').innerHTML =
    warriors.map(w => `<span class="warrior-icon">${w.def.jobId === 'hime' ? '🌸' : '⚔️'}</span>`).join('');

  document.getElementById('enemy-warriors').innerHTML =
    '<span class="warrior-icon">⚔️</span><span class="warrior-icon">⚔️</span><span class="warrior-icon">⚔️</span>';

  document.getElementById('battle-log').innerHTML =
    '<div class="log-line ally">敵軍が城に迫っています！</div>';
}

window.startBattleSimulation = function() {
  const log = document.getElementById('battle-log');
  const name = currentHouseHead ? currentHouseHead.warrior.def.name : '武将';
  log.innerHTML += `<div class="log-line ally">${name}が先陣を切った！</div>`;
  setTimeout(() => {
    log.innerHTML += '<div class="log-line ally" style="color:#ffdd88">大勝利！天下に名を轟かせた！</div>';
    log.scrollTop = log.scrollHeight;
  }, 1400);
};

window.endBattle = function() {
  document.getElementById('battle-screen').classList.remove('show');
};

window.startBattle = function() {
  showBattleScreen();
};

window.showBloodline = function() {
  alert('配合機能は現在開発中です');
};

window.onload = initGame;
</script>
</body>
</html>
