<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
  <title>戦国血脈 〜覇道の系譜〜</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=DotGothic16&display=swap');

    :root{
      --gold:#c8960c;
      --gold-l:#f0c040;
      --gold-d:rgba(200,150,12,.4);
      --parchment:#f5e8c8;
      --ink:#0e0800;
      --panel:rgba(8,4,0,.88);
      --crimson:#8b0000;
      --spring:#7CFC00;
      --summer:#00BFFF;
      --autumn:#FFA500;
      --winter:#d6d6d6;

      --h-header:72px;
      --h-nationbar:30px;
      --h-partyrow:84px;
      --h-actionrow:68px;
      --h-bottom-pad:max(env(safe-area-inset-bottom,0px),8px);
    }

    *,*::before,*::after{
      margin:0;padding:0;box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;height:100%;
      background:var(--ink);
      font-family:'Noto Serif JP',serif;
      overflow:hidden;
      user-select:none;-webkit-user-select:none;
      position:fixed;
      touch-action:none;
      color:var(--parchment);
    }

    #sky{
      position:fixed;inset:0;z-index:0;
      background:linear-gradient(175deg,#0a0500 0%,#18100a 35%,#251808 65%,#1a1005 100%);
    }
    .star{
      position:fixed;border-radius:50%;background:#fff;opacity:0;
      animation:twinkle ease-in-out infinite;
    }
    @keyframes twinkle{0%,100%{opacity:0}50%{opacity:.75}}
    .mist{
      position:fixed;left:-20%;width:140%;
      background:linear-gradient(90deg,transparent,rgba(245,228,180,.06),rgba(245,228,180,.1),rgba(245,228,180,.06),transparent);
      border-radius:50%;animation:drift linear infinite;pointer-events:none;
    }
    .mist:nth-child(1){height:42px;top:30%;animation-duration:32s;}
    .mist:nth-child(2){height:56px;top:48%;animation-duration:26s;animation-delay:-11s;opacity:.65;}
    .mist:nth-child(3){height:36px;top:40%;animation-duration:42s;animation-delay:-20s;opacity:.45;}
    @keyframes drift{
      0%{transform:translateX(-8%) scaleY(1)}
      50%{transform:translateX(7%) scaleY(1.4)}
      100%{transform:translateX(-8%) scaleY(1)}
    }
    .petal{
      position:fixed;border-radius:50% 0 50% 0;
      background:radial-gradient(ellipse,rgba(255,200,200,.9) 0%,rgba(255,130,130,.25) 100%);
      animation:petalFall linear infinite;pointer-events:none;
    }
    @keyframes petalFall{
      0%{transform:translateY(-10px) rotate(0deg) translateX(0);opacity:0}
      7%{opacity:.9}
      93%{opacity:.5}
      100%{transform:translateY(102vh) rotate(760deg) translateX(45px);opacity:0}
    }

    #main{
      position:fixed;inset:0;z-index:10;
      display:grid;grid-template-rows:var(--h-header) 1fr auto;
      width:100%;height:100%;
    }

    #header{
      height:var(--h-header);
      padding:max(env(safe-area-inset-top,0px),8px) 12px 6px;
      display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
      flex-shrink:0;
    }
    #game-title{
      color:var(--gold);font-size:clamp(14px,4.2vw,18px);font-weight:900;
      letter-spacing:.18em;text-shadow:0 0 16px rgba(200,150,12,.7);line-height:1.25;
      white-space:nowrap;
    }
    #game-title .sub{
      display:block;font-size:clamp(7px,1.8vw,9px);letter-spacing:.36em;
      color:var(--gold-d);font-weight:400;margin-top:2px;
    }

    #status-panel{
      display:flex;flex-wrap:wrap;justify-content:flex-end;gap:5px;max-width:60%;
    }
    .stat-chip{
      display:flex;align-items:center;gap:4px;
      background:var(--panel);border:1px solid var(--gold-d);
      border-radius:16px;padding:4px 8px;min-height:26px;
    }
    .sl{font-size:8px;color:rgba(245,232,200,.5);letter-spacing:.08em;}
    .sv{font-size:13px;font-weight:700;color:var(--gold-l);}
    .su{font-size:8px;color:var(--gold-d);}
    .season-chip.spring .sv{color:var(--spring)}
    .season-chip.summer .sv{color:var(--summer)}
    .season-chip.autumn .sv{color:var(--autumn)}
    .season-chip.winter .sv{color:var(--winter)}

    #iso-field{position:relative;overflow:hidden;min-height:0;}
    #iso-canvas{position:absolute;inset:0;width:100%;height:100%;}
    #bubble-layer{position:absolute;inset:0;pointer-events:none;z-index:30;overflow:hidden;}

    .facility-activity{
      position:absolute;font-size:9px;color:#ffdd88;pointer-events:none;
      text-shadow:0 1px 3px #000;white-space:nowrap;transform:translateX(-50%);
      animation:actPop .3s ease-out;
    }
    @keyframes actPop{
      0%{opacity:0;transform:translateX(-50%) scale(.5)}
      100%{opacity:1;transform:translateX(-50%) scale(1)}
    }
    .float-text{
      position:absolute;font-size:10px;pointer-events:none;text-shadow:0 1px 3px #000;
      white-space:nowrap;transform:translateX(-50%);animation:floatUp 1.8s ease-out forwards;
    }
    @keyframes floatUp{
      0%{opacity:1;transform:translateX(-50%) translateY(0)}
      100%{opacity:0;transform:translateX(-50%) translateY(-36px)}
    }

    #bottom-ui{
      flex-shrink:0;padding:0 10px var(--h-bottom-pad);
      background:linear-gradient(0deg,rgba(6,3,0,.98) 0%,rgba(6,3,0,.82) 80%,transparent 100%);
    }
    #nation-bar{
      display:flex;align-items:center;gap:7px;padding:5px 2px 4px;
      border-bottom:1px solid rgba(200,150,12,.12);height:var(--h-nationbar);
    }
    .nl{font-size:8px;color:var(--gold-d);letter-spacing:.18em;white-space:nowrap;}
    .nt{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.07);overflow:hidden;}
    .nf{height:100%;border-radius:2px;background:linear-gradient(90deg,#8b0000,var(--gold));transition:width .6s;}
    .np{font-size:10px;color:var(--gold-l);font-weight:700;min-width:42px;text-align:right;}

    #party-row{
      display:flex;gap:5px;padding:5px 0 4px;overflow-x:auto;scrollbar-width:none;
      height:var(--h-partyrow);align-items:center;-webkit-overflow-scrolling:touch;touch-action:pan-x;
    }
    #party-row::-webkit-scrollbar{display:none;}
    .party-card{
      flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:1px;
      background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);
      border-radius:8px;padding:5px 8px;min-width:68px;cursor:pointer;
      transition:border-color .2s,background .2s;touch-action:manipulation;
    }
    .party-card.head{border-color:var(--gold);background:rgba(200,150,12,.08);}
    .party-card.young{opacity:.68;border-color:rgba(200,150,12,.1);}
    .party-card.mutant{border-color:#ff44ff;background:rgba(255,0,255,.08);}
    .party-card:active{background:rgba(200,150,12,.18);}
    .pc-role{font-size:7px;color:var(--gold-d);letter-spacing:.08em;}
    .pc-name{font-size:9px;color:var(--parchment);font-weight:700;}
    .pc-pow{font-size:8px;color:#ffaa44;}
    .pc-hp{font-size:7px;}
    .pc-loc{font-size:7px;color:#aaddff;margin-top:1px;}
    .pc-skill{font-size:6px;color:#ff88ff;margin-top:1px;text-align:center;}

    #action-row{
      display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:3px 0 2px;height:var(--h-actionrow);
    }
    .act-btn{
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
      background:var(--panel);border:1px solid var(--gold-d);border-radius:10px;padding:0 2px;
      cursor:pointer;transition:background .15s,border-color .15s,transform .1s;color:var(--parchment);
      font-family:inherit;touch-action:manipulation;min-height:56px;
    }
    .act-btn:active{transform:scale(.91);background:rgba(200,150,12,.16);border-color:var(--gold);}
    .act-btn .ico{font-size:18px;line-height:1;}
    .act-btn .lbl{font-size:8px;letter-spacing:.1em;color:rgba(245,232,200,.72);}
    .act-btn.primary{border-color:var(--gold);background:rgba(139,0,0,.45);}
    .act-btn.primary .lbl{color:var(--gold-l);}

    .modal{
      position:fixed;inset:0;z-index:600;display:none;align-items:flex-end;justify-content:center;
      background:rgba(8,4,0,.92);
    }
    .modal.show{display:flex;}
    .modal-shell{
      width:100%;max-width:480px;
      background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));
      border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;
      overflow:hidden;display:flex;flex-direction:column;
      animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;
      box-shadow:0 -20px 60px rgba(0,0,0,.4);
    }
    .modal-tall{height:88%;}
    .modal-mid{height:78%;}
    @keyframes slideUp{
      0%{transform:translateY(100%)}
      100%{transform:translateY(0)}
    }
    .modal-head{
      padding:14px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);
      display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
    }
    .modal-title{
      font-size:14px;color:var(--gold);font-weight:700;letter-spacing:.28em;
    }
    .close-btn{
      background:none;border:1px solid rgba(200,150,12,.3);color:var(--gold);
      font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;
    }
    .modal-body{
      overflow-y:auto;padding:12px 14px;flex:1;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;touch-action:pan-y;
    }
    .modal-body::-webkit-scrollbar{display:none;}

    .gen-block{margin-bottom:14px;}
    .gen-label{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-bottom:5px;}
    .gen-list{display:flex;flex-wrap:wrap;gap:5px;}
    .gen-card{
      background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.18);
      border-radius:8px;padding:7px 10px;font-size:9px;color:var(--parchment);line-height:1.6;
    }
    .gen-card .gn{font-size:11px;font-weight:700;color:var(--gold-l);}
    .gen-card .gp{color:#ffaa44;}
    .gen-card .gskill{color:#ff88ff;font-size:8px;}
    .gen-card .gcomp{color:#88ffcc;font-size:8px;}
    .gen-card.mutant-card{border-color:#ff44ff;background:rgba(255,0,255,.06);}

    .skill-badge{
      display:inline-block;background:rgba(255,100,255,.18);border:1px solid rgba(255,100,255,.4);
      border-radius:4px;padding:1px 5px;font-size:8px;color:#ff88ff;margin-top:2px;
    }

    .wm-shell{width:100%;max-width:480px;background:linear-gradient(160deg,rgba(14,8,2,.99),rgba(10,5,1,1));border:1px solid rgba(200,150,12,.35);border-radius:18px 18px 0 0;overflow:hidden;animation:slideUp .35s cubic-bezier(.22,.68,0,1.1) both;}
    .wm-head{padding:16px 16px 10px;border-bottom:1px solid rgba(200,150,12,.15);}
    .wm-name{font-size:18px;font-weight:900;color:var(--gold-l);letter-spacing:.14em;}
    .wm-role{font-size:9px;color:var(--gold-d);letter-spacing:.3em;margin-top:2px;}
    .wm-body{padding:10px 16px max(env(safe-area-inset-bottom,0px),16px);}
    .wm-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px;}
    .wm-stat .wsk{color:rgba(245,228,180,.6);}
    .wm-stat .wsv{color:var(--parchment);font-weight:700;text-align:right;max-width:60%;}
    .wm-hp-bar{height:5px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;margin:2px 0 6px;}
    .wm-hp-fill{height:100%;border-radius:3px;transition:width .4s;}
    .wm-close{
      display:block;width:100%;background:none;border:1px solid rgba(200,150,12,.3);color:var(--gold);
      font-family:inherit;font-size:12px;padding:11px;border-radius:8px;cursor:pointer;margin-top:10px;letter-spacing:.3em;
    }

    .modal-section{margin-bottom:14px;}
    .modal-section-title{font-size:9px;color:rgba(200,150,12,.6);letter-spacing:.3em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(200,150,12,.12);}
    .engumi-cost{text-align:center;padding:8px;background:rgba(200,150,12,.06);border:1px solid rgba(200,150,12,.15);border-radius:8px;margin-bottom:12px;}
    .engumi-cost .ec-label{font-size:9px;color:rgba(200,150,12,.5);letter-spacing:.3em;}
    .engumi-cost .ec-val{font-size:20px;font-weight:900;color:var(--gold-l);display:block;margin-top:2px;}
    .engumi-cost .ec-unit{font-size:9px;color:rgba(200,150,12,.6);}
    .warrior-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .warrior-sel-card{
      background:rgba(255,255,255,.03);border:1px solid rgba(200,150,12,.15);border-radius:10px;
      padding:10px;cursor:pointer;transition:all .2s;touch-action:manipulation;min-height:72px;
    }
    .warrior-sel-card:active,.warrior-sel-card.selected{background:rgba(200,150,12,.12);border-color:var(--gold);}
    .warrior-sel-card.mutant-card{border-color:rgba(255,100,255,.3);}
    .warrior-sel-card.mutant-card.selected{border-color:#ff44ff;background:rgba(255,0,255,.1);}
    .wsc-name{font-size:12px;font-weight:700;color:var(--parchment);}
    .wsc-stats{font-size:10px;color:rgba(200,150,12,.7);margin-top:3px;}
    .wsc-hp{font-size:9px;margin-top:2px;}
    .wsc-skill{font-size:8px;color:#ff88ff;margin-top:2px;}
    .confirm-panel{background:rgba(200,150,12,.05);border:1px solid rgba(200,150,12,.18);border-radius:10px;padding:12px;}
    .confirm-pair{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
    .confirm-w{text-align:center;}
    .confirm-w .cw-name{font-size:13px;font-weight:700;color:var(--parchment);}
    .confirm-w .cw-role{font-size:9px;color:var(--gold-d);}
    .confirm-heart{font-size:22px;color:var(--crimson);text-shadow:0 0 12px rgba(139,0,0,.5);}
    .child-preview{background:rgba(255,255,255,.03);border-radius:8px;padding:9px;margin-top:7px;}
    .cp-title{font-size:8px;color:rgba(200,150,12,.5);letter-spacing:.3em;margin-bottom:5px;}
    .cp-stat{display:flex;justify-content:space-between;font-size:10px;color:rgba(245,228,180,.7);padding:2px 0;}
    .cp-stat .cpv{color:var(--gold-l);font-weight:700;}
    .cp-compat{font-size:10px;color:#88ffcc;text-align:center;margin-top:5px;padding:4px;background:rgba(0,255,100,.05);border-radius:4px;}
    .modal-footer{padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);border-top:1px solid rgba(200,150,12,.1);display:flex;gap:8px;flex-shrink:0;}
    .modal-btn{
      flex:1;padding:13px;border-radius:10px;font-family:inherit;font-size:12px;letter-spacing:.25em;
      cursor:pointer;transition:all .2s;touch-action:manipulation;
    }
    .modal-btn-cancel{background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:rgba(200,150,12,.6);}
    .modal-btn-exec{background:linear-gradient(135deg,rgba(139,0,0,.65),rgba(180,30,0,.55));border:1px solid rgba(200,150,12,.5);color:var(--gold-l);font-weight:700;}
    .modal-btn-exec:disabled{opacity:.38;cursor:not-allowed;}
    .modal-step-indicator{display:flex;justify-content:center;gap:6px;margin-bottom:12px;}
    .step-dot{width:6px;height:6px;border-radius:50%;background:rgba(200,150,12,.22);transition:all .3s;}
    .step-dot.active{background:var(--gold);box-shadow:0 0 8px rgba(200,150,12,.5);}

    .blood-skill-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
    .bsk-row{display:flex;align-items:flex-start;gap:8px;padding:7px;background:rgba(255,255,255,.03);border-radius:8px;border:1px solid rgba(255,255,255,.06);}
    .bsk-icon{font-size:16px;flex-shrink:0;}
    .bsk-info .bsk-name{font-size:11px;font-weight:700;color:var(--parchment);}
    .bsk-info .bsk-desc{font-size:9px;color:rgba(245,228,180,.55);margin-top:1px;}

    #success-overlay{
      position:fixed;inset:0;z-index:900;display:none;align-items:center;justify-content:center;
      background:rgba(8,4,0,.96);flex-direction:column;gap:12px;padding:20px;
    }
    #success-overlay.show{display:flex;animation:fadeIn .4s ease;}
    @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
    .suc-kamon{font-size:52px;animation:pulse 2s ease infinite;}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .suc-title{font-size:12px;color:var(--gold-d);letter-spacing:.5em;text-align:center;}
    .suc-name{font-size:24px;font-weight:900;color:var(--gold-l);letter-spacing:.18em;text-shadow:0 0 28px rgba(200,150,12,.6);text-align:center;}
    .suc-stats{font-size:11px;color:rgba(245,228,180,.7);text-align:center;line-height:2;white-space:pre-line;}
    .suc-skill{font-size:13px;color:#ff88ff;text-align:center;letter-spacing:.1em;text-shadow:0 0 12px rgba(255,100,255,.5);}
    .suc-compat{font-size:11px;color:#88ffcc;text-align:center;}
    .suc-btn{background:rgba(200,150,12,.15);border:1px solid rgba(200,150,12,.4);color:var(--gold-l);font-family:inherit;font-size:13px;letter-spacing:.35em;padding:13px 28px;border-radius:10px;cursor:pointer;margin-top:6px;}
    .mutant-flash{animation:mutantFlash .5s ease 3;}
    @keyframes mutantFlash{0%,100%{box-shadow:none}50%{box-shadow:0 0 40px rgba(255,0,255,.8)}}

    .dev-body{padding:12px 16px max(env(safe-area-inset-bottom,0px),16px);display:grid;grid-template-columns:1fr 1fr;gap:7px;}
    .dev-btn{
      background:rgba(255,255,255,.04);border:1px solid rgba(200,150,12,.2);color:var(--parchment);
      font-family:inherit;font-size:11px;padding:12px 6px;border-radius:8px;cursor:pointer;letter-spacing:.15em;
    }
    .dev-btn:active{background:rgba(200,150,12,.14);}

    .hist-item{
      font-size:11px;color:rgba(245,228,180,.8);padding:7px 0;border-bottom:1px solid rgba(200,150,12,.1);
      line-height:1.5;display:flex;gap:8px;align-items:baseline;
    }
    .hist-item .hi-time{color:rgba(200,150,12,.55);font-size:9px;white-space:nowrap;flex-shrink:0;}
    .hist-item .hi-text{flex:1;}
    .hist-item.hi-mutant .hi-text{color:#ff88ff;}
    .hist-empty{text-align:center;padding:32px 16px;color:rgba(200,150,12,.35);font-size:11px;letter-spacing:.3em;}

    #battle-screen{
      position:fixed;inset:0;z-index:500;background:#0e0600;display:none;flex-direction:column;
      font-family:'DotGothic16',monospace;
    }
    #battle-screen.show{display:flex;}
    #battle-log-bar{
      height:26px;background:#0a0600;border-bottom:1px solid #4a3000;color:#e8c060;
      font-size:clamp(10px,2.8vw,13px);display:flex;align-items:center;padding:0 10px;letter-spacing:.06em;
    }
    #battle-arena{
      flex:1;display:flex;align-items:center;justify-content:center;position:relative;
      background:
        radial-gradient(circle at center,rgba(255,220,140,.08),transparent 50%),
        linear-gradient(180deg,#2a1400 0%,#120800 100%);
      overflow:hidden;
    }
    .battle-unit{
      width:120px;height:120px;border:2px solid #7a5800;border-radius:12px;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(180deg,#e8dcc0,#d4c090 40%,#c0a860);
      color:#1a0800;box-shadow:inset 0 1px 0 #fff8,inset 0 -1px 0 #0004;
      position:absolute;top:50%;transform:translateY(-50%);
    }
    .battle-unit.player{left:10%;}
    .battle-unit.enemy{right:10%;}
    .battle-icon{font-size:34px;}
    .battle-name{font-size:14px;font-weight:700;}
    .battle-hp{font-size:12px;margin-top:6px;}
    #battle-vs{font-size:32px;color:#f0c040;text-shadow:0 0 20px rgba(240,192,64,.5);}
    #battle-result-panel{
      display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;
      background:#000b;z-index:10;
    }
    #battle-result-panel.show{display:flex;}
    #result-box{
      background:linear-gradient(180deg,#f4e080,#c89020);border:3px solid #7a5000;border-radius:10px;
      padding:18px 32px;text-align:center;box-shadow:0 8px 40px #00000099;color:#1a0800;
    }
    .bres-title{font-size:clamp(14px,5vw,20px);letter-spacing:.2em;margin-bottom:12px;display:block;}
    .bres-detail{font-size:clamp(10px,3vw,13px);text-align:center;line-height:1.9;white-space:pre-line;margin-bottom:14px;}
    .bres-btn{
      font-family:'DotGothic16',monospace;font-size:clamp(11px,3.2vw,14px);
      background:linear-gradient(180deg,#e05010,#a02808);color:#fff8e0;border:2px solid #601000;
      border-radius:6px;padding:8px 24px;cursor:pointer;
    }

    #toast{
      position:fixed;
      bottom:calc(var(--h-actionrow) + var(--h-partyrow) + var(--h-nationbar) + var(--h-bottom-pad) + 10px);
      left:50%;transform:translateX(-50%);
      background:rgba(14,8,2,.97);border:1px solid var(--gold-d);
      color:var(--parchment);font-size:11px;padding:8px 18px;border-radius:18px;
      white-space:nowrap;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;
      letter-spacing:.1em;max-width:90vw;overflow:hidden;text-overflow:ellipsis;
    }
    #toast.show{opacity:1;}
    #toast.mutant-toast{border-color:#ff44ff;background:rgba(60,0,60,.97);color:#ff88ff;}

    .spring-text{color:var(--spring);}
    .summer-text{color:var(--summer);}
    .autumn-text{color:var(--autumn);}
    .winter-text{color:var(--winter);}
  </style>
</head>

  <div id="toast"></div>

  <script>
    'use strict';

    // ============================================================
    //  定数・設定
    // ============================================================
    const ENGUMI_COST = 600;
    const MATURE_AGE = 20;
    const MONTH_ADVANCE_EVERY_TURNS = 2;

    const BLOOD_SKILLS = [
      { id:'brave',    name:'猛将の血',   icon:'🔥', desc:'武力×1.3倍（攻撃に特化）', effect:u=>{ u.stats.power = Math.min(99, Math.floor(u.stats.power * 1.3)); } },
      { id:'wise',     name:'軍師の血',   icon:'📖', desc:'知力×1.3倍（施設効果+）', effect:u=>{ u.stats.wisdom = Math.min(99, Math.floor(u.stats.wisdom * 1.3)); } },
      { id:'berserk',  name:'狂戦士の血', icon:'💀', desc:'武力×1.5倍・体力-30', effect:u=>{ u.stats.power = Math.min(99, Math.floor(u.stats.power * 1.5)); u.stats.maxHp = Math.max(60, u.stats.maxHp - 30); u.stats.hp = Math.min(u.stats.hp, u.stats.maxHp); } },
      { id:'iron',     name:'鉄壁の血',   icon:'🛡️', desc:'体力上限+40', effect:u=>{ u.stats.maxHp += 40; u.stats.hp = Math.min(u.stats.maxHp, u.stats.hp + 40); } },
      { id:'loyal',    name:'義将の血',   icon:'⛩️', desc:'忠誠+25・施設効果+', effect:u=>{ u._loyalty = Math.min(100, u._loyalty + 25); } },
      { id:'swift',    name:'迅雷の血',   icon:'⚡', desc:'武力+15・移動速度+', effect:u=>{ u.stats.power = Math.min(99, u.stats.power + 15); u.speed *= 1.4; } },
      { id:'sage',     name:'天才の血',   icon:'✨', desc:'武力・知力+10', effect:u=>{ u.stats.power = Math.min(99, u.stats.power + 10); u.stats.wisdom = Math.min(99, u.stats.wisdom + 10); } }
    ];

    const FACILITY_EFFECT = {
      training:{ stat:'power', label:'武力',   color:'#ffcc44', range:[5,11], costHp:-6 },
      forge:   { stat:'power', label:'武力',   color:'#ffaa44', range:[4,9],  costHp:-5 },
      academy: { stat:'wisdom',label:'知力',   color:'#aaddff', range:[5,10], costHp:-4 },
      tea:     { stat:'hp',    label:'体力',   color:'#88ffcc', range:[12,18],costHp:8  },
      garden:  { stat:'hp',    label:'体力',   color:'#ff88cc', range:[18,25],costHp:15 },
      loyalty: { stat:'loyalty',label:'忠誠',  color:'#ffdd88', range:[7,14], costHp:-3 }
    };

    const FACILITY_MAP = {
      training:{ name:'鍛錬場', color:'#cc8800', icon:'🏋️' },
      forge:   { name:'鍛冶場', color:'#aa6600', icon:'⚒️'  },
      academy: { name:'学問所', color:'#4488cc', icon:'📚'  },
      tea:     { name:'茶室',   color:'#88cc88', icon:'🍵'  },
      garden:  { name:'庭園',   color:'#cc88aa', icon:'🌸'  },
      loyalty: { name:'忠義堂', color:'#ccaa44', icon:'🏮'  }
    };

    const FACILITY_POSITIONS = [
      {key:'training', tx: 0, ty:1},
      {key:'forge',    tx: 1, ty:2},
      {key:'academy',  tx:-1, ty:2},
      {key:'tea',      tx: 2, ty:0},
      {key:'garden',   tx:-2, ty:0},
      {key:'loyalty',  tx: 0, ty:3}
    ];

    const ROLES = {
      0:'当主', 1:'家老', 2:'侍大将', 3:'足軽頭', 4:'兵糧奉行',
      5:'忍頭', 6:'軍師', 7:'外交官', 8:'鉄砲頭', 9:'武者'
    };

    const SURNAMES = ['織田','豊臣','徳川','武田','上杉','毛利','伊達','島津','長曾我部','北条','今川','斎藤','浅井','朝倉','松永','三好','宇喜多','立花','黒田','細川'];
    const GIVEN_NAMES_M = ['信長','秀吉','家康','信玄','謙信','元就','政宗','義久','元親','氏康','義元','道三','長政','義景','久秀','長慶','直家','道雪','如水','幽斎','勝家','利家','光秀','秀長','半兵衛','官兵衛','兼続','慶次','幸村','昌幸'];
    const GIVEN_NAMES_F = ['茶々','ねね','帰蝶','お市','松','江','千姫','春日局','淀殿','小督'];

    const state = {
      koku:1200,
      unification:0,
      turn:0,
      generation:1,
      log:[],
      pedigree:[],
      year:0,
      month:1,
      season:'spring'
    };

    let gWarriors = [];
    let idleTimer = null;
    let ageTickCounter = 0;
    let engumiStep = 0;
    let engumiSelectedFather = null;
    let engumiSelectedMother = null;
    let isoAnimFrame = null;
    let toastTimer = null;
    let battleTimer = null;

    // ============================================================
    //  ユーティリティ
    // ============================================================
    function rnd(lo, hi){ return Math.floor(lo + Math.random() * (hi - lo + 1)); }
    function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
    function getSkillById(id){ return BLOOD_SKILLS.find(s => s.id === id) || null; }

    function showToast(msg, duration=2200, isMutant=false){
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('mutant-toast', !!isMutant);
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        t.classList.remove('show');
        toastTimer = null;
      }, duration);
    }

    function addLog(text, mutant=false){
      const now = new Date();
      const ts = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      state.log.unshift({ time:ts, text, mutant:!!mutant });
      if (state.log.length > 120) state.log.pop();
    }

    function openModal(id){ document.getElementById(id).classList.add('show'); }
    function closeModal(id){ document.getElementById(id).classList.remove('show'); }

    function seasonLabel(season){
      return ({ spring:'春', summer:'夏', autumn:'秋', winter:'冬' })[season] || '春';
    }

    function getSeason(month){
      if (month >= 3 && month <= 5) return 'spring';
      if (month >= 6 && month <= 8) return 'summer';
      if (month >= 9 && month <= 11) return 'autumn';
      return 'winter';
    }

    function compatLabel(score){
      if (score >= 45) return '❤️ 運命の縁';
      if (score >= 30) return '💛 良縁';
      if (score >= 15) return '🤝 普通の縁';
      return '💔 相性不良';
    }

    function randName(gender){
      const sn = SURNAMES[Math.floor(Math.random() * SURNAMES.length)];
      const gn = gender === 'female'
        ? GIVEN_NAMES_F[Math.floor(Math.random() * GIVEN_NAMES_F.length)]
        : GIVEN_NAMES_M[Math.floor(Math.random() * GIVEN_NAMES_M.length)];
      return sn + gn;
    }

    // ============================================================
    //  背景演出
    // ============================================================
    function spawnStars(){
      const sky = document.getElementById('sky');
      for (let i = 0; i < 55; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.2 + 0.8;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + 'vw';
        s.style.top = Math.random() * 100 + 'vh';
        s.style.animationDuration = (Math.random() * 4 + 2) + 's';
        s.style.animationDelay = (Math.random() * -6) + 's';
        sky.appendChild(s);
      }
    }

    function spawnPetals(){
      const sky = document.getElementById('sky');
      for (let i = 0; i < 18; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const sz = rnd(8, 14);
        p.style.width = sz + 'px';
        p.style.height = (sz * 0.85) + 'px';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDuration = (Math.random() * 10 + 12) + 's';
        p.style.animationDelay = (Math.random() * -16) + 's';
        sky.appendChild(p);
      }
    }

    // ============================================================
    //  相性・継承
    // ============================================================
    function calcCompatibility(a, b){
      let score = 0;
      if (a._skillId && b._skillId && a._skillId === b._skillId) score += 20;
      if (Math.abs(a.stats.power - b.stats.power) <= 15) score += 8;
      if (Math.abs(a.stats.wisdom - b.stats.wisdom) <= 15) score += 8;
      if (Math.abs(a.age - b.age) <= 10) score += 6;
      if (a.gender !== b.gender) score += 8;
      if (a._isMutant || b._isMutant) score += 4;
      return clamp(score, 0, 60);
    }

    function createChildStats(father, mother){
      const compat = calcCompatibility(father, mother);
      const bonus = Math.floor(compat / 6);
      const power = clamp(Math.round(father.stats.power * 0.65 + mother.stats.power * 0.45) + rnd(5,12) + bonus, 10, 98);
      const wisdom = clamp(Math.round(father.stats.wisdom * 0.45 + mother.stats.wisdom * 0.65) + rnd(8,14) + bonus, 10, 98);
      const maxHp = clamp(Math.round((father.stats.maxHp + mother.stats.maxHp) / 1.8) + rnd(10,20) + bonus, 100, 220);
      return { power, wisdom, hp:maxHp, maxHp, compat, bonus };
    }

    function inheritSkill(father, mother, compat){
      let skillId = null;
      let isMutant = false;

      const mutantChance = 0.05 + compat * 0.002;
      if (Math.random() < mutantChance) {
        isMutant = true;
        const skill = BLOOD_SKILLS[Math.floor(Math.random() * BLOOD_SKILLS.length)];
        skillId = skill.id;
        return { skillId, isMutant };
      }

      const pool = [];
      if (father._skillId) pool.push(father._skillId);
      if (mother._skillId) pool.push(mother._skillId);

      if (pool.length > 0) {
        const inheritRate = 0.35 + compat * 0.01;
        if (Math.random() < inheritRate) skillId = pool[Math.floor(Math.random() * pool.length)];
      } else if (Math.random() < 0.12) {
        const skill = BLOOD_SKILLS[Math.floor(Math.random() * BLOOD_SKILLS.length)];
        skillId = skill.id;
      }

      return { skillId, isMutant };
    }

    function bloodlineFacilityMul(w){
      let mul = 1.0;
      if (w._parents) {
        const gen = w._generation || 1;
        mul += (gen - 1) * 0.08;
      }
      if (w._skillId === 'wise' || w._skillId === 'loyal') mul *= 1.2;
      return mul;
    }

    // ============================================================
    //  武将クラス
    // ============================================================
    class IsoWarrior{
      constructor(name, jobId, power, wisdom, gender='male', age=20){
        this.name = name;
        this.jobId = jobId;
        this.gender = gender;
        this.age = age;
        this.stats = {
          power: clamp(power,1,99),
          wisdom: clamp(wisdom,1,99),
          maxHp: rnd(90,130),
          hp: 0
        };
        this.stats.hp = this.stats.maxHp;
        this._loyalty = rnd(55,88);
        this.speed = 0.018 + Math.random() * 0.01;
        this.isoX = (Math.random() - .5) * 3.5;
        this.isoY = 1.2 + Math.random() * 2.5;
        this.dirX = Math.random() > .5 ? 1 : -1;
        this.dirY = Math.random() > .5 ? 1 : -1;
        this._currentFacility = null;
        this._facilityTimer = 0;
        this._facilityStayMax = 0;
        this._moveTimer = rnd(60,180);
        this._parents = null;
        this._generation = 1;
        this._skillId = null;
        this._isMutant = false;
        this._compatibility = 0;
        this._color = this.pickColor();
      }

      pickColor(){
        if (this._isMutant) return '#ff44ff';
        const cols = ['#c8960c','#cc4444','#4488cc','#44cc88','#cc88cc','#ccaa44','#44aacc','#cc6644'];
        return cols[Math.floor(Math.random() * cols.length)];
      }

      get loyalty(){ return this._loyalty; }
      isMature(){ return this.age >= MATURE_AGE; }

      skillName(){
        if (!this._skillId) return '—';
        const sk = getSkillById(this._skillId);
        return sk ? `${sk.icon} ${sk.name}` : '—';
      }

      locationLabel(){
        if (!this._currentFacility) return '巡回中';
        const f = FACILITY_MAP[this._currentFacility];
        return f ? f.name : '巡回中';
      }

      applyBloodSkill(){
        if (!this._skillId) return;
        const sk = getSkillById(this._skillId);
        if (sk) sk.effect(this);
        this._color = this.pickColor();
      }

      tick(){
        if (this._currentFacility) {
          this._facilityTimer++;
          if (this._facilityTimer >= this._facilityStayMax) {
            this.leaveFacility();
          } else if (this._facilityTimer % 90 === 45) {
            this.applyFacilityEffect(this._currentFacility, false);
          }
        } else {
          this._moveTimer--;
          if (this._moveTimer <= 0) {
            this.tryFacility();
            this._moveTimer = rnd(70,180);
          }
          this.isoX += this.dirX * this.speed;
          this.isoY += this.dirY * this.speed * 0.8;

          const bound = 3.1;
          if (this.isoX < -bound){ this.isoX = -bound; this.dirX = 1; }
          if (this.isoX > bound){ this.isoX = bound; this.dirX = -1; }
          if (this.isoY < -0.2){ this.isoY = -0.2; this.dirY = 1; }
          if (this.isoY > 3.8){ this.isoY = 3.8; this.dirY = -1; }
        }
      }

      tryFacility(){
        const candidates = FACILITY_POSITIONS.map(f => f.key);
        if (!this.isMature() && Math.random() < 0.5) return;
        const key = candidates[Math.floor(Math.random() * candidates.length)];
        this.enterFacility(key);
      }

      enterFacility(key){
        const fp = FACILITY_POSITIONS.find(f => f.key === key);
        if (!fp) return;
        this._currentFacility = key;
        this.isoX = fp.tx + (Math.random() - 0.5) * 0.35;
        this.isoY = fp.ty + (Math.random() - 0.5) * 0.35;
        this._facilityTimer = 0;
        this._facilityStayMax = rnd(120,300);
        this.applyFacilityEffect(key, true);
      }

      leaveFacility(){
        this._currentFacility = null;
        this._facilityTimer = 0;
        this.dirX = Math.random() > .5 ? 1 : -1;
        this.dirY = Math.random() > .5 ? 1 : -1;
      }

      applyFacilityEffect(key, isEntry){
        const eff = FACILITY_EFFECT[key];
        if (!eff) return;

        const [lo, hi] = eff.range;
        const base = isEntry ? rnd(lo, hi) : rnd(1,2);
        const mul = bloodlineFacilityMul(this);
        const gain = Math.floor(base * mul);
        let hpChange = 0;

        if (isEntry) {
          hpChange = eff.costHp > 0
            ? Math.floor(eff.costHp * (0.8 + Math.random() * 0.4))
            : Math.floor(eff.costHp * (0.7 + Math.random() * 0.6));
        }

        if (eff.stat === 'power')   this.stats.power = clamp(this.stats.power + gain, 1, 99);
        if (eff.stat === 'wisdom')  this.stats.wisdom = clamp(this.stats.wisdom + gain, 1, 99);
        if (eff.stat === 'hp')      this.stats.hp = clamp(this.stats.hp + gain, 1, this.stats.maxHp);
        if (eff.stat === 'loyalty') this._loyalty = clamp(this._loyalty + gain, 0, 100);

        this.stats.hp = clamp(this.stats.hp + hpChange, 1, this.stats.maxHp);

        if (isEntry && (gain > 0 || hpChange !== 0)) {
          let text = '';
          if (eff.stat === 'hp') text = `体力 +${gain}`;
          else text = `${eff.label} +${gain}`;
          if (hpChange !== 0) text += `（体力 ${hpChange > 0 ? '+' : ''}${hpChange}）`;
          showFacilityActivity(this, text, eff.color);
        }
      }
    }

    function getWarriorScreenPos(warrior){
      const canvas = document.getElementById('iso-canvas');
      const rect = canvas.getBoundingClientRect();
      const tileW = Math.min(canvas.width * 0.18, canvas.height * 0.22);
      const tileH = tileW * 0.5;
      const cx = canvas.width / 2;
      const cy = canvas.height * 0.28;
      const x = cx + (warrior.isoX - warrior.isoY) * tileW * 0.5;
      const y = cy + (warrior.isoX + warrior.isoY) * tileH * 0.5;
      return {
        x: rect.left + (x / canvas.width) * rect.width,
        y: rect.top + (y / canvas.height) * rect.height
      };
    }

    function showFloatText(warrior, text, color){
      const layer = document.getElementById('bubble-layer');
      const pos = getWarriorScreenPos(warrior);
      const lr = layer.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'float-text';
      el.textContent = text;
      el.style.color = color || '#fff';
      el.style.left = (pos.x - lr.left) + 'px';
      el.style.top = (pos.y - lr.top - 30) + 'px';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 1900);
    }

    function showFacilityActivity(warrior, text, color){
      const layer = document.getElementById('bubble-layer');
      const pos = getWarriorScreenPos(warrior);
      const lr = layer.getBoundingClientRect();
      const el = document.createElement('div');
      el.className = 'facility-activity';
      el.textContent = text;
      el.style.color = color || '#ffdd88';
      el.style.left = (pos.x - lr.left) + 'px';
      el.style.top = (pos.y - lr.top - 40) + 'px';
      layer.appendChild(el);
      setTimeout(() => el.remove(), 2400);
    }

      window.addEventListener('resize', resize);

        const h = canvas.clientHeight;

        const tileH = tileW * 0.5;
        const cx = w / 2;

          y: cy + (ix + iy) * tileH * 0.5

        ctx.lineTo(x, y + tileH/2);
        ctx.lineTo(x - tileW/2, y);
        ctx.closePath();
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.strokeStyle = stroke;
        ctx.lineWidth = 1;
        ctx.stroke();
